body:
  text: 欽定四庫全書爾雅注疏卷十晉郭璞注唐陸徳明音義宋邢昺疏釋魚第十六音義魚字又作說文云魚水蟲也疏案說文云魚水蟲也此篇釋其見於經傳者是以不盡釋魚名至於龜蛇貝鼈之類以其皆有鱗甲亦魚之類故總曰釋魚也鯉注今赤鯉魚疏鯉赤鯉魚詩云豈其食魚必河之鯉是也鱣注鱣大魚似鱏而短鼻口在頷下體有邪行甲無鱗肉黄大者長二三丈今江東呼爲黄魚音義鱣張連反即黄魚也鱏音尋又音滛字林云長鼻魚也重千斤頷户感反行戸郎反疏鱣郭義具注陸璣云鱣出江海三月中從河下頭來上鱣身形似龍銳頭口在頷下背上腹下皆有甲縱廣四五尺今於盟津東石磧上鉤取之大者千餘斤可蒸爲􅌜又可爲鮓魚子可爲醤詩衛風碩人云鱣鮪發發是也鰋注今鰋額白魚音義鰋音偃白魚額魚格反疏今鰋額白魚郭以目驗言之也詩周頌云鰷鱨鰋鯉是也鮎注别名鯷江東通呼鮎爲鮧音義鮎郭奴謙反舍人夲無此字鯷音提字林云青州人呼爲鮎鯷鮧大兮反說文云大鮎也陶𢎞景云今人並呼慈疏郭氏云别名鯷江東通呼鮎爲鮧案此經鯉鱣鰋鮎舎人曰鯉一名鱣孫炎曰鰋一名鮎則是舍人以鯉鱣為一魚孫炎以鰋鮎爲一魚郭氏以為四魚者如陸璣之言又以時語驗之則鯉鱣鰋鮎皆異魚也故郭氏云先儒及毛詩訓傳皆謂此魚有兩名今此魚種類形狀有殊無縁强合之爲一物是郭氏所以異也鱧注鮦也音義鱧音禮字或作鱺又作䗍同廣雅云鱺鰑鮦也本草作䗍云一名鮦魚陶注云今皆作鱧字舊言是公蠣蛇所變今亦有相生者鮦大勇反疏鱧今䱰魚也鮦與䱰音義同又詩小雅云魚麗于罶魴鱧是也鯇注今鯶魚似鱒而大音義鯇華板反郭胡夲反字林下短反鯶胡本反又下短反一夲作故本反鱒才損反疏舍人云鱧一名鯇郭氏所不取也鯊鮀注今吹沙小魚體圓而有點文音義鯊本又作魦詩云魚麗于罶鱨鯊鮀徒何反疏鯊一名鮀詩小雅云魚麗于罶鱨鯊陸璣云魚狹而小常張口吹沙故郭氏云今吹沙小魚也鮂黑鰦注即白鯈魚江東呼爲鮂音義鮂徂秋反鰦音兹鯈音條本亦作鮋又音由又直留反又音酬疏鮂一名黒鰦郭云即白鯈江東呼爲鮂者以時驗而言之也詩頌曰鰷鱨鰋鯉是也鰼鰌注今泥鰌音義鰌音秋郭云泥鰌也字林云似鱣短小也泥乃兮反疏鰼一名鰌即今泥鰌也穴於泥中因以名云鰹大鮦小者鮵注今青州呼小鱺爲鮵音義鰹音堅鮦音童又逐拱反鮵大活反鱺音禮又力知反疏此即上云鱧也其大者名鰹小者名鮵故沣云今青州呼小鱺為鮵鱺與鱧音義同魾大鱯小者鮡注鱯似鮎而大白色音義魾蒲悲反或音丕鱯下化反一音獲鮡音兆又音姚疏鱯魚名似鮎而大白色鱯之大者别名魾小者别名鮡也鰝大鰕注鰕大者出海中長二三丈鬚長數尺今青州呼鰕魚爲鰝音義鰝郭音鄗戸老反鰕户加反數所主反疏鰕之大者長二三丈鬚長數尺若此之類者名鰝鯤魚子注凡魚之子總名鯤音義鯤音昆疏凡魚之子總名鯤詩云其魚魴鰥鄭云鰥魚子鯤鰥字異蓋古字通用也魯語云宣公夏濫於泗淵里革斷其罟而棄之曰魚禁鯤鮞鳥翼鷇卵蕃庶物也是亦以鯤為魚子也鱀是鱁注鱀䱜屬也體似鱏尾如䱡魚大腹喙小銳而長齒羅生上下相銜鼻在額上能作聲少肉多膏胎生健啖細魚大者長丈餘江中多有之音義鱀其冀反字林作音旣云胎生魚是本或作鯷非鱁音逐本亦作逐䱜七各七畧二反鱏尋淫二音䱡居六巨六二反字林云魚有兩乳出樂浪一曰出江說文同喙香穢反膏音高胎他來反啖大敢反疏鱀一名是鱁䱜之屬也云體似鱏者字林云鱏長鼻魚也重千斤傳曰伯牙鼔琴鱏魚出聽是也鱀魚之體似之也云尾如䱡魚者説文云䱡魚名出樂浪潘國一曰䱡魚江東有兩乳今鱀魚之尾如䱡魚之尾故云尾如䱡魚也云大腹以下者時驗而言也鱦小魚注家語曰其小者鱦魚也今江東亦呼魚子未成者爲鱦音義鱦郭音繩顧音孕夲或作䱆同疏案家語宓子賤仕魯爲單父宰孔子使巫馬期往觀政焉期隂免衣弊裘入界見䰻得魚輙捨之期問焉曰凡䰻者爲得魚也何以得魚郤捨之曰魚之大者名為鱄鱄吾大夫愛之其小者名鱦吾大夫欲長之是以得二者輙捨之是也引之證鱦是小魚之名也鮥鮛鮪注鮪鱣屬也大者名王鮪小者名鮛鮪今宜都郡自京門以上江中通出鱏鱣之魚有一魚狀似鱣而小建平人呼鮥子即此魚也音義鮥郭音洛字林作鯦巨救反鮛書育反鮪于軌反字林于九反或曰即鱏魚也似鱣而長鼻體無鱗甲鱣知連反上時掌反疏郭義具注陸璣云鮪魚形似鱣而青黒頭小而尖似鐵兠鍪口亦在頷下其甲可以摩薑大者不過七八尺益州人謂之鱣鮪大者爲王鮪小者為鮛鮪一名鮥肉色白味不如鱣也今東萊遼東人謂之尉魚或謂之仲明仲明者樂浪尉也溺死海中化爲此魚又曰河南鞏縣東北崖二山腹有穴舊說云此穴與江湖通鮪從此穴而来北入河西上龍門入漆沮故張衡賦云王鮪岫居山穴為岫謂此穴也月令季春薦鮪於寢廟天官漁人春薦王鮪是也鯦當魱注海魚也似鯿而大鱗肥羙多鯁今江東呼其最大長三尺者爲當魱音義鯦具救反又徐秋反似鯿而長三尺字林作鮥音格云當魱也顧作鯦同魱郭音胡一音互鯿字又作鯾方仙反字林云魚也案魚似魴而大腝細而長鯁工杏反說文云魚骨也字林工孟反疏鯦一名當魱海魚也注云似鯿而大鱗者案鯿似魴而大腹細而長今鯦魚似之但鱗大耳云肥羙以下者以時驗而知也鮤鱴刀注今之鮆魚也亦呼爲魛魚音義鮤音列顧閭結反鱴亡節反刀字亦作魛字林云刀魚飲而不食鮆徂禮反又徐爾反字林云刀魚也才豉反字或作鱭疏鮤名鱴刀郭氏云今之鮆魚也說文云鮆飲而不食刀魚也九江有之亦呼爲魴魚是則此魚一名鮤魚一名鱴刀一名魴魚一名鮆魚也鱊鮬鱖鯞注小魚也似鮒子而黑俗呼為魚婢江東呼爲妾魚音義鱊郭古􅉸反字林于一反沈音述又音聿鮬郭音歩字林丘于反施蒲悲反鱖音厥夲亦作厥字林凡綴巨月二反鯞章酉反本或作帚鮒符付反廣雅云鰿也音積字林子狄反疏郭云小魚也似鮒子而黒廣雅云鮒鰿也此魚似其小者故云鮒子而黑色爲異也江東呼為妾魚說文云鯜魚出樂浪潘國是也魚有力者鰴注强大多力音義鰴字或竹䲚許韋反疏凡魚之强大多力異於羣輩者名鰴魵鰕注出穢邪頭國見吕氏字林音義魵符云反又符粉反顧孚粉反郭云小鰕别名鰕下家反字或作蝦邪羊嗟反疏魵魚一名鰕郭云出穢邪頭國見吕氏字林案說文亦云鮅鱒注似鯶子赤眼音義鮅音必字林云魴也鱒才損反說文云赤目魚一音仕轉反或直轉反鯶呼夲反疏鮅一名鱒詩云九之魚鱒魴陸璣云鱒似鯶魚而鱗細於鯶赤眼是也魴魾注江東呼魴魚爲鯿一名魾音義魴字林音房云赤尾魚魾音丕又音毗鯿必連反疏魴一名魾江東呼爲鯿詩云其魚魴鰥陸璣云魴今伊洛濟潁魴魚也廣而薄肥恬而少力細鱗魚之羙者遼東梁水魴特肥而厚尤羙於中國魴故其鄉語曰居就糧梁水魴是也鯬鯠注未詳蜎蠉注井中小蛣蟩赤蟲一名孑孓廣雅云音義鯬力兮反又音棃廣雅云魾鯬鯠郭音來埤蒼云鯬鯠魾也字林作音七蜎郭狂兗反字林一全反又一耎反蟲貌也一曰蟲也蠉郭香兗反吕火全反蛣古節反又音吉或五結反蟩居月反孑紀列反字林云無右臂古熱反孓九月反字林云無左臂也廣雅云孑孓蜎也疏井中小赤蟲也一名蜎一名蠉一名蛣蟩又一名孑孓廣雅云孑孓蜎是也蛭蟣注今江東呼水中蛭蟲入人肉者爲蟣音義蛭沈吕豬秩反謝豬悌反一音之逸反本草謂之水蛭一名蚑一名至掌案說文今俗呼為馬蜞亦名馬耆即楚王食寒葅所得而吞之能去結積也蚑蜞同音其然釋蟲已有蛭蝚至掌郭云未詳依本草即是水蛭也蟣郭音祁字林云齊人名蛭也夲草又作蚑疏此水中蟲喜入人肉者江東呼為蟣本草謂之水蛭一名馬蜞一名馬耆即楚王食寒葅得而吞之能去結積者是也科斗活東注蝦蟆子音義科苦禾反字或作斗樊孫云科斗蟾諸子也郭云蝦蟇子活東如字謝施音括舍人夲作東蝦音遐蟆音麻疏郭云蝦蟆子此蟲一名科斗一名活東頭圓大而尾細古文似之故孔安國云皆科斗文字是也魁陸注夲草云魁狀如海蛤圓而厚外有理縦横即今之蚶也音義魁苦回反郭云狀如海蛤案本草海蛤一名魁蛤又有魁蛤一名魁陸一名活東並生東海說文云蛤有三皆生于海蛤厲千歳雀所化秦人謂之牡厲海蛤者百歳燕所化也魁蛤一名復絫老服翼所化縱子容反蚶火甘反字書云蛤也出㑹稽可食疏即魁蛤也見本草案本草蟲魚部云魁蛤一名魁陸生東海正圓兩頭空表有文陶隱居注云形似紡軠小狭長外有縱横文理云是老蝙蝠化為者是也即今之蚶也者案字書云蚶蛤也出㑹稽可食是也然則又一名蚶也蜪蚅注未詳鼁􅖚蟾諸注似蝦蟆居陸地淮南謂之去蚥在水者黽注耿黽也似青蛙大腹一名土鴨音義蜪徒刀反蚅於革反鼁起㩀反􅖚音秋蟾音占蚥音甫又音扶甫反黽莫辛反耿耕幸反蛙戸媧反鴨於甲反疏此有多種鼁􅖚一名蟾諸郭云似蝦蟆居陸地淮南謂之去蚥然蟾諸非蝦蟆但相似耳案本草蝦蟆陶注云此是腹大皮上多痱磊者也蟾諸亦類此抱朴子曰蟾諸夀三千嵗者頭上有角頷下有丹書八字𤣥中記云蟾諸生角者食之夀千嵗是也其居水者名黽一名耿黽一名土鴨狀似青蛙而腹大爲異陶注本草云大而青脊者俗名上鴨其鳴甚壯即此黽也陶又云一種小形善鳴喚名爲鼃者即郭云青蛙者也蜌螷注今江東呼蚌長而狭者爲螷音義蜌歩禮反又扶氐反字林小蛤也螷謝歩佳反郭毗支反字林作沈父幸反施蒲鯾反蚌歩項反本或作蜯下同狭乎夹反疏蜌一名螷蚌屬也說文云脩爲螷圓爲􅛔郭云今江東呼蚌長而狭者為螷其肉可為醢周禮醢人職饋食之豆云脾析螷醢是也蚌含漿注蚌即蜃也音義蜃字又作􅜹市忍反字林雉入海所化也疏說文云蜃屬郭云即蜃也謂老産珠者也一名蚌一名含漿周禮謂之貍物鼈三足能龜三足賁注山海經曰從山多三足鼈大􅟣山多三足龜吳興郡陽羡縣君山上有池池中出三足鼈又有六眼龜音義鼈字又作鱉卑滅反能如字又奴代反龜字林古追反字又作賁謝音奔又音墳顧彼義反羡似面反疏鼈龜皆四足三足者異故異其名鼈之三足者名能龜之三足者名賁也案中山經云游戲山東南三十五里曰從山從水出其上潛其下其中多三足鼈食之無蠱疫是從山多三足鼈也又云放臯山東五十七里曰大􅟣山陽狂水出焉西南注伊水中多三足龜食者無大疾可以已腫是大􅟣山多三足龜也云吳興郡以下者以時驗而言也蚹蠃螔蝓注即蝸牛也音義蚹音附一音扶卜反蠃力禾反下同注作螺字亦同螔余支反又音斯蝓羊朱反蝸工花反或工禾反疏蚹蠃一名螔蝓郭云即蝸牛也案夲草蝸牛陶注云生山中及人家頭形似蛣蝓但背負殻爾海邉又一種正相似以火炙殻便走出食之益顔色名寄居亦可作醢周禮饋食之豆羹葅蠃醢是也蠃小者蜬注螺大者如斗出日南漲海中可以爲酒杯音義蜬本又作函顧古含反又呼含反下同謝音含螺力禾反漲音張又音帳杯布廻反疏蠃與螺音義同其小者名蜬螖蠌小者蟧注螺屬見埤蒼或曰即蟚螖也似蟹而小音義螖音滑字林音骨蠌音澤字林大各反蟧力刀反埤避移反蟚音彭疏螖即蟚螖也似蟹而小一名蠌其小者别名蟧案埤蒼云即蟚螖郭氏兩從之蜃小者珧注珧玉珧即小蚌音義珧餘招反山海經云激汝之水多蜃珧郭注云蚌屬也字書云玉珧肉不可食唯杫可食耳衆家夲皆作濯疏蜃大蛤也月令云孟冬之月雉入大水爲蜃其小者名珧一名玉珧可飾佩刀鞘詩傳云天子玉琫而珧珌是也山海經嶧臯山臯水出焉東注激汝水其中多蜃珧龜俯者靈注行頭低仰者謝注行頭仰前弇諸果注甲前長後弇諸獵注甲後長左倪不類注行頭左庳今江東所謂左食者以甲卜審右倪不若注行頭右庳爲右食甲形皆爾音義低丁兮反謝如字衆家本作射弇古掩字又作揜於檢反果衆家作裹唯郭作此字獵力輒反倪五計反亦有本作睨下同類力愧反又力魏反庳普計反下同疏此辨龜之俯仰前後左右其形不同其名亦異也云龜者目諸龜也云俯者靈者謂行時頭低周禮天龜曰靈屬是也云仰者謝者謂行時頭仰周禮地龜曰繹屬是也云前弇諸果者諸辭也謂甲前長弇覆者名果周禮東龜曰果屬是也云後弇諸獵者諸亦辭也謂甲後長弇覆者名獵周禮南龜曰獵屬是也云左倪不類者倪庳也不發聲也謂行時頭左邉庳下者名類周禮西龜曰靁屬是也云右倪不若者不亦發聲也謂行時頭右邉庳下者名若周禮北龜曰若屬是也周禮又云各以其方之色與其體辨之鄭注云屬言非一也色謂天龜𤣥地龜黄東龜青西龜白南龜赤北龜黒俯者靈仰者繹前弇果後弇獵左倪靁右倪若是其體也東龜南龜長前後在陽象經也西龜北龜長左右在隂象緯也天龜俯地龜仰東龜前南龜卻西龜左北龜右各從其耦也是周禮先有成文故此釋之鄭取此文為說其言正同惟繹與謝靁與類小異耳其義亦同案賈公彦說周禮以倪爲睥睨則左倪右倪是左顧右顧也郭氏以庳觧倪及云今江東所謂左食者皆以時驗而言也云以甲卜審言用此龜之甲以卜吉凶審諦也貝居陸贆在水者蜬注水陸異名也貝中肉如科斗但有頭尾耳大者魧注書大傳曰大貝如車渠車渠謂車輞即魧屬小者鰿注今細貝亦有紫色者出日南𤣥貝貽貝注黒色貝也餘貾黄白文注以黄爲質白文爲點餘泉白黄文注以白爲質黄爲文點今紫貝以紫爲質黑爲文點蚆博而頯注頯者中央廣兩頭銳蜠大而險注險者謂汚薄􅜽小而橢注即上小貝橢謂狭而長此皆說貝之形容音義贆字亦作猋方遥反魧謝户郎反郭胡黨反字林作蚢云大貝也又口葬反輞音罔鰿音賾字林音績貽顧餘之反本又作胎他來反字林作云黑貝也大才反貾直其反泉如字夲或作蚆普巴反郭音巴字林同云蠃屬博而頯也博布莫反頯郭匡軌反顧又巨追反蜠郭求隕反又丘筠反汚音烏􅜽施音賾郭音責沈音積或作鰿又作資又作同橢他果反狹而長也狹乎夹反疏此辨貝居陸居水大小文彩不同之名也云貝者目諸貝也說文云貝爲介蟲也取其甲以飾器物古者貨貝周有泉貝至秦廢貝行錢居陸者名贆在水者名蜬至大者名魧至小者名鰿黑色之貝名貽貝黄爲質白爲文點者名餘貾白爲質黄爲文點者名餘泉中央廣兩頭銳者名蚆大而汚薄名蜠小而狭長者名􅜽注書大傳云西伯既戡黎紂囚之羑里散宜生之江淮之浦取大貝大如大車之渠以贖其辠是也考工記謂車輞爲渠故云渠謂車輞其貝形曲及大小如車輞故比之也引之以證此經魧是其大如車輞者故云即魧屬舍人云貝水中蟲也李廵曰餘貾貝甲黄爲質白爲文彩餘泉貝甲白爲質黄為文彩陸璣疏云貝水中介蟲也龜鼈之屬其文彩小大之殊甚衆古者貨貝是也餘貾黄爲質以白爲文餘泉白為質黄為文又有紫貝白質如玉紫點爲文皆行列相當其貝大者當至一尺六七寸者皆今九真交趾以爲杯盤寳物也是先儒相傳爲然但解紫貝與郭氏少異陸璣以白爲質紫爲文郭氏以紫爲質黒為文是其異也書云文貝仍几詩云成是貝錦山海經隂山濁浴水出焉南流注蕃澤其中多文貝皆謂此餘貾餘泉也云即上小貝知者以其同名􅜽也云橢謂狹而長者詩云墮山喬嶽楚辭云南北順橢其循幾何皆是橢爲狹長之名也蠑螈蜥蝪蜥蝪蝘蜓蝘蜓守宫也注轉相解博異語别四名也音義蠑音榮本或作榮螈音原字林作蚖五丸反云蠑螈蛇毉也說文同蜥先歴反蝪音亦說文字林作易云在壁曰蝘蜓在草曰蜥蜴案東方朔云非守宫即蜥蜴是二物也方言云秦晉西夏謂之守宫澤中曰蜥蜴南楚謂之蛇毉或謂之蠑螈蝘烏典反蜓徒典反字或作疏詩小雅正月胡爲虺蜴謂此也蠑螈蜥蝪蝘蜓守宫一物形狀相類而四名也字林云蠑螈蛇毉也說文云在草曰蜥蝪在壁曰蝘蜓方言云秦晉西夏謂之守宫或謂之蠦􅫢或謂之蜥蝪南陽呼蝘蜓其在澤中謂之蜥蝪南楚謂之蛇毉或謂之蠑螈又東方朔云非守宫即蜥蜴案此諸文則在草澤中者名蠑螈蜥蜴在壁名蝘蜓守宫也博物志云以器養之食以真朱體盡赤重七斤搗萬杵以點女人體終身不滅耦則落故號守宫陸璣疏云青緑色大如指形狀可惡是也镻蝁注蝮屬大眼最有毒今淮南人呼蝁子音義镻大結反說文云蛇毒長也蝁烏洛反蝮芳福反疏蛇也蝮虺之屬大眼有毒一名镻又名蝁淮南人呼蝁子者是也螣螣蛇注龍類也能興雲霧而遊其中淮南云蟒蛇音義螣直錦反字又作朕又作騰並同徒登反字林云神蛇也慎子云螣蛇遊疏蛇似龍者也名螣一名螣蛇能興雲霧而遊其中也蟒當爲莽淮南子覽㝠篇說女媧云功烈上際九天下契黄壚名聲被後世光輝熏萬物乗雷車服應龍驂青蚪援絶瑞席蘿圖黄雲絡前白螭後奔蛇許慎云奔蛇馳蛇是也或曰淮南人呼此螣爲蟒義亦通蟒王蛇注蟒蛇最大者故曰王蛇音義蟒音莽字林云大蛇也疏此蛇之最大者也名蟒又名王蛇與上螣蛇異蝮虺博三寸首大如擘注身廣三寸頭大如人擘指此自一種蛇名爲蝮虺音義蝮字亦作芳服反又亡六反此蛇色如綬鼻上有針大者百餘斤又一名反鼻鼻一孔虫即虺字也虛鬼反說文云上一名蝮博三寸首大如擘字林同舍人亦云蝮一名虺案蝮大蛇也非虺之類故郭云别自一種蛇名蝮虺博廣也謂身廣三寸擘甫革反劉昌宗音薄歴反孫云頭如拇指郭注三蒼云擘大指也案手足大指俱名擘也種章勇反疏博廣也首頭也擘拇指也此自一種毒蛇名蝮虺身廣三寸其頭大如人拇指案郭注三蒼云擘大指也蒼頡篇以為足大指皆得名擘故注云頭大如人擘指又名拇指孫炎云頭如拇指是也案舍人曰蝮一名虺江淮以南曰蝮江淮以北曰虺孫炎曰江淮以南謂虺爲蝮廣三寸頭如拇指有牙最毒郭曰此自一種蛇人自名為蝮虺今蛇細頸大頭色如艾綬文文間有毛似豬鬛鼻上有針大者長七八寸一名反鼻如虺類足以明此自一種蛇如郭意此蛇人自名蝮虺非南北之異蛇實是蟲以有鱗故在釋魚且魚亦蟲之屬也鯢大者謂之鰕注今鯢魚似鮎四脚前似彌猴後似狗聲如小兒啼大者長八九尺别名鰕音義鯢五兮反鰕音遐鮎乃兼反猴音侯狗音苟疏鯢雌鯨也大者長八九尺别名鰕魚枕謂之丁注枕在魚頭骨中形似篆書丁字可作印魚膓謂之乙魚尾謂之丙注此皆似篆書字因以名焉禮記云魚去乙然則魚之骨體盡似丙丁之屬因形名之音義枕之甚反篆丈轉反印一刃反腸音長去羌吕反盡子忍反疏此釋魚之骨體腸尾之名也其魚頭中骨為枕其骨形似篆書丁字故因謂之丁其膓似篆書乙字尾似篆書丙字亦因名之也注禮記曰魚去乙此禮記内則文也鄭𤣥注云乙魚體中害人者名也今東海鰫魚有骨名乙在目旁狀如篆乙食之鯁人不可出者與此經違非郭義也一曰神龜注龜之最神明二曰靈龜注涪陵郡出大龜甲可以卜縁中文似瑇瑁俗呼爲靈龜即今觜􅏲龜一名靈􅏲能鳴三曰攝龜注小龜也腹甲曲折解能自張閉好食蛇江東呼爲陵龜四曰寳龜注書曰遺我大寳龜五曰文龜注甲有文彩者河圖曰靈龜負書丹甲青文六曰筮龜注常在蓍叢下濳伏見龜策傳七曰山龜八曰澤龜九曰水龜十曰火龜注此皆說龜生之處所火龜猶火䑕耳物有含異氣者不可以常理推然亦無所怪音義涪音浮又音苻緣悅絹反蝳字又作音代或作徒妹反蝐字又作音妹觜字又作蟕子移反或子隨反􅏲以規反又下圭反字林云大龜似猬也攝謝之渉反郭祛浹反施之協反折之舌反解音蟹好呼報反遺唯季反筮舌制反蓍音尸叢才空反說文云草衆也見音現策初革反傳直戀反處昌慮反疏易損卦六五爻辭云十朋之龜弗克違馬鄭皆取此文觧之則此經十龜所以釋易也神龜者龜之最神明者也禮統曰神龜之象上圓法天下方法地背上盤法丘山𤣥文交錯以成列㝛長尺二寸明吉凶不言而信者是也靈龜龜之有靈次神龜者雒書曰靈龜者𤣥文五色神靈之精也攝龜龜之小者腹甲曲折能自張閉者也寶龜傳國所實者春秋經曰盗竊寳玉大弓公羊傳云寳者何龜青純何休云謂之寳者言世世寳用之辭是也文龜甲有文彩者筮龜在蓍叢下者山龜生山中者澤龜生澤中者水龜生水中者火龜生火中者注書曰遺我大寳龜此周書大誥文也注河圖至青文引之以證龜甲有文彩也其實河圖說靈龜也非此經之文龜取其一邉耳注云常在至龜策傳者龜策傳云傳曰上有壽蓍下有神龜又云聞蓍滿百莖者其下必有神龜守之其上常有青雲覆之傳曰天下和平王道得而蓍莖長丈其叢生滿百是也注云火龜猶火䑕耳者嫌龜不生於火故以火䑕猶之也郭注山海經云今去扶南東萬里有耆薄國復五千里許有火山國其山雖霖雨火常燃火中白䑕時出山邉求食人捕得之以毛作布名之火澣布是也釋鳥第十七音義說文云短尾羽衆禽總名也案此文云二足而羽謂之禽禽即烏也疏說文云烏者羽禽之總名象形字左傳曰少皥氏以鳥名官之類此篇廣釋其名也佳其鳺鴀注今䳕鳩音義佳如字旁或加烏非也鳺本亦作夫字林甫于反鴀本亦作不同方浮方九二反夫不楚鳩也䳕音浮又音孚疏舍人曰鵻一名鳺鴀李廵曰今楚鳩也某氏引春秋云祝鳩氏司徒祝鳩即鵻其鳺鴀者故爲司徒也郭云今䳕鳩詩曰翩翩者鵻毛傳云鵻鳺鴀也一㝛之鳥鄭箋云一㝛者一意於所㝛之木又云烏之謹慤者人皆愛之此是謹慤孝順之鳥也陸璣云今小鳩也一名䳕鳩幽州人或謂之鷱瞗梁宋之間謂之隹揚州人亦然鶌鳩鶻鵃注似山鵲而小短尾青黑色多聲今江東亦呼爲鶻鵃音義鶌辰勿反鳩九牛反鶻音骨鵃竹交反或竹牛反字林云鶻鵃小種鳩也毛詩草木疏云斑鳩也桂陽人謂之斑隹疏春秋左氏傳云鶻鳩氏司事也杜注云鶻鳩鶻鵃也春來秋去故爲司事即此鶌鳩也舍人曰鶌鳩一名鶻鵃今之斑鳩孫炎曰鶻鳩一名鶻鵃月令云鳴鳩拂其羽郭云似山鵲而小短尾青黒色多聲今江東亦呼爲鶻鵃案舊說及廣雅皆云斑鳩非也鳲鳩鴶鵴注今之布榖也江東呼爲穫榖音義鳲音尸字又作䲩鴶郭古八反字林音吉鵴居六反穫户郭反疏左傳云鳲鳩氏司空也詩召南云維鵲有巢維鳩居之皆謂此也郭云今之布榖江東呼為穫榖埤蒼云鴶鵴方言云戴勝謝氏云布榖類也陸璣疏云今梁宋之間謂布榖為鴶鵴一名擊榖一名桑鳩案戴勝自生穴中不巢生而方言云戴勝非也鷑鳩鵧鷑注小黒鳥鳴自呼江東名為烏鵙音義鷑吕郭巨立反施音及下同鵧謝苻悲反郭力買反苻尸反字林父隹反疏鷑鳩一名鵧鷑郭云小黒鳥鳴自呼江東名為烏鵙鴡鳩王鴡注鵰類今江東呼之為鶚好在江渚山邉食魚毛詩傳曰鳥摯而有别音義鴡本又作雎七徐反鵰音彫鶚五各反好呼報反下皆同摯音至别彼列反疏李廵曰王鴡一名鴡鳩郭云鵰類今江東呼之為鶚好在江渚山邉食魚詩周南云闗關鴡鳩陸璣疏云鴡鳩大小如鴟深目目上骨露幽州謂之鷙而揚雄許慎皆曰白鷢似鷹尾上白注毛傳曰鳥鷙而有别此即關雎傳文也鷙至也謂鳥中雌雄情意至厚而猶能有别故以興后妃說樂君子情深猶能不淫其色鵅鵋䳢注今江東呼鵂鶹為鵋䳢亦謂之鴝鵅音義鵅古客反注同鵋巨記反本亦作忌䳢去其反本亦作欺下䳢老同鵂音休鶹音留鴝古侯反疏鵅一名鵋䳢郭云今江東呼鵂鶹為鵋䳢亦謂之鴝鵅鶅鵵軌注未詳鴗天狗注小鳥也青似翠食魚江東呼為水狗音義鶅側其側事二反鵵他故反本亦作免同鴗音立疏鴗一名天狗鷚天鸙注大如鷃雀色似鶉好高飛作聲今江東名之曰天鷚音綢繆音義鷚字又作郭音繆亡侯反說文力幼反孫音流又丘虯反鸙予若反說文作蘥鷃音晏又一練反鶉音淳綢音儔疏鷚一名天鸙郭云大如鷃雀色似鶉好高飛作聲今江東名之曰天鷚音綢繆者詩豳風云綢繆牖户取其音同故讀從之鵱鷜鵝注今之野鵝音義鵱音六鷜郭力于反謝施力俟反鵝字亦作鵞五河反疏鵱鷜者野鵝之别名也郭云今之野鵝鶬糜鴰注今呼鶬鴰音義鶬音倉字林七羊反糜音眉字林作鶥音同鴰古活反說文音刮疏一名麋鴰郭云今呼鶬鴰鵅烏􅖂注水鳥也似鶂而短頸腹翅紫白背上綠色江東呼烏􅖂音義鵅音洛􅖂郭音駮字林方沃反孫音暴鶂五歴反又五結反水鳥也春秋云六鷁退飛過宋都是也頸古郢反駮布角反疏鶬一名􅖂郭云水鳥也似鶂而短頸腹翅紫白背上綠色江東呼烏􅖂舒鴈鵝注禮記曰出如舒鴈今江東呼􅕯音義􅕯郭音加說文音河廣雅云􅕯鵝鴈也疏鵝一名舒鴈今江東呼􅕯某氏云在野舒翼飛遠者爲鵝李廵曰野曰鴈家曰鵝注禮記曰出如舒鴈引禮記文也案彼云私覿愉愉焉出如舒鴈鄭注云威儀自然而有行列是也舒鳧鶩注鴨也音義鳧音符鶩音木鴨一甲反疏鶩鴨也一名舒鳧李廵曰野曰鳧家曰鶩禮記内則辨鳥之不可食者云舒鳧翠鳽鵁鶄注似鳧脚高毛冠江東人家養之以厭火災音義鳽郭五革反字林音肩鵁音交本亦作交鶄音精本又作精厭以冉反疏鵁鶄一名鳽輿鵛鷋注未詳鵜鴮鸅注今之鵜鶘也好羣飛沈水食魚故名洿澤俗呼之爲淘河音義興音餘樊孫本作鸒鵛古形反本亦作徑鷋音徒鵜大兮反鴮毛詩傳作洿同音烏郭火布反鸅音澤毛詩傳作澤鶘音胡淘大刀反疏舍人曰鵜一名鴮鸅郭云今之鵜鶘也好羣飛沈水食魚故名鴮澤俗呼之爲淘河詩曹風云維鵜在梁陸璣疏云鵜水鳥形如鶚而極大喙長尺餘直而廣口中正赤頷下胡大如數升囊若小澤中有魚便羣共抒水滿其胡而棄之令水竭盡魚在陸地乃共食之故曰淘河鶾天雞注鶾雞赤羽逸周書曰文鶾若彩雞成王時蜀人獻之音義鶾本又作榦胡旦反樊云一名山雞疏鶾一名天雞赤羽之鳥也注云逸周書曰者雖是周書不在尚書百篇内故曰逸周書今所謂汲冢周書也云文鶾若彩雞者王㑹篇文也案彼云蜀人以文鶾文鶾者若翬雉孔晁注云鳥有文彩者是也云成王時蜀人獻之者案彼孔晁注又云王城旣成大會諸侯及四夷故知當成王時蜀人獻之也鷽山鵲注似鵲而有文彩長尾觜脚赤音義鷽郭音渥又音學又才五反字林乙竺反鵲七約反觜子髓反廣雅云口也疏山鵲一名鷽說文云知來事鳥也鷣負雀注鷣鷂也江東呼之爲鷣善捉雀因名焉音義鷣音淫負字或作同房九反鷂以照反字林云鷙鳥下同疏鷣一名負雀齧齒艾注未詳鶨䳢老注鳹鶨也俗呼爲癡鳥音義鶨呂郭丑絹反孫勑亂反鳹巨炎反字林云句喙鳥疏鶨一名䳢老字林云勾喙鳥䲩鴳注今鴳雀音義鳸說文作雇籀文也左傳詩並作扈音户鴳音晏疏别二名也郭云今鴳雀案舍人李廵孫炎郭氏皆斷老上屬鳸下屬解云鶨一名䳢老鳸一名鴳鴳雀也唯樊光斷鶨䳢爲句以老下屬注云春秋云九扈爲九農正九扈者春扈夏扈秋扈冬扈棘扈行扈宵扈桑扈老扈是以老爲下屬唯鴳不重耳杜預仍云老扈鴳鴳非郭義桑鳸竊脂注俗謂之青雀觜曲食肉好盜脂膏因名云音義竊音切脂音之疏桑鳸一名竊脂郭云俗謂之青雀觜曲食肉好盜脂膏因名云鄭𤣥詩箋云竊脂肉食陸璣毛詩疏云竊脂青雀也好竊人脯肉脂及筩中膏故以名竊脂也諸儒說竊脂皆謂盜脂膏卽如下云竊𤣥竊黃者豈復盜竊𤣥黃乎案下篇釋獸云虎竊毛謂之虦貓魋如小熊竊毛而黃竊毛皆謂淺毛竊即古之淺字但此烏其色不純竊𤣥淺黒也竊藍青也竊黃淺黃也竊丹淺赤也四色皆具則竊脂爲淺白也而諸儒必爲盜竊脂膏者以此經下别云桑鳸與竊𤣥竊黃等并列則爲淺白者也春秋九扈是也此自别一種靑雀好竊脂肉目驗而然詩小雅交交桑扈是也且鄭𤣥郭璞陸璣皆當世名儒無容不知竊爲淺義脂爲白色而待後人駮正也後人不達此㫖妄說異端非也鳭鷯剖葦注好剖葦皮食其中蟲因名云江東呼盧虎似雀靑斑長尾音義鳭丁堯反鷯力小反剖普口反疏鳭鷯一名剖葦郭云好剖葦皮食其中蟲因名云江東呼蘆虎似雀青斑長尾桃蟲鷦其雌鴱注鷦􅛯桃雀也俗呼爲巧婦音義鷦子遥反雌字或作䳄同七移反鴱本又作鳮謝五蓋反呂郭音又􅛯亡小亡消二反字林云澤雀疏舍人曰桃蟲名鷦其雌名鴱郭云鷦􅛯桃雀也俗呼爲巧婦此鷦􅛯小鳥而生鵰鶚者也詩周頌云肇允彼桃蟲拚飛維鳥毛傳云桃蟲鷦也鳥之始小終大者陸璣疏云今鷦鷯是也微小於黃雀其雛化而為鵰故俗語鷦鷯生鵰鄭詩箋云鷦之所爲鳥題肩也或曰鶚皆惡聲之鳥其義未詳方言說巧婦之名自關而東謂之工爵或謂之過羸或謂之女􅬡或謂之鸋鴂自關而西謂之桑飛或謂之韈雀是也鶠鳳其雌皇注瑞應鳥雞頭蛇頸燕頷龜背魚尾五彩色高六尺許音義鶠音偃鳳郭云瑞應鳥也雞頭蛇頸燕頷龜背魚尾五彩色高六尺許說文云神鳥也天老曰鳳像麟前鹿後蛇頸魚尾龍文龜背燕頷雞喙五色備舉出於東方君子之國翺翔四海之外過崑崙飲砥柱濯羽弱水暮宿風穴見則天下大安寧毛詩草木疏云雄曰鳯雌曰皇一名鶠其雛名鸑鷟或曰鳯一名鸑鷟其形鴻前鹿後蛇頸魚尾龍文龜身燕頷雞喙首戴徳頸掲義背負仁翼挾信心抱忠足履正尾繫武非梧桐不棲非竹實不食朝鳴曰發明晝鳴曰上翔夕鳴曰滿昌昬鳴曰固常夜鳴曰保長得其屢象之一則過之二則翔之三則集之四則春秋居之五則為身居之皇本亦作凰應音譍頸吉井反頷乎感反疏鳳一名鶠郭云瑞應鳥雞頭蛇頸燕頷龜背魚尾五彩色高六尺許說文云神鳥也天老曰鳯像麟前鹿後蛇頸魚尾龍文龜背燕頷雞喙五色備舉出於東方君子之國翺翔四海之内過崑崙飲砥柱濯羽弱水暮宿丹穴見則天下大安寧字從鳥凡聲鳳飛則羣鳥從以萬數故鳳古作朋字山海經曰丹穴之山有鳥焉其狀如鶴五彩而文名曰鳳首文曰徳翼文曰順背文曰義膺文曰仁腹文曰信是鳥也飲食自歌自舞見則天下大安寧京房易傳曰鳳皇高丈二漢時鳳皇數至漢書云高五六尺是說鳳皇之狀也䳭鴒雝渠注雀屬也飛則鳴行則摇音義䳭詩作脊同精益反鴒詩作令同力丁反雝於㳟反渠字或作􅖥疏䳭鴒一名雝渠水鳥也郭云雀屬也飛則鳴行則摇詩小雅云脊令在原陸璣疏云大如鷃雀長脚長尾尖喙背上青赤色腹下白頸下黒如連錢故杜陽人謂之連錢是也鸒斯鵯鶋注鴉烏也小而多羣腹下白江東亦呼爲鵯烏音義鸒弋庶反毛詩傳云鸒鵯鶋雅烏也小爾雅云小而腹下白不反哺者謂之雅烏說文字林皆云楚烏也一名鸒一名鵯鶋秦云雅烏斯本多無此字案斯是詩人協句之言後人因將添此字也而俗本遂斯旁作鳥謬甚鵯音匹鶋音居本或作居疏鸒斯一名鵯鶋郭云鴉烏也小而多羣腹下白江東亦呼為鵯烏詩小雅云弁彼鸒斯毛傳云鸒鵯鶋然則此鳥名鸒而云斯者語辭猶蓼彼蕭斯之類也小爾雅云小而腹下白不反哺者謂之鴉烏說文字林皆云楚烏是也燕白脰烏注脰頸音義燕於見反象形字或加鳥者非脰音豆疏脰頸也小爾雅云白項而羣飛者謂之燕烏燕烏白脰烏是也鴽鴾母注䳺也青州呼鴾母音義鴽音如鴾字或作牟音謀母如字李音無舍人本作蕪䳺烏南反疏李廵云鴽䳺一名鴾母郭云䳺也青州呼鴾母田䑕所化者也月令季春田䑕化爲鴽是也密肌繫英注釋蟲已有此名疑誤重音義肌音飢繫音計重直用反巂周注子巂鳥出蜀中音義巂戸圭反說文周燕也蜀王望帝淫其相妻慙亡去爲子巂鳥故蜀人聞子巂皆起曰是望帝也疏子巂鳥也出蜀中說文云巂蜀王望帝化爲子巂今謂之子規是也燕燕鳦注詩云燕燕于飛一名𤣥鳥齊人呼鳦音義鳦音乙夲或作乙或音軋疏燕燕又名鳦郭云一名𤣥鳥齊人呼鳦此燕燕即今之燕古人重言之詩云燕燕于飛漢書童謡云燕燕尾涎涎是也孫炎舎人以巂周燕燕鳦鳥一物三名郭所不取也注詩云燕燕于飛者詩邶風衛莊姜送歸妾之詩也云一名𤣥鳥者案月令仲春之月𤣥鳥至以其色云故謂之𤣥鳥是也云齊人呼鳦者案商本紀云簡狄行浴𤣥鳥墮其卵取而吞之因孕生契諸緯候皆言簡狄吞鳦卵而生契是𤣥烏又名鳦也鴟鴞鸋鴂注鴟類音義鴟尺之反或作鵄鴞于驕反鸋音寧又音甯鴂音决鸋鴂今之巧婦鳥疏舍人云鴟鴞一名鸋鴂郭云鴟類詩豳風云鴟鴞毛傳云鴟鴞鸋鴂陸璣疏云鴟鴞似黃雀而小其喙尖如錐取茅莠為窠以麻紩之如刺韈然縣著樹枝或一房或二房幽州人或謂之鸋鴂或曰巧婦或曰女􅬡闗東謂之過羸關西謂之桑飛或謂之韈雀或曰巧女先儒皆以為今之巧婦郭注此云鴟類又注方言云鸋鴂鴟鴞鴟屬非此小雀明矣是與先儒意異也今爾雅以郭氏為宗且依郭氏狂茅鴟注今􅣽鴟也似鷹而白怪鴟注即鴟鵂也見廣雅今江東通呼此屬爲怪鳥梟鴟注土梟音義狂如字本或作鵟茅本或作鶜􅣽字又作亡項反又亡江反字林云鴟也亡董反廣雅云茅鴟􅣽也鷹於陵反怪古拜反梟古堯反疏此别鴟類也茅鴟一名狂廣雅云茅鴟􅣽也郭云今􅣽鴟也似鷹而白怪鴟廣雅謂之鴟鵂郭云今江東通呼此屬為怪鳥梟一名鴟郭云土梟說文云梟食母不孝之鳥故冬至捕梟磔之字從鳥首在木上詩陳風云墓門有梅有鴞萃止毛傳云惡聲之鳥也一名鵩一名梟一名鴟大雅瞻卬云為梟為鴟陸璣云鴞大如斑鳩緑色惡聲之鳥也入人家凶賈誼所賦鵩鳥是也其肉甚美可為羹臛又可為炙漢供御物各隨其時鴞冬夏常施之以其美故也鶛劉疾注未詳生哺鷇注鳥子須母食之生噣雛注能自食音義鶛音皆又音界劉字或作留音留哺蒲路反說文云口中嚼食也鷇謝苦候反字林工豆反郭音同又古豆反鳥子須哺而食者燕雀之屬也史記云趙武靈王探雀鷇而食之是也食本或作飤同音嗣噣竹角反義當作啄雛字林云雞子也匠于反又仕俱反鳥子生而能自啄者禮記云雛尾不盈握不食是也字或作鶵同或云仕俱反者是鳥子也匠于反者為鳯類也疏辨鳥子之異名也鳥子生須母哺而食名鷇謂燕雀之屬也史記趙武靈王探雀鷇而食之是也鳥生子而能自噣食者名雛謂雞雉之屬也禮記内則云雛尾不盈握弗食是也爰居雜縣注國語曰海鳥爰居漢元帝時琅邪有大鳥如馬駒時人謂之爰居音義爰本亦作鶢音袁居本或作鶋同李云爰居海鳥也樊云似鳯皇雜字亦作琅音郎邪似差反駒音俱疏爰居海鳥也大如馬駒一名雜縣漢元帝時琅邪有之注國語曰海鳥爰居者案魯語云海鳥曰爰居止於魯東門之外三日臧文仲命國人祭之展禽曰越哉臧孫之為政也夫祀國之大節也節政之所成也故制祭祀以爲國典今無故而加典非政之宜也今海鳥至已不知而祀之以爲國典難以言仁且知矣無功而祀之非仁也弗知而弗問非知也今茲海其有災乎夫廣川之鳥獸皆知辟其災是嵗海多大風冬煖是其事也春鳸鳻鶞夏鳸竊𤣥秋鳸竊藍冬鳸竊黃桑鳸竊脂棘鳸竊丹行鳸唶唶宵鳸嘖嘖注諸鳸皆因其毛色音聲以爲名竊藍青色音義鳸音户鳻本亦作分同扶云反或芳云反鶞勑倫反本亦作遁藍力甘反行如字唶唶說文云借字也一云大聲也莊百反顧子夜反又子亦反廣雅云唶唶鳴也嘖嘖莊革反廣雅云鳴也說文嘖呼也疏李廵云諸鳸别春夏秋冬四時之名唶唶嘖嘖鳥聲貌也郭云諸鳸皆因其毛色音聲以為名竊藍青色案昭十七年左傳云九扈為九農正以此八鳸并上鳸鴳為九賈逵注云春鳸鳻鶞相五土之宜趣民耕種者也夏鳸竊𤣥趣民耘苗者也秋鳸竊藍趣民收歛者也冬鳸竊黃趣民蓋蔵者也棘鳸竊丹為果驅烏者也行鳸唶唶晝為民驅鳥者也宵鳸嘖嘖夜為農驅獸者也桑鳸竊脂爲蠶驅雀者也老鳸鷃鷃趣民收麥令不得晏起者也舍人樊光注爾雅其言亦與賈同其意皆謂以鳸爲官還令依此諸鳸而動作也然則趣民耕耘及收歛蓋藏其事可得召民使聚而總號令之其為果驅鳥為蠶驅雀豈得多置官方使之就果樹入蠶室為民驅之哉又晝驅鳥夜驅獸不可竟日通宵常在田野溥天之下何以可周且其言不經難可㩀信也故郭氏及杜預皆不從也鵖鴔戴鵀注鵀即頭上勝今亦呼爲戴勝鵖鴔猶鶝語聲轉耳音義鵖彼及反郭房汲反字林方立反鴔皮及反郭北及反字林房立反又音伏鵀本亦作䋕女金反施没沁反方言云戴鵀一名戴南一名戴勝勝户證反皮逼反鶝音逼又音福疏李廵云戴勝一名鵖鴔郭云鵀卽頭上勝今亦呼為戴勝鵖鴔猶鶝語聲轉耳月令季春云戴勝降于桑方言云燕之東北朝鮮洌水之間謂之鶝䲹自闗而東謂之戴鵀或謂之戴鳻或謂之戴勝東齊吳揚之間謂之鵖鴔自關而西謂之服鶝或謂之鶝鶭澤虞注今婟澤鳥似水鴞蒼黑色常在澤中見人輙鳴喚不去有象主守之官因名云俗呼為護田鳥音義鶭本或作鴋說文作䲱孚往反澤虞字林作鸅鸆音同婟戸故反下同說文云嫪也廣雅云妬也聲類云婟嫪戀惜也字書作嫮一本作詃皆同嫪力報反疏澤虞一名鶭郭云今婟澤鳥似水鴞蒼黑色常在澤中見人輙鳴喚不去有象主守之官因名云俗呼為護田鳥說文云婟嫪也聲類云婟嫪戀惜也以比鳥戀惜池澤見人不去因名婟澤鳥也鶿鷧注即鸕鶿也觜頭曲如鉤食魚音義鶿音慈字林云似鶂而黒鷧郭懿翳二音字林英莅反觜子髓反疏别二名也字林云似鶂而黒郭云即鸕鶿也鷯鶉其雄鶛牝痺注鶉䳺屬音義鷯字林力彫反鶉順春反鶛音皆牝毗忍反舊扶死反痺婢支反施音婢郭音卑䳺烏含反疏李廵曰别雄雌異方之言鶉一名鷯其雄名鶛其牝名痺郭云鶉䳺屬䳺即上云鴽鴾母田䑕所化者鶉舊云蝦蟇所化者也鸍沈鳧注似鴨而小長尾背上有文今江東亦呼爲鸍音義鸍郭音施尸支反字林亡支反沈直今反疏鸍一名沈鳧郭云似鴨而小長尾背上有文今江東亦呼爲鸍陸璣云大小如鴨青色卑脚短喙水鳥之謹愿者也大雅云鳧鷖在涇鴢頭鵁注似鳧脚近尾略不能行江東謂之魚鵁音髐箭音義鴢謝烏卯反郭音杳字林音幼頭字或作投鵁本或作郭音髐虚交反又音交近附近之近箭子賤反疏鴢一名頭鵁郭云似鳧脚近尾略不能行江東謂之魚鵁音髐箭嫌讀為鵁鶄之鵁故音之山海經云青要山畛水出焉北注河其中有鳥名鴢狀如鳧青身朱目赤尾食之宜子是也鵽鳩寇雉注鵽大如鴿似雌雉䑕脚無後指岐尾爲鳥憨急羣飛出北方沙漠地音義鵽貞刮直活二反寇苦候反鴿古合反岐音祁憨呼濫反字書云愚也漠音莫疏冦雉一名鵽鳩郭云鵽大如鴿似雌雉䑕脚無後指岐尾為鳥憨急羣飛出北方沙漠地又謂之泆泆下云寇雉泆泆是也萑老鵵注木也似鴟鵂而小免頭有角毛脚夜飛好食雞音義萑音桓鵵本又作菟音疏老鵵一名萑郭云木也似鴟鵂而小頭有角毛脚夜飛好食雞鶟鶦鳥注似雉青身白頭音義鶟徒忽反本亦作突鶦字或作胡疏鶟鶦鳥名也郭云似雉青身白頭狂㝱鳥注狂鳥五色有冠見山海經音義㝱亡貢反疏㝱鳥一名狂五彩之鳥也山海經者案大荒西經云栗廣之野有五彩之鳥有冠名曰狂鳥是也皇黃鳥注俗呼黃離留亦名摶黍音義摶徒端反黍音暑疏舍人曰皇名黃鳥郭云俗呼黄離留亦名摶黍詩周南云黃鳥于飛陸璣疏云黃鳥黃留也或謂之黃栗留幽州人謂之黃鸎一名倉庚一名商庚一名鵹黃一名楚雀齊人謂之摶黍常葚熟時來在桑間故里語曰黃栗留看我麥黃葚熟亦是應節趨時之鳥也自此以下諸言倉庚商庚鵹黃楚雀倉庚鵹黃之文與此一也翠鷸注似燕紺色生鬱林音義鷸聿述二音左傳云鄭子臧好聚鷸冠即翠鳥毛也紺古闇反疏李廵曰鷸一名為翠其羽可以為飾樊光云青羽出交州郭云似燕紺色生鬱林說文云翠青羽雀也案漢書尉佗獻文帝翠鳥毛然則鷸羽可以飾器物故僖二十四年左氏傳鄭子臧好聚鷸冠是也鸀山鳥注似鳥而小赤觜穴乳出西方音義鸀濁蜀二音乳如注反下同疏山鳥名鸀蝙蝠服翼注齊人呼爲蟙䘃或謂之仙䑕音義蝙音邉蝠音福蟙章弋反䘃亡北反疏蝙蝠一名服翼郭云齊人呼為蟙䘃或謂之仙䑕方言云蝙蝠自關而東謂之服翼或謂之䑕自闗而西秦隴之間謂之蝙蝠北燕謂之蟙䘃晨風鸇注鷂屬詩曰鴧彼晨風音義晨如字本或作鷐鸇之然反說文上仙反字林已仙反鷂羊召反鴧戸橘反字林云鸇飛貌疏舍人曰晨風一名鸇摯鳥也郭云鷂屬陸璣云鸇似鷂黄色燕鳹勾喙嚮風摇翮乃因風飛急疾擊鳩鴿燕雀食之注鴧彼晨風詩秦風晨風篇文也楊鳥白鷢注似鷹尾上白音義鸉音楊鷢巨月反說文云白鷢王雎也字林同鷹於陵反疏楊鳥一名白鷢郭云似鷹尾上白寇雉泆泆注即鵽鳩也音義泆音逸鷆蟁母注似烏􅖂而大黃白雜文鳴如鴿聲今江東呼爲蚊母俗說此鳥常吐蚊因以名云音義鷆田眞二音蟁夲或作鴖郭云皆古蚊字音文案說文蟁正字蚊俗字或作字林亡巾反􅖂布角反疏鷆一名蟁母蟁蚊音義同鷉須鸁注鷉鷿鷉似鳧而小膏中瑩刀音義鷉他兮反字或作鷈鸁力戈反鷿蒲歴反瑩烏暝反瑩磨瑩也疏鷉一名須鸁郭云鷉鷿鷉似鳧而小膏中瑩刀鼯䑕夷由注狀如小狐似蝙蝠肉翅翅尾項脅毛紫赤色背上蒼艾色腹下黃喙頷雜白脚短爪長尾三尺許飛且乳亦謂之飛生聲如人呼食火烟能從高赴下不能從下上高音義鼯音吾或作由字或作狐音呼項乎講反脅許業反喙許穢反呼火故反上時丈反疏鼯鼠一名夷由倉庚商庚注即鵹黃也音義倉庚商庚本或作皆加鳥鵹音離鴩餔敊注未詳音義鴩大結反說文音吐節反餔音歩字或作鷹鶆鳩注鶆當爲鷞字之誤耳左傳作鷞鳩是也音義鶆郭讀作爽所丈反衆家並依字樊云耒鳩鷞鳩也字林作鶆音來云鶆鳩鷹也疏樊光曰鶆鳩鷞鳩也春秋曰鷞鳩氏司宼鷹鷙故爲司寇郭云鶆當爲鷞字之誤耳左傳曰鷞鳩是也案昭十七年左傳郯子曰少皥氏以鳥名官鷞鳩氏司寇也杜注云鷞鳩鷹也鷙故為司寇主盜賊是也鶼鶼比翼注說已在上音義鶼古恬反衆家作兼李云鳥有一目一翅相得乃飛故曰兼兼也疏鶼鶼比翼鳥名也說在釋地篇故注云說已在上鵹黃楚雀注即倉庚也音義鵹詩傳作離阮謝同力知反施音黎說文作云其色黎黒而黃也文釋云離黃倉庚也鳴則蠶生字林作力兮反毛詩草木疏云黃麗留也或謂之黃栗留也幽州人謂之黃鸎一名倉庚一名商庚一名鵹黃一名楚雀齊人謂之摶黍闗西謂之黃鳥方言云自關而東謂之倉庚關西謂之黃鸝留也鴷斵木注口如錐長數寸常斵樹食蟲因名云音義鴷音列斵陟角反錐章誰反疏斵木鳥一名鴷郭云口如錐長數寸常斵樹食蟲因名云鸄鶶鷵注似烏蒼白色音義鸄郭古狄反字林工了反鶶音唐鷵音徒疏鸄一名鶶鷵郭云似烏蒼白色鸕諸雉注未詳或云即今雉音義鸕謝力吳反施力魚反鷺舂鉏注白鷺也頭翅背上皆有長翰毛今江東人取以爲睫㰚名之曰白鷺縗音義鷺音路毛詩傳云白鳥也字林音盧舂舒容反鉏仕居反翰音汗睫字又作䀹音接說文云目旁毛也三蒼云􅗃毛也㰚力知反縗西雷反又西河反疏鷺一名舂鉏郭云白鷺也詩陳風云值其鷺羽陸璣疏云鷺水鳥也好而潔白故謂之白鳥齊魯之間謂之舂鉏遼東樂浪吳揚人皆謂之白鷺青脚高尺七八寸尾如鷹尾喙長三寸頭上有長毛十數枚長尺餘毿毿然與衆毛異好欲取魚時則弭之今吳人亦養焉楚威王時有朱鷺合沓飛翔而來舞則復有赤者舊鼓吹朱鷺曲是也然則鳥名白鷺赤者少耳鷂雉注青質五彩鷮雉注即鷮雞也長尾走且鳴鳪雉注黃色鳴自呼鷩雉注似山雞而小冠背毛黃腹下赤項緑色鮮明秩秩海雉注如雉而黑在海中山上鸐山雉注長尾者雗雉鵫雉注今白鵫也江東呼白雗亦名白雉雉絶有力奮注最健鬬伊洛而南素質五彩皆備成章曰翬注翬亦雉屬言其毛色光鮮江淮而南青質五彩皆備成章曰鷂注即鷂雉也南方曰􅔧東方曰鶅北方曰鵗西方曰鷷注說四方雉之名音義鷂郭音遥下同鷮音驕鳪音卜郭方木反又方角反鷩謝必滅反吕郭方世反秩秩本又作失失謝持乙反施音逸鸐音狄又音濯雗户旦反字又作翰鵫吕郭音罩陟孝反又音卓鬬丁豆反又丁侯反翬音暉􅔧本或作直留反郭徒留反字林女知反鶅側其反鵗音希鷷郭音尊謝徂尊反疏别諸雉之名也鷂雉者郭云青質五彩即下文江淮而南者是也云鷮雉者郭云即鷮雞也長尾走且鳴說文云鷮長尾雉走鳴乗轝以尾為防釳著馬頭上詩小雅云有集維鷮陸璣疏云鷮微小於鸐也走而且鳴曰鷮鷮其尾長肉甚美故林木山下人語曰四足之美有麃兩足之美有鷮麃者似鹿而小是也山海經文凡山其鳥多白鷮云鳪雉者雉之黃色鳴自呼者名鳪云鷩雉者案山海經牝山之上鳥多赤鷩郭注云即鷩雉也尚書謂之華蟲周禮春官司服職云鷩冕七章之服也畫此鷩雉郭云似山雞而小冠背毛黃腹下赤項綠色鮮明云秩秩海雉者海雉一名秩秩郭云如雉而黒在海中山上云鸐山雉者山雉一名鸐郭云尾長者今俗呼山雞是也云雗雉鵫雉者别二名也郭云今白鵫也江東呼白雗亦名白雉云雉絶有力奮者謂雉之壯大有力能鬭者名奮郭云最健鬭云伊洛而南素質五彩皆備成章曰翬者李廵曰素質五彩備其文章鮮明曰翬孫炎曰翬雉白質五色爲文也郭云翬亦雉屬言其毛色光鮮王后之服以爲飾案周禮内司服云王后之六服禕衣鄭注云王后之服刻繒爲之形而彩畫之綴於衣以為文章禕衣畫翬者是也云江淮而南青質五彩皆備成章曰鷂者有雉青質五彩備具而成文章名曰鷂雉郭云即鷂雉也亦王后之服以為飾周禮云榆狄鄭注云榆狄畫摇者是也摇與鷂音義同云南方曰􅔧東方曰鶅北方曰鵗西方曰鷷者郭云說四方雉之名左傳曰五雉為五工正杜預取四方之雉并上翬雉以爲五也必取翬雉者伊洛土之中區故與四方之雉為五也樊光賈逵以此五雉分屬五工無所慿㩀不可采用故略而不言鳥䑕同穴其鳥爲鵌其䑕爲鼵注鼵如人家䑕而短尾鵌似鵽而小黃黑色穴入地三四尺䑕在内鳥在外今在隴西首陽縣鳥䑕同穴山中孔氏尚書傳云共為雄雌張氏地理記云不爲牝牡音義鵌音途鼵徒忽反鵽丁刮反牝毗忍反牡音母疏尚書禹貢云導渭自鳥䑕同穴不言鳥獸之名故此釋之也李廵云鵌鼵鳥䑕之名共處一穴天性然也孔氏尚書傳云共為雄雌張氏地理記云不為牝牡郭氏竝載此言未知誰得其實也鸛鷒鶝鶔如鵲短尾射之銜矢射人注或說曰鸛鷒鶝鶔一名􅦀羿音義鸛音歡鷒徒端反鶝音福字亦作福鶔而由反本亦作柔或作蹂音同鵲七藥反射食亦反注同􅦀字又作隋徒課反字書云古以為懈惰字羿五計反古之善射者言此鳥捷勁雖羿之善射亦懈惰不敢射也故以名云疏鸛鷒一名鶝鶔郭云或曰鸛鷒鶝鶔一名􅦀羿案字書云􅦀古以為觧惰字羿古之善射者此言鳥捷勁雖羿之善射亦觧惰不敢射也故以名云郭圖讚云鸛鷒之鳥一名􅦀羿應弦銜鏑矢不著地逢蒙縮手養由不睨鵲鶪醜其飛也翪注竦翅上下音義鶪古闃反字林工役反翪子工反字林作㚇音子弄反竦思勇反上時掌反疏鶪伯勞也翪竦也醜類也鵲鶪之類不能翺翔逺飛但竦翅上下而已鳶烏醜其飛也翔注布翅翺翔音義鳶悅專反字亦作䳒疏鳶鴟也鴟烏之類其飛也布翅翺翔鷹隼醜其飛也翬注鼓翅翬翬然疾音義鷹字或作應隼西尹反本或作鶽案隹即鳥也無勞更加疏舍人曰謂隼鷂之屬也翬翬其飛疾羽聲也郭云鼓翅翬翬然疾是急疾之鳥也說文云隼鷙鳥也陸璣云隼鷂屬也齊人謂之擊征或謂之題肩或謂之雀鷹春化為布榖者是也鳧鴈醜其足蹼注脚指間有幕蹼屬相著其踵企注飛即伸其脚跟企直音義踵章勇反聲類云足跟也企去豉反字或作跂跟音根釋名云足後曰跟疏鳧水鳥也鴈陽鳥也蹼猶蹼屬相著之謂也踵脚跟也鳧鴈之類脚指間有幕蹼屬相著飛則伸其脚跟企直也鳥鵲醜其掌縮注飛縮脚腹下音義縮所六反疏掌足也鳥鵲之類飛時縮足於其腹下亢鳥嚨注嚨謂喉嚨亢即咽其粻嗉注嗉者受食之處别名嗉今江東呼粻音義亢胡郎反郭云咽也舎人云鳥高飛也嚨力東反樊云亢星鳥也嚨嚨亢鳥之頸也郭云嚨謂喉嚨舍人云嚨嚨財可見也喉音侯蒼頡篇云咽也咽於見反說文云嗌也又於賢反粻音張嗉音素處昌慮反疏别鳥咽嗉之名也亢者鳥喉嚨也其受粻處名嗉郭云嚨謂喉嚨亢即咽也嗉者受食之處别名嗉今江東呼粻鶉子鳼鴽子鸋注别䳺鶉鶵之名音義鶉音純鳼音文鴽音如鸋音寧䳺烏含反雛仕俱反疏别䳺鶉鶵之名也鶉之子鶵名鳼鴽之子鶵名鸋雉之暮子爲鷚注晚生者今呼少雞爲鷚音義鷚力救反又力求反說文作雡云鳥大雛也一曰雉之暮子也字林力幼反少詩照反下文同疏鷚是雉晚生者今呼少雞為鷚鳥之雌雄不可别者以翼右掩左雄左掩右雌音義别彼列反疏鄭詩箋云隂陽相下之義也鳥少美長醜爲鶹鷅注鶹鷅猶留離詩所謂留離之子音義長丁丈反鶹音留鷅音栗夲亦作栗留離詩字如此或作鶹離後人改耳疏鳥之少為子者美長食母而醜其名為鶹鷅郭云鶹鷅猶留離詩所謂留離之子者案詩弼風云瑣兮尾兮流離之子陸璣疏云流離梟也自闗而西謂梟為流離其子適長大還食其母故張奐云鶹鷅食母許慎云梟不孝鳥是也流與鶹同二足而羽謂之禽四足而毛謂之獸疏别禽獸之異也凡語有通别别而言之羽則曰禽毛則曰獸所以然者禽者擒也言鳥力小可擒捉而取之獸者守也言其力多不易可擒先須圍守然後乃獲故曰獸也通而為說鳥亦可曰獸獸亦可曰禽故曲禮鸚鵡不曰獸而猩猩通曰禽也易云王用三驅失前禽則驅走者亦曰禽也又周禮司馬職云大獸公之小禽私之以此而言則禽未必皆鳥也又鄭𤣥注周禮云凡鳥獸未孕曰禽周禮又云禽作六贄卿羔大夫鴈白虎通云禽者鳥獸之總名以其小獸可擒故得通名禽也鶪伯勞也注似鶷􅗾而大左傳曰伯趙氏音義鶷音鎋􅗾工鎋反又午鎋反字林云鶷􅗾似伯勞而小疏李廵云伯勞一名鶪樊光曰春秋傳曰少皥氏以鳥名官伯趙氏司至伯趙鶪也以夏至來冬至去郭云似鶷􅗾而大陳思王惡鳥論曰伯勞以五月鳴應隂氣之動陽為生仁養隂為殺殘賊伯勞盖賊害之鳥也其聲鵙鵙故以其音名云月令仲夏之月鵙始鳴是也郭云似鶷􅗾而大者字林云鶷􅗾似伯勞而小故也注左傳伯趙氏者案昭十七年云伯趙氏司至者也杜注云伯趙伯勞也以夏至鳴冬至止是也倉庚黧黃也注其色黧黒而黃因以名云音義黧力兮反又力知反疏即上黧黄也郭云其色黧黒而黃因以名云爾雅注疏卷十
