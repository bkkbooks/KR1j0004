body:
  text: 爾雅注疏卷九考證釋木第十四栲山樗注亦類漆樹陸本漆作桼鄭樵曰似樗而葉差狹樗木葉似椿江東呼爲虎目葉脫處有痕如樗蒱子又如眼目梅柟注似杏實酢陸疏廣要曰爾雅之梅柟乃似豫章者古稱楩柟豫章景純不得以似杏實酢解之柀煔說文柀檆也本草别錄榧實一名柀子爾雅翼榧似煔而材光文彩如栢古謂文木通作棐杻檍注葉新生可飼牛陸本飼作飤椋即來陸本來作棶栵栭注樹似槲􅈪而庳小陸本栭作檽槲作檴落注可以爲杯器素陸本杯作桮楥柜枊注未詳鄭樵曰烏臼也葉可染皂子可作油燭狄藏橰貢綦注皆未詳陸本藏作臧朹檕梅本草補遺朹子山樝一物也枓者聊注未詳臣照按說文枓高木也下文下句曰樛高木曰枓此處或應連上節言朹檕梅其枓者又名聊也否則錯簡應在高木曰枓之下言枓者聊也詩椒聊且遠條且魄榽橀鄭樵曰按此俗呼朴樹其木如檀子大如梧桐子而黄棆無疵鄭樵曰今謂之釣樟檉河柳鄭樵曰殷檉也生水畔其葉經冬變紅旄澤柳鄭樵曰杞柳也如蘆荻可編爲捲葙楊蒲柳鄭樵曰水楊也葉圜濶樹與柳相似采薇所謂楊柳依依諸慮山櫐注似葛而麤大陸本麤作麆杭魚毒石經杭作杬鄭樵曰今南人謂之杭樹其皮可煎汁藏梅也故編修朱彛尊曰爾雅杬魚毒郭璞注云杬大木子似栗生南方皮厚汁赤中藏卵果陸徳明釋文云杬音元又作芫鄭樵注云今南人謂之杬木其皮可煎汁藏梅三家之釋爾雅若是蓋杬之用在子沈瑩臨海異物志云杬味似楮用其皮汁和鹽漬鴨子裴淵廣州記云杬殻似栗赤色子大如栗散有棘刺破其外皮肉白如脂肪著核不離賈思勰齊民要術作杬子法云杬木皮凈洗細莖剉煮取汁率二斗及熟下鹽一升和之汁極冷内罋中浸鴨子一月煮而食之廣韻注杬木名出豫章煎汁藏果不壞錢易南部新書云湖州歳貢黄杬子連蔕木𤓰故李景先戲蘇特曰使君貴部有三黄杬子五蔕木𤓰左文質呉興統紀云大暦元年進單黄杬子談鑰吳興志云唐歳貢單杬子一千三百五十顆重黄杬子一千三百顆樂史寰宇記湖州土産單杬子予嘗問之州人莫有識者洪邁容齋隨筆云杬如蒼耳益母莖幹不純漬以藏鴨子則染其外陶宗儀輟耕録云今人以米湯和入鹽草灰以團鴨卵謂曰鹹杬子按今無錫土俗猶然坊本爾雅乃譌杬爲杭於是凡詮杬者皆以杭義釋之考諸顧野王玉篇於杬則注木名於杭則注州名二義固秩然不紊也若單黄重黄三黄則造杬子法有不同爾至若卞彬下酒以杬皮爲肴則又專用皮已檓大椒鄭樵曰秦椒也與蜀椒相似稍大而香氣減焉俗呼樛子寓木宛童鄭樵曰有二種一種葉圜名蔦一種似麻黄名女蘿櫟其實梂鄭樵曰亦謂之橡一名皁斗其實作梂似栗毬而小座接慮李陸本座作痤駁赤李鄭樵曰粉李也赤而著粉邊要棗石經邊作籩蹶洩苦棗陸本洩作泄還味捻棗石經捻作稔毛本作棯樸枹者鄭樵曰即柞木也劉劉杙注出交趾陸本趾作阯鄭樵曰即石榴本草謂之安石榴大而皵楸小而皵榎陸本皵作灌木叢木陸本灌作樌桑㸤有葚梔石經㸤作辨樕樸心陸本樸作㯷棧木干木注橿木也陸本橿作殭立死椔陸本椔作弊者翳陸本弊作蔽樅松葉栢身鄭樵曰此良材也今謂之松蘿柷州木髦柔英注皆未詳石經柷作祝椒醜莍陸本椒作茮石經作榝𤓰曰華之桃曰膽之棗李曰疐之樝梨曰鑽之石經疐作疐木族生爲灌陸本灌作樌釋蟲第十五􅝺茅蜩石經􅝺作􅝺蛄䗐强蝆注今米榖中蠧小黑蟲是也臣照按楊子方言螳螂或謂之蛘蛘姑䗐謂之强蛘說文作羊音是郭音注俱誤螳螂有斧故曰强若从虫芊則是米蟲矣不過當蠰注螗蜋别名陸本螗作螳蟋蟀蛬注亦名青􅖹陸本青􅖹作蜻蛚草螽負蠜陸本負作蝜蜤螽蜙蝑注俗呼蝽􅡂陸本蝽􅡂作舂黍螼蚓蜸蚕注江東呼寒蚓陸本寒作莫貈蟷蜋蛑陸本蟷作螳虰蛵負勞注或曰即蜻蛉也陸本勞作蟧蜻作青蟠䑕負注甕器底蟲陸本甕作瓮䖸羅注蠶䖸臣照按下文既以蛹爲蠶蛹則此䖸字或即白蛾葢上文是蟫白魚以類見也漢文帝紀建昭元年秋八月有白蛾羣飛蔽日師古注蛾若今之蠶蛾類也又古今注飛蛾善拂燈或因是得羅之名螒天雞陸本螒作翰傅負版注未詳臣照按唐柳宗元蝜蝂傳蝜蝂者善負小蟲也行遇物輒取卬其首雖困劇不止似即此蟲也蜆縊女注喜自經死陸本喜作熹次蟗鼅鼄䵹鼄鼄蝥注今江東呼蝃蝥陸本蝃作掇土䵹鼄鄭樵曰土中者能毒人俗謂天虵蠨蛸長踦陸本蠨作蟰蛭蝚至掌注未詳臣照按蛭蝚當是肌蛷俗名蠼䗏說文多足蟲也周禮秋官赤叐氏凡隙屋除其貍蟲注貍蟲􅟟肌蛷之屬又作蝫蛷淮南子說林訓曹氏之裂布蛷者貴之注曹布燒以傅蝫蛷瘡則愈故蛷者貴之果蠃蒲盧注即細腰蟲也石經蠃作臝陸本腰作要熒火即炤陸本熒作螢宻肌繼英注未詳鄭樵曰釋鳥有此誤重出耳蚅烏蠋陸本烏作䳋蠓蠛蠓注小蟲似蚋陸本蚋作蜹雔由樗繭陸本雔作讎翥醜罅陸本罅作罅鄭樵曰醜僻也猶人性之有僻然翥即蛀字借用耳此即蛀虫之有角甲者葢齧桑類也罅張拆也此蟲之僻在於張角拆甲臣照按若如鄭說以翥爲蛀則罅字當作罅隙解未有蛀類不鑽罅隙者如下文螟蟘之類是也食苖心螟食葉蟘食節賊食根蟊石經蟘作蟘陸本作􅠀賊作蠈鄭樵曰螟極纎細在苖之心若木中有蠧然今農家忌大小暑日降一種霏微者云即此蟲降也蟘詩作螣一種虫似螟蛉食苗葉而卷爲房賊即草虫類雖亦食葉好食節蟊未詳陸璣謂螻蛅據螻蛅雖穴土以居然亦取葉於穴中而食之元不食根惟陸田有之爾雅注疏卷九考證
