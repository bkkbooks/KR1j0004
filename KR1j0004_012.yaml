body:
  text: 爾雅注疏卷六考證釋地第九東方之羙者有醫無閭之珣玕琪焉石經玕作玗説文本作㺮石之似玉者列子殷湯篇珠玗之樹皆叢生又山海經開明北有玗琪樹注玗琪赤玉屬也然則音從余不從竿南方之美者有梁山之犀象焉鄭樵曰梁山在今汝州梁縣西南之美者有華山之金石焉鄭樵曰華山在今華隂北方之美者有幽都之筋角焉鄭樵曰幽都即幽州在今燕臣照按幽都郭邢以為山名鄭以為燕地鄭説近是東北之美者有斥山之文皮焉陸本斥作厈鄭樵曰今中國惟有竹箭金石筋角文皮五穀魚鹽之利如犀象與珠則生南海玉出于闐中國並無往往昔日有之後人採竭矣中有軹首蛇焉陸本軹作枳下者曰溼注公羊傳曰下平曰隰陸本隰作東至於泰逺西至於邠國南至於濮鈆北至於祝栗謂之四極鄭樵曰邠國非大王去邠之地觚竹北户西王母日下謂之四荒鄭樵曰疑日下即今日本東至日所出為太平西至日所入為大蒙陸本蒙作濛釋丘第十再成鋭上為融丘臣照按陸璣白雲賦興曜曽泉升迹融丘説文融煩氣上出也小篆作籕作鬲中出氣之象火形鋭也故火神亦名祝融其字左从鬲右从又从乃火氣也若从虫便不可解鬲傍火氣出鬲内物必融乃㑹意非從蟲音諧聲也上正章丘臣照按唐書地理志齊州濟南郡縣章丘蓋其地也堂途梧丘鄭樵本堂作當臣照按郭注不言堂字何義邢疏則曰當道有丘名梧丘然則堂字乃傳寫之訛也又按晏子景公田於梧丘此梧丘是齊地名水出其前渻丘水出其後沮丘水出其右正丘水出其左營丘臣照按説文渻少減也一曰水門沮禮月令地氣沮泄謂泄漏也左髙咸丘右髙臨丘前髙旄丘春秋桓公七年春二月己亥焚咸丘注咸丘魯地鄭樵曰旄丘在臨河縣東四十歩天下有名丘五其三在河南其二在河北注殆自别更有魁梧桀大者五陸本桀作傑爾雅注疏卷六考證
