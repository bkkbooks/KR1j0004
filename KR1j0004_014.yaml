body:
  text: 爾雅注疏卷七考證釋山第十一多大石礐注多盤石陸本盤作磐山上有水埒注有停泉陸本停作渟釋水第十二沃泉縣出縣出下出也石經作懸出灘沙出注今河中呼水中沙堆為灘鄭樵曰今錢塘亦有此語歸異出同流肥鄭樵本作歸異出同肥無流字河水清且瀾漪大波為瀾注言渙瀾陸本瀾作灡直波為徑陸本徑作徑庶人乘泭鄭樵曰泭與桴同據此亦書生牽於禮制之過夫梁航本為渡水設也不過隨其濶狹淺深之施不可士特舟過廣渡則不敢往諸侯維舟遇尋文之水則不復行寧有此理乎臣照按鄭樵之言砭迂儒拘牽之疢誠可快意然未悉古人之旨也造舟為梁本始于文王之迎太姒而後遂以為天子之禮猶漢髙微時冠竹皮冠而後遂以為劉氏冠也既天子造舟則諸侯之舟可四而不得造舟矣諸侯四則大夫二而士一矣士雖特舟乎若有徒杠輿梁則徑渡矣何用舟為諸侯維舟遇尋文之水則特舟可乘泭亦可也禮以多少為差者上可用下下不得用上寧獨舟然乎庶人乘桴孔子從大夫之後而思乘桴浮于海蓋欲自處于庶人而之荆蠻之國即子欲居九夷之意豈真蹈海而死乎愈可以徵庶人乘泭之為周制也鉤盤陸本盤作般爾雅注疏卷七考證
