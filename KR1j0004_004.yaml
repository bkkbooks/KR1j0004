body:
  text: 爾雅注疏卷二考證釋言第二鄭樵曰音發為言一音為一言釋詁者古言也格之以今釋言者今言也格之以正格懐来也陸本来作徕律遹述也鄭樵曰律即聿字若恵順也詩魯頌閟宫篇魯侯是若注若順也又萬民是若注順萬民之望也逸諐過也鄭樵曰逸縱逸也亦通作佚荐原再也注易曰水荐至今作水洊至屢暱亟也陸本屢作婁饙餾稔也鄭樵曰報蒸曰饙復蒸曰餾餥餱食也鄭樵曰餱乾食滷矜鹹苦也陸本矜作鹶流覃也覃延也陸本延作莚邕支載也鄭樵曰擁䕶支持皆載任之義隱占也禮少儀軍旅思險隐情以虞兆域也臣照按兆與肇同詩商頌𤣥鳥篇肇域彼四海箋肇當作兆疏言正天下之經界以四海為兆域是也郭邢則專以葬地言之肇敏也詩大雅江漢篇肇敏戎公用錫爾祉替廢也替滅也詩大雅召旻篇胡不自替職兄斯引注替廢也髦選也髦俊也臣照按詩小雅甫田篇丞我髦士注管子曰農之子恒為農野處而不暱其秀民之能為士者必足賴也是選義也大雅思齊篇譽髦斯士注髦俊也言令此士皆有譽於天下而成其俊乂之羙也是俊義也淩慄也鄭樵曰淩埤蒼作掕是偁舉也注書曰偁爾戈鄭樵曰偁通稱今書作稱康苛也臣照按康篆作從米莊子逍遥遊塵垢粃糠郭象注粃糠猶煩碎苛者必煩碎故曰康苛也猶言粃政也洵龕也注未詳龕方言注龕與戡同又與堪同逮遝也鄭樵曰遝猶言遝至也務侮也鄭樵曰疑侮為敏臣照按詩小雅常棣篇外禦其務國語作外禦其侮鄭樵之疑非也夷恱也陸本夷作恞跋躐也疐跲也鄭樵曰躐前倒跲後倒煽熾也熾盛也疏艶妻煽方處韓詩作閻妻扇方處漢書谷永傳閻妻驕扇日以不臧說文艶妻傓方處陸本盛作晠僨僵也鄭樵本僵作强注却偃曰强祈呌也石經呌作弇同也鄭樵本無此三字握具也鄭樵曰握即屋字是以邢疏引詩夏屋渠渠并引鄭箋云屋具也振訊也鄭樵曰訊當作迅偟暇也鄭樵曰偟亦作遑將資也詩召南鵲巢篇百兩將之苛妎也楚語弭其百苛妎其讒慝路史太古之民與物相友人無妎物之心般還也鄭樵曰郭注般馬之聲今左傳作班般班義通班師之班亦其義也辟歴也注未詳書君陳篇辟以止辟周禮秋官小司宼以八辟麗邦法歴書梓材殺人歴人注歴人者罪人所過漦盝也注漉漉出涎沫鄭樵曰郭氏云漉漉出涎沫然則盝即漉也集韻盝與漉淥􅜷通滲也陸本涎作唌寛綽也臣照按詩衛風淇澳篇寛兮綽兮箋綽兮謂仁於施舎又小雅角弓篇綽綽有裕傳綽綽寛也書無逸篇不寛綽厥心爾雅注疏卷二考證
