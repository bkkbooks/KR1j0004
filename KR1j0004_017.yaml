body:
  text: 欽定四庫全書爾雅注疏卷九晉郭璞注唐陸德明音義宋邢昺疏釋木第十四音義木之卜反說文云木冒也冒地而生也從屮下象其根白虎通云木之言踊也陽氣踊躍疏說文云木冒也冒地而生東方之行也白虎通云木觸也陽氣動躍觸地而出也種名雖多木爲總號此篇析别故云釋木也槄山榎注今之山楸音義槄地刀反郭又他皓反榎古雅反舍人本又作檟楸音秋疏李巡云山榎一名槄郭云今之山楸秦風云終南何有有條有梅陸璣疏云槄今山楸也亦如下田楸耳皮葉白色亦白材理好宜爲車板能濕又可爲棺木宜陽共北山多有之也栲山樗注栲似樗色小白生山中因名云亦類漆樹音義栲音考郭姑老反案方志云櫄樗栲漆相似如一櫄音勑倫反樗丑於反漆音七疏舍人曰栲名山樗郭云栲似樗色小白生山中因名云亦類漆樹俗語曰櫄樗栲漆相似如一詩唐風云山有樗陸璣疏語云山樗與下田樗略無異葉似差狹耳呉人以其葉爲茗方俗無名此爲栲者似誤也今所云爲栲者葉如櫟木皮厚數寸可爲車輻或謂之栲櫟許愼正以栲讀爲今人言栲失其聲矣柏椈注禮記曰鬯以椈音義柏音百椈弓六反鬯初亮反疏柏一名椈注禮記曰鬯以椈者上雜記文也彼鄭注云所以搗鬱也椈柏也是也髠梱注未詳椵柂注白椵也樹似白楊音義髠苦門反梱五門反椵徒亂反字林云木似白楊一名柂柂弋攴反疏椵一名柂郭云白椵也樹似白楊其材能濕禮記檀弓云柂椵鄭注云所謂椑棺也即引此文證之是也梅柟注似杏實酢音義梅莫迥反柟而占反又音南杏戸猛反酢七故反疏孫炎云荆州曰梅揚州曰柟郭云似杏實酢詩秦風終南云有條有梅陸璣云梅樹皮葉似豫樟葉大如牛耳一頭尖赤心華赤黄子青不可食柟葉大可三四葉一叢木理細緻於豫樟子赤者材堅子白者材脆是也柀煔注煔似松生江南可以爲船及棺材作柱埋之不腐音義柀音披又匹彼反煔字或作杉所咸反郭音芟又音纖棺音官腐音父疏柀一名煔俗作杉郭云煔似松生江南可以爲船及棺材作柱埋之不腐櫠椵注柚屬也子大如盂皮厚二三寸中似枳食之少味音義櫠音廢椵古雅反柚羊又反盂音于厚戸豆反又如字枳諸氏反疏櫠一名椵郭云柚屬也杻檍注似棣細葉葉新生可飼牛材中車輞關西呼杻子一名土橿音義杻女九反呂郭並汝九反檍於力反孛又作億說文云檍梓屬也棣大細反車昌蛇反輞音罔下同字林云也音渠橿居良反疏杻一名檍郭云似棣細葉葉新生可飼牛材中車輞關西呼杻子一名土橿詩唐風云隰有杻陸璣疏云葉似杏而尖白色皮正赤爲木多曲少直枝葉茂好二月中葉疎華如練而細蘂正白蓋樹今宮園種之正名曰萬嵗既取名於億萬其葉又好故種之共汲山下人或謂之牛筋或謂之檍材可爲弓弩幹也楙木瓜注實如小𤓰酢可食音義楙音茂疏木瓜一名楙郭云實如小瓜酢可食詩衛風投我以木瓜是也椋即來注今椋材中車輞音義椋音良來力臺反埤蒼字林並作棶云椋也疏椋一名即來郭云今椋材中車輞本草唐本注云葉似柿兩葉相當子細圓如牛李子生青熟黑其木堅重煑汁赤色爾雅云椋即來是也栵栭注樹似槲樕而庳小子如細栗可食今江東亦呼爲栭栗音義栵字林音例詩音同又音列栭音而毛詩草木疏文云葉如榆木理堅韌而赤今人謂之芝檽也槲胡木反樕桑木反詩云林有樸樕毛傳云小木也或作㯈同庳音婢疏栵一名栭詩大雅皇矣云其灌其栵陸璣疏云葉如榆也木理堅韌而赤可爲車轅郭云樹似槲樕而庳小子如細栗可食今江東亦呼爲栭栗禮記内則云芝栭蔆椇是也檴落注可以爲杯器素音義檴戸郭反詩云無浸檴薪杯必回反疏檴一名落某氏曰可作杯圈皮韌繞物不解郭云可以爲杯器素素謂樸也小雅大東云無浸檴薪鄭箋云檴落木名陸璣疏云今椰榆也其葉如榆其皮堅韌剥之長數尺可爲絙索又可爲甑帶其材可爲杯器是也柚條注似橙實酢生江南音義柚羊又反或作櫾條字又作樤橙直耕反上林賦云黄甘橙楱是也楱音直奏反吕忱云橙橘屬疏柚一名條郭云似橙實酢生江南禹貢揚州云厥苞橘柚孔安國云小曰橘大曰柚呂氏春秋云果之美者有雲夢之柚本草唐本注云柚皮厚味甘不如橘皮味辛而苦其肉亦如橘有甘有酸酸者名胡甘今俗人或謂橙爲柚非也時英梅注雀梅疏時一名英梅郭云雀梅似梅而小者也楥柜枊注未詳或曰枊當爲柳柜柳似柳皮可煑作飲音義楥孫音袁又于眷反柜謝音巨郭音舉枊郭音卬又作柳良久反疏楥一名柜抑郭云未詳或曰枊當爲柳拒柳似柳皮可煑作飲以時驗而知也栩杼注柞樹音義栩香羽反郭又音羽字林丑與反杼謝嘗汝反施音佇孫昌汝反施或音序柞子各反疏栩一名杼郭云柞樹詩唐風云集于苞栩陸璣疏云今柞櫟也徐州人謂櫟爲杼或謂之爲栩其子爲皁或言皁斗其殻爲汁可以染皁今京洛及河内言杼汁謂櫟爲杼五方通語也菋荎著注釋草已有此名疑誤重出藲荎注今之刺榆音義菋音味又亡戒反荎直之反舍人本作柢丁計反著音儲舍人本作都樊本作屠重直用反又直龍反藲烏喉反詩云山有樞是也本或作蓲同荎謝大結反郭直基反疏别二名也郭云今之刺榆詩唐風云山有樞陸璣疏其針刺如柘其葉如榆瀹爲茹美滑如白榆之類有十種葉皆相似皮及木理異矣杜甘棠注今之杜棃疏杜一名甘棠郭云今之杜棃下云杜赤棠白者棠舍人曰杜赤色名赤棠白者亦名棠然則其白者名棠其赤者爲杜棠爲甘棠杜爲赤棠詩召南云蔽芾甘棠唐風云有枤之杜傳云赤棠是也狄藏橰貢綦注皆未詳朹檕梅注朹樹狀似梅子如指頭赤色似小柰可食音義藏孫子郎反橰舍人本作臯樊本作同音羔綦音其朹音求檕工系反本亦作繫樊本作槅工厄反疏朹一名檕梅郭云朹樹狀似梅子如指頭赤色似小柰可食枓者聊注未詳魄榽橀注魄大木細葉似檀今河東多有之齊人諺曰上山斫檀榽橀先殫音義枓郭音糾又居幽反又音皎聊音寮榽兮計反又音奚橀許兮反本亦作醯檀大丹反上時掌反斫章略反殫音丹字林云極盡也又云斃也疏魄一名榽橀郭云魄大木細葉似檀今河東多有之齊人諺曰上山斫檀榽先殫殫訓盡也梫木桂注今南人呼桂厚皮者爲木桂桂樹葉似枇杷而大白華華而不著子叢生巖嶺枝葉冬夏常青間無雜木音義梫字林音寢郭音浸或初林反一音侵枇房私反又音毗杷歩巴反著丁略反又直略反疏梫一名木桂郭云今南人呼桂厚皮者爲木桂桂樹葉似枇杷而大白華華而不著子叢生巖嶺枝葉冬夏常青間無雜木案本草謂之牡桂者是也棆無疵注棆楩屬似豫章音義棆音倫又致均反疵本又作辭貲反字書云無棆也楩鼻緜反又婢衍反上林賦云楩柟豫章是也字指云木似豫章章本或作樟注棆木也無疵病因名之郭云榆楩屬似豫章案楩及豫章皆南方大木之名也椐樻注腫節可以爲杖音義椐音祛字林已庶反又音舉樻起愧反又去軌反字林巨位反樊孫並云椐樻腫節可作枝杖毛詩草木疏云節中腫似扶老即今靈夀是也今人以爲馬鞭及杖𢎞農共北山皆有之腫之勇反疏别二名也郭云腫節可以爲杖詩大雅皇矣其檉其椐陸璣疏云節中腫似扶老今人以爲馬鞭及杖𢎞農共北山甚冇之檉河柳注今河旁赤莖小楊音義檉勑貞反疏檉一名河柳郭云今河旁赤莖小楊陸璣疏云生水旁皮正赤如絳一名雨師枝葉如松旄澤柳注生澤中者音義旄音毛疏柳生澤中者别名旄郭云生澤中者楊蒲柳注可以爲箭左傳所謂董澤之蒲疏楊一名蒲柳生澤中可爲箭笴注云左傳所謂董澤之蒲者案左傳宣十二年晉楚戰于邲晉師敗績楚熊負覊囚知罃知莊子以其族反之㕑武子御下軍之士多從之每射抽矢菆納諸㕑子之房㕑子怒曰非子之求而蒲之愛董澤之蒲可勝既乎杜注云董澤之蒲河東聞喜縣東北有董池陂既盡也是其事也權黄英輔小木注權輔皆未詳杜赤棠白者棠注棠色異異其名音義權音拳疏郭云棠色異異其名樊光云赤者爲杜白者爲棠陸璣疏云赤棠與白棠同耳但子有赤白美惡子白色爲白棠甘棠也少酢滑美赤棠子澀而酢無味俗語云澀如杜是也赤棠木理韌亦可以作弓幹諸慮山櫐注今江東呼櫐爲藤似葛而麤大音義慮如字施力積反字又作攄力余反櫐字或作蘽音誄力水反下同藤徒登反麤七胡反疏諸慮一名山櫐郭云今江東呼櫐爲藤似葛而麤大欇虎櫐注今虎豆纒蔓林樹而生莢有毛刺今江東呼爲㯿欇音義欇郭音渉本又作聶又作並同虎呼戸反莢古協反下同字林云草實也廣雅云豆角謂之莢周禮云墳衍之地其植物宜莢物刺七豉反㯿力輒反又餘渉反疏欇一名虎櫐郭云今虎豆纒蔓林樹而生莢冇刺今江東呼爲㯿欇或曰葛類也子如菉豆而葉大杞枸檵注今枸杞也音義杞去已反枸音苟檵音繼疏杞一名枸檵郭云今枸杞也詩小雅四牡云集于苞杞陸璣疏云一名苦杞一名地骨春生作羹茹微苦其莖似莓子秋熟正赤莖葉及子服之輕身益氣耳杬魚毒注杬大木子似栗生南方皮厚汁赤中藏卵果音義杬音元又作芫卵力管反疏杬一名魚毒檓大椒注今椒樹叢生實大者名爲檓音義檓况彼反椒字又作茮子消反疏檓者大椒之别也郭云今椒樹叢生實大者名爲檓詩唐風云椒聊且陸璣疏云椒樹如茱萸有針刺葉堅而滑澤蜀人作茶吳人作茗皆合煑其葉以爲香今成臯諸山間有椒謂之竹葉椒其樹亦如蜀椒少毒熱不中合藥也可著飲食中又用蒸雞豚最佳香東海諸島上亦冇椒樹枝葉皆相似子長而不圓甚香其味似橘皮島上獐鹿食此椒葉其肉自然作椒橘香楰䑕梓注楸屬也今江東有虎梓音義楰郭音庾又音瑜梓音子疏李廵曰䑕梓一名楰郭云楸屬也今江東有虎梓詩小雅云北山有楰陸璣疏云其樹葉木理如楸山楸之異者今人謂之苦楸是也楓欇欇注楓樹似白楊葉圓而岐有脂而香今之楓香是音義楓甫隆反說文云木厚葉弱枝善摇字林音方廉反欇之渉反岐音祁脂音之疏說文云楓木厚葉弱支善摇一名欇欇郭云楓樹似白楊葉圓而岐有脂而香今之楓香是案本草唐本注云樹高大葉三角商洛之間多有之是也又山海南荒經云冇宋山者木生山上名曰楓木楓木蚩尤所葉其桎梏是謂楓木注云即今楓香樹也寓木宛童注寄生樹一名蔦音義寓魚具反宛於院反蔦音鳥或音弔說文或作樢字林云寄生也疏寓木一名宛童郭云寄生樹一名蔦詩小雅頍弁云蔦與女蘿陸璣疏云蔦一名寄生葉似當廬子如覆盆赤黑甜美是也無姑其實夷注無姑姑榆也生山中葉圓而厚剝取皮合漬之其味辛香所謂蕪荑音義夷舍人本作桋同疏無姑一名姑榆其實名夷郭云無姑姑榆也生山中葉圓而厚剝取皮合漬之其味辛香所謂蕪荑云所謂本草蕪荑一名無姑也櫟其實梂注有梂彚自裹音義櫟力的反梂字林音求舍人云櫟實名梂也孫云櫟實橡也有梂彚自裹郭同彚音謂裹音果疏櫟似樗之木也梂盛實之房也孫炎曰櫟實橡也郭云有梂彚自裹詩秦風云山冇苞櫟陸璣疏云秦人謂柞櫟爲櫟河内人謂木蓼爲櫟椒榝之屬也其子房生爲梂木蓼子亦房生故說者或曰柞櫟或曰木蓼璣以爲此秦詩也宜從其方土之言柞櫟是也檖蘿注今楊檖也實似棃而小酢可食音義檖音遂疏檖一名蘿郭云今楊檖也實似棃而小酢可食詩秦風云隰有樹檖陸璣疏云檖一名赤蘿一名山棃也今人謂之楊檖實如棃但小耳一名鹿棃一名䑕棃今人亦種之極有脆美者亦如棃之美者楔荆桃注今櫻桃旄冬桃注子冬熟榹桃山桃注實如桃而小不解核音義楔古黠反施音結櫻乞耕反廣雅云櫻桃含桃也禮記月今云羞以含桃鄭注云今之櫻桃旄音毛字林作楙亡到反榹郭音斯又音雌解古買反核胡革反下同疏别桃類也楔一名荆桃郭云今櫻桃廣雅云櫻桃含桃也月令仲夏云羞以含桃是也桃子冬熟者名旄生山中者名榹桃郭云實如桃而小不解核休無實李注一名趙李座接慮李注今之麥李駁赤李注子赤音義休虚求反又作林座徂禾反慮如字施音驪駁字亦作駮邦角反疏别李屬也李之無實者名休郭云一名趙李座接慮李郭云今之麥李與麥同熟因名云李之子赤者名駁棗壺棗注今江東呼棗大而銳上者爲壺壺猶瓠也邊要棗注子細腰今謂之鹿廬棗櫅白棗注即今棗子白乃熟樲酸棗注樹小實酢孟子曰養其樲棘楊徹齊棗注未詳遵羊棗注實小而圓紫黑色今俗呼爲之羊矢棗孟子曰曾晳嗜羊棗洗大棗注今河東猗氏縣出大棗子如雞卵煑塡棗注未詳蹶洩苦棗注子味苦晳無實棗注不著子者還味捻棗注還味短味音義棗音早壺字或作㯛孫云棗形上小下大似瓠故曰壺音胡瓠呼故反要一遙反注同字或作楆櫅子兮反樲而至反徹本或作撤直列反晳思歴反下同嗜時至反洗屑典反猗乙竒反又於竒反塡音田本或作顚蹶本或作居衞反洩息列反著丁略反還音旋郭云還味短味字林作一縣反捻而審反又作菍同疏别棗類也云棗者目諸棗也壺棗者棗形似壺也郭云今江東呼棗大而銳上者爲壺壺猶瓠也邊大而腰細者名邊腰棗郭云子細腰今謂之鹿盧棗棗子白熟者名櫅實小而味酢者名樲棗楊徹齊棗注未詳遵一名羊棗郭云實小而圓紫黑色今俗呼之爲羊矢棗洗最大之棗名也郭云今河東猗氏縣出大棗子如雞卵煑塡棗注未詳蹶洩者味苦之棗名也晳者無實之棗名也還味者短味也名捻棗注孟子曰養其樲棘者案孟子曰人之於身也體冇貴賤有小大無以小害大無以賤害貴養其小者爲小人養其大者爲大人今有場師舍其梧檟養其樲棘則爲賤場師焉趙岐注云樲棘所謂酸棗是也云孟子曰曾晳嗜羊棗者孟子云曾晳嗜羊棗而曾子不忍食羊棗公孫丑問曰膾炙與羊棗孰美孟子曰膾炙哉公孫丑曰然則曾子何爲食膾炙而不食羊棗曰膾炙所同也羊棗所獨也是其事櫬梧注今梧桐音義櫬初靳反下同梧音吳疏櫬一名梧郭云今梧桐詩大雅云梧桐生矣于彼朝陽是也樸枹者注樸屬叢生者爲枹詩所謂棫樸枹櫟音義樸音卜字又作僕枹逋蒡反注同屬之欲反棫于逼反櫟音歴疏樸屬抱櫟皆木叢生之名也郭云樸屬叢生者爲枹云棫樸者詩大雅云芃芃棫樸薪之槱之是也枹櫟者秦風云山有苞櫟隰有六駮是也謂櫬采薪采薪即薪注指解今樵薪音義謂舍人本作彚同采七在反下並同薪采薪即薪舍人引上句櫬梧來合在此句以謂字作彚釋云櫬梧者樸枹者櫬者其理也樸者相追附也彚者莖也如竹箭一讀曰枹也櫬名采薪又名即薪樊引詩云薪是穫薪荆州曰柞木采木詩人不曉薪意言薪謂身即薪伐之也李云采薪一名彚櫬言即薪謂二薪也孫引詩云薪是穫薪薪一名彚櫬郭云指解今樵薪今依郭氏說樵字又作䕴徂焦反字林云薪也案左傳云不樵樹史記云樵蘇後爨師不宿飽注云樵取薪蘇取草疏郭云指解今樵薪一名櫬一名采薪一名即薪公羊謂之薪采左傳云不樵樹史記云樵蘇後爨師不宿飽注云樵取薪蘇取草皆謂取草爲薪也棪㯈其注棪實似柰赤可食音義棪餘念反山海經堂庭之山多棪木注云子似㮏而赤可食㯈音速疏棪一名㯈其郭云棪實似柰赤可食山海經云堂庭之山多棪木注云子似柰而赤可食是也劉劉杙注劉子生山中實如棃酢甜核堅出交趾音義杙音弋趾音止疏劉一名劉杙其云可食郭云劉子生山中實如棃酢甜核堅出交趾櫰槐大葉而黑注槐樹葉大色黑者名爲櫰音義櫰郭古回反字林下罪反又音懷槐音懷或音回疏櫰槐一也大葉而黒名櫰不爾者即名槐郭云槐樹葉大色黑者名爲櫰守宮槐葉晝聶宵炕注槐葉晝日聶合而夜炕布者名爲守宮槐音義聶之渉反合也炕郭呼郎反又口浪反顧云張也樊本作抗疏此亦槐也聶合也炕張也言其葉晝合夜開者别名守宫槐郭云槐葉晝日聶合而夜炕布者名爲守宮槐槐小葉曰榎注槐當爲楸楸細葉者爲榎大而皵楸注老乃皮粗皵者爲楸小而皵榎注小而皮粗皵者爲榎左傳曰使擇美榎音義槐小葉郭謂槐爲楸音秋或如字榎古雅反及下同皵孫七各七路二反字或作下同樊云大者老也皵楷皮也謂麤皵而老者爲楸也孫郭云老乃皮麆皵者爲楸楸音秋疏别楸榎之名也楸之小葉者名榎契光云大者老也皵楷皮也謂樹老而皮粗皵者爲楸小少也樹小而皮粗皵者爲榎注云左傳曰使擇美榎者案襄二年夏齊姜薨初穆姜使擇美榎以自爲襯與頌琴季文子取以葬是其事也椅梓注即楸音義椅於竒反郭云即楸也案椅與楸唯子爲異耳梓字林音子疏别二名也郭云即楸詩鄘風云椅桐梓漆陸璣疏云梓者楸之疏理白色而生子者爲梓梓實桐皮曰椅則大類同而小别也桋赤栜白者栜注赤栜樹葉細而岐銳皮理錯戾好叢生山中中爲車輞白栜葉圓而岐爲大木音義桋音夷栜又作㮦同山厄反郭霜狄反下同岐巨伊反下同好呼報反輞音罔本或作軔音刃又音如戰反本今作輞疏栜赤者名桋白者即名栜某氏曰其色雖異爲名即同郭云赤栜樹葉細而岐銳皮理錯戾好叢生山中中爲車輞白栜葉圓而岐爲大木也詩小雅云隰冇杞桋陸璣疏云栜葉如柞皮薄而白其木理赤者爲赤栜一名桋白者爲栜其木皆堅韌今人以爲車轂終牛棘注即馬棘也其刺粗而長疏終一名牛棘其針刺粗長者亦名馬棘也灌木叢木注詩曰集于灌木音義灌古亂反叢才公反本或作樷疏灌木者即叢生之木也下云木族生爲灌郭云族叢也是灌木爲叢木也詩周南云黄鳥于飛集于灌木是也瘣木苻婁注謂木病尫傴癭腫無枝條音義瘣郭胡罪反說文云病也一曰腫旁出也又音回婁謝力侯反施力俱反樊引詩云譬彼瘣木疾用無枝苻婁者尫傴内病磈磊無枝也李云苻婁一名瘣木無枝木也尫烏皇反字書云傴也假紆禹反廣雅云曲也癭於井反字林云頸瘤也腫章勇反本或作瘇常勇反疏某氏云詩云譬彼瘣木疾用無枝苻婁尫傴内疾瘣磊故疾用無枝郭云謂木病尫傴癭腫無枝條舍人曰苻婁屬下句獨爲異也蕡藹注樹實繁茂菴藹音義蕡扶云反孫苻粉反藹烏害反菴於檢反疏蕡亦樹實名又名藹郭云樹實繁茂菴藹枹遒木魁瘣注謂樹木叢生根枝節目盤結磈磊音義枹音包遒又作逎子由反又徂由反說文云遒廹也謂叢攢廹而生魁字亦作鬿謝苦罪反施苦回反瘣郭盧罪反施胡罪反磈本或作傀苦罪反磊本或作儡力罪反疏木叢攢廹而生者名枹遒木魁瘣讀若磈磊謂根節盤結處也郭云謂樹木叢生根枝節目螌結磈磊棫白桵注桵小木叢生有刺實如耳璫紫赤可啖音義棫音域字林于具反桵本或作㮃字林人隹反刺七智反疏棫一名白桵郭云桵小木叢生冇刺實如耳璫紫赤可啖詩大雅云芃芃棫樸陸璣云王蒼說棫即柞也其材理全白無赤心者爲白桵直理易破可爲櫝車輻又可爲矛㦸矜今人謂之白梂或曰白柘此二說不同未知孰是棃山樆注即今棃樹音義棃字亦作梨樆音離本亦作離非疏棃生山中者名樆郭云即今棃樹言其在山之名則曰樆人植之曰棃桑㸤有葚梔注㸤半也音義㸤普遍反又皮莧反葚音甚說文云桑實也本或作椹非字林式忍反梔章移反下注同舍人云桑樹一半有葚半無葚名梔也樊本同疏說文云葚桑實也郭云㸤半也舍人曰桑樹一半冇葚半無葚爲梔女桑桋桑注今俗呼桑樹小而條長者爲女桑樹音義桋大兮反或作夷疏女桑一名桋桑郭云今俗呼桑樹小而條長者爲女桑樹詩幽風七月云猗彼女桑是也榆白枌注枌榆先生葉却著莢皮色白音義榆以朱反枌符云反却去略反著丁略反莢古叶反字林云草實也疏榆之皮色白名枌郭云枌榆先生葉却著莢皮色白詩陳風云東門之枌是也唐棣栘注似白楊江東呼夫移音義棣大計反下同字林大内反移以攴反字林上泥反夫音苻疏舍人曰唐棣一名栘郭云似白楊江東呼夫栘詩召南云唐棣之華陸璣云奥李也一名雀梅亦曰車下李所在山皆冇其華或白或赤六月中熟大如李子可食常棣棣注今關西有棣樹子如櫻桃可食疏舍人曰常棣一名棣郭云今關西有棣樹子如櫻桃可食詩小雅云常棣之華陸璣疏云許愼曰白棣樹也如李而小如櫻桃正白今宮園種之又冇赤棣樹亦似白棣葉如刺榆葉而微圓子正赤如郁李而小五月始熟自關西天水隴西多有之檟苦荼注樹小如梔子冬生葉可煑作羹飲今呼早采者爲荼晚取者爲茗一名荈蜀人名之苦荼音義檟古雅反與榎同荼音徒下同埤蒼作􅟒案今蜀人以作飲音眞加反茗之類茗亡頂反荈尺兖反荈􅟒茗其實一也張揖雜字云茗之别名也疏檟一名苦茶郭云樹小似梔子冬生葉可煑作羹飲今呼早采者爲茶晚采者爲茗一名荈蜀人名之苦荼樕樸心注槲樕别名音義樕音速樸音卜槲音斛疏樸樕一名心某氏曰樸樕槲樕也冇心能濕江河間以作柱是樸樕爲木名也故郭云槲樕别名詩召南云林冇樸樕此作樕樸文雖别其實一也或者傳寫誤榮桐木注即梧桐疏桐木一名榮郭云即梧桐與上櫬梧一也棧木干木注橿木也江東呼木觡音義棧仕板反千古丹反樊本作杆同橿居良反字書云死而不朽本或作僵說文云僵偃也觡加客反疏棧木一名于木郭云橿木也江東呼木觡檿桑山桑注似桑材中作弓及車轅音義檿烏簟反車昌蛇反轅音袁疏山桑一名檿桑郭云似桑材中作弓及車轅冬官考上記云弓人取幹柘爲上檿桑次之是也木自弊柛注弊立死椔注不弊頓椔弊者翳注樹䕃翳覆地者詩云其椔其翳木相磨槸注樹枝相切磨棤皵注謂木皮甲錯梢梢櫂注謂木無枝柯梢櫂長而殺者音義弊婢世反字又作斃神音申踣蒲北反或作仆椔側利反一音側其反弊必世反注同翳音殪注同䕃於禁反槸魚逝反郭魚逝魚例二音楷七各反皵謝音舄郭音夕梢郭音朔櫂直角反方言云拔也蒼頡篇云抽也廣雅云出也小爾雅云㧞根曰櫂殺色戒反又色例反疏此别死頓相磨皮甲棤櫂之異名也云木者總在下之稱也自弊踣者名柛立死不弊頓者名椔枝葉蔽䕃覆地者名翳木兩枝相切磨名槸木皮甲粗錯者名棤亦名皵木無枝柯長而殺者名梢一名棤櫂小爾雅曰抜根曰櫂注詩其椔其翳者詩大雅皇矣篇文也毛傳云木立死曰椔自弊爲翳說者引李廵曰以當死害生曰菑斃死也然則以立死之木妨他木生長爲木之害故曰菑也自斃者生木自倒枝葉覆地爲隂翳故曰翳也爾雅直云斃者詩傳以其非人斃之故曰自斃其文與此不同者所見本異也樅松葉柏身注今大廟梁材用此木尸子所謂松柏之䑕不知堂密之有美樅檜柏葉松身注詩曰檜楫松舟音義樅七容反松字林象容反大音泰檜古外反又苦外反楫本又作檝子葉反一音集疏此辨樅檜之異名也松葉柏身者名樅柏葉松身者名檜郭云今大廟梁材用此木者以時驗而言也注尸子所謂已下者綽子篇文也云詩曰檜楫松舟者鄘風竹竿篇文也毛傳云楫所以擢舟是也句如羽喬注樹枝曲卷似鳥毛羽下句曰朻上句曰喬如木楸曰喬注楸樹性上竦如竹箭曰苞注篠竹性叢生如松柏曰茂注枝葉婆娑如槐曰茂注言扶疎茂盛音義句居具反下同喬阮孝緒音橋郭音驕下皆同卷巨員反朻居蚪反本又作樛同字林九稠反苞如字本或作枹篠先了反娑素河反疏此别水之曲直叢生茂盛之異名也句曲也樹枝曲卷似鳥毛羽名喬樹枝下垂而曲名朻詩周南云南有樛木是也木枝上竦而曲卷者亦名喬如木楸上竦者亦曰喬郭云楸樹性上竦詩周南云南有喬木是也凡木如竹箭叢生者曰苞禹貢曰草木漸苞是也凡木枝葉婆娑者曰茂詩小雅云如松柏之茂是也枝葉扶疎茂盛如槐者亦曰茂柷州木髦柔英注皆未詳音義柷章六反髦音毛槐棘醜喬注枝皆翹竦桑柳醜條注阿那垂條椒榝醜莍注莍萸子聚生成房貌今江東亦呼莍楸似茱萸而小赤色桃李醜核注子中有核人音義棘居力反阿烏河反又於可反那奴何反又奴可反椒音焦榝所黠反字林云似茱萸岀淮南本草云茱萸一名榝案今樹極似茱萸唯子赤細莍音求說文云榝椒實褱如裘也一音巨六反茱音殊萸以朱反核何革反疏此辨木之枝條子實形狀之異醜類也喬高也槐棘之類枝皆翹竦桑柳之類皆阿那垂條莍者實之房也椒榝之類實皆有莍彚自裹李廵曰椒茱萸皆有房故曰莍莍實也郭云莍萸子聚生成房貌今江東亦呼莍榝似茱萸而小赤色桃李之類皆子有核人曲禮云其冇核者懷其核瓜曰華之桃曰膽之棗李曰疐之樝棃曰鑽之注皆啖食治擇之名樝似棃而酢澀見禮記音義華胡化反鄭注禮記云謂中裂不四析也膽丁敢反疐亦作康同丁計反樝側加反字亦作查鑽子官反郭徂端反澁字又作濇又作澀所立反疏此辨啖食治擇瓜果之名也云瓜曰華之者此爲國君削瓜之禮也華謂半破也降於天子故破而不四折也亦横斷之而巾以綌也云桃曰膽之者桃多毛栻治去毛令色青滑如膽也或曰膽謂杏桃有苦如膽者擇去之云棗李曰疐之者謂治棗李皆去其疐疐者柢也云樝棃曰鑽之者恐有蟲故一一鑽看其蟲孔也案鄭注禮記内則云柤棃不臧者今之所謂樝子者是也注云見禮記者案曲禮云爲天子削𤓰者副之巾以絺爲國君者華之巾以綌又内則云棗曰新之栗曰撰之桃曰膽之柤棃曰鑽之鄭注云皆治擇之名也文雖小異大意則同小枝上繚爲喬注謂細枝皆翹繚上句者名爲喬木音義繚音了疏此即上句曰喬嫌不了故重出之言小枝上竦翹繚者名爲喬木也無枝爲檄注檄櫂直上音義檄形的反櫂直角反上時掌反疏此釋上文梢梢櫂也櫂身櫂也謂木無枝檄櫂直上長而殺者也木族生爲灌注族叢音義灌古半反疏族叢也木叢生者爲灌即上灌木叢木也釋蟲第十五音義蟲本亦作虫案此篇是釋蟲依字虫音許鬼反蛇類也並兩虫爲䖵音古門反蟲之總名也三虫爲蟲直忠反有足者也今人以虫爲蟲相承假借用耳說文云虫一名蝮象其形物之㣲細或行或飛或毛或臝或介或鱗以虫爲象案此文云冇足謂之蟲無足謂之豸月令鱗毛羽介皆謂之蟲白虎通以聖人爲倮蟲之長自上聖下逹蟭螟通有蟲稱耳疏案說文蟲者蜾毛羽鱗介之總稱也此篇廣釋諸蟲之名狀故曰釋蟲螜天螻注螻蛄也夏小正曰螜則鳴音義螜胡木反螻力侯反蛄古乎反夏胡雅反正音征疏螜一名天螻一名碩䑕即今之螻蛄也夏小正者大戴禮之篇名以蟲魚草木正十二月之節候起於夏后氏故曰夏小正其三月云螜則鳴螜天螻是也蜚蠦蜰注蜰即負盤臭蟲音義蜚扶味反蠦力胡反蜰敷非反孫甫尾反盤字又作螌蒲安反廣雅云負盤蟅也蟅音章夜反臭昌又反疏案洪範五行傳云蜚負蠜夷狄之物越之所生其爲蟲臭惡南方滛氣之所生也本草曰蜚厲蟲也然則蜚自臭惡之蟲害人衣物故春秋左氏傳曰有蜚不爲災亦不書也春秋經傳皆云有蜚則此蟲名蜚一名蠦蜰而舍人李廵皆云蜚蠦一名蜰非也此蟲一名負盤漢書及左傳注多作負蠜者以此下有草蟲負蠜故相渉誤耳螾􅨪入耳注蚰蜒音義螾以忍反􅨪以善反本又作􅣓蚰音由蜒音延方言云宋魏之間蚰蜒謂之入耳字林云北燕人謂蚰蜒爲蚭上音奴六反下音女其反疏此蟲象蜈蚣黄色而細長呼爲吐古案方言云蚰􅣓自關而東謂之蚰􅣓或謂之入耳或謂之蜄􅫡趙魏之間或謂之蚨虶北燕謂之蚭江東人呼蛩皆今蚰蜒喜入耳者也蚰音由蜒音延􅫡音麗蚨音扶虶音于奴六切蚭音尼蛩音鞏蜩蜋蜩注夏小正傳曰蜋蜩者五彩具螗蜩注夏小正傳曰螗蜩者蝘俗呼爲胡蟬江南謂之螗蛦蚻蜻蜻注如蟬而小方言云有文者謂之螓夏小正曰鳴蚻寧縣􅝺茅蜩注江東呼爲茅截似蟬而小青色蝒馬蜩注蜩中最大者爲馬蟬蜺寒蜩注寒螿也似蟬而小青色月令曰寒蟬鳴蜓蚞螇螰注即蝭蟧也一名蟪蛄齊人呼螇螰音義蜩直彫反下同蜋音郎又音良螗音唐蟬示延反字林云蟪蛄也􅡻郭音荑徒低反蚻側黠反蜻郭音情又音精懸音𤣥􅝺子列反又徂節反茅本或作􅫞萌交反蝒音緜字林云亡千反蜺五兮反呂郭牛結反螿子羊反蜓謝徒頂反沈音殄施音亭蚞音木或作沐非螇音奚螰音鹿蝭音提又音帝蟧力刀反字林同又力公反蟪音惠蛄音姑疏此辨蟬之大小及方言不同之名也云蜩者目諸蜩也蜋蜩五彩具者也螗蜩俗呼曰蟬似蟬而小鳴聲清亮者也蚻一名蜻蜻如蟬而小有文者也􅝺一名茅蜩似蟬而小青色者也蝒一名馬蜩蟬之最大者也蜺一名寒蜩又名寒螿似蟬而小青赤色者也關東謂蟪蛄爲蜓蚞齊謂之螇螰也云夏小正者在五月記時也云螗蜩者蝘者亦在五月舍人曰皆蟬也方語不同三輔以西爲蜩梁宋以東謂蜩爲蝘陸璣云螗一名蝘字林或作蟟也青徐人謂之螇螰然則螗蝘亦皆蟬也大雅蕩篇云如蜩如螗是也蚻舍人曰小蟬也蜻蜻者案方言云蟬楚謂之蜩宋衛之間謂之螗蜩陳鄭之間謂之蜋蜩秦晉之間謂之蟬海岱之間謂之䗁其小者謂之麥蚻有文者謂之螓是也詩人碩人云螓首蛾眉鄭𤣥螓謂蜻蜻此蟲額廣而且方故以比婦人之首也某氏解此云鳴蚻蚻者也云夏小正曰者在四月彼云鳴蚻蚻者寧懸也鳴而後知故先鳴而後蚻是也月令曰寒蟬鳴者在七月鄭注云寒蟬寒蜩謂蜺是也方言云蛥蛺齊謂之螇螰楚謂之蟪蛄楚辭云蟪蛄鳴兮啾啾是也或謂之蛉蛄秦謂之蛥蚗自關而東謂之虭蟧或謂之蝭蟧或謂之蜓蚞然則亦皆蟬之别名耳蛥蚗音折玦蛉音零虭貂料二音蝭音帝蛣蜣蜣蜋注黑甲蟲噉糞土音義蛣起吉反蜣音羌蜋音良噉大敢反糞方問反疏蛣蜣一名蜣蜋黑甲翅在甲下噉糞土喜取糞作丸而轉之莊子蛣蜣之智在於轉丸是也蝎蛣􅔒注木中蠧蟲音義蝎戸葛反􅔒起勿反蠧丁故反字林云木中蟲也疏木中蠧蟲解在下蠰齧桑注似天牛長角體有白㸃喜齧桑樹作孔入其中江東呼爲齧髪音義蠰郭音餉又音霜孫音傷齧五結反喜虛記反下同疏蠰一名齧桑江東呼齧髪形似天牛長角體有白㸃喜齧桑樹作孔入其中因名云諸慮奚相注未詳蜉蝣渠略注似蛣蜣身狹而長有角黄黑色叢生糞土中朝生暮死豬好啖之音義慮本或作蠦施音驢一音力據反相施音葙謝息亮反舍人本作桑蜉音孚又音浮蝣郭音由本又作䖻謝音流渠略如字略或作音同狹乎夾反好呼報反下同疏舍人曰蜉蝣一名渠略南陽以東曰蜉蝣梁宋之間曰渠略似蛣蜣身狹而長有角黄色叢生糞土中朝生暮死豬好啖之夏小正曰蜉蝣渠略也朝生而暮死詩曹風云蜉蝣之羽陸璣疏云蜉蝣方土語也通謂之渠略似甲蟲有角大如指長三四寸甲下有翅能飛夏月隂雨時地中出今人燒炙噉之美如蟬也樊光謂之糞中蝎蟲隨隂雨時爲之朝生而夕死蛂蟥蛢注甲蟲也大如虎豆綠色今江東呼黄蛢音義蛂謝音弗沈符結反字林大替反蟥音黄郭音王本或作黄蛢郭音瓶疏蛂一名蟥蛢甲蟲也形大如虎豆綠色蠸輿父守瓜注今瓜中黃甲小蟲喜食瓜葉故曰守瓜音義蠸音權輿音余父音甫下同字或作疏蠸輿父一名守瓜黄甲小蟲喜食瓜葉因名守瓜蝚蛖螻注蛖螻螻蛄類音義蝚如由反蛇武江反又亡工反或作駝非螻來侯反疏案方言云蛄詣謂之杜蛒螻螲謂之螻蛄或謂之蟓蛉南楚謂之杜狗或謂之蛞螻然則此言蝚及蛖螻者亦螻蛄之異名耳蛒音格螲音窒蟓音象蛉音令不蜩王蚥注未詳蛄䗐强蝆注今米榖中蠧小黑蟲是也建平人呼爲蝆子音義䗐字又作施式移反又式䜴反字林弋䜴反强巨良反蝆郭音芉亡婢反本或作芊說文作羊字林作蛘弋丈反云搔蛘也疏方言云蛄䗐謂之强蝆今米榖中小黑蠹蟲也江東謂之加虫音加建平人呼蝆子音芈楚姓芈不過蟷蠰注蟷蠰螗蜋别名其子蜱蛸注一名䗚蟭蟷蠰卵也音義過本或作蝸字林古禾反謝𤣥卧反蟷丁郎反蠰息詳反字林乃郎反螗音唐螂音郎蜱音禆又婢貽反蛸音蕭􅡯普莫反又補莫反蟭音焦字林子彫反疏不過一名蟷蠰一名蟷蜋母也其子一名蜱蛸一名䗚蟭一名螵蛸蟷蠰卯也方言云潭魯以南謂之蟷蠰三河之域謂之螳螂燕趙之際謂之食庬齊杞以東謂之馬谷其子同名螵蛸也月令仲夏云螳螂生是也蒺蔾蝍蛆注似蝗而大腹長角能食蛇腦音義蒺音疾字亦作同蔾音梨字亦作䖿蝍音即孫子逸反蛆子余反蝗華孟反下同字林音皇說文榮庚反范宣禮記音音横聲類韻集並以蝗協庚韻腹音福腦奴老反疏蒺蔾一名蝍蛆廣雅云蝍蛆蜈蚣也郭云似蝗而大腹長角能食蛇腦則非蜈蚣也莊子云蝍蛆甘帶是也蝝蝮蜪注蝗子未有翅者外傳曰蟲舍蚳蝝音義蝝以全反字林尹絹反說文云劉歆說蚍蜉子也董仲舒說蝗子也何休注公羊云即螽也始生曰蝝長大曰螽杜預亦云螽子郭依董說蝮孚福反郭蒲篤反蜪郭音陶字林他牟反翅式智反舍音捨蚳直其反疏蝝一名蝮蜪蝗子未有翅者春秋宣十五年冬蝝生是也注外傳曰蟲舍蚳蝝者此魯語里革諫宣公之辭也韋氏解曰蚳螘子也可以爲醢蝝蝮蜪也可食舍不取也蟋蟀蛬注今促織也亦名青􅖹音義蟋音悉說文作悉本或作音瑟蟀所律反詩同本或作􅢊說文同蛬九勇反促字亦作趗七玉反青子盈反􅖹音列廣雅云蜻蛚促織也字林云蟋蟀也疏蟋蟀一名蛬今促織也亦名青􅖹詩唐風云蟋蟀在堂嵗聿其莫陸璣疏云蟋蟀似蝗而小正黑有光澤如漆有角翅一名蛬一名青􅖹楚人謂之王孫幽州人謂之趣織里語曰趣織鳴嬾婦驚是也蟼蟆注蛙類音義蟼郭驚景二音孫音京蟆武巴反蛙戸蝸反史游急就云蛙蝦蟇疏此自一種蝦蟆也蛝馬䗃注馬蠲蚐俗呼馬􅢡音義蛝音閑䗃郭仕板反字林仕免反或仕簡反施仕娩反蠲古𤣥反說文云明堂月令腐草爲蠲蚐音均􅢡丈六反字林云􅢡馬疏蛝蟲一名馬䗃一名馬蠲蚐俗呼馬􅢡方言云馬蚿北燕謂之蛆蟝其大者謂之馬蚰是也蚿音弦蛆子余切蚰音逐蛗螽蠜注詩曰趯趯蛗螽草螽負蠜注詩云喓喓草蟲謂常羊也蜤螽蜙蝑注蜙䗥也俗呼蝽􅡂蟿螽螇蚸注今俗呼似蜙䗥而細長飛翅作聲者爲螇蚸土螽蠰谿注似蝗而小今謂之土音義蛗音阜蟲本或作音終下同蠜音煩下同本或作螌趯他歴反喓於遙反蜤本又作蟴詩作斯同音私支反蜙字林先凶反郭先工反說文思弓反蝑相魚反郭才與反字林先吕反說文云蚣蝑以股鳴䗥寸東反字林云螉䗥似䗲蝽傷容反蟿音棄字林云口地反螇音奚蚸或作蚗郭音歴孫音昔蠰音壤孫音囊字又作蠰誤又思諒反或式尚反谿苦兮反孫音奚字又作虴竹宅反誥㓜云虴虴蜢也善跳蜢音猛疏蛗螽之族厥類寔煩此辨之也蛗螽一名蠜李廵曰蝗子也陸璣疏云今人謂蝗子爲螽子兗州人謂之螣許愼云蝗螽也蔡邕云螽蝗也明是一物蟲一名負蠜一名常羊陸璣云小大長短如蝗也竒音青色好在茅草中又一名草蟲詩云喓喓草蟲趯趯蛗螽是也蜤螽周南作螽斯七月作斯螽惟字異文倒其實一也一名蜙蝑一名蜙䗥一名蝽􅡂陸璣云幽州人謂之蝽箕蝽箕即蝽􅡂蝗類也長而青長角長股股鳴者也或謂似蝗而小斑黑其股似瑇瑁又五月中以兩股相切作聲聞數十歩者是也蟿螽一名螇蚸形似蜙䗥而細長飛翅作聲者是也土螽一名蠰谿今謂之土江南呼虴蛨又名蚱蜢似蝗細小善跳者是也注詩云喓喓草蟲趯趯蛗螽者召南草蟲篇文螼蚓蜸蚕注即䖤蟺也江東呼寒蚓音義螼羌引反蚓音引郭餘忍反說文以爲螾字同蜸苦顯反蚕他典反䖤於阮反蟺音善廣雅云䖤蟺蚯蚓也蚓郭許謹反殷仲堪許偃反疏螼蚓一名蜸蚕即䖤蟺也廣雅云䖤蟺蚯蚓也月令四月蚯蚓出十一月蚯蚓結是也江東呼寒蚓郭云蚯蚓土精無心之蟲與蛗螽交者也莫貈蟷蜋蛑注蟷蜋有斧蟲江東呼爲石蜋孫叔然以方言說此義亦不了音義莫本或作同武博反貈本又作貉孫戸各反下同螳蜋說文云名斫父蛑郭音牟字林云蝗蜋也又亡牢反斧音甫疏莫貈一名螳蜋一名蛑即上不過也捕蟬而食有臂若斧奮之當軼不避莊子云猶螳蜋之怒臂以當車軼是也江東呼爲石蜋又名齕肱注孫叔然以方言說此義亦不了案方言曰螳蜋謂之髦或謂之虰或謂之芊芊孫炎取此方言之文以虰上屬爲說案說文以虰蛵負勞爲一則方言之說既失其指孫氏引之爲說是亦不了也虰蛵負勞注或曰即蜻蛉也江東呼狐棃所未聞音義虰音丁蛵虚形反勞力刀反蛉力丁反字林云蜻蛉一名桑根狐音乎疏即蜻蛉六足四翼蟲也一名虰蛵一名負勞江東呼狐棃方言云蜻蛉謂之蝍蛉淮南人又呼䗧􅢤字林云一名桑根陶注本草云一名蜻蜓是也郭云所未聞者雖冇或人之說但經典未聞所出示其無質故云所未聞蜭毛蠧注即蛓音義蜭戸感反蛓七志反說文云毛蟲也讀若笥案今俗呼爲毛蛓冇毒螫人楚辭云蛓綠兮我裳疏蜭一名毛蠧即蛓也說文云蛓毛蟲今俗呼爲毛蛓有毒螫人楚辭云蛓綠兮我裳是也蟔蛅蟴注蛓屬也今青州人呼蛓爲蛅蟴孫叔然云八角螫蟲失之音義蟔字又作䘃亡北反蛅字或作蚺而占反蟴音斯螫式亦反螫猶蠚也蠚火各反字林云蟲行毒也疏蟔一名蛅蟴即蛓類也青州人呼蛅蟴注孫叔然云八角螫蟲失之者此即毛蟲何止八角故云失之螫猶蠚也字林云蟲行毒也蟠䑕負注甕器底蟲音義蟠音煩字或作負本亦作􅣁又作婦亦作􅣁音同本草䑕負一名負蟠一名伊威一名委黍陶注云多在䑕坎中䑕背負之今作婦字則似乖理一名䑕姑底丁禮反疏此與下蛜威委黍是一故下注委黍云舊說䑕婦别名則此蟲一名蟠一名䑕負負或作􅣁本草作婦一名蛜威一名委黍也陸璣云在壁根下甕器底土中生似白魚者是也陶注本草云多在䑕坎中䑕背負之然爲䑕􅣁及䑕婦則似乖詩東山云蛜威在室是也蟫白魚注衣書中蟲一名蛃魚音義蟫郭音淫又徒南反蛃音丙疏此衣書中蟲也一名蟫一名白魚一名蛃魚本草謂之衣魚是也䖸羅注蠶䖸音義䖸本又作蛾說又同我河反蠶徂南反下同疏此即蠶蛹所變者也說文云䖸羅是也螒天雞注小虫黑身赤頭一名莎雞又曰樗雞音義螒胡旦反莎蘇禾反樗恥豬反廣雅云樗鳴樗雞也疏此黑身赤頭小蟲也一名螒一名天雞一名莎雞又曰樗雞李廵曰一名酸雞詩幽風七月云六月莎雞振羽陸璣疏云如蝗而斑色毛翅數重其翅正赤六月中飛而振羽索索作聲幽州人謂之蒲錯是也傅負版注未詳强蚚注即强醜捋音義傅音付版字亦作蝂甫簡反强其良反說文云籀文作蚚字林巨希反又下枚反郭胡輩反捋力活反疏强蟲名也一名蚚好自摩捋者蓋蠅類蛶螪何注未詳螝蛹注蠶蛹音義蛶本或作将郭音劣又力活反螪失羊反字林之亦反何本或作蚵音河螝郭音龜字林音潰施音愧蛹音勇疏即蠶所變者一名螝又名蛹蜆縊女注小黑蟲赤頭喜自經死故曰縊女音義蜆下顯反字林下研反孫音俔案俔字下顯苦見二反縊一賜反一音翳是反喜許記反經古刑反疏蜆小黑蟲也赤頭喜自縊故又名縊女說文云蛻爲蝶是也經即縊也晉語申生使猛足辭於狐突乃雉經於新城廟僖四年左氏傳云十二月戊申縊於新城是謂縊爲經也蚍蜉大螘注俗呼爲馬蚍蜉小者螘注齊人呼螘爲蛘蠪朾螘注赤駮蚍蜉飛螘注有翅其子蚳注蚳蟻卵周禮曰蜃蚳醬音義蚍音毗蜉音浮螘魚綺反本亦作蛾俗作蟻字音同案說文蟻羅也蟻或作義蛾蠶化飛蛾也並非螘字蛘以丈反郭云齊人呼蟻也字林云北燕人謂蚍蜉曰蟻蛘蠪謝音聾郭音龍朾本又作虰郭唐耕反孫丈耕反字林音丁駮布角反於貴反說文字林從蚰翅矢䜴反又吉䜴反蚳直其反蜃市軫反醬子亮反疏此辨衆螘及其子名也螘通名也其大者别名蚍蜉俗呼馬蚍蜉小者即名螘齊人呼螘蛘方言云蚍蜉齊魯之間謂之蚼蠓西南梁益之間謂之𤣥蚼燕謂之蛾蛘其場謂之坻或謂之垤是也其大而赤色斑駁者名蠪一名朾螘有翅而飛者名即飛螘也其子在卵者名蚳可以作醢案周禮醢人職曰饋食之豆蜃蚳醢醢則醬之有肉者故此云醬也蚼音駒蠓音蒙蛾音蟻蛘音養次蟗鼅鼄䵹鼄鼄蝥注今江東呼蝃蝥土䵹鼄注在地中布網者草䵹鼄注絡幕草上者音義蟗本或作蝵郭音秋鼅音知或作蜘鼄音誅或作蛛蝥音謀又音無說文作蟊音茅云㡭蟊作網蛛蟊也以此亦爲蟊􅠀字蝃或作䖦音章悅反本或作掇拾字非疏此辨䵹鼄方言及在上草之名也蟗即鼅鼄别名也又一名鼄蝥今江東呼蝃蝥說文謂之鼄蝥作網鼄蝥也方言云自關而西泰晉之間謂之鼄蝥自關而東趙魏之郊謂之䵹鼄或謂之蠾北燕朝鮮洌水之間謂之蝳蜍郭又云齊人又呼社公亦言網公其在地中布網者名土䵹鼄其作網絡幕草上者名草䵹鼄也蠾音燭音臾蝳音毒蜍音余土蠭注今江東大蠭在地中作房者爲土蠭啖其子即馬蠭今荆巴間呼爲蟺木蠭注似土蠭而小在樹上作房江東亦呼爲木蠭又食其子音義蠭本又作螽匹凶反字又作蜂說文云古螽字字林云飛蟲螫人者蟺音墠又示延反蓋方言也郭音憚徒旦反疏此辨蠭在土木之異也說文云蠭飛蟲螫人者其形大在地中作房而啖其子者名土蠭又名馬蠭今荆巴間呼爲蟺其形差小在樹上作房者名木蠭亦食其子蟺讀爲蛩亶之亶故音之蟦蠐螬注在糞土中蝤蠐蝎注在木中今雖通名爲蝎所在異音義蟦扶味反又扶云反蠐本又作齊徂西反螬音曹蝤徂秋反蝎音曷疏此辨蝎在土在木之異名也其在糞土中者名蟦蠐又名蠐螬其在木中者方言云闗東謂之蝤蠐梁益之間謂之蝎上文蝎蛣􅔒郭云木中蠧下文蝎桑蠧郭云即蛣􅔒然則蟦蠐也蠐螬也蝤蠐也蛣􅔒也桑蠧也蝎也一蟲而六名也以在木中者白而長故詩人以比婦人之頸碩人云領如蝤蠐是也蛜威委黍注舊說䑕􅣁别名然所未詳音義蛜音伊本今作伊威委黍今爾雅本旁或並加虫並如字􅣁音婦蠨蛸長踦注小鼅鼄長脚者俗呼爲喜子音義蠨悉彫反或音肅蛸所交反說文云蠨蛸長股者踦郭云音崎嶇之崎柣宜反字林巨綺反或居綺反廣雅云踦脛也字從足虫旁作者非疏此小鼅鼄長脚者一名蠨蛸一名長踦俗呼爲喜子詩東山云蠨蛸在户陸璣疏云一名長脚荆州河内人謂之喜母此蟲來著人衣當有親客至冇喜也幽州人謂之親客亦如蜘蛛爲羅綱居之是也蛭蝚至掌注未詳國貉蟲蠁注今呼蛹蟲爲蠁廣雅云土蛹蠁蟲音義蛭郭豬秩反施徒結反蝚如由反貉戸各反蠁許兩反說文云知聲蟲也司馬相如作幽字蛹音勇疏此蛹蟲也今俗呼爲蠁一名國貉一名蟲蠁說文云知聲蟲也廣雅云土蛹蠁蟲是也蠖蚇蠖注今蝍􅠸音義蠖枉略反字林於郭反蚇音尺易云尺蠖之屈以求伸也亦作尺蝍子逸反又音即􅠸子六反字林云蝍􅠸蚇蠖疏蠖一名蚇蠖郭云今蝍􅠸方言云蠀􅠸謂之蚇蠖郭云又呼歩屈說文云蠖屈伸蟲也易係辭云尺蠖之屈以求信者是也蠀音即􅠸音叔果蠃蒲盧注即細腰蟲也俗呼爲蠮螉螟蛉桑蟲注俗謂之桑蟃亦曰戎女音義果本又作蜾又作蝸同工火反臝魯果反腰一遙反蠮於結反又於計反螉烏紅反廣雅云蠮螉土蜂也案今俗呼細腰小蜂爲蠮螉在物中作房用土爲隔非土蜂也螟亡丁反蛉力丁反蟃音萬疏案詩小雅小宛云螟蛉有子果蠃負之果蠃一名蒲盧即細腰蟲也俗呼爲蠮螉方言云蠭燕趙之間謂之蠓螉其小者謂之蠮螉鄭注中庸以蒲盧爲土蠭說文云細腰土蠭也天地之性小腰純雄無子螟蛉一名桑蟲一名桑蟃一名戎女陸璣云螟蛉者桑上小青蟲也似歩屈其色青而細小或在草萊上果蠃土蟲也似蠭而小腰取桑蟲附之於木空中七日而化爲子法言云螟蛉之子殪而逢果蠃祝之曰類我類我久則肖之是也蝎桑蠧注即蛣􅔒熒火即炤注夜飛腹下有火音義蝎音曷蛣去一反􅔒五勿反熒戸扁反炤音照疏熒火一名即炤夜飛腹下有火蟲也本草一名夜光一名熠燿月令季夏腐草爲熒腐草此時得暑濕之氣故爲熒至秋而天沈隂數雨熒火夜飛之時也詩東山云熠燿宵行是也密肌繼英注未詳音義肌居疑反繼字又作音計蚅烏蠋注大蟲如指似蠶見韓子音義蚅烏革反蠋音蜀說文云桑中蟲也郭云大蟲如指似蠶也疏蚅一名烏蠋形似蠶而大如指詩大雅韓奕云鞗革金厄毛亦云厄烏蠋大如指似蠶注見韓子案韓子内儲說上七術其三曰信賞盡能云蟺似蛇蠶似蠋人見蛇則驚駭見蠋則毛起然而婦人拾蠶而漁者握蟺利之所在則亡其所惡皆爲孟賁是其事也蠓蠛蠓注小蟲似蚋喜亂飛音義蠓莫孔反下同蠛亡結反蚋人銳反字林人劣反泰人謂蚊爲蚋疏小蟲似蚋亂飛者也名蠓又名蠛蠓列子云生朽壤之上因雨布生得陽而死一名醯雞莊子云孔子與老𥅆語出告顔回曰丘之於道也其猶醯雞與郭象云醯雞者甕中蠛蠓是也王蛈蝪注即螲蟷似䵹鼄在穴中有蓋今河北人呼蛈蜴音義蛈大結反字林音秩蝪字林音湯或音蕩又音唐螲丁結反蟷丁郎反疏此䵹鼄之一種也一名螲蟷穴居布網穴口有蓋河北人呼蛈蝪者是也蟓桑繭注食桑葉作繭者即今蠶雔由樗繭注食樗葉棘繭注食棘葉欒繭注食欒葉蚢蕭繭注食蕭葉皆蠶類音義蟓音象繭古典反雔市由反樗恥余反棘居力反欒力九反蚢戸剛反蕭先條反疏此皆蠶類作繭者因所食葉而異其名也食桑葉作繭者名蟓即今蠶也食樗葉棘葉欒葉者名雔由食蕭葉作繭者名蚢也翥醜罅注剖母背而生螽醜奮注好奮迅作聲强醜捋注以脚自摩捋蠭醜螸注垂其腴蠅醜扇注好搖翅音義翥于據反罅呼暇反剖普口反奮甫問反迅音信又音峻强其良反捋力活反李孫云以口捋其翅郭云以脚自摩捋蠭李孫郭並闕讀而謝孚逢反施作螽音終案上冇螽醜奮依謝爲得螸亦作羊朱反說文云垂腴腴羊朱反蠅餘仍反扇如字說文作蝙云搖翼也音同疏此辨蟲屬所生及所好之狀不同者也翥飛也醜類也蟲類能飛翥者謂蟬屬皆剖坼母背以爲孔罅而生螽蝗之類好奮迅作聲而飛强蚚之類好以脚自摩捋蠭類好垂其腴以伏息說文云螸垂腴也腴即腹下也青蠅之類好搖翅自扇食苖心螟食葉蟘食節賊食根蟊注分别蟲啖食禾所在之名耳皆見詩音義螟亡丁反蟲食苖心者說文云蟲食榖葉者吏㝠㝠犯法即生螟蟘又作􅻯同徒得反蟲食葉者說文云蟲食草葉者吏乞貸即生􅻯蟊亡侯反本亦作蛑說文作蟊蛑古蟊字云吏抵冐取民則生蟊也字林蟊音亡牛反疏此分别蟲所啖食禾所在之名也李廵曰食禾心爲螟言其姦㝠㝠難知也食禾葉者言假貸無厭故曰蟘也食禾節者言貪狼故曰賊也食禾根者言其稅取萬民財貨故云蟊也孫炎曰皆政貪所致因以爲名也郭璞直以蟲食所在爲名而李廵孫炎竝因託惡政則災由政起雖以食所在爲名而所在之名緣政所致理爲兼通也陸璣疏云螟似妨而頭不赤螣蝗也賊桃李中蠧蟲赤頭身長而細耳或說云蟊螻蛅食苖根爲人患許愼云吏㝠㝠犯法即生螟吏乞貸則生蟘吏抵冒取民財則生蟊舊說云螟螣蟊賊一種蟲也如言寇賊姦宄内外言之爾故犍爲文學曰此四種蟲皆蝗也實不同故分釋之詩小雅大田云去其螟螣及其蟊賊無害我田穉是也有足謂之蟲無足謂之豸音義豸丈爾反無足者說文云獸長脊行豸豸欲有所伺殺也疏此對文爾散言則無足亦曰蟲月令春日其蟲鱗鄭注云龍蛇之屬是也爾雅注疏卷九
