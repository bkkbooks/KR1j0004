body:
  text: 欽定四庫全書爾雅注疏卷二晉郭璞注唐陸德明音義宋邢昺疏釋言第二音義言魚鞬反詩傳云直言曰言書傳云言辭章也東方朔云誦詩九萬言謂一字為一言也説文從口從辛聲左傳云介之推曰言身之文也仲尼曰言以足志文以足言廣雅云言從也此釋言篇者釋古今之訓義疏説文曰直言曰言仲尼曰言以足志介之推曰言身之文也然則言者發於志而形於聲所以文章於身者也論語曰詩三百一言以蔽之曰思無邪左傳趙簡子稱子太叔遺我以九言皆以一句為一言也漢書東方朔云十六學詩書誦二十二萬言則以一字為一言也雖一句一字有異要以今古方國殊別學者莫能通是以方言云皆古今語也初別國不相往來之言也今或同而舊書雅記故俗語不失其方而後人不知故為作釋是曰釋言殷齊中也注書曰以殷仲春釋地曰岠齊州以南音義中如字又音仲又知衆反距又作岠同音巨疏殷齊皆謂正中也注書曰以殷仲春者堯典文案彼云日中星鳥以殷仲春孔安國以殷為正中正義同故也云釋地曰岠齊州以南者彼注云岠去也齊中也謂中州為齊州是齊得為中也斯誃離也注齊陳曰斯誃見詩音義斯私資所宜二反誃尺氏反疏斯析誃張皆分離也孫炎曰斯析之離郭云齊陳曰斯者方言文陳風墓門云斧以斯之是也云誃見詩者小雅巷伯云哆兮侈兮成是南箕鄭箋云因箕星之哆而又侈大之是也誃侈音義同謖興起也注禮記曰尸謖音義謖所六反疏謖興皆作起也禮記曰尸謖者祭統文也還復返也注皆回返也音義還音旋復音服返音反説文同云春秋傳作從彳疏皆回返也春秋書師還又曰至河乃復之類是也宣徇遍也注皆周遍也音義徇本又作殉樊本作並辭峻反郭音巡張揖字詁云徇今巡施音詢進本又為均序遍古遍字疏皆周遍也大雅江漢云來旬來宣毛傳云旬遍鄭箋云宣遍是皆為周遍也徇旬音義同馹遽傳也注皆傳車驛馬之名音義馹而實反郭音義云本或作聲類云亦馹字同遽其據反傳也張戀反注同車音居疏皆傳車驛馬之名文十六年左傳曰楚子乘馹會師於臨品又僖三十三年云使遽告於鄭又成五年曰晉侯以傳召伯宗是皆謂今驛也蒙荒奄也注奄奄覆也皆見詩音義蒙莫公反小爾雅云覆也覆音副疏皆謂奄覆唐風云葛生蒙楚孫炎曰荒大之奄周南云葛藟荒之故郭云皆見詩告謁請也注皆求請也音義告古毒反疏皆謂求請也成二年左傳曰郤克對齊侯曰晉與魯衛兄弟也來告曰大國朝夕釋憾于敝邑之地詩序云無險詖私謁之心肅噰聲也注詩曰肅噰和鳴音義噰於容反疏和樂聲也注詩曰肅噰和鳴者周頌有瞽文也格懷來也注書曰格爾衆庶懷見詩疏謂招來也注書曰格爾衆庶者商書湯誓文也云懷見詩者周頌時邁云懷柔百神畛砥致也注皆見詩傳音義底畛之忍反之視反疏曲禮曰畛於鬼神昭元年左傳叔向曰底祿以德周頌下武篇云耆定爾功毛傳曰耆致也王肅云致定其大功謂誅紂定天下是毛讀耆為底故注云見詩傳恀怙恃也注今江東呼母為恀音義恀音是怙音户恃音市疏皆依恃也郭云今江東呼母為恀小雅蓼莪云無父何怙無母何恃是也律遹述也注皆敘述也方俗語耳音義遹古述字一音餘橘反疏皆敘述也方俗語異耳律管所以述氣遹者述行之也大雅文王有聲云遹駿有聲之類是也俞畣然也注禮記曰男唯女俞畣者應也亦為然音義俞羊朱反畣古答字一本作答唯維癸反應音譍疏皆然應也注禮記曰男唯女俞者內則文也畣古答字故為應也豫臚敘也注皆陳敘也音義臚吕居反疏皆陳敘也事豫備者亦有敘也漢書云典客秦官太初元年更名大鴻臚韋昭曰鴻大也臚陳敘也以禮陳敘于賓客也又莊子云大儒臚傳是也庶幾尚也注詩曰不尚息焉音義幾音機疏尚謂心所希望也注詩曰不尚息焉者小雅菀栁篇文也鄭箋云尚庶幾也以心所念尚即是庶幾義相反覆故引之觀指示也注國語曰且觀之兵音義觀施音館謝音官注同疏示謂呈見於人也注國語曰且觀之兵者案周語穆王將征犬戎祭公謀父諫曰不可先王耀德不觀兵犬戎氏以其職來王天子曰豫必以不享征之且觀之兵無乃廢先王之訓而王幾頓乎是也論語曰指其掌謂舉掌以示人也若惠順也注詩曰惠然肯來音義肯口等反疏順不逆也書曰若稽古謂順考古道也詩邶風終風云惠然肯來言有順心然後可來是也敖憮傲也注禮記曰無憮無敖傲慢也音義敖五刀反憮郭火孤反沈亡甫反傲五報反疏皆謂傲慢周頌絲衣云不吳不敖注禮記曰無憮無敖者投壺文也案彼云魯令弟子辭曰毋憮毋敖毋偝立毋踰言偝立踰言有常爵是也幼鞠稚也注書曰不念鞠子哀音義稚直利反又音稚疏方言云稚年小也曲禮曰幼子常視無誑書曰兄亦不念鞠子哀是皆謂年少也書曰者周書康誥文也逸愆過也注書曰汝則有逸罰音義愆去虔反疏皆謂咎過也注書曰汝則有逸罰者案商書盤庚云惟豫一尺有佚罰費誓云汝則有常刑無云汝則有逸罰者師讀不同故也或者其在今文乎愆者左傳曰禮義不愆之類是也疑休戾也注戾止也疑者亦止音義戾力細反疏戾止也書曰疑謀勿成月令云百工休是疑休皆為止也疾齊壯也注壯壯事謂速也齊亦疾音義壯阻亮反疏急速齊整皆於事敏速強壯也悈褊急也注皆急狹音義悈本或作極又作亟同紀力反或音戒褊必淺反説文云小衣也廣雅云褊狹陋也狹戶甲反疏悈與亟同大雅靈臺云經始勿亟文王有聲云匪棘其欲禮記引此詩作匪革其猶革亦急悈亟棘革字雖異音義同魏風葛屨云維是褊心又廣雅云悈謹也褊狹陋也是皆急狹也貿賈市也注詩曰抱布貿絲音義貿音茂字又作同賈音古疏謂市買賣物也注詩曰抱布貿絲者衛風氓篇文也大雅瞻卬云如賈三倍也厞陋隱也注禮記曰厞用席書曰揚側陋音義厞符沸反字又作陫同側音仄疏皆幽隱也注禮記曰厞用席者案有司徹云有司官徹饋饌于室中西北隅南面如饋之設右几厞用席是也云禮記者誤也云書曰揚側陋堯典文也遏遾逮也注東齊曰遏北燕曰遾皆相及逮音義遾嘗例反逮音代一音徒帝反疏逮謂相及也注東齊曰遏北燕曰遾者方言文也征邁行也注詩曰王于出征邁亦行疏皆出行注詩曰王于出征者小雅六月文也云邁亦行者詩云周王于邁是也圯敗覆也注謂毁覆音義圯皮美反覆芳服反注同疏圯毁敗壞皆傾覆也書曰祖乙圮于耿荐原再也注易曰水荐至今呼重蠶為蠢春原音義荐徂薦反又徂遜反郭徂很反原舍人本作蠢春原音同再子代反重直用反又直龍反疏皆重再也孫炎云荐草生之再也注云易曰水荐至者周易坎卦象辭也云今呼重蠶為蠢春原者周禮夏官馬質云禁原蠶者是也憮敉撫也注憮愛撫也敉寧見書音義憮亡甫反敉亡婢反郭敷靡反孫敷是反疏皆愛撫也方言云東齊邠陶之間謂愛曰憮故上云憮愛撫也云敉寧見書者大誥云豫翼以于敉寧武圖功之類是也臞脙瘠也注齊人謂瘠為脙音義臞字又作癯同求俱反脙音求瘠秦昔反疏皆瘦瘠也鄭玄周禮注云瘦瞿腐敗郭云齊人謂瘠瘦為脙桄熲充也注皆充盛也音義桄孫作光古黃反熲古迥反疏孫叔然本桄作光書曰光被四表説文云熲火光也是皆充盛也屢昵亟也注親昵者亦數亟亦數也音義屢力住反昵女乙反亟墟記反數色角反疏亟猶數也詩頌曰屢豐年左傳曰諸夏親昵親昵時恩信必數故注云親昵者亦數靡罔無也疏無不有也詩云靡神不舉書曰罔有攸赦皆是爽差也爽忒也注皆謂用心差錯不專一音義忒他得反或作疏廣異言也爽謂差錯又為忒變孫炎曰忒變雜不一郭云皆謂用心差錯不專一詩衛風云女也不爽大雅瞻卬云鞠人忮忒佴二也注佴次為副二音義佴而志反疏佴次也次即副二之二劑翦齊也注南方人呼翦刀為劑刀音義劑即隨反翦子淺反疏皆為齊截也郭云南方人呼翦刀為劑刀釋器云金鏃翦羽謂之鍭饙餾稔也注今呼飯為饙饙熟為餾音義饙方云反字又作餴同説文作云修飯也饙餴並同也字書云一蒸米餾力又反稔字又作飪同而審反􅧮音修又西九反又所九反一音孫廣雅饙謂之􅧮也蒼頡篇云􅧮饋也飰字作餅俗作飯同符萬反字林云飯食也扶晚反飼也疏稔熟也孫炎曰蒸之曰饙均之曰餾郭云今呼飯為饙饙熟為餾説文云饙一蒸米也餾飯氣流也然則蒸米謂之饙饙必餾而熟之故言饙餾稔也大雅泂酌云可以餴饎饙餴音義同媵將送也注左傳曰以媵秦穆姬詩曰逺于將之音義媵以證反又繩證反方言云媵寄也記也送也疏皆謂送行也孫炎曰將行之送也注云左傳曰以媵秦穆姬者案僖五年晉執虞公及其大夫井伯以媵秦穆姬杜注云秦穆姬晉獻公女送女曰媵以屈辱之云詩曰逺于將之者邶風燕燕衛莊薑送歸妾之詩也作造為也音義造才早反疏謂營為也皆見鄭風緇衣篇餥餱食也注方言云陳楚之間相呼食為餥音義餥音非餱音侯呼或作􅨜同疏皆飯食也方言云陳楚之間相呼食為餥者案彼云餥飵食也陳楚之內相謁而食麥饘謂之餥楚曰飵凡陳楚之郊南楚之外相謁而飱或曰飵或曰䬯秦晉之際河隂之間曰䭡䭓此秦語也大雅公劉云乃裹餱糧䭡惡恨切䭓五恨切鞫究窮也注皆窮盡也見詩音義鞫居六反字又作鞠同究音救疏皆窮盡也大雅雲漢云鞫哉庶正小雅節南山云以究王訩滷矜鹹苦也注滷苦地也可矜憐者亦辛苦苦即大鹹音義滷音魯鹹音咸憐力田反疏郭云滷苦地也者謂斥滷可煮鹽者左傳曰表淳滷云可矜憐者亦辛苦者小雅鴻鴈云爰及矜人鄭箋云可憐之人謂貧窮者是辛苦之人也云苦即大鹹者釋經之鹹也鹹殊極必苦故以鹹為苦也干流求也注詩曰左右流之疏皆求取也論語云子張學干祿注詩曰左右流之者周南關雎文也流覃也覃延也注皆謂蔓延相被及音義覃徒南反本又作字孫叔然云古覃字同蔓音萬延相連不斷也疏轉相解也皆謂蔓延相被及水之流必相延及詩周南云葛之覃兮佻偷也注謂苟且音義佻他雕反郭庴了反偷他侯反疏小雅鹿鳴云視民不佻是也李巡曰佻偷薄之偷郭云謂苟且左傳趙孟曰吾儕偷食朝不謀夕何其長也杜注云言欲苟免目前不能念長久是謂偷為苟且也潛深也潛深測也注測亦水深之別名音義潛捷鹽反深如字又尸鴆反測初力反疏轉相解也詩曰潛雖伏矣是深矣潛深又為測郭云測亦水深之别名穀鞠生也注詩曰穀則異室音義鞠居六反疏皆生活也注詩曰穀則異室者王風大車篇文也小雅蓼莪云母兮鞠我啜茹也注啜者拾食音義啜常悅反郭音鋭顧豬芮反施丑衛尺鋭二反説文云啜嘗也廣雅云食也茹音汝食也疏説文云啜嘗也郭云啜者拾食禮記檀弓云啜菽飲水大雅蒸民云柔則茹之方言云茹食也吳越凡貪飲食者謂之茹茹虞度也注皆測度也詩曰不可以茹音義茹如庶反注同度待各反注及下同疏皆謂測度也注詩曰不可以茹者邶風柏舟文也左傳曰備豫不虞試式用也注見詩書疏皆任用也云見詩書者小雅大東云百僚是試雨無正云庶曰式臧商書盤庚云今豫將試以汝遷又云式敷民德之類是也誥誓謹也注皆所以約勤謹戒衆疏皆謹敕也以大義諭衆謂之誥集將士而戒之曰誓尚書誥誓之類是也故郭云皆所以約勤謹戒衆也競逐強也注皆自勉強音義強巨丈反注同又其良反疏皆自勉強也大雅抑篇云無競維人馳逐者亦強梁也禦圉禁也注禁制音義圉本或作御同俱魚吕反疏皆謂禁制小雅棠棣云外禦其務飬馬曰圉亦所以禁制故皆為禁也窒薶塞也注謂塞孔穴音義窒豬乙反又下栗反薶亡皆反疏皆謂堙塞孔穴豳七月云穹窒熏鼠大宗伯云以貍沈祭山林川澤是其類也黼黻彰也注黼文如斧黻文如兩已相背音義黼字或作􅡴同音甫白與黑曰黼為斧形黻字或作同音弗青與黑曰黻黻戾也已音紀疏彰眀也言文采著眀也注云黼文如斧黻文如兩已相背者考工記云白與黑謂之黼黑與青謂之黻釋器云斧謂之黼蓋半白半黑似斧刃白而身黑黻謂以青黑線刺繡為兩己字相背黼取能斷黻取善惡相背膺身親也注謂躬親音義膺於矜反疏服膺身先皆謂躬親也愷悌發也注發發行也詩曰齊子愷悌音義愷苦亥反悌徒禮反疏謂發明而行也注詩曰齊子愷悌者齊風載驅篇文也毛傳云言文薑于是樂易然鄭箋云此豈弟猶言發夕也豈讀當為闓弟古文尚書以弟為圛圛明也然則郭云發發行也是用鄭箋為説髦士官也注取俊士令居官音義髦音毛毛中之長毫曰髦士之俊傑者借譬為名令力呈反疏下云髦俊也士者男子之美號言取俊士令居官也大雅棫朴云髦士攸宜是也畯農夫也注今之嗇夫是也音義畯子峻反主田大夫也嗇音色疏田畯一曰農夫孫炎曰農夫田官也皆謂主田大夫也小雅甫田云田畯至喜鄭箋云田畯司嗇今之嗇夫也此注云今之嗇夫是也然則田畯田官在田司主稼穡故謂之司嗇漢及東晉亦有此官謂之嗇夫故鄭郭皆亡今之嗇夫也蓋割裂也注蓋未詳音義蓋古害反舍人本作害裂音列疏割謂以刃裂之也雍支載也注皆方俗語亦未詳音義雍字又作擁疏謝氏云雍字又作擁釋云擁者護之載郭云皆方俗語亦未詳諈諉纍也注以事相屬纍為諈諉音義諈謝之睡反郭置睡反諉郭女睡反顧汝恚反謝音􅖖孫亡楚人曰諈秦人曰諉纍本又作纍劣偽反字又作絫同注同屬之欲反疏謂相纍及也孫炎曰楚人曰諈秦人曰諉郭云以事相屬纍為諈諉漠察清也注皆清眀音義漠音莫疏樊光云漠然清貌察眀也是皆清眀也庇庥廕也注今俗語呼樹蔭為庥音義庇必寐反又音祕庥字又作休虛求反郭許州反廕字亦作蔭於鴆反疏舍人曰庇蔽也庥依止也郭云今俗語呼樹蔭為庥文七年左傳云葛藟猶能庇其本根穀履祿也注書曰既富方穀詩曰福履將之疏皆福祿也孝經援神契云祿者録也取上所以敬録接下下所以敬録事上注書曰既富方穀者洪範文云詩曰福履將之者周南樛木文也履禮也注禮可以履行見易疏履又為禮也禮可以履行見易者序卦云物畜然後有禮故受之以履韓康伯云履者禮也隱占也注隱度音義度大各反疏占者視兆以知吉凶也必先隱度故曰隱占也逆迎也疏謂迎迓周書顧命云逆子釗于南門之外憯曾也注發語辭見詩音義憯七感反疏憯猶言曽也曽則也皆發語辭郭云見詩者小雅節南山云憯莫懲嗟衛風河廣云曾不崇朝之類是也增益也注今江東通言增疏謂饒益也郭云今江東通言增窶貧也注謂貧陋音義窶求矩反毛詩傳云窶者無禮疏窶者無禮也貧者無財也由其無財以為禮郭云謂貧陋邶風北門云終窶且貧薆隱也注謂隱蔽音義薆烏槩反疏薆鄣即隱蔽也僾唈也注嗚唈短氣皆見詩音義僾烏槩反唈烏合反疏孫炎曰心唈也郭云嗚唈短氣皆見詩大雅桑柔云亦孔之僾是也基經也注基業所以自經營基設也注亦為造設疏基墻下土也又詁為始作事謀始必經綸也郭云基業所以自經營又為造設祺祥也注謂徵祥祺吉也注祥吉之先見音義祺音其下同見賢遍反疏舍人曰祺祥之祥謂徵祥也祥即吉之先見者也故又為吉大雅行葦云夀考維祺兆域也注謂瑩界音義兆廣雅云葬地也本又作垗音同瑩音營疏謂瑩墓界域也孝經曰卜其宅兆廣雅云兆葬地也士喪禮云筮宅冡人營之鄭注云宅葬居也然則筮得吉兆經營之以為界域也肇敏也注書曰肇牽車牛疏謂敏疾也注書曰肇牽車牛者周書酒誥文也挾藏也注今江東通言挾音義挾户牒反疏謂隱藏物也郭云今江東通言挾史記秦有挾書之律浹徹也注謂霑徹音義浹子協反郭音接徹直列反霑竹簾反疏言潤澤浹洽相霑徹也替廢也替滅也注亦為滅絶疏替謂廢己也小雅楚茨篇云子子孫孫勿替引之是也替又為絶滅速徵也徵召也注易曰不速之客疏轉相解也皆謂呼召注易曰不速客者需卦上六爻辭也琛寶也注詩曰來獻其琛音義琛敕金反郭舒金反疏謂珍寶也舍人曰美寶曰琛注詩曰來獻其琛者魯頌泮水文也探試也注刺探嘗試音義探吐南反刺七赤反疏試謂嘗之也論語曰見不善如探湯郭云刺探嘗試髦選也注俊士之選髦俊也注士中之俊如毛中之髦音義選宣戀反疏廣異言也毛中之長毫日髦士之俊選者是也俾職也注使供職音義俾必爾反沈方寐反疏俾詁為使言任使供職也紕飾也注謂緣飾見詩音義紕婢寐反謝房彌反郭方寐反飾申職反緣恱面反疏謂緣飾見詩者鄘風干旄云素絲紕之是也淩栗也注淩懅戰栗栗戚也注戰栗者憂戚音義淩力升反案郭注意當作陵埤蒼云淩栗也樊注作凌冰􅏮也力膺反栗音栗懅舊音遽其據反亦謂戰栗也戚字又作戚七歷反疏轉相解也埤蒼云淩栗也郭言淩懅戰栗則淩陵音義同栗又為戚郭云戰栗者憂戚秦風黃鳥云惴惴其栗蠲明也注蠲清明貌茅明也注左傳曰前茅慮無明朗也音義蠲古玄反又音圭疏郭云蠲清明貌樊光云蠲除垢穢使令清明茅亦明也舍人曰茅昧之明也注左傳云前茅慮無者宣十二年傳文也杜注慮無如今軍行前有斥候踏伏皆持以絳及白為幡見騎賊舉絳幡見步賊舉白幡備慮有無也茅明也或曰時楚以茅為旌幟明即融朗也猷圖也注周官曰以猷鬼神祗謂圖畫猷若也注詩曰實命不猷疏猷謂圖畫又為若若如也注周禮曰以猷鬼神祗者春官凡以神仕者掌三辰之法以猷鬼神示之居辨其名物是也詩曰實命不猷者召南小星文也稱舉也注書曰稱爾戈音義稱尺證反疏謂興舉也稱爾戈者周書牧誓文也稱好也注物稱人意亦為好音義好呼報反又如字注同疏謂美好郭云物稱人意亦為好坎律銓也注易坎卦主法法律皆所以銓量輕重音義坎字又作欿苦感反銓七全反銓即稱疏謂銓量也樊光曰坎卦水也水性平律亦平銓亦平郭云易坎卦主法者説卦云坎為水水平故主法云法律皆所以銓量輕重者白虎通云水之為言準也律歷志云繩直生準準正則平衡而鈞權矣又曰權衡者衡平也權重也衡所以任權而鈞物平輕重也本起於黃鍾之重一籥容千二百黍重十二銖兩之為兩兩者兩黃鍾律之重是法律皆所以銓量輕重也矢誓也注相約誓疏相約誓也鄘柏舟云之死矢靡它舫舟也注並兩船音義舫方訪反又音方並字又作併步頂反疏謂並兩船釋水曰大夫方舟泳遊也注潛行遊水底音義泳音詠底丁禮反疏謂潛行遊水底也邶谷風云泳之遊之逮及也注東齊曰逮音義逮音待疏謂相及也注東齊曰逮者方言文也冥幼也注幼稚者冥昧音義冥覓經反字林亡經亡定二反疏謂幼少也郭云幼稚者冥昧小雅斯干云噦噦其冥降下也音義降古巷反下音如字一讀降音户江反下音户嫁反疏召南草蟲云我心則降傭均也注齊等音義傭勑恭反均音鈞疏謂齊等也小雅節南山云昊天不傭強暴也注強梁淩暴音義暴字又作暴同蒲報反疏強梁者好淩暴於物詩序云強暴之男窕肆也注輕窕者好放肆肆力也注肆極力音義窕吐雕反好呼報反疏窕輕也肆放也輕窕者好放肆肆又為極力俅戴也注詩曰載辨俅俅音義俅音求辨音卞疏謂頭戴也注詩曰載辨俅俅者周頌絲衣文也瘞幽也注幽亦薶也音義瘞於例反又於計反或作卷同薶莫皆反疏皆謂薶藏氂罽也注毛氂所以為罽音義氂力知反又力才反李本作毳吕鋭反罽居例反疏毛氂所以為罽舍人曰氂所謂毛罽也胡人續羊毛而作衣然則罽者織毛為之若今之毛氍毹以衣馬之帶鞅也烘燎也注謂燒燎煁烓也注今之三隅竈見詩音義烘沈顧火公反郭巨凶反孫音恭字林巨凶甘凶二反燎力皎反又力召力弔二反煁市針反烓郭音恚字林口頴反説文云行竈也顧口井烏擕二反隅音虞竈則到反疏舍人曰烘以火燎也煁烓竈也郭云烘謂燒燎煁今之三隅竈也然則烓者無釡之竈其上然火謂之烘本為此竈上以然火照物若今之火爐也注云見詩者小雅白華云樵彼桑薪卭烘于煁是也陪朝也注陪位為朝音義陪蒲回反朝直遙反注同疏臣見君曰朝朝之列位必陪重是陪位為朝也康苛也注謂苛刻音義苛音何疏注謂苛刻案苛者毒草名為政刻急者取譬焉禮記孔子曰苛政猛於虎苛名康者以康安也苛刻者心安之左傳曰州吁阻兵而安忍其類也樊藩也注謂藩籬音義樊音煩藩方元反籬力支反疏孫炎曰樊圃之藩也郭曰謂藩籬藩以細木為之齊風東方未明云折栁樊圃小雅青蠅云營營青蠅止於榛毛傳云棘榛所以為藩是也賦量也注賦稅所以評量音義量音良一音亮評音病疏謂賦稅也郭亡賦稅所以評量方言云評均賦也燕之北鄙東齊北郊凡相賦斂謂之平均是評量也粻糧也注今江東通言粻音義粻音張字林又文庚反糧音良疏謂粻食也郭云今江東通言粻王制云五十異粻庶侈也注庶者衆多為奢侈庶幸也注庶幾僥幸音義侈昌氏反又尸氏反幾音機僥古堯反幸朝耿反與幸通用疏富庶者多奢侈郭云庶者衆多為奢侈書曰祿不期侈庶又為幸望郭云庶幾僥幸僥者求見親御也幸與幸通用之築拾也注謂拾掇音義築音竹掇丁活反説文云拾取疏拾謂拾掇金縢云几大木所偃盡起而築之馬融云起其木拾其禾奘駔也注今江東呼大為駔駔猶粗也音義奘徂朗反秦晉謂大為奘駔在魯反又子郎反沈集注本作音同孫二夲並作將且而無奘駔沈集衆本合為一字􅨜火乎反或作呼同疏皆謂大也秦晉謂大為奘郭云今江東呼大為駔駔猶粗也集會也疏説文云集若羣鳥在林木之上故曰集指事也故經典通謂聚會為集舫泭也注水中竺二稗筏音義舫謝音方詩亦作方施甫訪反樊本作坊符方反又音方泭郭音孚字或作同樊本作附沈音附竺二稗皮佳反本又作􅑉同筏音伐方言云泭謂之􅑉􅑉謂之筏秦晉通語疏孫炎曰舫水中為泭筏也郭云水中竺二稗筏方言云泭謂之竺二稗竺二稗謂之筏筏秦晉之通語也周南漢廣云不可方思論語曰乘桴浮于海注云桴編竹木大曰筏小曰桴是也舫方泭桴音義同洵均也注謂調均洵龕也注未詳音義洵郭音巡注同謝音荀下句放此龕苦南反字或作含疏李巡曰洵遍之均也郭云謂調均大雅桑柔云菀彼桑柔其下侯旬毛傳云旬言隂均也然則洵旬音義同洵又為龕未詳逮遝也注今荆楚人皆云遝音義逮音代一音大計反遝孫郭徒答反疏亦謂相及方俗語異爾郭云今荆楚人皆云遝是則也注是事可法則疏是不非也則法效也郭云是事可法則言不非之事乃可為人法則畫形也注畫者為形像音義畫胡卦反疏郭云畫者為形象考工記云畫繪之事土以黃其象方天時變火以圜山以章水以龍鳥獸蛇是畫者為形象也賑富也注謂隱賑富有音義賑之忍反又之人之刃二反字林云富也刃引反疏皆豐財也郭云謂隱賑富有局分也注謂分部音義局強六反分符問反注同疏成十六年左傳云離局姦也杜注云逺其部曲為離局懠怒也注詩曰天之方懠音義懠才計反疏舍人日懠怒聲也注云詩曰天之方懠者大雅板之文也僁聲也注謂聲音音義僁音屑動草聲也郭音與稷契同施私秩反字又作屑疏郭云謂聲音言聲音僁僁然也葵揆也注詩曰天子揆之揆度也注商度音義葵求維反揆其水反度徒各切注同疏轉相解也皆謂商度注詩曰天子揆之者小雅采菽文也鄘風定之方中云揆之以日逮及也疏亦謂相及也大雅桑柔云荓云不逮惄飢也注惄然飢意音義惄本又作惄同奴歷反疏李巡云惄宿不食之飢也郭云惄然飢意周南汝濆云惄如調飢毛傳云惄飢意也鄭箋釋云惄思也然則惄之為訓本為思耳但飢之思食意又惄然故又以為飢惄是飢之意非飢之狀故郭及毛傳皆言飢意鄭箋以為思義相接成也眕重也注謂厚重見左傳音義眕之忍反疏謂厚重注見左傳者隱三年衛大夫石碏曰夫寵而不驕驕而能降降而不憾憾而能眕者鮮矣杜注云如此者少也降其身則必恨恨則思亂不能自安自重是也獵虐也注淩獵暴虐疏獵謂從禽也必暴害於物故云虐郭云淩獵暴虐土田也注别二名音義別彼列反疏别地之二名也白虎通云中央者土土主吐含萬物土之為言吐也釋名云土田耕者曰田田者填也五穀填滿其中也戍遏也注戍守所以止寇賊音義戍式喻反寇苦侯反疏遏止也郭云戍守所以止寇賊春秋公子買戍衛師人也注謂人衆疏師衆也周禮大司馬二千五百人為師故郭云謂人衆硈鞏也注硈然堅固音義硈苦角反鞏九勇反疏謂牢固易文言云確乎其不可拔又革卦初九云鞏用黃牛之革若如此説硈苦學切當從告説文别有硈苦八切石堅也字雖小異其義則同棄忘也音義棄邱異反忘音亡疏心遺忘小雅谷風云棄我如遺嚻間也注囂然間暇貌音義囂邱刀反又許嬌反謀心也注謀慮以心獻聖也注諡法曰聰明睿智曰獻疏郭云諡法曰聰眀睿智曰獻諡法者周書篇名也里邑也注謂邑居疏謂邑居也論語云里仁為美王制云凡居民量地以制邑襄除也注詩曰不可襄也音義襄四羊反或而羊反疏謂除去也注詩曰不可襄者鄘風墻有茨文也振古也注詩曰振古如兹猶云久若此疏言久故也注詩曰振古如兹猶言久若此者案周頌載芟云匪今斯今振古如兹毛傳云振自也鄭箋云振亦古也言修德行禮莫不獲報乃自古而如此所由來者久非適今時是也懟怨也音義懟直類反疏謂怨恨左傳曰以死誰懟縭介也注縭者繫也介猶閡音義縭力知反介音界李孫顧舍人本並云補羅也介别也閡五代反疏郭云縭者繫介猶閡以釋水云縭緌也緌繫者則介閡也號呼也注今江東皆言呼音義號戶羔反又胡到反呼火故反又如字又作呼疏謂呌呼也小雅賓之初筵云載號載呶郭云今江東皆言呼凶咎也音義咎求九反疏謂咎惡也通見詩書苞稹也注今人呼物叢緻者為稹音義苞補茅反稹謝之忍反郭振真二音緻直吏反疏郭云今人呼物叢緻者為稹孫炎曰物叢生曰苞齊人名曰稹唐風鴇羽云集于苞栩毛傳云苞稹也鄭箋云稹者根相逼迮梱綴亦謂叢生也逜寤也注相干寤音義逜五故反孫本吾字作午吾補反寤五故反疏逜謂相干也寐而覺寤之曰寤郭云相干寤顁題也注題額也詩曰麟之定音義顁丁佞反字又作定注同題徒兮反麟力仁反疏皆謂額也注詩曰麟之定者周南麟之趾文也猷肯可也注詩曰猷來無棄肯今通言音義肯苦等反或作古字字林作並同疏皆肯可也注詩曰猷來無棄者魏風陟岵文也肯今通言者邶風終風云惠然肯來是也務侮也注詩曰外禦其務音義侮亡甫反疏謂輕侮也注詩曰外禦其務小雅常棣文也貽遺也注相歸遺音義貽以之反遺唯季反注同歸巨位反疏謂相歸遺詩云貽我握椒貿買也注廣二名音義貿音茂疏貿市也又為買郭云廣二名詩云抱布貿絲賄財也音義賄火罪反疏財帛總名賄周禮冢宰職云商賈阜通貨賄鄭注云布帛曰賄甲狎也注謂習狎音義狎乎甲反疏謂狎習也衛風芃蘭云能不我甲左傳曰水懦弱民狎而玩之菼騅也菼薍也注詩曰毳衣如菼菼草色如騅在青白之間音義菼字又作􅫠他敢反或待感反騅章誰反如騅馬色也薍五患反毳昌鋭反疏廣異言也注詩曰毳衣如菼者王風大車文也毛傳云菼騅也藘之初生者也鄭箋云菼薍也以傳解菼色未辨草名故定之也郭云菼草色如騅在青白之間者以釋畜云蒼白雜毛騅故也粲餐也注今河北人呼食為粲音義粲七旦反飱謝素昆反説文云餔也字林云水澆飯也本又作餐施七丹反字林作飱云吞食疏謂餐食也郭云今河北人呼食為粲鄭風緇衣云還豫授子之粲兮鄭箋云自館還在采地之都我則設餐以授之愛之欲飲食之渝變也注謂變易音義渝音榆舍人作䞕同疏謂變易也詩曰舍命不渝宜肴也注詩曰與子宜之音義肴音爻疏謂肴饌也李巡曰飲食之肴也注詩曰與子宜之者鄭風女曰雞鳴文也夷悅也注詩曰我心則夷疏謂喜悅也注詩曰我心則夷者召南草蟲文顛頂也注頭上音義顛丁田反疏謂頭上也詩曰有馬白顛耋老也注八十為耋音義耋田結反孫他結反云老人面如鐵色疏耋鐵也孫炎曰老人面如鐵色郭云八十為耋詩秦風車鄰云逝者其耋毛傳云八十曰耋易離卦云大耋之嗟鄭注云年踰七十僖九年左傳曰伯舅耋老服虔曰七十曰耋此及詩傳言八十曰耋者耋有七十八十無正文也詩以仕者七十致事仕者慮已之耋欲得早致事故以為八十此用詩傳為説故與之同輶輕也注詩曰德輶如毛音義輶由久反又餘周反疏謂輕微也注詩曰德輶如毛者大雅蒸民文俴淺也注詩曰小戎俴收音義俴慈瞚反疏謂淺近注詩曰小戎俴收者秦風小戎文也綯絞也注糾絞繩索音義綯徒刀反絞古卯反糾吉黝反索悉各反疏謂糾絞繩索也李巡曰綯繩之絞也豳七月云宵爾索綯訛化也注詩曰四國是訛疏匡正之化也注詩曰四國是訛者豳風破斧文跋躐也注詩曰狼跋其胡疐跲也注詩曰載疐其尾音義跋蒲末反郭音貝又補葛反躐力輒反狼音郎疐竹利反又得異反又竹季反説文云礙足不行與躓同跲其業反又居業反郭又音甲疏李巡曰跋前行曰躐跲卻頓曰疐注詩云狼跋其胡載疐其尾者豳風狼跋文也説文云跋蹎丁千切跲躓竹二切躓即疐也然則跋與疐皆是顛倒之類以跋為躐者謂跋其胡而倒躓耳毛傳云老狼有胡謂頷下垂胡進則躐其胡謂躐胡而前倒也退則跲其尾謂卻頓而倒於尾上也蒸塵也注人衆所以生塵埃音義蒸之仍反埃音哀疏孫炎曰蒸物久之塵小雅南有嘉魚蒸然罩罩郭云人衆所以生塵埃戎相也注相佐助音義戎如字本或作顧如勇反沈如升反相如字又息亮反疏相如字注同一云相助也息亮切故注云相佐助也飫私也注宴飫之私音義飫於庶反疏孫炎曰飫非公朝私飲酒也郭云宴飫之私小雅常棣云飲酒之飫毛傳云飫私也不脫屨升堂謂之飫鄭箋云私者圖非常之事若議大疑於堂則有飫禮焉聽朝為公周語曰王公立飫孺屬也注謂親屬音義孺如戍反屬雛欲反疏李巡云孺骨肉相親屬也常棣云和樂且孺毛傳云九族會曰和孺屬也鄭箋云屬者昭穆相次序幕暮也注幕然暮夜音義幕音莫疏幕然暮夜也煽熾也熾盛也注互相訓煽義見詩音義煽音扇熾昌至反疏轉相解也皆嬖寵熾盛也注煽義見詩者小雅十月之交云艷妻煽方處柢本也注謂根本音義柢謝音帝疏謂根本也周禮典瑞云四圭有邸鄭司農云於中央為璧圭著其四面一玉俱成即引此文云邸本也圭本著於璧故四圭有邸圭本四出故也又曰兩圭有邸後鄭云僢而同邸皆謂本也柢邸音義同窕間也注窈窕間隙音義窕郭徒了反舍人本作跳云跳者躍之間間音間或如字窈音杳隙去逆反疏窈窕間隙也詩周南關雎云窈窕淑女毛傳云窈窕幽間鄭箋云幽間深宫皆謂淑女所處之宫形狀窈窕然淪率也注相率使疏謂相牽率郭云相率使小雅兩無正云無淪胥以鋪罹毒也注憂思慘毒音義罹力知反思息吏反慘七感反疏釋詁云罹憂也郭云憂思慘毒小雅小辨云我獨於罹檢同也注模範同等音義檢李郭居儉反模亡胡反疏檢模範也郭云模範同等説文云書署也郵過也注道路所經過音義郵音尤過古卧反疏郵謂郵亭過經過也郭云道路所經過郊特牲云郵表畷遜遁也注謂逃去音義遁字又作遁又作􅋟同徒頓反疏謂逃去也春秋莊元年夫人薑氏孫于齊公羊傳曰孫者何孫猶遜也內諱奔謂之孫穀梁傳曰孫之為言猶孫諱奔也斃踣也注前覆僨僵也注郤偃音義斃字亦作弊又作弊婢世反又婢設反郭步計反踣蒲北反又音赴或孚豆蒲侯二反覆芳服反僨甫問反僵居良反疏前郤顛覆之名也斃又謂之踣皆前覆也檀弓云射之斃鄭箋云斃仆也然則又為仆僨謂之僵皆仰偃也左傳曰鄭伯之車僨於濟畛殄也注謂殄絶音義畛之引反又之人反殄大典反疏謂殄絶也周頌載芟云徂隰徂畛毛傳曰畛埸也地官遂人云十夫有溝溝上有畛則畛謂地畔之徑路也至此而易之故以畛為埸易則地絶故得為殄曷盍也注盍何不音義盍户臘反疏郭云盍何不也論語曰盍各言爾志虹潰也注謂潰敗音義虹音洪顧作訌音同李本作降下江反潰乎內反疏潰敗亂也大雅抑篇云實虹小子召旻蟊賊內訌隌暗也注隌然冥貌音義隌字林或作暗同烏感反暗音暗冥莫定反疏謂冥昧也郭云隌然冥貌䵒膠也注膠黏䵒音義䵒字又作􅭓同女乙反郭音馹膠音交黏女亷反字林云相著也字書云糊也疏膠黏䵒也方言云䵒􅭓黏也齊魯青徐自關而東或曰䵒或曰􅭓孔甚也厥其也戛禮也注謂常禮音義戛居八反疏孔甚厥其通見詩書釋訓云戛常也故郭云謂常禮闍臺也注城門臺音義闍丁胡反疏謂城門臺也鄭風云出其闉闍毛傳云闉曲城也闍城臺也囚拘也注謂拘執音義拘音俱疏謂拘執也月令云挺重囚左傳曰南冠而縶者楚囚也縶則拘執也攸所也展適也注得自申展皆適意疏易曰利有攸往郭云得自申展皆適意欎氣也注鬱然氣出疏鬱然氣出也謂鬱蒸之氣也宅居也疏謂居處也大雅文王有聲云宅是鎬京休慶也音義休虛呌反疏謂嘉慶也商頌曰何天之休祈呌也注祈祭者呌呼而請事音義呌古弔反呼火故反注祈猶禱也求也春官太祝掌六祝之辭以祈福祥求永貞郭云祈祭者呌呼而請事濬幽深也注濬亦深也哲智也音義濬音峻疏舍人曰濬下之深也哲大智也郭云濬亦深也虞書舜典云濬哲文明孔安國云舜有深智言其智之深所知不淺近也弄玩也疏謂玩好也小雅斯干云載弄之璋鄭箋云玩以璋者欲其比德焉尹正也注謂官正也皇匡正也注詩曰四國是皇疏正長也郭云謂官正也言為一官之長也周書君陳曰尹兹東郊皇君威之正匡救諌之正孝經云匡救其惡注詩曰四國是皇者豳風破斧文也服整也注服御之令齊整音義整之領反令力呈反疏謂整治也郭云服御之令齊整周南葛覃云服之無斁聘問也注見穀梁傳疏問謂存省之對而言之則聘問異周禮大行人云時聘以結諸侯之好間問以喻諸侯之德又曰凡諸侯之邦交歲相問也殷相聘也聘禮云小聘曰問是異也散而言之皆謂相存省故此云聘問也注見穀梁傳者案隱九年春天王使南季來聘穀梁傳曰南氏姓也季字也聘問也是其事愧慙也音義愧九位反本亦作愧疏謂慙恥也小爾雅云不直失節謂之慙慙愧也面慙曰戁心慙曰恧體慙曰逡方言云悔㥾赧慙也晉曰悔或曰㥾秦晉之間凡愧而見上謂之赧梁宋曰㥾又云倎恧慙也荆揚青徐之間曰倎若梁並秦晉之間言心內慙矣山之東西自愧曰恧趙魏之間謂之䎵㥾音匿倎音腆恧女六切䎵音密亦音祕殛誅也注書曰鯀則殛死音義殛紀力反鯀古本反疏謂誅責注書曰鯀則殛死者周書洪範文克能也翌明也注書曰翌日乃瘳音義瘳勑留反疏克能通見書傳注書曰翌日乃瘳周書金縢文訩訟也注言訩譊音義訩音凶許容反説文作訩同譊即歡字疏多爭訟郭云言訩譊譊即歡小雅節南山云降此鞫訩晦冥也奔走也逡退也注外傳曰已復於事而逡音義冥亡定反逡七旬反傳直戀反下左傳皆同已復韋昭云已畢也復芳福反疏冥謂暗冥見公羊傳奔大走也左傳曰車馳卒奔逡却退也注外傳曰已復於事而逡者齊語管仲對桓公辭也韋昭曰已畢也逡伏退也此國語也而謂之外傳者韋昭曰左丘明采録前世穆王以來下訖魯悼智伯之誅邦國成敗嘉言善語隂陽律吕天時人事逆順之數以為國語其文不主於經故號曰外傳也疐仆也注頓躓倒仆音義疐都麗反一音致仆音赴躓音致疏即前文跲與踣也郭云頓躓倒仆亞次也諗念也注相思念音義諗音審相思念也説文式荏反疏亞下次也通見書傳諗者相思念也小雅四牡云將母來諗屆極也注有所限極音義屆音戒疏有所限極也大雅瞻仰云靡有夷屆弇同也注詩曰奄有龜蒙弇蓋也注謂覆蓋音義弇於簡反音掩覆敷救反疏廣異言也注詩曰奄有龜蒙魯頌閟宫文言弇覆同為已有弇又為蓋謂覆蓋也易曰惡積而不可掩弇掩音義同恫痛也注詩曰神罔時恫音義恫音通疏謂痛傷注詩曰神罔時恫大雅思齊文王肅云文王之德能上順祖宗安寧百神無失其道無所怨痛握具也注謂備具音義握李本作幄云居位處之具也郭云謂備具疏握持辦具也郭云謂備具李本作幄釋云居位處之具也秦風權輿云夏屋渠渠鄭箋云屋具也義其同乎振訊也注振者奮迅音義訊音信疏謂振訊去塵也郭云振者奮迅也曲禮曰振書端册鬩恨也注相怨恨音義鬩呼歷反恨也孫炎作很云相很戾也很音户墾反疏郭云相怨恨孫炎本作很解云相很戾小雅棠棣云兄弟鬩于墻毛傳云鬩很也很者忿呼之名曲禮曰很無求勝以字形異濫故釋者致殊於義兩解得之越揚也注謂發揚對遂也注詩曰對揚王休疏揚謂稱美郭云謂發揚遂者因事之辭注詩曰對揚王休者大雅江漢文燬火也注詩曰王室如燬燬齊人語音義燬音毁季尋云燬一音火孫炎曰方言有輕重故謂火為燬郭云燬齊人語疏李巡曰燬一名火孫炎曰方言有輕重故謂火為燬郭云燬齊人語方言云㷄火也楚轉語也猶齊言􅛚火也注詩曰王室如燬者周南汝墳文㷄呼隗切􅛚音燬懈怠也疏謂惰慢也大雅蒸民云夙夜匪懈宣緩也注謂寬緩遇偶也注偶爾相值遇疏郭云偶爾相值遇春秋隱八年春宋公衛侯遇于垂穀梁曰不期而會曰遇曩嚮也注國語曰曩而言戲也音義曩李亦作乃黨反嚮許亮反音向疏在今而道既往或曰曩或曰嚮書大傳云嚮之取於囿中勇力之取也注國語曰曩而言戲也者案晉語驪姬與優施謀飲里克酒乃歌曰暇豫之吾吾不如鳥烏人皆集於菀已獨集於枯里克笑曰何謂菀何謂枯優施曰其母為夫人其子為君可不謂菀乎其母既死其子又有謗可不謂枯乎枯且有傷優施出里克辟奠不餐而寢夜半召優施曰曩而言戲乎抑有所聞之乎是也偟暇也注詩曰不遑啓處音義偟音皇遑音皇呼王反或作偟通作皇疏謂間暇注詩曰不遑啓處者小雅四牡文宵夜也音義宵音消舍人云陽氣消也疏舍人曰宵陽氣消也詩云肅肅宵征書曰宵中星虛懊忨也注謂愛忨愒貪也注謂貪羡音義懊烏報反忨五館反愒苦蓋反杜預注左傳云忨愒皆貪也疏皆謂愛忨貪羡也昭元年左傳云主民玩歲而愒日杜注云忨愒皆貪也搘拄也注相搘拄音義搘音枝説文作榰拄音注説文作柱皆從木旁疏郭云相搘拄也説文云榰柱砥古用木今以石字書云拄屋之欹裁節也並併也注詩曰並坐鼓瑟音義併必頂反疏易泰卦云后以財成天地之道裁財音義同並併古今字注詩曰並坐鼓瑟者秦風車鄰篇文卒既也注既已音義卒子忽反疏皆謂盡已也慒慮也注謂謀慮也音義慒音囚字書作悰疏郭云謂謀慮也字書作悰將資也注謂資裝疏行所資也郭云謂資裝黹紩也注今人呼縫紩衣為黹音義黹致恥反紩也音抶郭云今人呼紩衣為黹縫奉容反疏謂縫刺也郭云今人呼縫紩衣為黹鄭注司服云黼黻絺繡為黹謂刺繡也遞迭也注更迭音義遞音悌他計反一音待結反迭待結反音絰更音庚疏李巡曰遞者更迭間厠相代之義邶柏舟云胡迭而微矧况也注譬况音義矧詩忍反疏説文云矧况辭從矢取辭如矢也郭云譬况謝氏云志譬况是也廩廯也注或説云即倉廩所未詳音義廩力錦反廯息淺反廣雅云廯倉也孫炎云廯藏穀鮮潔也舍人云廩少鮮也郭云或説云即倉廪所未詳疏廣雅云廯倉也則廩廯即囷倉之别名孫炎云廯藏穀鮮潔也舍人云廩少鮮也郭云或説云即倉廩所未詳逭逃也注亦見禮記音義逭音換疏謂遁逃商書太甲云自作孽不可逭注亦見禮記者案緇衣云子曰小人溺於水君子溺於口大人溺於民皆在其所褻也下云太甲曰天作孽可違也自作孽不可以逭訊言也注相問訊疏訊問以言也郭云相問訊詩云執訊獲醜間俔也注左傳謂之諜今之細作也音義間音諌俔胡典反諜徒協反杜預注左傳云諜伺也説文云軍中反間也疏反間一名俔今之細作也注左傳謂之諜者案桓十二年云使伯嘉諜之杜注云諜伺也兵書謂之反間也案説文云諜軍中反間也謂佯為敵國之人入其軍中伺候間隙以反報其主人鄭注周禮掌戮云諜謂姦寇反間者沄沆也注水流漭沆音義沄音云沆胡黨反説文云沄轉流也一曰沆漭莫廣反一音莫郎反大水貌疏説文云沄轉流也一曰沆郭云水流漭沆漭沆水大貌干扞也注相扞衛音義扞戶旦反疏郭云相扞衛孫炎曰干盾自蔽扞周南兔罝云公侯干城言公侯以武夫自固為扞蔽如盾為防守如城然趾足也注足腳剕刖也注斷足音義趾音止剕本亦作剕同扶味反又枝迷反刖足曰剕刖音月鄭注周禮云斷足也疏易云賁其趾趾則足也亦謂之腳剕刑名刖斷人刑也吕刑云剕罰五百孔安國云刖足曰剕鄭注司刑云刖斷足也周改臏作刖剕剕音義同襄駕也注書曰懷山襄陵疏謂乘駕也鄭風太叔于田云兩服上襄注書曰懷山襄陵堯典文忝辱也燠暖也注今江東通言懊音義忝他簟反燠於六反疏忝謂恥辱也詩曰無忝爾所生暖溫也洪範云哲時燠若郭云今江東通言燠塊堛也注土塊也外傳曰枕凷以堛音義塊本作凷説文云塊俗凷字也凷一名堛堛孚逼反疏塊者結土也説文云塊俗凷字也凷一名堛郭云土凷也注外傳曰枕凷以堛案吳語吳王夫差既許越成乃大戒師徒將以伐齊申胥進諫曰昔楚靈王不君其臣針諌不入乃築臺於章華之上闕為石郭陂漢以象帝舜罷弊楚國以間陳蔡不修方城之內踰諸夏而圖東南三歲於沮汾以服吳越其民不忍飢勞之殃三軍叛王於乾溪王親獨行屏營傍偟於山林之中三日乃見其涓人疇王呼之曰余不食三日矣疇趨而進王枕其股以寢於地王寐疇枕王以墣而去之王覺而無見乃匍匐將入於棘圍棘圍不納也乃入芊尹申亥氏焉是其事也説文云墣匹角切亦塊也今注云枕凷者字之誤也凷當作王又外傳作墣郭云以堛者蓋亦理同或所見夲異也將齊也注謂分齊也詩曰或肆或將音義齊才細反郭云謂分齊王肅云分齊其肉所當用也分如字疏郭云謂分齊也注詩曰或肆或將者小雅楚茨文毛傳云肆陳將齊也或陳子牙或齊其肉王肅云分齊其肉所當用也糊饘也注糜也音義糊户吳反説文云寄食也饘之然反糜靡為反粥之稠者曰糜疏郭云糜也下云鬻糜郭云淖糜然則糊饘鬻糜相類之物稠者曰糜淖者曰鬻糊饘是其别名昭七年左傳云饘於是鬻於是以糊余口啓跪也注小跽音義跪求委反跽渠几反説文云長跪也莊子云擎跽曲拳臣之禮也疏謂跪拜也小雅四牡云不遑啓處郭云小跽説文曰跽長跪也莊子云擎跽曲拳臣之禮也矏密也注謂緻密音義矏武延反郭云謂緻密緻之侍反一音智又音至疏郭云謂緻密開闢也注書曰闢四門音義闢本亦作辟婢亦反又甫亦反疏注書曰闢四門虞書舜典文袍襺也注左傳曰重襺衣裘音義袍包毛反襺古典反本亦作繭綿衣也禮玉藻云纊為襺縕為袍鄭注云衣有著之别名也重直龍反衣於既反疏玉藻云纊為襺縕為袍鄭玄云衣有著之異名也纊謂今之新綿緼謂今之纊及舊絮也然則襺是袍之别名謂新綿著袍者也注左傳曰重襺衣裘者魯襄公二十一年傳云楚子使薳子馮為令尹遂以疾辭方暑闕地下氷而牀焉重襺衣裘鮮食而寢是也障畛也注謂壅障音義障知亮反説文云隔也又界也蔽也亦作鄣畛之忍反田間道壅於勇反疏郭云謂壅障一名畛左傳曰封畛土略靦姡也注面姡然音義靦他典反舍人云擅也一曰面貌也謂自専擅之貌姡戶刮反又户括反孫李云靦人面姡然也方言云楚鄭或謂狡獪為姡姡猶獪也凡小兒多詐謂之姡郭注言黠也獪音古外反又音夬疏郭云面姡然孫炎云靦人面姡然説文曰靦面見人姡面靦也然則靦與姡皆面見人之貌詩云有靦面目鬻糜也注淖糜舒緩也注謂遲緩音義鬻之六反字林亦作粥云淖糜也又與六反淖奴孝反又文卓反字林云濡甚也疏郭云謂遲緩詩云舒而脫脫兮翿纛也注今之羽葆幢纛翳也注舞者所以自蔽翳音義翿徒刀反又徒報反纛字又作翳徒報反鄭衆云羽葆幢也蔡伯喈云以旄牛尾為之大如斗在左騑馬軛上所謂黃屋左纛葆音保幢丈江反疏李巡曰翿舞者所持纛也孫炎曰纛舞者所持羽也郭云今之羽葆幢鄭司農注鄉師云翿羽葆幢也蔡雍獨斷云以旄牛尾為之大如斗在左騑馬頭上所謂黃屋左纛纛乂謂之翳郭云舞者所以自蔽翳然則翿又名為纛纛所以為翳故王風云左執翿毛傳云翿纛也翳也隍壑也注城池空者為壑音義壑火各反疏隍城池無水者郭云城池空者為壑易泰卦上六城復於隍芼搴也注謂拔取菜音義芼莫報反搴九輦反取也與􅠡同郭又音騫音義云本又作毛蹇拔步八反疏孫炎曰皆擇菜也某氏曰搴猶拔也郭云謂拔取菜以搴是拔之義史記曰斬將搴旗謂拔取敵人之旗也周南關雎云參差荇菜左右芼之故云謂拔取菜毛傳云芼擇亦謂拔菜而擇之也典經也威則也注威儀可法則疏周禮太宰之職掌建邦之六典鄭注云典常也經也法也王謂之禮經常所秉以治天下也邦國官府謂之禮法常所守以為法式也常者其上下通名郭云威儀可法則詩曰敬慎威儀維民之則苛妎也注煩苛者多嫉妎音義苛胡柯反妎胡計反又胡界反又音害説文云妎妬也疏説文云妎妬也郭云煩苛者多嫉妎言煩苛之人多嫉妬芾小也注芾者小貌音義芾芳味反又方蓋反疏芾是木幹及葉之小者也召南云蔽芾甘棠此比於大木為小也我行其野云蔽芾其樗鄭箋云樗之蔽芾始生謂樗葉之始生形亦小也郭云芾者小貌迷惑也狃復也注狃􅏸復為音義狃女九反復扶又反注同孫郭云狃􅏸復為也李音服云狃能屈申曰復􅏸石世反疏小雅節南山云俾民不迷謂不惑也狃復習也郭云狃􅏸復為孫炎云狃􅏸前事復為也説文云狃狎也􅏸習也鄭風云將叔無狃毛傳云狃習也桓十三年左傳云莫敖狃於蒲騷之役杜注云狃􅏸也然則狃􅏸皆貫習之義復亦貫習之意也逼迫也般還也注左傳曰般馬之聲音義逼彼力反本又作逼迫音百般郭音班左傳云役將般矣是也一音蒲安反周易云般桓是也説文云般辟也還音旋或音環疏逼相急迫也般還反也注左傳曰般馬之聲者襄十八年晉大夫邢伯告中行伯之辭也班賦也注謂布與疏郭云謂布與桓六年左傳云諸侯之大夫戍齊齊人饋之餼使魯為其班聘禮記云朌肉及廋車班朌音義同左傳曰屬役賦文濟渡也濟成也濟益也注所以廣異訓各隨事為義音義濟子細反下同益於亦反疏郭云所以廣異訓各隨事為義方言云過渡謂之涉濟彼注云猶今云濟渡左傳曰濟河焚舟濟又為成左傳曰以欲從人則可以人從欲鮮濟濟又為曽益左傳曰盍請濟師於王緡綸也注詩曰維絲伊緡緡繩也江東謂之綸音義緡亡巾反綸音倫繩音乘疏孫炎云皆繩名也郭云緡繩也江東謂之綸詩曰維絲伊緡也召南何彼穠矣文辟歷也注未詳漦盝也注漉漉出涎沫音義辟婢亦反一音壁漦仕其反又吕其反郭音牛齝反又丑之反李云吐沫漦也盝音鹿漉音鹿延囚延反字林云液沫音末疏李巡云吐沫漦也郭云漉漉出涎沫鄭語云訓語有之曰夏之衰也褒人之神化為二龍以伺于庭而言曰余褒之二君夏后卜殺之與去之與止之莫吉卜請其漦而藏之吉韋昭云漦龍所吐沫龍之精氣也寬綽也注謂寬裕也音義綽昌斫反裕音喻疏孫炎云性之裕者郭云謂寬裕也臯陶謨云寬而栗衮黻也注衮衣有黻文音義衮古本反説文云從衣從公也公羊耎反或云從公衣黻音弗疏郭云衮衣有黻文小雅采菽云玄衮及黼衮必兼有黼黻詩但言及黼嫌於無黻故此釋之毛傳云玄衮卷龍也白與黑謂之黼鄭箋云玄衮玄衣而畫以卷龍也黼黼黻謂絺衣也諸公之服自衮冕而下皇華也注釋草曰葟華榮音義華胡瓜反葟胡光反疏草木之華一名皇樊光引詩云皇皇者華孫炎云皇皇猶煌煌郭云釋草曰葟華榮引之以證皇亦華榮之名昆後也注謂先後方俗語疏郭云謂先後方俗語大禹謨云官占惟先蔽志昆命于元龜彌終也注終竟也音義彌亡移反疏郭云終竟也大雅生民云誕彌厥月言大矣后稷之在其母終人道十月而生也爾雅注疏卷二
