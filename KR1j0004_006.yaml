body:
  text: 爾雅注䟽卷三考證釋訓第三鄭樵曰訓者不可眀言也但形容其義耳故此篇只釋詩之言貎状後始及其説焉條條秩秩智也詩小雅巧言篇秩秩大猷注智思深長也秩秩説文作􅨖􅨖大猷漢書注作大繇兢兢憴憴戒也陸本憴作繩兢兢左傳作矜矜惴惴憢憢懼也鄭樵曰憢與嘵通悠悠洋洋思也陸本悠悠作攸攸鄭樵曰思而無所止貎忯忯惕惕愛也臣照按忯从氏與怟从氐者不同怟音諦玉篇閟也忯集韻音餂忯忯和悦也又同恀釋言恀怙恃也㦯从氏又音是恃事曰恀蓁蓁孽孽戴也䟽周南桃夭曰其葉蓁蓁王應麟詩攷曰通典作其葉溱溱赫赫躍躍迅也躍躍韓詩外傳作趯趯毚史記注趯趯徃来貎坎坎墫墫喜也臣照按䟽引詩墫墫舞我説文作竷竷舞我鄭樵曰據詩所言非喜意但喜躍而鼓舞也旭旭也旭旭前漢書揚雄傳嘻嘻旭旭注師古曰自得之貎也夢夢訰訰亂也䟽誨爾諄諄王應麟詩攷引禮記注曰誨爾忳忳鄭樵曰謂闇亂訰即諄也版版盪盪僻也陸本盪作蕩佌佌瑣瑣小也䟽引詩佌佌彼有屋説文作彼有屋畇畇田也䟽引詩畇畇原隰周禮䟽引詩作㽦㽦原隰俅俅服也注謂戴弁服陸本戴作載䟽引詩載弁俅俅説文作弁服俅俅鍠鍠樂也陸本鍠鍠作韹韹穰穰福也陸本穰穰作禳禳佻佻契契愈遐急也䟽引詩佻佻公子韓詩外傳作嬥嬥公子釋文徃来貎宴宴粲粲陸本宴宴作燕燕晏晏旦旦旦旦説文作􅘔􅘔懽懽愮愮陸本懽懽作灌灌翕翕訿訿臣照按詩小雅小旻篇潝潝訿訿説文訿訿不善之貎荀子作噏噏呰呰漢書作訿訿不俟不来也陸本俟作赫兮咺兮威儀也石經咺作烜韓詩外傳作赫兮宣兮有斐君子終不可諼兮韓詩外傳作有邲君子注邲美貎也是刈是濩濩煮之也石經濩作鑊陸本刈作乂濩作鑊美女為媛注所以結好媛陸本好媛作好援美士為彦注人所彦詠陸本彦詠作喭詠擗拊心也石經擗作辟釋親第四宗族母黨妻黨㛰姻臣照按石經俱標題扵後鄭樵本亦在後監本毛本俱訛在前今改正𤣥孫之子為来孫陸本作徕孫謂夫之庶母為少姑夫之兄為兄公鄭樵本庶母作少母陸本兄公作兄鍾爾雅注䟽卷三考證
