body:
  text: 爾雅注疏卷三考證釋訓第三鄭樵曰訓者不可眀言也但形容其義耳故此篇只釋詩之言貌狀後始及其説焉條條秩秩智也詩小雅巧言篇秩秩大猷注智思深長也秩秩説文作􅨖􅨖大猷漢書注作大繇兢兢憴憴戒也陸本憴作繩兢兢左傳作矜矜惴惴憢憢懼也鄭樵曰憢與嘵通悠悠洋洋思也陸本悠悠作攸攸鄭樵曰思而無所止貌忯忯惕惕愛也臣照按忯從氏與怟從氐者不同怟音諦玉篇閟也忯集韻音餂忯忯和悅也又同恀釋言恀怙恃也或從氏又音是恃事曰恀蓁蓁孽孽戴也疏周南桃夭曰其葉蓁蓁王應麟詩考曰通典作其葉溱溱赫赫躍躍迅也躍躍韓詩外傳作躍躍毚史記注躍躍往來貌坎坎樽樽喜也臣照按疏引詩樽樽舞我説文作竷竷舞我鄭樵曰據詩所言非喜意但喜躍而鼓舞也旭旭也旭旭前漢書揚雄傳嘻嘻旭旭注師古曰自得之貌也夢夢訰訰亂也疏誨爾諄諄王應麟詩考引禮記注曰誨爾忳忳鄭樵曰謂暗亂訰即諄也版版蕩蕩僻也陸本蕩作蕩佌佌瑣瑣小也疏引詩佌佌彼有屋説文作彼有屋畇畇田也疏引詩畇畇原隰周禮疏引詩作畇畇原隰俅俅服也注謂戴辨服陸本戴作載疏引詩載辨俅俅説文作辨服俅俅鍠鍠樂也陸本鍠鍠作韹韹穰穰福也陸本穰穰作禳禳佻佻契契愈遐急也疏引詩佻佻公子韓詩外傳作嬥嬥公子釋文往來貌宴宴粲粲陸本宴宴作燕燕晏晏旦旦旦旦説文作􅘔􅘔歡歡愮愮陸本歡歡作灌灌翕翕訿訿臣照按詩小雅小旻篇潝潝訿訿説文訿訿不善之貌荀子作吸吸呰呰漢書作訿訿不俟不來也陸本俟作赫兮咺兮威儀也石經咺作烜韓詩外傳作赫兮宣兮有斐君子終不可諼兮韓詩外傳作有邲君子注邲美貌也是刈是濩濩煮之也石經濩作鑊陸本刈作乂濩作鑊美女為媛注所以結好媛陸本好媛作好援美士為彥注人所彥詠陸本彥詠作唁詠劈拊心也石經劈作辟釋親第四宗族母黨妻黨婚姻臣照按石經俱標題于後鄭樵本亦在後監本毛本俱訛在前今改正玄孫之子為來孫陸本作徠孫謂夫之庶母為少姑夫之兄為兄公鄭樵本庶母作少母陸本兄公作兄鍾爾雅注疏卷三考證
