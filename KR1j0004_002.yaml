body:
  text: 爾雅注疏卷一考證釋詁第一鄭樵曰詁故也古人之言也故從言以古人之言於今有訛轉故作釋詁以五方之言於此有異同故作釋言然古人之言亦有五方之異五方之言亦有古今不同故釋詁釋言二篇雖各有注其義互通權輿始也注胡不承權輿詩秦風權輿篇作于嗟乎不承權輿箌昄晊將業席大也注箌義未聞韓詩云箌彼甫田詩小雅甫田篇本作倬彼甫田韓詩為箌篇海以為與罩同則又迥非倬義矣鄭樵曰説文云箌草大也晊日照之所及也儀若祥淑鮮省臧嘉令類綝彀攻榖介徽善也注省綝彀未詳其義臣照按詩大雅皇矣篇帝省其山鄭箋省善也又禮大傳省于其君注善于其君謂免于大難也綝玉篇善也集韻音森或作襂襂纚衣裳毛羽垂貌楚辭九懷舒佩兮綝纚木華海賦被羽翮之襂襹後漢輿服志諸古麗圭襂閨緑加上之服禁絶之彀孟子羿之教人射必志于彀詩大雅行葦篇敦弓既句注句彀通射至於彀射之善也靖惟漠圖詢度咨諏究如慮謨猷基訪謀也注如未詳臣照按凡曰何如皆謀議未定之辭也如當同茹詩周頌臣工篇來咨來茹猷與猶同詩小雅小旻篇謀猶回遹我視謀猶不我告猶哀哉為猶謀又同謨淮南引皇皇者華之詩作周爰咨謨黃髮鯢齒鮐背耉老夀也注齯齒齒墮更生細者陸本墮作隋允孚亶展諶誠亮詢信也注方言曰荆吳淮泗之間曰展諶詩大雅蕩之篇天命匪諶説文作天命匪忱陸本淮泗作淮汭諸本同作淮泗臣照按方言注曰汭水名也音芮則應從陸本粵于爰曰也鄭樵曰粵亦作越通作曰曰於也臣照按曰古又通作聿王應麟詩考楚辭章句引詩大雅綿之篇作豫聿有奔走豫聿有先後敆郃盍翕仇偶妃匹會合也臣照按郃本同洽詩大雅大明篇在郃之陽注洽水名在同州郃陽夏陽縣今流已絶故去水而加邑正韻洽合也詩小雅正月篇洽比其鄰注洽比皆合也忥諡溢蟄慎貉謐顗頠密寧靜也注忥顗頠未聞其義臣照按忥集韻欷去聲説文靜也又息也忥與愾同又同忔廣韻靜也史記周本紀棄為兒時忔如巨人之志諡石經作諡溢詩周頌維天之命篇假以溢我説文作誐以溢我廣韻作誐以謐我謐同密禮記引周頌昊天有成命篇夙夜其命宥密賈誼新書叔向曰宥謐者寧也顗音蟻説文謹莊貌頠音隗説文頭間習也注低仰便也廣韻間習容止也隕殞湮下降墜摽蘦落也石經殞作碩命令禧畛祈請謁訊誥告也注禧未聞臣照按禧本通釐史記孝文紀祠官祝釐師古注釐本作禧假借用耳然則禧有告于神明之義故曰告也矢雉引延順薦劉繹尸旅陳也陸本矢作屎尸寀也注謂寀地鄭樵曰舊注謂寀地非此即竂寀之宷故亦從寀而下文又申云寀竂官也臣照按鄭樵之意以下文寀竂官也竂官二字連讀郭璞注曰官地為寀同官為竂則寀與寮各為句而以官也二字解之若然則兩寀字不應覆舉矣故鄭樵不從之永羕引延融駿長也注羕所未詳韓詩外傳引漢廣之詩江之漾矣薛漬曰漾長也説文作羕犯奢果毅剋捷功肩堪勝也注陵犯誇奢果毅皆得勝也書曰西伯堪黎陸本誇作夸果作惈黎作􅧰鄭樵曰堪亦作戡亹亹蠠沒孟敦勗釗茂劭勔勉也注釗孟未聞臣照按楊子方言釗薄勉也秦晉曰釗自關而東周鄭之間曰勔釗齊魯曰勗兹又周書釗我周王當是勉意鄭樵曰孟即暋也皆方俗之語又廣韻勉也班固幽通賦盍孟晉以逮羣辰倐忽其不再注孟進勉進也猶猛進也台朕賚畀卜陽豫也臣照按台同貽又同飴詩周頌思文篇貽我來牟漢書作飴我釐牟又按朕陽無與字義賚畀卜無余字義兩不相蒙鄭樵曰據豫本豫我之豫又為賜豫之豫樵疑此當言台朕陽豫也謂我也賚畀卜豫也謂與也以二字同文故誤耳其説亦通肅延誘薦餤晉寅藎進也注寅未詳臣照按書臯陶謨同寅協恭今以寅為敬義則同寅即是協恭不須復説若作進解則同進而協恭于理為長暀暀皇皇藐藐穆穆休嘉珍禕懿鑠美也石經禕作褘張衡東京賦漢帝之德侯其禕而注美也關關噰噰音聲和也鄭樵曰據二文一義者皆當在釋訓部恐誤在此從申神加弼崇重也注神所未詳臣照按神又作抻與伸同集韻抻物長也伸申也易繫辭曰神而明之存乎其人又氣之申者為神揫斂屈收戢搜裒鳩樓聚也鄭樵曰搜通作搜樓通作摟壑坑坑滕徴隍漮虛也注滕徴未詳鄭樵云坑有二文無義其一為衍者耳臣照按滕易咸卦滕口説也騁虛辭為滕其口説則滕有虛義恙寫悝盱繇慘恤罹憂也鄭樵曰繇通作搖詩王風云中心搖搖倫勩邛敕勤愈庸疸勞也石經勩作鄭樵曰愈心勞也或云愈即愈也勞來強事謂翦篲勤也注翦篲未詳鄭樵曰來賚也謂賚其勤也強勉也事有所事也翦篲未詳臣照按左傳戎子駒支曰我諸戎除翦其荆棘驅其狐狸豺狼以為先君不侵不畔之臣至于今不二史記列傳騶子適趙平原君側行襒席如燕昭王擁篲先驅除翦擁篲皆古人服勤之事故曰勤也祿祉履戩祓禧禠祜福也注詩曰祓祿康矣禠禧書傳少見其義未詳臣照按今詩作茀祿爾康矣然則茀祓古通也禠張衡東京賦祈禠禳災禧通釐賈誼傳上方受釐宣室注言受神之福噊幾災殆危也注噊災未詳臣照按禮禮運鳯以為畜故鳥不矞注矞又作獝驚飛貌疑矞與噊同災禮記中庸災及其身者也詩大雅召旻篇不災我躬然則災固危義治肆古故也注治未詳鄭樵曰治疑為始肆故今也鄭樵曰此各隨詩書之文有其義故展轉釋之埤竺腹厚也竺鄭樵作笁注笁與篤同古文工即馬字鞠訩溢盈也鄭樵曰訩無盈義但引文耳訖徽妥懷安按替戾底廢尼定曷遏止也注徽未詳臣照按易坎卦繫用徽纆説文徽三紏繩也玉篇徽大索也然則徽有止義豫射厭也注豫未詳臣照按書太甲王懋乃德視乃烈祖無時豫怠然則豫有厭義鄭樵曰豫怠也射即斁也梏梗較頲庭道直也臣照按郭注云皆正直也而邢疏未申其説鄭樵曰梏未聞今考禮緇衣引詩有梏德行射義棲皮曰鵠注鵠之言梏梏直也言人正直乃得中也梗木之正直者周禮天官女祝以時招梗禬禳以除時疾鄭樵曰梗即鯁亮之鯁較詩衛風淇澳篇猗重較兮注兩輢上出軾者廣韻與校通集韻豆中央直者為校鄭樵曰較所謂較然也頲説文狹頭頲也當是強項不屈之貌道王應麟詩考周詩周道挺挺又小雅大東篇周道如砥其直如矢然則皆有直義弼棐輔比俌也注書曰天威棐忱臣照按今本作天畏棐諶威畏通用如洪範威用六極史宋世家引作畏用書天明畏即明威詩蠻荆來威畏也陸本忱作諶昌敵強應丁當也陸本強作壃嗟咨􅜚也鄭樵本􅜚作䰈間狎串貫習也陸本貫作慣挋拭刷清也鄭樵曰挋即振也鴻昏於顯間代也注於義未詳臣照按鴻昏於顯四字為句間代也三字為句古字於同烏歎辭曰於戲亦曰烏呼可驗于篆文本象烏形今但以為歎辭及語辭遂無以為鴉烏字者矣鴻以秋來以春去故曰昏烏以曉鳴以暮集故曰顯間代之義也衛蹶假嘉也注詩序曰假樂嘉成王也餘未詳鄭樵曰時俗訝其物則曰衛蹶與衛亦不相遠但方俗語有差耳棲遲休苦㕟齂呬息也石經作憩郡臻仍乃侯乃也注乃即乃餘未詳鄭樵曰臻重至也侯維也維亦乃也乃引詞也不絶之義也歷傅也臣照按上文云歷秭算數也又申之曰歷敷也傅與敷同五經文字曰經典相承𨽻省作敷書舜典敷奏以言前漢書宣帝紀傅奏其言注師古曰傅讀曰敷詩商頌長發篇敷奏其勇大戴禮作傅奏其勇敷傅通用者多矣此節蓋申上文之義謂天官家之法從一而衍之至于萬億及秭有敷義焉郭注邢疏以附近解之似失其意艾歷覛胥相也注艾歷未詳鄭樵曰艾即乂也察乂治也歷編閲也胥共視也皆有相視之義乂亂靖神弗淈治也注神未詳臣照按王應麟詩考戰國䇿引小雅菀桞篇上天甚神無自瘵也今文作甚蹈然則神有治義際接翜捷也疏翜者未詳臣照按翜説文捷也飛之疾也按六書正訛翣别作翜所甲反捷也集韻又與霎霅同左思吳都賦靸霅驚捷注靸霅走捷貌馬融廣成頌霅爾雹落亦言捷也俗語謂瞬息為一霅馘穧獲也注獲禾為穧陸本獲作穫元良首也注良未聞鄭樵曰元從上從人其文象人身之首也良未聞臣照按書太甲一人元良故曰首也元良二字連讀郭鄭邢俱讀斷遂致良不得為首義賡揚續也注揚未詳臣照按書曰賡揚文武之光命蓋正釋此賡揚字言賡揚即繼續也郭邢皆讀斷遂致揚無續義貉縮綸也臣照按縮釋器繩之謂之縮之注縮者約束之博物志綸似宛轉繩然則此貉字當作絡字解絡亦纒繞束縛也郭注云今俗語亦然然則貉縮二字亦應連讀北魏顔之推家訓引時諺有絡索阿姑餐之語則貉縮誠古諺字轉為絡索耳不應音陌求酋在卒就終也注詩曰嗣先公爾酋矣成就亦終也餘未詳陸本求作殏終作鄭樵曰求下武世德作求卷阿云嗣先公爾酋矣在未詳臣照按嗣先公爾酋矣詩經作似先公酋矣無爾字在當是詩小雅小辨篇天之生我我辰安在之在爾雅注疏卷一考證
