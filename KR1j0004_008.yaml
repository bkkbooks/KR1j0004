body:
  text: 爾雅注疏卷四考證釋宮第五垝謂之坫注在堂隅坫㙐也陸本㙐作墆屋上薄謂之筄鄭樵本薄作簿所以止扉謂之閎疏於門辟旁樹長橛所以止扉者名閎鄭樵本作於門兩旁宫中弄謂之壼陸本壼作廟中路謂之唐陸本唐作塘釋器第六鄭樵曰器服一體故釋器而該服焉因器而又及飲食之屬甌瓿謂之瓵疏江湖之間謂之㼻齊之東北海岱之間謂之甔江湖方言作江湘甔方言作儋注所謂家無儋石之餘也音擔􅯘謂之疀陸本疀作疀注皆古鍬插字插鄭樵本作鍤大版謂之業陸本業作牒黼領謂之襮陸本領作襟衣蔽前謂之襜陸本襜作幨婦人之禕謂之䄜䄜緌也陸本禕作幃摶者謂之糷鄭樵曰摶謂飯已涎黏成搏魚曰斫之注謂削鱗也陸本鱗作鰭康謂之蠱鄭樵曰康今作粳澱謂之垽鄭樵曰澱即澄泔之澤象謂之鵠角謂之觷犀謂之斫木謂之剫玉謂之雕注五者皆治朴之名朴陸本作璞不律謂之筆鄭樵曰緩聲為不律急聲為筆郭云蜀人呼筆為不律許愼云吳人謂之不律觀作爾雅者多用江南音命物恐許氏之言是矣邸謂之柢鄭樵曰邸人之所止也柢乃木之根本是亦其所止也故邸可謂之柢簀謂之第鄭樵曰簀薦下竹簿爾雅注疏卷四考證
