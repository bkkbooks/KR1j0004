body:
  text: 欽定四庫全書爾雅注疏卷一原目卷上晉郭璞注唐陸德眀音義宋邢昺疏爾雅郭璞注疏璞字景純河東人束晉𢎞農太守著作郎注著也解釋經旨使義理著明也亦言已注意以釋此書也詩書謂之傳者傳傳也博識經意傳示後人也此皆其人自題故或言傳或言注無義例也釋詁第一音義詁音古又音故樊光李巡本作故説文云詁故言也字林同張揖雜字云詁者古今之異語也疏釋解也詁古也古今異言解之使人知也釋言則釋詁之别故爾雅序篇云釋詁釋言通今之字古與今異言也第次也一數之始也以其作最在先故為第一此篇相承以為周公作但其文有周公後事故先儒共疑焉或曰仲尼子夏所增足也或曰當周公時有之今無者或在散亡之中然則詩書所有非周公所釋乃後人依放故言雅記而為之文故與之同郭氏因即援據以成其義若言胡不承權輿及緇衣之席兮此秦康鄭武之時在周公之後明矣其義猶今為文採托故事以為辭耳則此篇所載悉周公時所有何足怪也其諸篇所次舊無明解或以為有親必須宫室宫室既備事資器用今謂不然何則造物之始莫先兩儀而樂器居天地之先豈天地乃樂器所資乎蓋以先作者居前增益者處後作非一時故題次無定例也其篇之名義逐篇具釋此不繁言此書之作以釋六經之言而字别為義無復章句今而作疏亦不分科段所解經文若其易了及郭氏未詳者則闕而不論其稍難解則援引經據及諸家之説以證之郭氏之注多采經記若其通見可曉者則但指篇目而已其或書名僻異義旨隱奧者則具載彼文以祛未寤者耳初哉首基祖元胎俶落權輿始也注尚書曰三月哉生魄詩曰令終有俶又曰俶載南畝又曰訪豫落止又曰胡不承權輿胚胎未成亦物之始也其餘皆義之常行者耳此所以釋古今之異言通方俗之殊語音義哉子來反亦作栽肇音趙胎天才反孫炎大才反本或作台俶字又作俶尺叔反權巨員反輿音余令力政反胚字又作衃同普才反又匹尤反淮南子及文子並文婦孕三月而胚説文云胚婦孕一月也胚凝血疏皆初始之異名也初者説文云從衣從刀裁衣之始也哉者古文作才説文云才草木之初也以聲近借為哉始之哉首者頭也身之始也基者説文云牆始築也肇者説文作肇始開也祖者宗廟之始也元者善之長也長即始義胎者人成形之始也俶者動作之始也落者木葉隕墜之始也權輿者天地之始也天圓而地方因名云此皆造字之本意也及乎詩書雅記所載之言則不必盡取此理但事之初始俱得言焉他皆倣此注云尚書曰三月哉生魄者康誥文云詩曰令終有俶者大雅既醉文又曰俶載南畝者周頌載芟文又曰訪豫落止者周頌訪落文又曰胡不承權輿者秦風權輿文云胚胎未成亦物之始也者説文云胚婦孕一月也胎婦孕三月也然則尚未成形而為形之始故曰胚胎未成亦物之始物則形也云其餘皆義之常行者耳者謂初首基肇祖元也通見詩書故曰義之常行云此所以釋古今之異言通方俗之殊語者揚雄説方言云皆古今語也初别國不相往來之言也今或同而舊書雅記故俗語不失其方而後人不知故為之作釋也郭彼注云謂作釋詁釋言是也林蒸天帝皇王后辟公侯君也注詩曰有壬有林又曰文王蒸哉其餘義皆通見詩書音義蒸本又作蒸同之仍反辟必亦反壬而心反見賢遍反下迄卷終注悉放此疏皆天子諸侯南面之君異稱也白虎通云君羣也羣下之所歸心也林者説文云平地有叢木曰林蒸者左傳云天生蒸民樹之以君而司牧之然則人物之衆必立君長以司牧之故以林蒸為君也天者説卦云乾為天為君以其俱尊極故也大雅皆謂君為天是也帝皇者白虎通云德合天地者稱帝帝者諦也象可承也皇美也大也天之總美大稱也時質故總稱之號之為皇煌煌人莫違也王者往也天下所歸往説文云后者繼體君也象人之形施令以告四方故􅛣之從一口發號者君后也辟者法也為下所法則也公者通也公正無私之意也侯者候也候逆順也天帝皇王惟謂天子公侯惟謂諸侯餘皆通稱注云詩曰有壬有林者小雅賔之初筵文又曰文王蒸哉者大雅文王有聲文云其餘義皆通見詩書者謂天帝皇王后辟公侯皆義之常行故不備引𢎞廓宏溥介純夏幠厖墳嘏丕奕洪誕戎駿假京碩濯訏宇穹壬路淫甫景廢壯冢簡箌昄晊將業席大也注詩曰我受命溥將又曰亂如此幠為下國駿厖湯孫奏假王公伊濯訏謨定命有壬有林厥聲載路既有淫威廢為殘賊爾土宇昄章緇衣之席兮廓落宇宙穹隆至極亦為大也箌義未聞尸子曰此皆大有十餘名而同一實音義宏戶萌反溥音普介音界夏户雅反幠火吳反下同厖亡江反又亡項反方言云厖深之大也墳符云反嘏古雅反丕字又作丕同普悲反奕以昔反誕音但駿子浚反又荀閏反假古雅反濯直角反訏本又作盱同香于反穹起弓反壯側狀反箌郭陟孝反顧野王都角反説文云草大也孫都耗反昄沈旋蒲板反此依詩讀也孫郭方滿反字林方但方旦二反施乾蒲滿反顧音板又普姦普練二反晊舊音之日反本又作至又作胵顧音充尸反席音席謨亡乎反疏此皆廣大之異言也𢎞者含容之大也周書洛誥云武王𢎞朕恭廓者方言云張小使大謂之廓宏者書曰若保宏父介者方言云東齊海岱之間謂之介純者魯頌閟宫云天錫公純嘏夏者方言云自關而西秦晉之間凡物之壯大而愛偉之謂之夏厖者深之大也墳嘏者方言云墳地大也青幽之間凡土而髙且大者謂之墳秦晉之間凡物壯大謂之嘏丕者書云嘉乃丕績奕者詩大雅韓奕云奕奕梁山洪者書大誥云延洪惟我幼沖人誕者大雅生民云誕彌厥月戎者方言云宋魯陳衛之間謂之嘏或曰戎京碩濯訏者秦晉之間凡人大謂之奘燕之北鄙齊楚之郊或曰京齊宋之間曰碩荆吳揚甌之郊曰濯中齊西楚之間曰訏此皆謂大方俗之殊語也甫者詩齊風云無田甫田景者周頌潛篇云以介景福壯者秦晉之間凡人大謂之奘或謂之壯冢者舍人曰冢封之大也大雅綿篇云乃立冢土簡者周頌執競云降福簡簡箌者郭云義未聞顧氏云都角切説文云草大也韓詩云箌彼圃田將者周頌云日就月將業者版之大也大雅靈臺云虡業維樅餘皆見注注詩云我受命溥將者商頌烈祖文又曰亂如此幠者小雅巧言文云下國駿厖者商頌長發文云湯孫奏假者商頌那篇文云王公伊濯者大雅文王有聲文云訏謨定命者大雅抑篇文云有壬冇林者小雅賔之初筵文云厥聲載路者大雅生民文云既有淫威者周頌有客文云廢為殘賊者小雅四月文云爾土宇昄章者大雅卷阿文云緇衣之席兮者鄭風緇衣文云廓落宇宙穹隆至極亦為大也者廓落大貌四方上下曰宇説文云宙舟輿所極也穹隆天之形也郭氏讀晊為至故云至極是廓宇穹晊亦為大也云尸子曰此皆大有十餘名而同一實者漢書藝文志云尸子二十篇注曰名佼魯人秦相商君師之鞅死佼逃入蜀案尸子廣澤篇云墨子貴兼孔子貴公皇子貴衷田子貴均列子貴虛料子貴别囿其學之相非也數世矣而已皆弇於私也天帝皇后辟公𢎞廓宏溥介純夏幠冡晊昄皆大也十有餘名而實一也若使兼公虛均衷平易别囿一實也則無相非也以其數字皆訓為大故引之也周公作詁必以始也君也大也居先者始者無先之稱君者至尊之號大則無所不包故先言之一曰此三者天也人也地也易乾卦云萬物資始坤卦云直方大老子云域中有四大王居其一焉故以此三者為先乾坤相對之物而以地在人後者以人居天地之中且尊尚人君故進之自此而下隨便即言無義例也幠厖有也注二者又為有也詩曰遂幠大東疏二者又為有言大有也成十六年左傳云民生敦厖言人生聚豐厚大有也云詩曰遂幠大東魯頌閟宫文也案今詩本作遂荒此言遂幠者所見本異也或當在齊魯韓詩迄臻極到赴來弔艐格戾懷摧詹至也注齊楚之會郊曰懷宋曰屆詩曰先祖于摧又曰六日不詹詹摧皆楚語方言云音義迄許訖反臻側巾反弔如字又音的艐郭音屆孫云古屆字顧子公反音宗格更伯反字或作􅛕戻力帝反摧昨雷反又祖雷反詹音占屆音界疏迄者自古至今也大雅生民云以迄于今臻者詩邶風泉水云遄臻于衛言疾至於衛也極者窮盡之至也樂記云及夫禮樂之極乎天而蟠乎地言禮樂之道上至於天下委於地也到者自逺而至也大雅韓奕云靡國不到赴者趨而至也雜記云凡赴於君來者自彼至我也春秋經曰祭伯來言至魯也弔者小雅天保云神之弔矣艐讀為屆屆格戾懷摧詹皆方俗語注云齊楚之會郊曰懷宋曰屆者方言文云詩曰先祖于摧者大雅雲漢文又曰六日不詹者小雅采緑文云詹摧皆楚語方言云者案方言云徦􅛕懷摧詹戾艐至也邠唐冀兖之間曰徦或曰格齊楚之會郊或曰懷摧詹戾楚語也艐宋語也皆古雅之别語也今則或同是也徦音駕􅛕古格字艐古屆字如適之嫁徂逝往也注方言云自家而出謂之嫁猶女出為嫁音義適傷亦反疏皆謂造於彼也如者自我而往也春秋公及大夫朝聘皆曰如之者論語云之一邦言又往一國也適嫁徂逝皆方俗語案方言云嫁逝徂適往也自家而出謂之嫁猶女而出為嫁也逝秦晉語也徂齊語也適宋魯語也往凡語也賚貢錫畀豫貺賜也注皆賜與也音義賚力代反又力臺反貢字或作贛同畀必寐反下及注同豫羊汝反下同貺許誑反本或作況疏皆謂賜與也賚者賜有功善人也書湯誓曰子其大賚汝貢者下與上也左傳齊桓責楚云爾貢包茅不入錫者嘉賜也禹貢云禹錫玄圭畀者付與也詩鄘風干旄云何以畀之豫者授與也小雅采菽云天子所豫貺者惠賜也小雅彤弓云中心貺之儀若祥淑鮮省臧嘉令類綝彀攻穀介徽善也注詩曰儀刑文王左傳曰禁禦不若詩曰永錫爾類我車既攻介人維藩大姒嗣徽音省綝彀未詳其義餘皆常語音義淑市六反鮮息淺反又音仙本或作沈云古斯字郭音義云本或作鮮非古斯字案字書先奚反亦訓善省先郢反臧子郎反令力政反綝勑金反郭敕淫反彀古豆反一音古侯反徽音暉藩方元反大音泰疏皆謂美善也儀者形象之善也若者惠順之善也祥者李巡曰福之善也書泰誓云襲于休祥淑者有德之善也詩曹風鳲鳩云淑人君子鮮者清潔之善邶風新臺云籧篨不鮮省綝彀郭氏未詳臧者功能之善也詩齊風云射則臧兮嘉者美之善也詩大雅抑篇云無不柔嘉令者大雅卷阿云令聞令望類者昭二十八年左傳云勤施無私曰類攻者堅緻之善穀者飬生之善詩小雅小明云式穀以女介者大善也徽者美善也注云詩曰儀刑文王者大雅文王篇文云左傳曰禁禦不若者左傳無全文案文十八年説四凶云投諸四裔以禦魑魅宣三年傳言鑄鼎象物故民入山林不逢不若蓋采合傳文故言禁禦不若也云詩曰永錫爾類者大雅既醉文云我車既攻者小雅車攻文云介人維藩者大雅板篇文云大姒嗣徽音者思齊文云餘皆常語者謂祥淑鮮臧嘉令穀書傳多有之故云皆常語舒業順敘也注皆謂次序舒業順敘緒也注四者又為端緒疏敘謂次敘舒者展舒徐緩有次也業者事有次敘也順者不逆有敘也舒業順敘四者又為端緒互相訓也怡懌悅欣衎喜愈豫愷康妉般樂也注皆見詩音義怡以之反懌音亦衎苦旦反愈羊朱反愷苦在反妉丁含反般蒲安反樂音洛疏皆謂喜樂怡者和樂也小雅節南山云既夷既懌怡夷音義同懌者悅樂也商頌那篇云亦不夷懌悅者心樂也小雅都人士云我心不悅悅説音義同欣者笑喜之樂也大雅鳬鷖云旨酒欣欣毛傳云欣欣然樂也衎者飲食之樂也小雅南有嘉魚云嘉賓式燕以衎喜者説文云不言而悅也小雅彤弓云中心喜之愈者安間之樂也唐風山有樞云他人是愈毛傳云愈樂也豫者逸樂也小雅白駒云逸豫無期愷者康樂也小雅魚藻云豈樂飲酒康者安樂也唐風蟋蟀云無以大康妉者樂之久也小雅鹿鳴云和樂且湛又衛風氓篇云無與士耽鄭箋云耽非禮之樂般者遊樂也周頌篇名也鄭箋云般樂也按郭以爾雅之作多為釋詩且詩中備有此文故云皆見詩其實六經之中所訓亦爾但以詩書之作非一人故有音義雖同而字形蹖駁者詩文作湛耽而此作妉詩文作夷説豈辨槃而此作怡悅愷般之類直以異人之作故不同爾無義例也他皆放此悅擇愈釋賓協服也注皆謂喜而服從音義協胡頰反疏皆謂喜而服從也悅懌愈者皆喜樂而服也釋者釋去恨怨而服也賓者懷德而服也旅獒云四夷咸賓協者和合而服也左傳曰謀其不協遹遵率循由從自也注自猶從也遹遵率循也注三者又為循行音義遹孫云古述字讀聿一音餘橘反率所律反循音旬行下孟反疏自亦從也轉互相訓也遹者大雅綿篇云聿來胥宇遹聿音義同遵者周南汝墳云遵彼汝墳率者大雅綿篇云率西水滸循者顧命云率循大卞由者曲禮大夫士出入君門由闑右從者小雅何人斯云伊誰云從遹遵率三者又為循行靖惟漠圖詢度咨諏究如慮謨猷肇基訪謀也注國語曰詢于八虞咨于二虢度于閎夭謀于南宮諏于蔡原訪于辛尹通謂謀議耳如肇所未詳餘皆見詩音義靖音靜漠孫音莫舍人云心之謀也度徒洛反注同諏子須反猷音猶肇音趙究九又反謨亡胡反基本或作音同謀莫浮反虢古伯反閎音宏夭於兆反原音元疏皆謂謀議也靖者安謀也小雅小旻云靖共爾位惟者思謀也漠者舍人曰心之謀也小雅小辨云聖人莫之漠莫音義同圖者大雅嵩髙云我圖爾居詢度咨諏者小雅皇皇者華傳云訪問於善為咨咨事為諏咨事之難易為謀咨禮之所宜為度親戚之謀為詢究者小雅小辨云不舒究之慮者計謀也謨者大謀也大雅云訏謨定命猷者以道而謀也大雅文王云厥猶翼翼猷猶音義同肇者大雅江漢云肇敏戎公基者君子作事謀始也訪者謀政事也注云國語曰詢于八虞咨于二虢度于閎夭謀于南宮諏于蔡原訪于辛尹者皆晉語胥臣對文公辭説文王之即位也韋氏解云八虞周八士皆在虞官二虢文王弟虢仲虢叔南宮南宮括也蔡蔡公原原公辛辛甲尹尹逸皆周太史典彝法則刑範矩庸恆律戛職秩常也注庸戛職秩義見詩書餘皆謂常法耳音義彝以而反範音犯字或作范同戛居黠反郭苦八反職之力反秩長栗反疏皆謂常禮法也典刑者詩大雅蕩篇云尚有典刑彝者洪範云彝倫攸敘法則者天官冢宰以八法治官府以八則治都鄙鄭注云邦國官府謂之禮法常所守以為法式也則亦法也典法則所用異異其名也範者模法之常也矩者度方有常也庸者書臯陶謨云自我五禮有庸哉恆久之常也湯誥云若有恆性律者常法也戛者康誥云不率大戛職者主之常也秩者商頌烈祖云有秩斯祜柯憲刑範辟律矩則法也注詩曰伐柯伐柯其則不逺論語曰不踰矩音義柯古河反辟婢亦反下同踰以朱反矩俱宇反疏此亦謂常法轉互相訓柯者執以取法也憲者大雅桑扈云百辟為憲辟罪法也刑範律矩則皆謂常法也注云詩曰伐柯伐柯其則不逺者豳風伐柯文云論語曰不踰矩者為政文辜辟戾罪也注皆刑罪音義辜古胡反罪古罪字秦始皇以其字似皇字改從四非疏皆謂刑罪也辜者書仲虺之誥曰罔不懼于非辜辟者呂刑云墨辟疑赦戾者大雅抑篇云亦維斯戾罪罪古今字也訓文云罪犯法也從辛從自言罪人蹙鼻苦辛之憂秦以罪似皇改為罪取非人自投於网古文自為罪黃髮齯齒鮐背耇老壽也注黃髮髮落更生黃者齯齒齒墮更生細者鮐背背皮如鮐魚耇猶耆也皆夀考之通稱音義兒本今皆作齯五兮反一音如字鮐天才反一音夷背博內反耇音苟更古孟反細先計反耆巨伊反稱尺證反疏皆夀考之通稱也黃髮者舍人曰黃髮老人髮白復黃也郭云黃髮髮落更生黃者齯齒者説文云齯老人兒齒也郭云齒墮更生細者魯頌閟宮云既多受祉黃髮兒齒鄭箋云兒齒亦夀徵鮐背者舍人曰老人氣衰皮膚消瘠背若鮐魚郭云鮐背背皮如鮐魚劉熙釋名云九十曰鮐背背有鮐文大雅行葦云黃耇鮐背毛傳云鮐背大老也鄭箋云台之言鮐也大老則背有鮐文方言云秦晉之郊陳兖之會謂老曰耇鮐耇者郭云耆也方言云燕岱北鄙謂耇為梨郭彼注云梨靣色似凍梨也舍人曰耇覯也血氣精華覯竭言色赤黑如狗矣孫炎曰耇靣如凍梨色如浮垢老人壽徵也老者説文云七十曰老從人毛匕言鬚髮變白也允孚亶展諶誠亮詢信也注方言曰荆吳淮泗之間曰展燕岱東齊曰諶宋衛曰詢亦皆見詩音義允音尹孚音敷亶丁但反諶甚針反岱音待疏皆謂誠實不欺也案方言云允諶恂展諒穆信也齊魯之間曰允燕岱東齊曰諶宋衛汝潁之間曰恂荆吳淮泗之間曰展西甌毒屋黃石野之間曰穆衆信曰諒周南召南衛之語也云亦皆見詩者鄘風定之方中云終然允臧大雅文王云萬邦作孚小雅祈父云亶不聰鄘風君子偕老云展如之人兮大雅蕩篇云其命匪諶誠者復言之信也鄘柏舟云不諒人只鄭風溱洧云洵訏且樂諶諶亮諒詢洵音義同展諶允愼亶誠也注轉相訓也詩曰愼爾優遊疏皆謂至誠轉相訓也詩曰小雅白駒文謔浪笑敖戲謔也注謂調戲也見詩音義謔許虐反笑蘇誚反敖五報反戲虛寄反調徒弔反疏詩曰謔浪笑敖者不敬之戲謔也舍人曰謔戲謔也浪意朗也笑心樂也敖意舒也戲笑邪戲謔笑之貌郭云謂調戲也見詩者邶風終風文粵于爰曰也注書曰土爰稼穡詩曰對越在天王于出征爰粵于也注轉相訓音義征之成反粵音越爰音袁稼古乍反穡音色疏皆謂語辭發端轉互相訓也説文云曰從開口象氣出於口也注云書曰土爰稼穡者周書洪範文云詩曰對越在天者周頌清廟文云王于出征者小雅六月文爰粵于那都繇於也注左傳曰棄甲則那那猶今人云那那也書曰臯陶曰都繇辭於乎皆語之韻絶音義那乃河反繇除又反注同孫音由又音遙於音烏注同陶音遙疏皆語之韻絶歎辭也爰粵于三者又為於乎注云左傳曰棄甲則那者宣二年華元答謳者辭也云書曰臯陶曰都者虞書臯陶謨文也云繇辭者繇卦兆之辭也云於乎者周頌維天之命云於乎不顯是也敆郃盍翕仇偶妃匹會合也注皆謂對合也音義敆古答反郃音合又音洽盍胡獵反翕許急反仇音求偶五口反妃音配又芳非反下同疏皆謂對合也敆者説文云合會也郃者和合也盍者衆合也易豫卦九四云勿疑朋盍簪翕者斂合也書臯陶謨云翕受敷施仇者左傳曰怨耦曰仇偶者相對合也左傳曰大都耦國妃者嘉耦曰妃匹者配合也大雅文王有聲云作豐伊匹會者集合也周禮曰時見曰會仇讎敵妃知儀匹也注詩云君子好仇樂子之無知實維我儀國語亦云丹朱馮身以儀之讎猶儔也廣雅云讎輩也音義讎市周反樂音洛馮皮冰反疏皆謂匹合也仇者孫炎云相求之匹讎者儔侶輩類之匹也敵者相當之匹也妃合耦之匹也注云詩云君子好仇者周南關雎文云樂子之無知者檜風隰有萇楚文云實維我儀者鄘柏舟文也云國語亦云丹朱馮身以儀之者案周語惠王十五年有神降于莘王問於內史過曰今是何神也對曰昔昭王娶於房曰房后實有爽德協于丹朱丹朱馮身以儀之生穆王焉實臨照周之子孫而禍福之夫神一不逺徙遷若由是觀之其丹朱乎韋氏解云馮依也儀匹也言房后之行有似丹朱丹朱馮依其身而匹偶之生穆王焉妃合會對也注皆相當對妃媲也注相偶媲也音義媲普計反郭音譬字林匹地反疏此三者又為當對妃又為媲謂相偶媲也紹胤嗣續纂緌績武係繼也注詩曰下武維周緌見釋水餘皆常語音義紹市小反胤羊忍反又以刃反纂子管反緌汝誰反績子狄反係户帝反繼音計疏皆聨繼不絶也紹者大雅抑篇云弗念厥紹胤者大雅既醉云永錫祚胤嗣者周頌酌篇云載用有嗣續者小雅斯干云似續妣柤纂者魯頌閟宮云纘禹之緒緌武見注績者陳東門之枌云不績其麻係者繫屬之繼易曰係小子失丈夫注云詩曰下武維周者大雅下武文云緌見釋水者彼云泛泛揚舟紼縭維之紼繂也縭緌也是矣忥諡溢蟄慎貉謐顗頠密寧靜也注忥顗頠未聞其義餘皆見詩傳音義忥本或作氣同許氣反諡詩至反溢以日反蟄直立反貉莫白反又武博反謐彌畢反顗魚豈反又五愷反頠魚毁反沈五罪反孫郭五鬼反疏皆安靜也諡者人死將葬誄列其行而作之也溢者盈溢者宜靜周頌維天之命云假以溢我蟄者藏伏靜處也易曰龍蛇之蟄慎者謹靜也大雅云淑慎爾止貉者靜定也大雅皇矣云貊其德音鄭箋云德政應和曰貊謐者説文云靜語也密者周頌昊天有成命云夙夜基命宥密寧者周頌良耜云婦子寧止隕殞湮下降墜摽蘦落也注殞猶隕也方俗語有輕重耳湮沈落也摽蘦見詩音義隕于閔反殞于敏反石落也湮郭音因又音煙又音翳降古巷反墜本又作隊同直類反摽婢眇反又普交符表二反蘦力丁反字或作苓説文云草曰苓木曰落沈直今反疏皆謂墮落也隕者説文云從髙墜也易曰有隕自天殞者石落也郭云殞猶隕也方俗語有輕重耳湮沈落也下者自上而落也降即下也曲禮謂羽鳥死曰降墜者説文曰從髙墮也左傳曰弗敢失墜摽者召南云摽有梅蘦者説文云草曰蘦木曰落此對文爾散而言之他物之落亦言蘦鄘風定之方中云靈雨既零蘦零音義同命令禧畛祈請謁訊誥告也注禧未聞禮記曰畛於鬼神音義畛之忍反訊音信誥羔報反又古酷反告古篤反疏皆謂告諭也命者使告也詩唐風楊之水云我聞有命令者發號以告也論語云其身正不令而行畛者致告也祈者求告也書召誥云祈天永命請者言告也婚禮五曰請期謁者告白也月令曰謁於天子訊者告問也詩云歌以訊之誥者布告也書大誥洛誥之類是也畛於鬼神下曲禮文永悠迥違遐逖闊遠也注書曰逖矣西土之人永悠迥遠遐也注遐亦逺也轉相訓音義悠音由迥户頂反逖説文云古逖字他歷反郭湯革反闊苦活反疏皆謂遼逺也永者長逺也周南漢廣云江之永矣悠者小雅漸漸之石云山川悠逺迥者大雅云泂酌彼行潦迥泂音義同違者離逺也召南殷其靁云何斯違斯遐者大雅旱麓云遐不作人逖者古文逖也闊者相疏逺也邶風擊鼓云于嗟闊兮永悠迥逺四者又為遐也遐亦逺也轉相訓爾逖矣西土之人周書牧誓文也虧壞圯垝毁也注書曰方命圯族詩曰乘彼垝垣虧通語耳音義虧字又作虧袪危反郭又許宜反壞音怪説文云敗也籀文作􅭔字林云壞自敗也下怪反􅭔毁也公壞反圯孫房美反岸毁也垝古委反垣音袁疏皆謂毁敗也虧者損毁祭義云不虧其體壞者人毁也音怪一云自毁也乎怪切圯者岸毁也書序曰祖乙圮于耿垝是毁垣也注云書曰方命圮族者堯典文孔安國云圮毁族類也言鯀性狠戾好比方名命而行事輒毁敗善類云詩曰乘彼垝垣者衛風氓篇文也矢雉引延順薦劉繹尸旅陳也注禮記曰尸陳也雉順劉皆未詳音義繹音亦旅音呂疏皆謂敷陳也矢者書序云臯陶矢厥謨引者伸陳也延鋪陳也薦者饌陳也繹者復陳也周頌賚篇云時周之命於繹思尸者主陳也旅者謂布陳也大雅賓之初筵云殽核維旅注云禮記曰者郊特牲文尸職主也注左傳曰殺老牛莫之敢尸詩曰誰其尸之又曰職為亂階疏皆謂為之主宰也注云左傳曰殺老牛莫之敢尸者成十七年傳云晉欒書中行偃遂執公焉召韓厥韓厥辭曰昔吾畜於趙氏孟姬之讒吾能違兵古人有言曰殺老牛莫之敢尸而况君乎二三子不能事君焉用厥也是其事云詩曰誰其尸之者召南采蘋文又曰職為亂階者小雅巧言文尸寀也注謂寀地寀竂官也注官地為寀同官為竂音義寀李孫郭並七代反下及注同樊七在反寮字又作僚同力雕反疏寀謂寀地主事者必有寀地寀采也采取賦稅以供已有寀地及言同寮者皆謂居官者也注云官地為寀者禮運云大夫有采以處其子孫是也云同官為寮者左傳文七年荀林父告先蔑之辭也績緒采業服宜貫公事也注論語曰仍舊貫餘皆見詩書音義采七在反服本或作服同符福反又作般字貫古玩反疏皆事為也績者功事也商頌云設都于禹之績緒者事業也魯頌閟宮云纘大王之緒采者臯陶謨云亮采有邦業者學人所有事書周官云業廣惟勤服者周南關雎云寤寐思服宜者宜其事也大雅鳬鷖云公尸來燕來宜貫者魏風碩鼠云三歲貫女公者周頌酌篇云實維爾公允師注云論語者先進仍舊貫如之何何必改作是也永羕引延融駿長也注宋衛荆吳之間曰融羕所未詳音義羕羊讓反字從永説文云水長也引以忍反駿本或作俊又作峻同子閏反長直良反疏説文云長久逺也方言云施於衆長謂之永引者漢書律歷志云十丈為引引者信也顔師古曰信讀曰伸言其長延者方言云延長也凡施於者謂之延又曰宋衛荆吳之間曰融駿者長大也喬嵩崇高也注皆髙大貌左傳曰師叔楚之崇也崇充也注亦為充盛音義喬郭音橋或音驕嵩宿忠反疏皆髙大貌喬周頌般篇云嶞山喬嶽釋山云山大而髙嵩嵩嵩音義同崇者髙貴也亦為充盛樂記云復綴以崇云楚之崇也者宣十二年傳文杜注云師叔潘尫為楚人所崇貴犯奢果毅尅捷功肩堪勝也注陵犯誇奢果毅皆得勝也左傳曰殺敵為果肩即尅耳書曰西伯堪黎音義捷才接反肩音堅堪字又作戡同苦含反勝尸證反注及下同誇口花反黎郎兮反國名疏皆謂得勝也舍人曰肩強之勝也孫炎曰戡勝之勝也陵犯誇奢殺敵為果致果為毅尅殺捷獲有功肩尅堪任是皆得勝也注云左傳曰殺敵為果者宣二年君子辭也云書曰西伯堪黎者商書篇名也勝肩戡劉殺克也注轉相訓耳公羊傳曰克之者何殺之也音義殺所黠反舊所例反説文云戮也疏克亦勝也詩周頌敬之云佛時仔肩毛傳云仔肩克也又為殺也皆謂得勝而殺之轉互相訓注云公羊傳者隱元年經曰夏五月鄭伯克段于鄢傳曰克之者何殺之也劉獮斬刺殺也注書曰咸劉厥敵秋獵曰獮應殺氣也公羊傳曰刺之者何殺之也音義獮息淺反説文或作刺七賜反説文云君殺大夫曰刺刺直傷也周禮司刺掌三刺之法以聽獄訟或七亦反應應對之應疏説文云殺戮也斬者文二年左傳曰狼瞫取戈以斬囚餘皆具注注云書曰咸劉厥敵者周書君奭文云秋獵為獮釋天文云應殺氣也者言秋氣肅殺故名秋獵為獮大司焉云中秋教治兵遂以獮田是也云公羊傳曰刺之者何殺之也者僖二十七年傳文也經云公子買戍衛不卒戍刺之故傳云此也亹亹蠠沒孟敦勗釗茂劭勔勉也注詩曰亹亹文王蠠沒猶黽勉書曰茂哉茂哉方言云周鄭之間相勸勉為勔釗孟未聞音義亹亹字或作斖同亡匪反蠠彌畢反又亡忍反本或作􅨥説文曰􅨥古密字敦丁門反朂許玉反釗古堯反又之遙反茂字又作懋亦作􅐂同亡候反劭上照反或上遙反勔字本作僶又作黽或音泯又彌兖反僶字又作黽亡忍反又亡衍反茂哉或作茂才疏皆謂勸勉也敦者厚相勉也朂者邶風燕燕云以朂寡人劭者勉力也餘皆見注注云詩曰亹亹文王者大雅文王文也言勉勉乎不倦文王之勤用明德也云蠠沒猶黽勉者以其聲相近方俗語有輕重耳邶風谷風云黽勉同心云書曰茂哉茂哉者臯陶謨文也書作懋茂懋古今字也云方言云以下者案彼云釗薄勉也秦晉曰釗或曰薄故其鄙語曰薄努猶勉努也南楚之外曰薄努自關而東周鄭之間曰勔釗齊魯曰朂兹是也鶩務昏暋強也注馳騖事務皆自勉強書曰不昏作勞暋不畏死音義騖音務暋音閔或作旻強也其丈反注同疏皆謂自勉強也騖謂馳騖務謂事務二者皆以力勉強孫炎曰昏夙夜之強也注云書曰不昏作勞者盤庚文云暋不畏死者康誥文卬吾台豫朕身甫余言我也注卬猶姎也語之轉耳書曰非台小子古者貴賤皆自稱朕禮記曰授政任功曰豫一人畛於鬼神曰有某甫言見詩音義卬五剛反台孫羊而反下同豫余並羊如反姎烏郎烏黨烏浪三反説文云女人稱我曰姎任而鴆反畛之忍反某音畝疏我者施身自謂也此皆我之别稱也卬者郭云卬猶姎也語之轉耳説文云女人稱我曰姎由其語轉故曰卬邶風匏有苦葉云人涉卬否吾者孔子曰吾自衛反魯身者我之躬也余者邶谷風云伊余來塈餘皆見注注云書曰非台小子者湯誓文云古者貴賤皆自稱朕者大禹謨云帝曰朕宅帝位禹曰朕德罔克屈原亦云朕皇考曰伯庸是貴賤皆自稱朕史秦始皇二十六年定為至尊之稱漢因不改以迄於今云禮記云授政任功曰豫一人畛於鬼神曰有某甫者皆下曲禮文云言見詩者周南葛覃云言告師氏言告言歸是也朕余躬身也注今人亦自呼為身音義躬音弓疏身即我也郭云今人亦自呼為身舍人曰余謙卑之身也孫炎曰余舒遲之身也僖九年左傳云齊侯曰小白余杜注云小白齊侯名余身也邶谷風云我躬不閲台朕賚畀卜陽豫也注賚卜畀皆賜與也與猶豫也因通其名耳魯詩云陽如之何今巴濮之人自呼阿陽音義畀必二反陽音暘又如字本或作暘豫羊女反巴伯家反濮音卜疏豫即與也皆謂賜與台者遺與也讀與貽同朕者我與之也賚畀卜皆賜與也説命云夢帝賚以良弼鄘風干旄云何以畀之小雅天保云君曰卜爾萬夀無疆注云與猶豫也因通其名耳者説文云與黨與也豫推豫前人也象兩手相與之形今經典多以與為推豫故云因通其名耳云魯詩云陽如之何者漢書藝文志云魯申公為詩訓故是為魯詩其經云陽如之何申公以陽為豫故引之云今巴濮之人自呼阿陽者以時驗而言也肅延誘薦餤晉寅藎進也注禮記曰主人肅客詩曰亂是用餤王之藎臣易曰晉進也寅未詳音義誘余九反餤沈大甘反徐仙民詩音閻餘占反郭持鹽反晉本又作晉藎本又作燼同徐刃反疏皆謂進道延者引而進之射義云子路出延射誘者道而進之也召南野有死麕云吉士誘之薦者進獻也月令云先薦寢廟餘皆見注注云禮記曰主人肅客者上曲禮文也鄭注云進客謂道之云詩曰亂是用餤者小雅巧言文云王之藎臣者大雅文王文云易曰晉進也者晉卦彖辭也羞餞迪蒸進也注皆見詩禮音義餞徂淺反迪大的反蒸之仍反疏謂進與也羞者曲禮云聞子有客使某羞餞者進飲食之名也迪者以道而進也蒸者周頌豐年云蒸畀祖妣詔亮左右相導也注皆謂教導之詔相導左右助勴也注勴謂贊勉亮介尚右也注紹介勸尚皆相佑助左右亮也注反覆相訓以盡其義音義左右音佐佑下同相息亮反下文同導徒報反注及下同勴力庶反介音界覆芳服反疏詔者大宗伯云詔相王之大禮亮者大雅大明云涼彼武王左右者周南關雎云左右流之相者鄉飲酒云相者一人此皆謂教道之也教道即贊勉也故又為勴説文云勴助也不以力助以心助也郭云紹介勸尚皆相佑助孫炎曰介者相助之義如人之左右手故以介為左右也大雅生民云攸介攸止故轉為右左右即亮也亦皆謂佐助反覆相訓以盡其義亮涼音義同緝熙烈顯昭皓熲光也注詩曰學有緝熙于光明又曰休有烈光音義緝七入反熙許其反皓胡老反熲古迥反疏顯者光明也大雅假樂云顯顯令德説文云昭日明也大雅雲漢云昭回于天皓者亦日光也熲火光也小雅無將大車云不出于熲注云學有緝熙于光明者周頌敬之文云休有烈光者周頌載見文劼鞏堅篤掔虔膠固也注劼虔皆見詩書易曰鞏用黃牛之革固志也掔然亦牢固之意音義劼苦黠反郭苦八反或作硈字古黠反鞏九勇反篤丁毒反掔音牽又却間反郭音義本與慳同虔音乾膠音交疏皆牢固也劼者確固也鞏者説文云以革有所束也堅者剛強之固也論語曰不曰堅乎磨而不磷篤者厚也物厚者牢固掔者掔亦牢固之意虔者恭之固膠者所以固物小雅隰桑云德音孔膠注云劼虔皆見詩書者酒誥云劼毖殷獻臣大雅韓奕云虔共爾位云易曰鞏用黃牛之革固志也者案革卦云初九鞏用黃牛之革遁卦六二象曰執用黃牛固志也文與此異然則郭云固志者所以釋革卦之鞏非謂遁之固志疇孰誰也注易曰疇離祉音義疇本又作斖直留反祉音恥疏皆謂語辭不為義也又猶言誰人也論語云君孰與不足陳風墓門云誰昔然矣疇離祉易否卦九四爻辭也暀暀皇皇藐藐穆穆休嘉珍禕懿鑠美也注穆穆已上皆美盛之貌其餘常語音義暀于況反又于􅧇反藐亡角反禕於宜反懿音意鑠舒灼反上時掌反盛或作晠同疏皆謂美盛也少儀云祭祀之美濟濟皇皇鄭玄云皇皇讀如歸往之往彼言皇皇則此暀暀也少儀又云言語之美穆穆皇皇曲禮云天子穆穆諸侯皇皇鄭注皆云行容止之貌然則皇皇穆穆者皆語言容止之美盛也大雅嵩髙云既武藐藐毛傳云藐藐美貌休者大禹謨云戒之用休又曰嘉乃丕績儒行云席上之珍以待聘禕者歎美也懿者周頌時邁云我求懿德鑠者周頌酌篇於鑠王師是皆謂美之常語爾諧輯協和也注書曰八音克諧左傳曰百姓輯睦關關噰噰音聲和也注皆鳥鳴相和協燮和也注書曰燮友柔克音義諧下階反輯音集又七入反噰於恭反協本又作協同户牒反燮蘇頰反疏皆謂和同協者説文云衆之同和也關關噰噰者皆鳥鳴音聲相和也周南關雎云關關雎鳩邶風匏有苦葉云噰噰鳴鴈協即古文協字注云書曰八音克諧者虞書舜典文云左傳曰百姓輯睦者案僖十五年及成十六年皆云羣臣輯睦其是乎云書曰燮友柔克者周書洪範文從申神加弼崇重也注隨從弼輔增崇皆所以為重疊神所未詳音義弼白筆反重直龍反注同疊音牒疏隨從申重加增弼輔崇充皆所以為重疊也大雅鳬鷖云福祿來崇觳悉卒泯忽滅罄空畢罊殲拔殄盡也注觳今直語耳忽然盡貌今江東呼厭極為罊餘皆見詩音義觳胡角反又胡谷反卒豫恤反字或作泯亡忍反罄苦定反罊苦計反説文口地反云器中盡也本或作􅱂字音同廣雅云􅱂劇也殲子廉反拔步八反殄大典反厭一豔反疏此皆謂終盡觳今直語耳忽然盡貌左傳曰臯陶庭堅不祀忽諸注云今江東呼厭極為罊者以時驗而言也説文云器中盡也云餘皆見詩者悉者説文云詳盡也卒者終盡也衛風日月云畜我不卒泯者滅盡也大雅桑柔云靡國不泯滅絶盡也小雅正月云寧或滅之罄者説文云器中空也小雅蓼莪云瓶之罄矣空者小雅大東云杼柚其空畢者小雅無羊云畢來既升殲者舍人曰衆之盡也秦風黃鳥云殲我良人拔者搴除使盡也殄者詩云邦國殄瘁苞蕪茂豐也注苞叢繁蕪皆豐盛音義苞百交反蕪音無或亡甫反蕃滋生長也古本作隸豐敷馮反疏皆豐盛也苞者草木叢生也禹貢云草木漸苞蕪者繁蕪也洪範云庶草蕃廡蕪廡音義同茂者茂盛也小雅天保云如松柏之茂揫斂屈收戢搜裒鳩樓聚也注禮記曰秋之言揫揫斂也春獵為搜搜者以其聚人衆也詩曰屈此羣醜原隰裒矣左傳曰以鳩其民樓猶今言拘樓聚也音義揫孫子由反郭音遒案遒音子由徂秋二反斂力儉反屈邱勿反戢側立反搜所求反裒古字作褒蒲侯反下同字本或作桴鳩居牛反説文作勼音九尤反摟力侯反從手本或作樓非隰音習拘古侯反疏皆會聚也斂者率聚也禮記大學曰百乘之家不畜聚斂之臣收者周頌維天之命云我其收之戢者藏聚也周頌時邁云載戢干戈餘皆見注注云禮記曰秋之言揫揫斂也者鄉飲酒義文云春獵為搜搜者以其聚人衆也者春獵為搜釋天文云詩曰屈此羣醜者魯頌泮水文云原隰裒矣者小雅常棣文云左傳曰以鳩其民者隱八年文云樓猶今言拘樓聚也者以時驗而言也肅齊遄速亟屢數迅疾也注詩曰仲山甫徂齊音義遄市專反亟欺冀反又居力反屢力具反數色角反迅信峻二音徂才孤反疏皆謂急疾也肅者召南小星云肅肅宵征毛傳云肅肅疾貌齊者壯疾也遄者弼風泉水云遄臻于衛速者論語云無欲速亟者欺冀切論語曰好從事而亟失時一云亟居力切大雅靈臺云匪亟其欲屢者小雅巧言云君子屢盟數者祭義云祭不欲數迅者疾走也論語云迅雷風烈必變注云仲山甫徂齊者大雅蒸民文寁駿肅亟遄速也注詩曰不寁故也駿猶迅速亦疾也音義寁本或作疌同子感反亟又作急同居力反經典亦作棘同疏速亦疾也肅亟遄轉相訓耳駿者猶迅也禮記大傳云逡奔走駿逡音義同鄭注云疾奔走言勸事也不寁故也鄭風遵大路文壑坑坑滕徵隍漮虛也注壑溪壑也坑坑謂坑塹也隍城池無水者方言云漮之言空也皆謂丘墟耳滕徵未詳音義壑本或作壑同許各反郭胡郭反坑苦衡反滕徒登反隍音皇城池也漮字又作㱂同苦郎反説文云水之空也方言作㝩亦空也郭云本或作荒荒亦邱墟之空無虛許居反溪音溪塹七豔反墟去魚反疏皆謂空虛也壑者溪壑也大雅韓奕云實墉實壑坑坑者坎陷之虛也但重言耳隍者城池無水者易曰城復于隍漮者注引方言云康之言空也彼注云漮㝗空貌亦丘墟之空也小雅賓之初筵云酌彼康爵鄭箋云康空也漮康音義同黎庶蒸多醜師旅衆也注皆見詩音義蒸之仍反疏皆謂衆夥也注云皆見詩者大雅雲漢云周餘黎民靈臺云庶民子來蒸民云天生蒸民周頌載見云思皇多祜大雅綿篇云戎醜攸行棫朴云六師及之小雅采芑云振旅闐闐之類是也洋觀裒衆那多也注詩曰薄言觀者又曰受福不那洋溢亦多貌音義洋音羊洋溢多貌讀羊者或為詳非也觀顧謝音官施古喚反注同那奴多反本或作疏皆謂重多也洋者洋溢亦多貌魯頌閟宮云萬舞洋洋裒者聚之多也易曰君子以裒多益寡衆者周頌臣工云命我衆人注云詩曰薄言觀者小雅采緑文又曰受福不那者桑扈文流差柬擇也注皆選擇見詩音義差楚佳反柬音簡疏皆選擇也周南關雎云左右流之小雅吉日云既差我馬弼風云簡兮簡兮皆是也簡柬音義同戰栗震驚戁竦恐懾懼也注詩曰不戁不竦懾即懾也音義栗六日反戁女版反竦息勇反恐邱勇反懾之涉反疏皆惶怖也論語曰使民戰栗詩秦風黃鳥云惴惴其栗易曰震雷虩虩又曰驚逺而懼邇也詩云不戁不竦月令曰國時有恐樂記曰柔氣不懾是皆懼也懾即懾也注云不戁不竦者商頌長發文痡瘏虺穨玄黃劬勞咎悴瘽愈鰥戮癙癵㾖癢疷疵閔逐疚痗瘥痱􅓠瘵瘼癠病也注虺穨玄黃皆人病之通名而説者便謂之馬病失其義也詩曰生我劬勞書曰智藏瘝在相戮辱亦可恥病也今江東呼病曰瘵東齊曰瘼禮記曰親癠色容不盛逐未詳餘皆見詩音義痡普胡芳膚二反詩作鋪瘏音徒詩作屠虺虎回反又呼懷反穨徒回反劬土于反咎音臼悴字或作悴在醉反瘽音勤字亦作勤愈羊朱反又羊主反鰥古頑反注瘝同癙傷汝反舍人云癙癵㾖癢皆心憂憊之病也孫炎云癙者畏之病也字林音恕詩作鼠癵郭作拘攣同力專反㾖音里癢音羊疷祈支反或丁禮反本作疲字書云疲病也聲類猶以為疷字又音支孫炎云滯之病也疵音慈疚音救痗音昧一音脢瘥徂何反又子衰反痱符非反又符沸反説文蒲愷反風病也􅓠丁但反又徒丹反孫炎云疫病瘵側界反字林側例反瘼音莫癠徂細反或徂犂反疏疾甚曰病此皆病之通名耳孫炎曰痡人疲不能行之病瘏馬疲不能進之病虺穨馬罷不能升高之病玄黃馬更黃色之病然則虺穨者病之狀玄黃者病之變色郭云皆人病之通名而説者便謂之馬病失其義也蓋指孫炎不能𢎞通故云失其義也咎者罪病也悴者小雅雨無正云維躬是瘁悴瘁音義同瘽者勞苦之病也愈者小雅角弓云交相為愈戮者相戮辱亦可恥病也癙及癢者小雅正月云癙憂以癢舍人云癙癵㾖癢皆心憂憊之病也孫炎云癙者畏之病也㾖者小雅正月云悠悠我里㾖里音義同疷者孫炎云滯之病也小雅白華云俾我疷兮疵者瑕釁小病也閔者豳風鴟梟云鬻子之閔斯逐者衛風考槃云碩人之軸鄭箋云軸病也軸與逐蓋今古字郭氏未詳疚者小雅采薇云憂心孔疚痗者小雅十月云亦孔之痗瘥者節南山云天方薦瘥痱者四月云百卉具腓痱腓音義同􅓠者大雅板篇云下民卒􅓠瘵者大雅瞻仰云士民其瘵瘼者大雅桑柔云瘼此下民餘皆見注注云生我劬勞者小雅蓼莪文云書曰智藏瘝在者周書召誥文云今江東呼病曰瘵者以時驗而言云東齊曰瘼者方言文云禮記曰親癠色容不盛者玉藻文恙寫悝盱繇慘恤罹憂也注今人云無恙謂無憂也寫有憂者思散寫也詩曰悠悠我悝云何盱矣繇役亦為憂愁也音義恙羊讓反寫悉冶反悝音里盱本或作同香于反繇音遙慘七感反罹力知反疏皆謂憂愁也恙者聘禮云公問君賓對公再拜鄭注云拜其無恙郭云今人云無恙謂無憂也寫者有憂者思散寫也小雅車牽云我心寫兮繇者繇役亦為憂愁慘者心憂也恤者小雅祈父云胡轉豫于恤罹者王風兔爰云逢此百罹注云詩曰悠悠我悝者小雅十月文云云何盱矣者卷耳及都人士文也倫勩邛敕勤愈庸疸勞也注詩曰莫知我勩維王之卬哀我疸人國語曰無功庸者倫理事務以相約敕亦為勞勞苦者多惰愈今字或作窳同音義勩字或作勃與世反郭音諡字亦作肄邛巨凶反敕本又作飭並恥力反案説文字林來旁作力是勞來之字束旁作文是始音丑力反愈羊主反又羊朱反疸丁賀反本或作憚音同窳羊主反字林云汙也音烏説文云汙窬也案汙窬猶汙邪也疏皆謂勞苦也倫者理也理治事務者必勞勩者廣雅云苦也孫炎曰習事之勞也敕者相約敕也亦為勞苦勤者勞力也梓材云既勤垣墉愈者懶也郭云勞苦者多惰愈今字或作窳同庸者民功曰庸疸者説文云勞病也注云詩曰莫知我勩者小雅雨無正文云維王之邛者巧言文云哀我疸人者大東文云國語曰無功庸者案晉語韓獻子老使公族穆子受事於朝辭曰厲公之亂無忌備公族不能死臣聞之曰無功庸者不敢居髙位今無忌智不能匡君使至於難仁不能救勇不能死敢辱君朝以忝韓宗請退也固辭不立悼公聞之曰難雖不能死而能讓不可不賞使掌公族大夫是其事也勞來強事謂翦篲勤也注詩曰職勞不來自勉強者亦勤力者由事事故為勤也詩曰逮其謂之翦篲未詳音義勞力報反注同來本又作勑力代反本或作賚強其丈反注同翦子淺反篲本又作彗同息遂反又徂歲反逮音待疏皆為勤勞也勞來者以其有勤勞也自勉強者亦為勤由能事事有功者亦為勤注云職勞不來者小雅大東文人以不被勞來者為不見勤故采薇序曰杕杜以勤之即是勞來也云逮其謂之者召南摽有梅文也悠傷憂思也注皆感思也音義傷字書作慯尸羊反思司嗣反注同疏皆感思也悠者秦風渭陽云悠悠我思傷者周南卷耳云維以不永傷憂者愁思也懷惟慮願念惄思也注詩曰惄如調飢音義惄乃歷反調竹留反毛詩傳云朝也疏皆思念也方言云鬱悠懷惄惟慮願念靖慎思也晉宋衛魯之間謂之鬱悠惟凡思也慮謀思也願欲思也念常思也東齊海岱之間曰靖秦晉或曰慎凡思之貌亦曰慎或曰惄舍人曰惄恚而不得之思也注云惄如調飢者周南汝墳文祿祉履戩祓禧禠祜福也注詩曰福履綏之俾爾戩榖祓祿康矣禠禧書傳少見其義未詳音義祉音恥戩音翦又章善反孫音箭祓音廢又音拂又方妹反禧許其反禠音斯郭常支巨移二反祜音戶俾必爾反疏皆福祜也福祿對文則小異散則祿亦福也商頌玄鳥云百祿是何鄭箋謂當擔負天之多福祉者繁多之福也周頌烈文云錫爾祉福祜者小雅信南山云受天之祜注云詩曰福履綏之者周南樛木文云俾爾戩榖者小雅天保文云祓祿康矣者大雅卷阿文禋祀祠蒸嘗禴祭也注書曰禋于六宗餘者皆以為四時祭名也音義禋音因注同祀音似祠音詞周春祭名蒸之升反冬祭名嘗字又作常秋祭名禴字又作礿同餘若反夏祭名疏皆祭之别名祭際也人神交際説文云從示從又從肉又手也以手持肉示神所以祭也禋者説文云潔祀也祀者説文云祭無已也餘者四時祭名疏具釋天注云禋于六宗者虡書舜典文孔安國云精意以享謂之禋宗尊也所尊祭者其祀有六謂四時也寒暑也日也月也星也水旱也儼恪祗翼諲恭欽寅熯敬也注儼然敬貌書曰夙夜惟寅詩曰我孔熯矣諲未詳音義儼魚儉反恪口各反祗旨夷反諲音因又音真熯而善反郭音罕説文蒼頡篇皆同疏皆謂謹敬也儼者郭云儼然敬貌論語云儼然人望而畏之恪者心敬也周書微子之命云恪慎克孝祗者虞書大禹謨云祗承于帝翼者小心之敬也大雅大明云小心翼翼恭者敬貌也大雅桑柔云溫溫恭人欽者堯典云欽若昊天注云書曰夙夜惟寅者虞書舜典文云詩曰我孔熯矣者小雅楚茨文朝旦夙晨晙早也注晙亦明也音義晙子峻反又音峻疏早者説文云晨也從日在甲上十古文甲字今即以不晚為早朝者鄘風蝃蝀云崇朝其雨毛傳云崇終也從旦至食時為終朝旦者説文云明也從日在一上一地也陳風東門之枌云穀旦于差夙者齊風東方未明云不夙則莫晨者説文云晨昧爽也東方未明云不能晨夜晙亦明之早也􅓄俟替戾砥止徯待也注書曰徯我后今河北人語亦然替戾砥者皆止也止亦相待也音義􅓄音須俟音仕字又作俟亦作戺音同替他計反戾音麗砥之視反字宜從一或作底非也底音丁禮反徯胡禮反疏皆相待也􅓄者邶風匏有苦葉云卬􅓄我友俟者齊風著篇云俟我于著乎而􅓄須俟俟音義同替戾砥者郭云皆止也止亦相待也注云徯我后者商書太甲文噊幾災殆危也注幾猶殆也噊災未詳音義噊郭音聿施音述幾音祈又音機災音哉疏皆危險也説文云危在高而懼幾者幾猶殆也周書顧命云無以釗冒貢于非幾殆者小雅節南山云無小人殆􅠟汽也注謂相摩近音義􅠟音祈又音沂郭音剴案剴音公哀反説文云摩也汽古愛反施音既樊孫虛乞反摩莫河反近附近之近疏説文云剴摩也郭讀􅠟為剴云謂相摩近孫炎云汽近也大雅民勞云汽可小康鄭箋云汽幾也反覆相訓故汽得為幾也昭十年左傳亦引此詩杜預云汽期也然則期字雖别皆是近義言其近當如此史記稱漢髙祖欲廢太子周昌曰臣口不能言然臣期知其不可陛下雖欲廢太子臣期不奉詔言期者意亦與此同也治肆古故也注治未詳肆古見詩書音義治如字施直吏反肆音四疏肆之為故語更端辭也商書湯誥曰肆台小子古之為故謂舊故也周頌良耜云續古之人肆故今也注肆既為故又為今今亦為故故亦為今此義相反而兼通者事例在下而皆見詩疏詩大雅綿篇云肆不殄厥愠毛傳云肆故今也即以肆之一字為故今因上起下之語郭氏字别為義云肆既為故又為今今亦為故故亦為今此義相反而兼通者事例在下在下者謂在下文徂在存也注惇亶祜篤掔仍肶埤竺腹厚也注頻仍埤益肶輔皆重厚掔然厚貌餘皆見詩書音義惇字又作丁門反亶多但反祜音户掔却賢反又苦間苦忍二反仍本或作扔同汝蒸反肶音毗本或作脾同埤避支反又音椑竺字又作篤同丁毒反腹分伏反重直龍反疏皆重厚也惇者周書武成云惇信明義亶者誠之厚也大雅桑柔云逢天憚怒小雅天保云俾爾單厚周頌昊天有成命云單厥心皆訓厚也亶僤單音義同祜者福厚也篤者周頌維天之命云曾孫篤之掔然厚貌頻仍埤益肶輔皆重厚釋天云仍飢為荐邶風北門云政事一埤益我小雅節南山云天子是毗又采菽云福祿膍之肶毗膍音義同竺與篤同腹者小雅蓼莪云出入腹我月令云水澤腹堅載謨食詐偽也注載者言而不信謨者謀而不忠書曰朕不食言音義謨亡胡反郭音慕詐側駕反謀亡侯反疏皆虛偽也郭云載者言而不信謨者謀而不忠者以載詁為言謨為謀今又為偽故以為言而不信謀而不忠不信不忠則是偽也食者孫炎曰食言之偽也哀二十五年左傳云孟武伯惡郭重曰何肥也公曰是食言多矣能無肥乎然則言而不行如食之消盡後終不行前言為偽故通謂偽言為食言故此訓食為偽也詐者方言云膠譎詐也涼州西南之間曰膠自關而東西或曰膠詐通語也注朕不食言商書湯誥文話猷載行訛言也注詩曰慎爾出話猷者道道亦言也周禮曰作盟詛之載今江東通謂語為行世以妖言為訛音義話胡快反猷音由字亦從犬行下庚反郭下孟反注同訛字又作吪亦作訛同五戊反盟音明詛側慮反妖於喬反疏皆謂言辭也話者善言也孫炎曰善人之言也猷者道也道亦言也載者載於簡䇿之謂也郭云今江東通謂語為行世以妖言為訛注云詩曰慎爾出話者大雅抑篇文云周禮曰作盟詛之載者春官詛祝職文也遘逢遇也注謂相遘遇遘逢遇遻也注轉復為相觸遻遘逢遇遻見也注行而相值即是見音義遘古豆反遻字又作忤同五故反復扶又反疏皆謂相遭遇觸遻而相見也召南草蟲云亦既遘止周書洪範云子孫其逢吉鄭風野有蔓草云邂逅相遇轉復相訓三者又為相觸遻遘逢遇遻四者皆行而相值之名行而相值即見故又為見顯昭覲釗覿見也注顯昭明見也逸書曰釗我周王音義釗工堯反又章堯反見賢遍反注同疏顯昭皆明見也周頌敬之云天維顯思又時邁云明昭有周覲釗覿者皆下見上也曲禮云天子當依而立諸侯北面而見天子曰覲郊特牲云不敢私覿注云逸書者不在今尚書之內故曰逸監瞻臨涖俯相視也注皆謂察視也音義監音鑒又工杉反字又作涖音利又音類俯他弔反相施息亮反又息良反疏皆謂察視也小雅節南山云何用不監又曰民具爾瞻大雅大明云上帝臨汝文王世子云成王幼不能蒞阼俯者考工記云瑑圭璋八寸璧琮八寸以俯聘鄭注云俯視也聘問也衆來曰俯特來曰聘相者小雅小辨云相彼投兔鞠訩溢盈也注詩曰降此鞠訩音義訩音凶疏皆謂盈多訩訟滿溢皆盈多也降此鞠訩小雅節南山文毛傳云鞠盈訩訟也鄭箋云盈猶多也以盈者必多故鄭轉云盈猶多也孔魄哉延虛無之言間也注孔穴延魄虛無皆有間隙餘未詳音義間古間反隙也舊音間隙去戟反疏間謂間隙也孔者孔穴小雅角弓云如酌孔取魄者形也謂月之無光之處名魄也康誥云惟三月哉生魄延者今墓道也虛無者虛無所有也是皆有間隙也瘞幽隱匿蔽竄微也注微謂逃藏也左傳曰其徒微之是也音義瘞猗例反郭音翳匿女力反蔽必曵反竄粗亂反疏微謂逃藏也瘞者埋藏之微也幽者深微也隱者濳隱而微也匿者舍人曰藏之微也蔽者覆障使微也竄者行之微也是皆微昧不顯揚也案昭十七年傳云楚白公勝作亂殺子西子期葉公子髙至遇針尹固帥其屬將與白公子高曰微二子者楚不國矣棄德從賊其可保乎乃從葉公使與國人以攻白公白公奔山而縊其徒微之是也訖徽妥懷安按替戾底廢尼定曷遏止也注妥者坐也懷者至也按抑按也替廢皆止住也戾砥義見詩傳國語曰戾久將砥孟子曰行或尼之今以逆相止為遏徽未詳音義妥孫他果反郭他回反又他罪反劉昌宗音儀禮同字林亦同按一旦反砥之視反尼施女乙反謝羊而反曷何末反遏烏割反抑於力反疏皆謂止住也訖者終止也安者坐止也懷至止也安休止也抑按替廢皆止住也大雅云以按徂旅小雅云勿替引之定者靜止也曷者俗以抑止為曷今以逆相止為遏餘皆見注注云戾砥義見詩者小雅采菽云亦是戾矣砥者在物之下是亦止也凡注言見詩今毛詩無者蓋在齊魯韓詩也云國語曰戾久將砥者案晉語云文公在翟十二年狐偃曰日吾來此也非以翟為榮可以成事也吾曰奔而易達困而有資休以擇利可以戾也今戾久矣戾久將砥砥著滯淫誰能興之盍速行乎是其事也云孟子曰行或尼之者案孟子魯平公將見孟子嬖人臧倉止之樂正子見孟子曰克告於君君為來見也嬖人有臧倉沮君君是以不來也曰行或使之止或尼之行止非人所能也吾之不遇魯侯天也臧氏之子焉能使豫不遇哉是其事也此云行或尼之所見本異或傳寫誤豫射厭也注詩曰服之無斁豫未詳音義射羊石反字又作斁同厭於豔反疏謂厭倦也注云詩曰服之無斁者周南葛覃文也烈績業也注謂功業也疏謂功業也烈者周頌執競云無競維烈績者大雅文王有聲云維禹之績績勳功也注謂功勞也疏謂功勞也績者虞書大禹謨云嘉乃丕績勳者案周禮司勳職云王功曰勳鄭注云輔成王業若周公功績質登平明考就成也注功績皆有成詩曰質爾民人禮記曰年榖不登榖梁傳曰平者成也事有分明亦成濟也疏皆謂成濟也勳功績業皆有成也事有分明亦成濟也舜典云三載考績周頌敬之云日就月將皆言成功也注云詩曰質爾民人者大雅抑篇文云禮記曰年榖不登者下曲禮文云榖梁傳曰平者成也者宣十五年文也梏梗較頲庭道直也注梏梗較頲皆正直也詩曰既庭且碩頲道無所屈音義桔古沃反郭音角梗古杏反較古學反頲他鼎反疏梏梗較頲皆正直也庭條直也道者頲道無所屈注云既庭且碩者小雅大田文密康靜也注皆安靜也音義密亡筆反疏皆安靜也周頌昊天有成命夙夜基命宥密大雅生民云不康禋祀豫寧綏康柔安也注皆見詩書疏皆安樂也大雅板篇云不敢戲豫虞書大禹謨云萬邦咸寧商書太甲云撫綏萬邦大雅民勞云汔可小康虞書舜典云柔遠能邇平均夷弟易也注皆謂易直音義易以䜴反注同疏易者不難也和平均一皆易直也周頌天作云岐有夷之行大雅泂酌云愷弟君子矢弛也注弛放弛易也注相延易音義弛尸紙反易音亦顧謝本弛作施并易皆以䜴反注同疏郭云矢弛也以弓釋弦曰弛故云弛放禮記雜記云一張一弛弛又為易謂相延易也希寡鮮罕也注罕亦希也鮮寡也注謂少音義鮮息淺反下同罕火旱反疏皆簡少之稱也論語云希不失矣易説卦云巽為寡髮大雅抑篇云鮮不為則郭云罕亦希也鄭風大叔于田云叔發罕忌鮮又為寡轉互相訓皆謂希少爾酬酢侑報也注此通謂相報答不主于飲酒音義酢才各反侑本或作宥同于救反疏皆相報答也郭云此通謂相報答不主于飲酒者以飲酒之禮主人酌酒于賓曰獻賓既卒爵洗而酌主人曰酢主人既卒酢爵又酌自飲卒爵復酌進賓曰酬故説者以酬酢主謂飲酒相報答郭以易繫辭云可與酬酢謂應對萬物也小雅楚茨云萬夀攸酢是神報主人也故云不主于飲酒侑者案公食大夫賓禮三飯之後云公受宰夫束帛以侑注云束帛十端帛也侑猶勸也主國君以為食賓殷勤之意未至復發幣以勸之欲其深安賓也是侑者主人所以報賓也毗劉暴樂也注謂樹木葉缺落蔭疏暴樂見詩音義毗如字樊光本作庇云蔭也暴本又作爆同邦角反樂本又作爍郭音洛又力角反蔭於禁反又作廕同疏舍人曰毗劉暴樂之意也木枝葉稀踈不均為暴樂注云謂樹葉缺落蔭疏暴樂見詩者大雅桑柔云捋采其劉毛傳云劉爆爍而希也是矣覭髳茀離也注謂草木之叢茸翳薈也茀離即彌離彌離猶蒙蘢耳孫叔然字别為義失矣音義覭郭亡革反又莫絰反髳音蒙茀音弗叢才工反茸如容反或如融反薈烏會反疏郭云謂草木之叢茸翳薈也茀離即彌離彌離猶蒙蘢耳孫叔然字别為義失矣郭以時驗而為此解孫氏每字各别為義故云失矣蠱諂二疑也注蠱惑有二心者皆疑也左傳曰天命不諂音義蠱音古諂郭音縚他刀反字或作慆沈勑檢反疏皆謂疑惑也郭云蠱惑有二心者皆疑也者案昭元年左傳晉趙孟問于醫和曰何謂蠱對曰淫溺惑亂之所生也于文皿蟲為蠱榖之飛亦為蠱在周易女惑男風落山謂之蠱是蠱惑也二者心疑不一也大雅大明云無二爾心毛傳云無敢懷二心也注云左傳曰天命不諂者哀十七年葉公子高辭也楨翰儀幹也注詩曰維周之翰儀表亦體幹音義楨音貞幹本又作幹胡旦反又作翰疏舍人曰楨正也築墻所立兩木也所以當墻兩邉障土者也大雅文王云維周之楨又嵩高云維周之翰儀表亦體幹也弼棐輔比俌也注書曰天威棐忱易曰比輔也俌猶輔也音義某音匪比毗志反注同俌音輔郭方輔反字林音甫忱市林反疏俌猶輔也弼者商書説命云夢帝賚豫良弼棐者周書康誥云天威棐忱輔者商書湯誓云爾尚輔豫一人比者易比卦彖云比輔也疆界邉衛圉垂也注疆埸境界邉旁營衛守圉皆在外垂也左傳曰聊以固吾圉也音義圉魚吕反埸羊石反廣雅云界也旁步郎反聊音遼疏謂四垂也郭云疆埸境界邉旁營衛守圉皆在外垂也舍人曰圉拒邉垂也孫炎曰圉國之四垂也注云聊以固吾圉也者隱十一年鄭伯辭也昌敵強應丁當也注書曰禹拜昌言強者好與物相當值音義敵音狄強巨良反下注同應本或作膺同于矜反好呼報反疏皆相當也昌者言當也敵者仇匹相當也文六年左傳曰敵惠敵怨強者好與物相當值應者對當也大雅下武云應侯順德丁者雲漢云寧丁我躬注云禹拜昌言者虞書大禹謨文浡肩搖動蠢迪俶厲作也注浡然興作貌蠢動作也公羊傳曰俶甚也榖梁傳曰始厲樂矣肩見書迪未詳音義浡步忽反蠢尺允反俶昌育反疏皆興作也浡然興作貌莊公十一年左傳曰禹湯罪已其興也浡然肩者勝任之作也搖者考工記矢人云夾而搖之以視其豐殺之節也動者商書咸有一德云德惟一動罔不吉蠢者鄉飲酒義云春之為言蠢也俶者始作也厲者方言云厲卬為也甌越曰卬吳曰厲為亦作也注云公羊傳曰俶甚也者隱九年云三月庚辰大雨何以書記異也何異爾俶甚也云榖梁傳曰始厲樂矣者隱五年云九月考仲子之宫初獻六羽始僣樂矣尸子曰舞夏自天子至諸侯皆用八佾初獻六羽始厲樂矣兹斯咨呰已此也注呰已皆方俗異語音義呰子爾反或子移反郭音些案廣雅些辭也息計反又息賀反謂語餘聲也已音以疏此者對彼之稱言近在是也兹者虞書大禹謨云念兹在兹斯者召南殷其靁云何斯違斯咨與兹同呰已與此皆音相近故得為此也郭云呰已皆方俗異語嗟咨􅜚也注今河北人云􅜚歎音兔罝之罝音義􅜚夲或作嗟字林云皆古嗟字罝音嗟疏皆歎也周南卷耳云嗟我懷人堯典云疇咨若時登庸郭云今河北人云􅜚歎間狎串貫習也注串厭串貫貫􅏸也今俗語皆然音義狎乎甲反串郭音五患反沈謝古患反貫古患反厭於艷反忕音逝又時設反張揖雜字音曳云狃􅏸過度疏皆便習也莊二十二年左傳曰赦其不間于赦訓曲禮曰賢者狎而敬之大雅皇矣云串夷載路齊風猗嗟云射則貫兮皆是習也注云串厭串貫貫􅏸也今俗語皆然者當東晉時有此厭串貫忕之語故以為證也曩塵佇淹留久也注塵垢佇企淹滯皆稽久也音義曩奴黨反疏曩嚮塵垢佇企淹滯留止皆稽久也通見詩書逮及暨與也注公羊傳曰會及暨皆與也逮亦及也音義逮音代一音大計反暨其器反疏皆相親與也注云公羊傳曰會及暨皆與也者隱元年文也云逮亦及也者方言文騭假格陟躋登升也注方言曰魯衛之間曰隲梁孟曰格禮記曰天王登遐公羊傳曰躋者何升也音義騭之實反又音陟假音遐躋子兮反升音升疏皆謂升上陟者周南卷耳云陟彼髙岡餘見注注云方言曰者案彼云躡郅跂􅛕躋躍登也自關而西秦晉之間曰躡東齊海岱之間謂之躋魯衛曰郅梁益之間曰􅛕或曰跂騭郅格􅛕音義同云禮記曰天王登遐者下曲禮文云公羊傳曰躋者何升也者文二年文也郅音質跂音企躍音躍揮盝歇涸竭也注月令曰無漉陂池國語曰水涸而成梁揮振去水亦為竭歇通語音義揮許韋反盝音鹿歇虛謁反涸户各反漉音鹿去起呂反疏皆謂竭盡也揮者郭云揮振去水亦為竭曲禮曰執玉器者弗揮是也盝即漉也郭云歇通語謂歇即竭之通語也涸水竭也注云月令曰無漉陂池者按月令仲春之月是月也無竭川澤無漉陂池無焚山林鄭注云順陽養物也畜水曰陂穿地通水曰池云國語曰水涸而成梁者案周語定王使單襄公聘于宋遂假道于陳以聘楚單子歸告王曰陳侯不有大咎國必亡王曰何故對曰夫辰角見而雨畢天根見而水涸本見而草木節解駟見而隕霜火見而清風戒寒故先王之教曰雨畢而除道水涸而成梁草木節解而備藏隕霜而冬裘具清風至而修城郭宫室今陳國火朝覿矣而道路若塞野場若棄澤不陂障川無舟梁是廢先王之教也引之者證涸為水竭挋拭刷清也注振訊抆拭掃刷皆所以為潔清音義挋音震拭音式刷字又作刷所劣反説文云刮也廣雅云削也清如字劉音儀禮慈性反抆亡粉反掃素老反疏郭云振訊抆拭掃刷皆所以為潔清禮記喪大記云挋用巾哀十四年公羊傳云反袂拭靣周禮凌人職云夏頒冰掌事秋刷後鄭云秋涼氷不用可以清潔其室鴻昏於顯間代也注鴻鴈知運代昏主代明明亦代昏顯即明也間錯亦相代於義未詳音義間古莧反注同謝古間反郭古鴈反施胡瞎反疏皆謂更代也注云鴻鴈知運代者鴻鴈之屬九月而南正月而北是知其時運而更代南北也云昏主代明者釋經昏字也日入後二刻半為昏昏來則明往故云昏主代明云明亦代昏者釋經顯字也顯即明也云間錯亦相代者謂間則交錯亦相更代也儀禮鄉飲酒云乃間歌魚麗鄭注云間代也謂一歌則一吹是也又周頌桓篇云皇以間之饁餉饋也注國語曰其妻饁之音義饁于輒反字林于怯反餉式亮反饋也本或作餽同巨愧反疏饋者以食遺與也野饋曰饁食人曰餉自家之野也注云國語曰其妻饁之者晉語云臼季使過冀冀缺耨其妻饁之敬相待如賓從而問之冀芮之子與之歸既復命而進之曰臣得賢人敢以告是也遷運徙也注今江東通言遷徙音義遷七延反注同徙斯爾反疏皆謂移徙也大雅皇矣云帝遷明德易曰日月運行注云今江東通言遷徙者時驗而言也秉拱執也注兩手持為拱音義拱九勇反疏皆謂持執也周書金縢云植璧秉圭注云兩手持為拱者老子云雖有拱璧廞熙興也注書曰庶績咸熙廞見周官音義廞郭音歆又音欽字林火欽反興如字又許應反疏皆謂興作注云書曰庶績咸熙者虞書舜典文云廞見周官者即周禮也笙師職云大喪廞其樂器鄭注廞興也興謂作之衛蹶假嘉也注詩序曰假樂嘉成王也餘未詳音義蹶居衛反下同假户嫁反疏謂嘉美也注云詩序曰假樂嘉成王也者大雅假樂篇序也廢稅赦舍也注詩曰召伯所稅舍放置音義廢字亦作廢同甫穢反稅始鋭反舍音捨注同疏皆舍置也廢者宣八年公羊傳云廢其無聲者赦者放置也虞書舜典云眚災肆赦注云詩曰召伯所稅者召南甘棠文也棲遲憩休苦㕟齂呬息也注棲遲遊息也苦勞者宜止息憩見詩㕟齂呬皆氣息貌今東齊呼息為呬也音義棲音西遲直釐反憩起例反本或作愒同㕟古怪反又墟季反字林以為喟邱愧反孫本作快郭音苦概反又作嘳墟愧苦怪二反齂郭施謝海拜反孫虛貴反顧乎被反呬郭許四反孫許器反施火季反疏皆止息也舍人曰棲遲行步之息郭云棲遲逰息也陳風衡門云衡門之下可以棲遲憩者召南草棠云召伯所憩休者止而息也周南漢廣云不可休息苦者郭云苦勞者宜止息㕟齂呬者郭云皆氣息貌案方言云䭒喙呬息也周鄭宋沛之間曰䭒自關而西秦晉之間或曰喙或曰䭒東齊曰呬故郭云今東齊呼息為呬也供峙共具也注皆謂備具音義供如字又居用反峙直紀反共音恭疏皆謂備具也供者論語云子路共之供共音義同峙者周書費誓云峙乃糗糧周頌臣工云痔乃錢鏄峙痔音義同共者小雅小旻云靜共爾位􅤷憐惠愛也注􅤷韓鄭語今江東通呼為憐音義􅤷亡矩反又音無憐力田反疏愛謂寵惜也方言云憮㤿憐牟愛也韓鄭曰憮晉衛曰㤿汝潁之間曰憐宋魯之間曰牟秦或曰憐憐通語也故郭云􅤷韓鄭語今江東呼為憐憮義同惠者仁愛也邶北風云惠而好我憮亡輔反㤿音淹娠蠢震戁妯騷感訛蹶動也注娠猶震也詩曰憂心且妯無感我帨兮或寢或訛蠢戁騷蹶皆搖動貌音義娠指慎反又音身蠢尺允反戁奴板反妯顧依詩勑留反郭盧篤反又徒歷反騷蘇刀反訛五禾反帨始鋭反毛詩傳云佩巾也疏皆謂動作娠者説文云妊娠動也郭云娠猶震也者以大雅生民云載震載夙昭元年左傳曰邑薑方震大叔哀元年左傳曰后緡方震皆謂有身為震故云娠猶震也蠢者郭云蠢戁騷蹶皆搖動貌小雅采芑云蠢爾蠻荆震者大雅常武云震驚徐方戁者恐動也商頌長發云不戁不竦騷者大雅常武云徐方繹騷蹶者大雅綿篇云文王蹶厥生注云詩曰憂心且妯者小雅鼓鐘文云無感我帨兮者召南野有死麕文云或寢或訛者小雅無羊文覆察副審也注覆校察視副長皆所為審諦音義覆芳福反後注同副音赴校音教長丁丈反下文并注同諦音帝疏郭云覆校察視副長皆所為審諦覆者月令季春云命舟牧覆舟五覆五反察者周書吕刑云惟察惟法副者次長之稱契滅殄絶也注今江東呼刻斷物為契斷音義契郭苦計反字又作挈顧苦結反注同左傳云盡借邑人之車契其軸是也殄大典反刻音克斷大管反疏皆謂斷絶契者郭云今江東呼刻斷為契斷定九年左傳曰盡借邑人之車契其軸注杜預云契刻也滅者小雅正月云寧或滅之殄者大雅桑柔云不殄心憂郡臻仍乃侯乃也注乃即乃餘未詳疏乃語辭也乃乃音義同大雅綿篇云乃慰乃止是也迪繇訓道也注義皆見詩書音義迪音狄繇音由道如字或徒報反非疏虞書大禹謨云惠迪吉小雅巧言云秩秩大猷猷繇音義同又周書顧命云命汝嗣訓僉咸胥皆也注東齊曰胥見方言音義僉七亷反胥息盧反疏謂衆皆也舜典云僉曰伯禹作司空商書云咸有一德注云東齊曰胥見方言者案方言云僉胥皆也自山而東五國之郊曰僉東齊曰胥是也育孟耆艾正伯長也注育養亦為長正伯皆官長音義耆巨之反禮記云六十曰耆艾五蓋反下同禮記曰五十曰艾長丁丈反疏皆謂長上也郭云育養亦為長弼谷風云既生既育鄭箋云育謂長老也孟庶長也又周書康誥云王若曰孟侯孔安國云孟長也五侯之長耆艾皆老長也曲禮曰五十曰艾服官政六十曰耆指使正伯皆官長大雅雲漢云以戾庶正盤庚云邦伯師長艾歷也注長者多更歷音義更音庚疏艾又為歷郭云長者多更歷歷秭算數也注歷厯數也今以十億為秭論語云何足算也音義秭音姊算字又作算素緩反郭息轉反數色具反注同謝色主反疏皆算數也郭云歷歷數也推律所生之數虞書大禹謨云天之歷數在汝躬秭者周頌豐年云萬億及秭毛傳云數萬至萬曰億數億至億曰秭郭云今以十億為秭者以時驗而言也注論語云何足算也者案論語子貢問曰今之從政者何如子曰噫斗筲之人何足算也鄭曰算數也歷傅也注傅近音義歷音靂傅符付反注同疏謂傅近也隱十一年左傳云庚辰傅于許艾厯覛胥相也注覛謂相視也公羊傳曰胥盟者何相盟也艾歷未詳音義覛字又作脈亡革反相息羊反讀者或息亮反今不用疏皆謂相視也覛者郭云覛謂相視也説文云覛邪視也注云公羊傳曰胥盟者何相盟也者桓三年文乂亂靖神弗淈治也注論語曰豫有亂臣十人淈書序作汨音同耳神未詳餘見詩書音義乂字又作䢃亦作刈同魚廢反淈郭古沒反又胡忽反治直吏反謝如字汨古沒反疏皆治理也舍人曰亂義之治也孫炎曰亂治之理也注云論語曰豫有亂臣十人者泰伯篇文也云淈書序作汨音同耳者虞書序云帝釐下土方設居方别生分類作汨作孔傳云汨治作興也言其治民之功興故為汨作之篇亡云餘並見詩書者舜典云有能俾乂小雅菀栁云俾豫靖之大雅生民云茀厥豐草弗茀音義同頤艾育養也注汝潁梁宋之間曰艾方言云音義頤以之反疏頤者易曰頤貞吉育者易旡妄象曰先王以茂對時育萬物注云汝潁梁宋之間曰艾方言云者案方言云台胎陶鞠養也晉衛燕趙曰台陳楚韓鄭之間曰鞠秦或曰陶汝潁梁宋之間曰胎或曰艾也汱渾隕墜也注汱渾皆水落貌音義汱姑犬反施胡犬反顧徒蓋反宜作汏渾胡本反隕于敏反墜直類反疏皆墜落也郭云汱渾皆水落貌春秋僖公十六年經云星隕如雨際接翜捷也注捷謂相接續也音義翜所甲反捷才接反疏郭云捷謂相接續也際者相會之捷也左傳曰爾未際也小雅菀栁云無自瘵焉鄭箋云瘵接也接者曽子問云接祭而已謂捷速而祭也翜者未詳毖神溢慎也注神未詳餘見詩書音義毖音祕溢音逸疏謂謹慎也毖者周書洛誥云夙夜毖祀溢者舍人曰溢行之慎周頌維天之命云假以溢我故注云見詩書鬱陶繇喜也注孟子曰鬱陶思君禮記曰人喜則斯陶陶斯詠詠斯猶猶即繇也古今字耳音義陶徒刀反繇音由一音遙疏皆謂歡悅鬱陶者心初悅而未暢之意也注云孟子曰鬱陶思君者案孟子象往入舜宫舜在牀琴象曰鬱陶思君爾忸怩趙氏注云象見舜正在牀鼓琴愕然反辭曰我鬱陶思君故來爾辭也忸怩而慙是其情也云禮記曰人喜則斯陶陶斯詠詠斯猶者下檀弓文鄭注云鬱陶陶也咏謳也猶當為搖聲之誤也搖謂身動搖也秦人猶搖聲相近云猶即繇也古今字耳者言禮記猶即此經繇也古今字異耳馘穧獲也注今以獲賊耳為馘獲禾為穧並見詩音義馘古獲反本又作聝音同穧本作齊同才細反依注字宜從禾獲户郭反疏皆謂克獲也注云今以獲賊耳為馘者大雅皇矣云攸馘安安毛傳云不服者殺而獻其左耳曰馘魯頌泮水云在泮獻馘鄭箋云馘所格首之左耳皆謂臨陳格殺之而取其耳也云獲禾為穧者小雅大田云此有不斂穧穧者禾之鋪而未束故云獲禾為穧是並見詩阻艱難也注皆險難音義難奴旦反注同一音如字疏皆險難也秦風葭云道阻且長商書説命云非知之艱剡㗉利也注詩曰以我剡耜音義剡羊冉反㗉力約反詩本作略耜音似疏皆耜之利也小雅大田云以我覃耜剡覃音義同周頌載芟云有略其耜㗉略音義同允任壬佞也注書曰而難任人允信者佞人似信壬猶任也音義任而鴆反又而淫反注同壬而今反注同疏皆謂諂佞也允信也佞人似信任者孫炎云似可任之佞也虞書舜典云而難任人壬猶任也臯陶謨云何畏乎巧言令色孔壬俾抨使也注皆謂使令見詩俾抨使從也注四者又為隨從音義俾必爾反拼北萌反以利使人曰拼從手抨普耕反案字書拼抨並音普耕補耕二反訓義亦同今既二字相隨故多互其讀也亦從手彈也字又作伻音同使人也令力呈反疏皆謂使令隨從也注云見詩者魯頌閟宫云俾爾熾而昌大雅桑柔云并云不逮拼并音義同抨義亦同此皆為使令也俾拼抨使四者又為隨從儴仍因也注皆謂因緣音義儴樊孫如羊反引論語其父攘羊釋之作攘注云因來而盜曰攘施息羊反疏皆因緣也費誓曰無敢冦攘鄭注云因其亡失曰攘儴攘音義同施博士讀曰襄周書君奭云襄我二人郭無明説義得兩通論語云仍舊貫董督正也注皆謂御正音義督多毒反疏皆謂御正也虞書大禹謨云董之用威春秋僖公十三年左傳云謂督不忘享孝也注享祀孝道音義享虛丈反下注同疏享祀孝道也小雅信南山云享于祖考珍享獻也注珍物宜獻榖梁傳曰諸侯不享覲疏致物于尊者曰獻珍者珍物宜獻也享者周禮大行人云廟中將幣三享鄭司農云三享三獻也注云榖梁傳曰諸侯不享覲者隱五年文縱縮亂也注縱放掣縮皆亂法也音義縱于用反縮所六反掣昌世反疏縱放掣縮皆亂法也大雅民勞云無縱詭隨探篡俘取也注書曰俘厥寶玉篡者奪取也探者摸取也音義探吐南反篡初患反俘音孚摸亡各樓胡二反疏郭云探者摸取也篡者奪取也李巡曰囚敵曰俘伐執之曰取注云書曰俘厥寶玉者商書序云夏師敗績湯遂從之遂伐三朡俘厥寶玉孔氏云俘取也徂在存也注以徂為存猶以亂為治以曩為嚮以故為今此皆詁訓義有反覆旁通美惡不嫌同名音義治直吏反曩乃朗反嚮許亮反疏鄭風出其東門云匪我思且鄭箋云非我思存也徂且音義同在訓存者常語也上云徂往也往則非存故郭氏引類以曉人也注云美惡不嫌同名者案隱七年公羊傳云貴賤不嫌同號美惡不嫌同辭何休云若繼體君亦稱即位繼弒君亦稱即位皆有起文美惡不嫌同辭是也若此篇往也死也亦稱徂是惡也存也亦稱徂是美也各有其義故云美惡不嫌同名在存省士察也注書曰在璿璣玉衡士師官亦主聼察存即在音義省息井反璿音旋又音璇疏謂審察也虞書舜典云在璿璣玉衡以齊七政存即在也省謂視察吾日三省吾身士者理獄之官亦主聽察虞書舜典舜命臯陶云汝作士烈枿餘也注晉衛之間曰蘖陳鄭之間曰烈音義枿五割反本或作又作木注作蘖並同説文作􅤁以木為古文蘖為或體云伐木之餘疏謂遺餘也詩大雅雲漢序云宣王承厲王之烈李巡曰枿稿木之餘也商書盤庚云若顛木之有由蘖枿蘖音義同注云晉衛之間曰蘖陳鄭之間曰烈者方言文迓迎也注公羊傳曰跛者迓跛者音義迓五駕反跛布我反疏謂相逢迎也注云公羊傳曰跛者迓跛者此成二年傳文案彼云晉卻克與臧孫許同時而聘于齊蕭同姪子者齊君之母也踊于棓而窺客則客或跛或眇于是使跛者迓跛者眇者迓眇者是也引之以證迓為迎也宣三年左傳曰狂狡輅鄭人杜注云輅迎也周禮秋官有訝士及聘禮云厥明訝賓于館鄭注皆云訝迎也召南鵲巢云百兩御之鄭注云御迎也字形雖别音義實同蓋以作非一人致兹異也當以迓為正字餘皆假借元良首也注左傳曰狄人歸先軫之元良未聞音義軫之忍反疏謂頭首也注云左傳曰狄人歸先軫之元者僖三十三年狄伐晉及箕八月戊子晉侯敗狄于箕郤缺獲白狄子先軫曰匹夫逞志于君而無討敢不自討乎免胄入秋師死焉秋人歸其元面如生是也引證元為首良未詳薦摯臻也注薦進也摯至也故皆為臻臻至也音義薦遭練反摯之二反臻則中反疏臻至也薦進執摯皆所以表至也賡揚續也注書曰乃賡載歌揚未詳音義賡古孟反沈孫音庚説文以為古文續續似欲反疏謂相繼續也注云書曰乃賡載歌者虞書益稷文祔祪祖也注祔付也付新死者于祖廟祪毁廟主音義祔音附郭音付祪俱毁反疏謂先祖也説文云祔後死者合食於先祖也郭云祔付也付新死者于祖廟士虞記云明日以其班祔毁廟之主曰祪即尼也注即猶今也尼者近也尸子曰悅尼而來逺音義尼本亦作昵同女乙反謝羊而反顧奴啓反下同疏尼近言也即今相近也尼定也注尼者止也止亦定疏尼詁為止止即定舍人曰尼者私之定也邇幾昵近也注昵親近也音義幾音機又音祈昵女乙反疏皆謂殆近也邇者鄭風東門之墠云其室則邇幾者聘義曰日幾中而後禮成昵者郭云親近也小雅菀栁云無自昵焉妥安坐也注禮記曰妥而后傳命音義妥郭他回反沈他果反傳直攣反疏妥定之坐也注云禮記曰妥而后傳命者案士相見禮曰凡言非對也妥而后傳言鄭注云凡言謂已為君言事也妥安坐也傳言猶出言也此言禮記曰妥而后傳命者傳寫誤也或所見本異貉縮綸也注綸者繩也謂牽縳縮貉之今俗語亦然音義貉亡白反下同施胡各反綸音倫繩音乘疏注云綸者繩也謂牽縳縮貉之今俗語亦然者據時驗而言也大雅綿篇云其繩則直縮板以載貉嗼安定也注皆靜定見詩音義嗼音莫本亦作莫疏皆靜定也大雅皇矣云貉其德音毛傳云貊靜也鄭箋云德正應和曰貉嗼者皇矣文云求民之莫鄭箋云求民之定謂所歸就也貉貊嗼莫音義同安者小雅斯干云乃安斯寢伊維也注發語辭伊維侯也注詩曰侯誰在矣互相訓疏皆發語辭轉互相訓弼谷風云伊余來暨大雅大明云維此文王小雅六月云侯誰在矣時實是也注公羊傳曰實來者何是來也音義實音石疏是此也秦風駟驖云奉時辰牡注云公羊傳曰實來者何是來也者案春秋桓五年冬州公如曹六年春正月實來公羊傳曰實來者何猶曰是人來也引之證實為是也卒猷假輟已也注猷假未詳音義卒子恤反又作下同猷音由假古雅反輟丁劣反已音以疏皆謂終已也卒者終夀之已也輟止已也論語云耰而不輟求酋在卒就終也注詩曰嗣先公爾酋矣成就亦終也其餘未詳音義酋在由反又子由反郭音遒就如字或作噈子六子合二反又作殧同疏皆謂終盡也求者大雅下武云世德作求郭云詩曰嗣先公爾酋矣者大雅卷阿文卒者弼風日月云畜我不卒就者凡事物成就亦終也崩薨無祿卒殂落殪死也注古者死亡尊卑同稱耳故尚書堯曰殂落舜曰陟方乃死音義薨火𢎞反殂音徂本又作徂殪於計反稱尺證反疏此皆死之别稱也曲禮云天子死曰崩諸侯曰薨大夫曰卒士曰不祿庶人曰死鄭注云異死名者為人褻其無知若猶不同然也自上顛壞曰崩薨顛壞之聲卒終也不祿不終其祿死之言澌也精神澌盡也又曰夀考曰卒短折曰不祿鄭注云祿謂有德行任為大夫士而不為者老而死從大夫之稱少而死從士之稱此云無祿者即彼之不祿也徂落者李巡曰徂落堯死之稱注云古者死亡尊卑同稱耳故尚書堯曰徂落舜曰陟方乃死者皆虞書舜典文也謂之徂落者蓋徂為往也言人命盡而往落者若草木葉落也殪者案隱九年左傳云衷戎師前後擊之盡殪杜注云殪死也爾雅注疏卷一
