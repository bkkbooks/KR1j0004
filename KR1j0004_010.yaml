body:
  text: 爾雅注疏卷五考證釋樂第七小者謂之應注詩曰應朄縣鼓陸本􅉧作今詩本作應田懸鼓大籥謂之産注籥如笛三孔而短小廣雅云七孔鄭樵曰籥毛氏詩傳云六孔是則其制有不同者耳大鼗謂之麻小者謂之料注麻者音概而長也陸本概作穊釋天第八謂之景風甘雨時降萬物以嘉謂之醴泉鄭樵曰據下文敵體則此上容有二句亡焉在戊曰著雍陸本雍作雍唐虞曰載蔡雍獨斷曰載嵗也言一嵗之中莫不覆載也焚輪謂之頽陸本焚作棼霓為挈二陸本霓作霓鄭樵曰虹霓朝見西暮見東日中則見天中故暈氣弇日疾雷為庭霓注雷之急擊者陸本庭作霆急作激淫謂之霖注雨自三日已上為霖陸本已作以天駟房也鄭樵曰房為天馬主車駕故亦為天駟玄枵虛也鄭樵曰虛星在辰為玄枵居躔度為北陸在地為顓頊之虛營室謂之定陸本定作顁鄭樵曰室星昏正見南方則興土功營宫室之時故曰營室娵觜之口營室東壁也陸本壁作辟濁謂之畢鄭樵曰畢星一名濁實沉所次故有沉濁之名焉彗星為欃槍注亦謂之孛陸本彗作篲鄭樵曰孛乃妖變之星也此篇大概釋十二辰所次據壽星大辰析木星紀玄枵諏訾降婁大梁實沉鶉首鶉火鶉尾此當備載不應遺却實沉鶉首鶉尾恐是簡編之失夏曰復胙陸本胙作昨宵田為獠注管子曰獠獵畢弋陸本畢作罼振旅闐闐鄭樵曰闐闐鼓聲維以縷鄭樵曰此上並一旗之制也爾雅注疏卷五考證
