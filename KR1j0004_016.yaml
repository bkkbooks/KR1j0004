body:
  text: 爾雅注疏卷八考證釋草第十三蒮山韭茖山蔥葝山䪥蒚山蒜後漢書馬融傳格韭菹于注茖與格古字通葝廣韻又作薜山蘄注當歸今似蘄而粗大陸本粗作麆椵木槿櫬木槿陸本槿作堇玊篇木堇朝生夕隕可食亦作堇术山薊鄭樵曰蒼术也楊枹薊鄭樵曰白术也葥王蔧鄭樵曰椶櫚也菉王芻臣照按菉通作綠詩小雅采綠篇終朝采綠注王芻也似非菉竹之菉陸本菉作彔蒿菣注今人呼青蒿香中炙啖者為菣陸本啖作㗖齧彫蓬薦黍蓬鄭樵曰彫蓬米茭也其米謂之彫胡黍蓬野茭也以只可為薦故曰薦菥蓂大薺鄭樵曰似薺菜但葉差大而莖稍高耳蒤虎杖鄭樵曰似馬蓼但無毛耳所在有之盂狼尾石經盂作孟鄭樵本同玊篇䓝狼尾草也果臝之實栝樓鄭樵曰今亦曰苽蔞荼苦菜鄭樵曰今人呼苦益虉綬鄭樵曰疑即赤孫施草也粢稷鄭樵曰今謂之穄五穀之長故以為粢盛狀如蘆荻結穗亦相似衆秫鄭樵曰本名梁戎叔謂之荏菽陸本叔作尗萒雀卉注未詳石經卉作弁毛本同蘹烏薞萰莬荄蘩菟蒵注皆未詳臣照按本草蘹香注北人呼為茴香聲相近也萰玊篇白蘝也詩唐風葛生篇蘝蔓于野疏蘝似栝樓葉盛而細又烏蘝本草五葉如白蘝蘩陸璣曰春始生香美可蒸食蔩莬瓜鄭樵曰俗呼新羅葛藱懷羊注未詳類篇芋之惡者曰藱茭牛蘄注今馬蘄本草馬蘄一名野茴香淔灌注未詳苬芝臣照按淔灌苬芝當是一節淔灌者即苬芝皆濕生可食之物苬如今豆芽木耳之類集韻徐由切音囚草生水田子可食芝禮内則芝栭菱椇鄭注人君燕食所加庶羞也疏無華而實者名栭芝屬也芝栭一物亦作檽本草别錄木生者為檽地生者為菌類篇一作㮕音而一作檽與栭栮同木耳别名生枯木上形如耳故名木耳葍䔰鄭樵曰即商陸也熒委萎陸本委作荽葋艼熒注未詳臣照按神農本草蒟蒻一名鬼艼唐段成式酉陽雜爼蒟蒻根大如椀至秋葉滴露隨滴生苖竹萹畜石經詩衞風淇澳篇綠􆅱如簀􆅱音竹今作竹韓詩外傳綠􆅱猗猗􆅱篇筑也玊篇篇筑作萹茿臣照按詩爾雅注疏所言淇澳菉竹皆非竹也如今淡竹葉之類在竹與草之間然漢武伐淇陽之竹以塞河見于史記漢書則明是竹矣諸儒異議只因不思菉與綠通菉者竹色非别有菉竹也即此竹萹畜亦秪是竹言竹又名萹畜耳萹畜猶言林立竹無孤生故也豈别有物耶葴寒漿陸本寒作藆蕛苵集韻苵作鉤芺鄭樵曰苦芺也今謂之雞頭蓧蓨鄭樵曰蓧即苕也臣照按詩陳風防有鵲巢卭有旨苕疏苕饒也幽州人謂之翹夏生莖如勞豆而細葉似蒺藜而青其莖綠色可生食如小豆藿蓨與條同史記周勃世家亞夫封為條侯注條表皆作蓚臺夫須陸本須作蕦鄭樵曰即雲臺菜也薜庾草注未詳鄭樵曰藤生蔓延墻樹間花生頗似薜荔蔜􅭚􅘚石經蔜作蔜陸本作蔜鄭樵曰可為菜茹兼作牙藥離南活莌陸本離作蘺鄭樵曰通草也瓤白可作婦人首飾蘢天蘥須葑蓯注未詳陸璣草木疏蘢一名馬蓼即今之水葒草管子地員篇其山之淺有蘢與斥須鄭樵曰菰葑也積舊茭頭而或封筏者陸本須作蕦蒡隱荵鄭樵曰牛蒡也葉似芥蓾蔖鄭樵曰可為屨生鹵地蘄茝蘪蕪陸本蘪作糜蔨鹿靃其實莥注蔓延生陸本鹿作蔍延作莚莥一作又作薃侯莎其實媞鄭樵曰或云即香附子其根生塊似實爾雅誤以為實也如莎草之類皆無實莞苻蘺其上蒚臣照按玊篇蒲蒚謂今蒲頭有臺臺上有重臺中出黄即蒲黄葢苻即古蒲字也其華菡蓞陸本蓞作紅蘢古其大者蘬注俗呼紅草為蘢鼔陸本蘢鼓作龍古菲蒠菜鄭樵曰即遂菜也萹苻止濼貫衆臣照按陸本引本草云貫衆一名萹苻邢疏貫衆一名貫節一名貫渠一名萹苻然則萹苻者止濼也貫衆也止濼二字為句亦貫衆之别名矣今文萹苻止為一節注云未詳濼貫衆為一節疏云一名萹苻其為傳寫之訛必也萍蓱陸本萍作苹蓱作萍其大者蘋鄭樵曰蘋舊說即萍類而大者按萍屬不可食此必蓴類葉亦圜浮水上如萍也臣照按韓詩沉者曰蘋本草集解四葉合成一葉如田字者蘋也爾雅翼蘋似槐葉而連生淺水中五月有花白色故謂之白蘋藬牛蘈鄭樵曰即羊蹄菜藚牛脣陸本脣作䔚鄭樵曰狀似麻黄亦謂之續斷生沙阪連異翹鄭樵曰亦名旱蓮狀似當歸而非鱧腸也澤烏蘾鄭樵本蘾作薞大菊蘧麥鄭樵曰叢生莖細弱今人多植庭院間其花與葉皆可愛故有南天竹之名唐蒙女蘿女蘿菟絲陸本唐作蓎菺戎葵陸本戎作茙莩麻母莩石經陸本鄭樵本皆作茡音字注以為布䘮服所用俗謂黄麻倚商活脫陸本商作蔏蘵黄蒢注江東以作葅食陸本葅作菹鄭樵曰俗呼竹茶葉似蒟醬藒車芞輿鄭樵曰芸蒿也權黄華鄭樵曰野决明蔠葵蘩露陸本蔠作終蒤委葉陸本蒤作荼皇守田鄭樵曰即童粱也一穗未得數粒榖而易墮落明年復生故謂之守田鉤姑陸本鉤作姑作菇望椉車陸本車作居杜土鹵陸本鹵作蓾中馗菌陸本菌作菆小葉注未聞陸本菆作韻會草叢也苕陵苕鄭樵曰陵苕今謂之凌霄花本草謂之紫葳蔓生依緣樹木皆黄華少見有白華者仲無笐鄭樵曰篔簹竹篠箭陸本箭作箭藄月爾陸本藄作姚莖涂薺注未詳陸本涂作蒤蒙玊女注蒙即唐也陸本唐作蓎藗牡茅陸本藗作蔌繁由胡注未詳陸本繁作蘩的薂陸本的作菂葽繞蕀蒬陸本蕀作棘蕭荻荻石經陸本皆作萩鄭樵曰今藥家謂之青葙子長楚銚芅陸本長作萇蘦大苦注今甘草也蔓延生陸本延作莚鄭樵曰沈存中辨謂為黄藥甚明沈存中筆談云本草注引爾雅云蘦大苦注甘草也蔓延生葉似荷青莖赤此乃黄藥也其味極苦謂之大苦非甘草也甘草枝葉悉如槐高五六尺但葉端微尖而糙澁似有白毛實作角生如相思角作一本生熟則角坼子如小扁豆極堅齒嚙不破芣苢馬舄馬舄車前陸本舄作蕮綸似綸組似組東海有之鄭樵曰綸鹿角菜也赤而攣屬似綸帶組海苔也似組綬或云綸即昆布苀東蠡注未詳鄭樵曰苀亡剛反薜荔也緜馬羊齒注繅者以取繭緒鄭樵曰據今人所用為繭緒者多以蕨莾搴柜朐注未聞蘩之醜秋為蒿臣照按注未聞三字衍文當是搴柜朐繁之醜秋為蒿言搴者柜朐也繁之醜類也至秋則為蒿猋藨芀注未聞鄭樵曰苕也即菅花可為苕帚葦醜芳芳石經毛本皆作芀鄭樵本無此三字臣照按此亦當連上文為一節言蔈者荂荼也猋者藨芀也凡葦之醜類皆可曰芀郭注曰蔈即芀蒹薕注似萑而細陸本萑作藡鄭樵曰荻也蘆屬而小可為箔檴槖含陸本檴作攫爾雅注疏卷八考證
