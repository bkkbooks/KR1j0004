body:
  text: 欽定四庫全書爾雅注疏卷八原目卷下晉郭璞注唐陸徳明音義宋邢昺疏釋草第十三音義草亦作艸說文云百卉也從二􅋄􅋄讀若徹象草木初生疏草說文作艸𨽻變作廾七老切百卉也又曰象野草莽蒼之形說文别有草字自保切云草斗櫟實也一曰象斗子徐鍇曰今俗以此為廾木之草别作皁字為黑色之皁案櫟實可以染帛為黑色故曰草通用為草棧字然則此篇辨百卉之名見於經傳者當為草木之草故云釋草蒮山韭茖山蔥葝山䪥蒚山蒜注今山中多有此菜皆如人家所種者茖蔥細莖大葉音義蒮羊六反韭居有反說文云菜名也一種而長乆故曰韮象形在一之上一地也茖古百反葱本反作䓗音聰葝字又作􅹦巨盈反䪥户界反又作薤說文云菜也菜似韭故從韭也蒚力的反蒜西亂反說文云葷菜也一本云菜之美者雲夢之葷菜種之用反莖户耕反或作英疏此辨四種菜生山中與人家所種者異名也韭說文云菜名一種而久者故謂之韭象形在一之上一地也生山中者名蒮韓詩云六月食鬰及藿是也蔥說文云菜名生山中者名茖細莖大葉者是也䪥說文云菜也葉似韭生山中者名葝蒜說文云葷菜也一云菜之美者雲夢之葷菜生山中者名蒚薜山蘄注廣雅曰山蘄當歸當歸今似蘄而粗大音義薜方奭反郭布革反蘄古芹字巨斤反疏說文云蘄草也生山中者一名薜一名山蘄色白者名白蘄下文薜白蘄是也生平地即名蘄案廣雅張揖撰以廣爾雅之闕漏也曰山蘄當歸者言即今藥草當歸案本草當歸不言名薜及山蘄是即以時驗而言也故郭云今似蘄而粗大言似平地蘄而差粗大耳椵木槿櫬木槿注别二名也似李樹華朝生夕隕可食或呼日及亦曰王蒸音義椵徒亂反槿音謹下同櫬楚靳反本又作藽别彼列反下放此隕于敏反日人逸反蒸之仍反疏此别椵櫬是木槿之二名也某氏云别二名也其樹如李其華朝生暮落與草同氣故在草中鄭風云顔如舜華陸璣疏云舜一名木槿一名櫬一名椵齊魯之間謂之王蒸今朝生暮落者是也郭氏云可食亦呼日及五月始華故月令仲夏云木槿榮术山薊注本草云术一名山薊今术似薊而生山中楊枹薊注似薊而肥大今呼之馬薊音義术徒律反本或作􅙥薊古帝反下同案本草术一名山薊一名山連一名山薑廣雅云术薑也枹沈音孚又音浮又音包疏此辨薊生山中及平地者名也生平地者即名薊生山中者一名术本草云一名山薊一名山薑一名山連陶注云有兩種白术葉大有毛甜而少膏赤术葉細小苦而多膏是也其生平地而肥大於衆者名楊枹薊今呼之馬薊葥王蔧注王帚也似藜其樹可以為掃彗江東呼之曰落帚音義葥音箭一音子淺反說文作湔同蔧息遂囚銳二反掃素報反下同帚之有反疏此即藜之科大為樹可以作掃蔧者一名葥一名王蔧一名王帚江東呼落帚菉王芻注菉蓐也今呼鴟脚莎音義菉力辱反芻楚俱反本又作蒭蓐音辱鴟尺之反莎素和反疏舍人云菉一名王芻某氏云菉鹿蓐也郭云蓐也今呼鴟脚莎詩衛風云瞻彼淇澳菉竹猗猗是也拜蔏藋注蔏藋亦似藜音義蔏音商藋徒弔反說文廣雅皆云堇也疏此亦似藜而葉大者名拜一名蔏藋莊子云藜藋柱宇是也蘩皤蒿注白蒿蒿菣注今人呼青蒿香中炙啖者為菣蔚牡菣注無子者音義蘩音煩皤白波反白也蒿好高反菣本亦作􅀢去刃反讀者或作苦見反炙之亦反啖徒覽反說文云噍也廣雅云食也蔚於貴反下同牡亡后反疏此辨蒿色及有子無子者之異名也詩召南云于以采蘩于沼于沚毛傳云蘩皤蒿也郭氏云白蒿然則皤猶白也本草云白蒿唐本注云此蒿葉粗於青蒿從初生至枯白於衆蒿欲似艾者所在有之又云葉似艾葉上有白毛粗澀俗呼蓬蒿可以為葅故詩箋云以豆薦蘩葅陸璣云凡艾白色為皤蒿今白蒿春始生及秋香美可生食又可蒸一名游胡北海人謂之旁勃故大戴禮夏小正傳曰蘩由胡由胡旁勃也是蒿一名菣詩小雅鹿鳴云食野之蒿陸璣云蒿青蒿也荆豫之間汝南汝陰皆云菣孫炎云荆楚之間謂蒿為菣郭云今人呼青蒿香中炙啖者為菣是也蔚即蒿之雄無子者故云牡菣舍人曰蔚一名牡菣詩蓼莪云匪莪伊蔚陸璣云牡蒿也三月始生七月華華似胡麻華而紫赤八月為角角似小豆角銳而長一名馬新蒿是也齧彫蓬薦黍蓬注别蓬種類音義齧魚結反彫一遼反蓬歩公反薦作見反孫李本作􅏪沈平兆反黍音著種之勇反疏此别蓬種類也説文云蓬蒿也草之不理者也種類非一故有齧彫蓬薦黍蓬詩召南騶虞云彼茁者蓬月令云藜莠蓬蒿竝興是也􅤴䑕莞注亦莞屬也纖細似龍須可以為席蜀中出好者音義􅤴方寐反又方弭反莞謝音官施音丸疏莞屬也說文云莞草可以為席此􅤴一名鼠莞纖細似龍須亦可以為席蜀中出好者葝䑕尾注可以染皁音義葝巨盈反皁音造疏可以染皁草也一名葝一名䑕尾本草有白華者有赤華者又一名陵翹陶注云田野甚多人採作滋染皁草是也菥蓂大薺注薺葉細俗呼之曰老薺音義菥思歴反蓂亡歴反薺齊禮反疏菥蓂一名大薺俗呼老薺似薺而葉細本草又名薎菥一名太蕺一名馬辛是也蒤虎杖注似紅草而麄大有細刺可以染赤音義蒤大奴反刺七賜反下同疏蒤一名虎杖注云似紅草而粗大有細刺可以染赤陶注本草云田野甚多狀如大馬蓼莖班而葉圓是也盂狼尾注似茅今人亦以覆屋音義狼音郎茅亡交反覆音副疏草似茅者一名盂一名狼尾今人亦以覆屋瓠棲瓣注瓠中瓣也詩云齒如瓠棲音義瓠户故反舍人本又作觚釋云瓠也棲詩作犀音西瓣苻莧苻閑二反謝力見反郭云瓠中瓣也字林云瓜中實也父莧反疏瓣瓠中瓣也一名瓠棲人之齒美者似之故詩衛風碩人美莊姜云齒如瓠棲是也今詩文作犀茹藘茅蒐注今之蒨也可以染絳音義茹音如字亦作蕠藘力居反蒐色留反蒨本或作茜七見反疏今染絳蒨也一名茹藘一名茅蒐詩鄭風云茹藘在阪陸璣云一名地血齊人謂之茜徐州人謂之牛蔓即今之蒨草是也果臝之實栝樓注今齊人呼之為天瓜音義臝力果反栝本或作䒷古活反樓本或作蔞力侯反本草栝樓一名地樓一名天瓜一名澤姑一名果臝實一名黄瓜陶𢎞景注云出近道藤生狀似土瓜而葉有义實中人今以雜作手膏用也根入土六七尺大二三圍者服食亦用之疏果臝之草其實名栝樓實即子也故李廵云栝樓子名也郭云今齊人謂之天瓜本草云栝樓葉似瓜葉形兩兩相値蔓延青黑色六月華七月實如瓜瓣是也荼苦菜注詩曰誰謂荼苦苦菜可食音義荼音徒說文同案詩云誰謂荼苦大雅云堇荼如飴本草云苦菜一名荼草一名選生益州川谷名醫别錄云一名游冬生山陵道旁冬不死月令孟夏之月苦菜秀易通卦驗𤣥圖云苦菜生於寒秋經冬歴春得夏乃成今苦菜正如此處處皆有葉似苦苣亦甚食但苦耳今在釋草篇本草為菜上品陶𢎞景乃疑是茗失之矣釋木篇有檟苦荼乃是茗耳疏此味苦可食之菜一名荼一名苦菜本草一名荼草一名選一名游冬案易緯通卦驗𤣥圖云苦菜生於寒秋經冬歴春乃成月令孟夏苦菜秀是也葉似苦苣而細斷之有白汁花黃似菊堪食但苦耳注云詩曰誰謂荼苦邶風谷風篇文也萑蓷注今茺蔚也葉似荏方莖白華華生節間又名益母廣雅云音義萑音佳蓷他回反或音推郭云茺蔚也本草茺蔚子一名益母一名大札一名益明一名貞蔚陶𢎞景云處處生葉如荏方莖子細長三楞白華華生節間茺音充蔚音尉荏而甚反疏萑一名蓷李廵曰臭穢草也郭云今茺蔚也廣雅名益母葉似荏方莖白華華生節間詩王風云中谷有蓷陸璣云舊說及魏博士濟陰周元明皆云菴蔄是也韓詩及三蒼說悉云益母故曾子見益母而感案本草茺蔚一名益母故劉歆曰蓷臭穢即茺蔚也虉綬注小草有雜色似綬音義虉又作鷊五歴反郭音五革反綬音受疏虉者雜色如綬文之草也詩陳風云邛有㫖虉陸璣疏云虉五色作綬故曰綬草是也粢稷注今江東人呼粟為粢音義粢音咨左傳云粢食不鑿杜注云黍稷曰粢郭云今江東人呼粟為粢陶注本草云白糧粟或呼為粢音緇字林云黏稷也今苗及穀似粟稷本草云稷米味甘無毒益氣補不足陶注云不識書多云稷恐與黍相似詩黍稷稻梁禾麻菽麥此八穀世人莫能證辨如此穀稼米不能明而况芝英者乎汜勝之種殖書無稷案禮記云子卯稷食菜羹又云君沐梁大夫沐稷士沐梁相承云稷粟也又郭注衆秫云黏粟而說文字林皆云黏稷今秫苗及穀全似粟唯色及黏為異又衆家釋粢皆為粟知稷即粟也然本草稷米在下品别有粟米在中品又似二物疏左傳云粢食不鑿粢者稷也曲禮云稷曰明粢是也郭云今江東人呼粟為粢然則粢也稷也粟也正是一物而本草稷米在下品别有粟米在中品又似二物故先儒甚疑焉衆秫注謂黏粟也音義衆音終秫音述郭云黏粟也說文云稷之黏者字林亦云黏稷本草云秫米味甘微寒主止寒熱利大腸治漆創案江東人皆呼稻米為秫米嚼稻米以治漆創亦驗然北間自有秫穀全與粟相似米黏北人用之釀酒其莖稈似禾而麤大也黏女廉反字林云相著疏衆一名秫謂黏粟也說文云稷之黏者也與穀相似米黏北人用之釀酒其莖稈似禾而麄大者是也戎叔謂之荏菽注即胡豆也音義菽舒育反荏而甚反疏戎叔一名荏菽孫炎云大豆也詩大雅生民蓺之荏菽荏菽斾斾鄭箋亦以為大豆樊光舍人李廵郭氏皆云今以為胡豆郭氏云春秋齊侯來獻戎捷穀梁傳曰戎菽也管子亦云北伐山戎出冬蔥及戎菽布之天下今之胡豆是也案此戎菽皆為大豆注榖梁者亦以為大豆也郭氏等以戎胡俱是夷名故以戎菽為胡豆也卉草注百草總名音義卉虚謂反總子孔反疏别二名也百卉猶百草也詩小雅云百卉具腓是也雀卉注未詳蘥雀麥注即燕麥也音義萒悅轉反又古本反蘥予若反麥亡革反燕烏見反疏蘥一名雀麥一名燕麥本草云生故墟野林下苗似小麥而弱實似穬麥而細在處亦有之是也蘹烏薞萰菟荄蘩菟蒵注皆未詳蔩菟瓜注菟瓜似土瓜音義蘹户怪反薞西存反萰音練菟音兔荄古來反一音皆蘩音煩蒵音兮蔩羊善反又弋仁反疏菟瓜一名蔩苗及實似土瓜土瓜者即王瓜也月令王瓜生是也茢薽豕首注本草古彘顱一名蟾蜍蘭今江東呼豨首可以煼蠶蛹音義茢音列薽音眞豕傷氏反彘音滯蟾音占豨虚豈反煼字或作􅵇炒􅱊㷅七字竝音初卯反三蒼云熬也說文云火乾物也蠶雜南反蛹音勇疏茢薽藥草名一名豕首一名彘顱一名蟾蜍蘭一名天名精一名麥句薑一名蝦蟇藍一名天門精一名玉門精别錄一名天蔓菁南人名為地菘味甘辛故有薑稱狀如藍故名蝦蟇藍香似蘭故名蟾蜍蘭郭云江東呼豨首可以煼蠶蛹者三蒼云煼熬也荓馬帚注似蓍可以為掃彗音義荓音瓶帚之酉反蓍音尸說文云蒿屬也生千歲三百莖埽蘇早反疏荓草似蓍者今俗謂蓍荓可以為掃彗故一名馬帚注似蓍說文云蓍蒿屬也生千歳三百莖可以為卜策白虎通云此天地之間壽考物也故問之是也藱懷羊注未詳茭牛蘄注今馬蘄葉細銳似芹亦可食音義藱胡罪反茭郭胡卯反又音交或尸交反蘄音芹疏似芹可食菜也而葉細銳一名茭一名牛蘄一名馬蘄子入藥用本草注云生水澤中苗似鬼鍼菜等花青白色子黄黑色似防風子是也葖蘆萉注萉宜為菔蘆菔蕪菁屬紫花大根俗呼雹葖音義葖孫郭竝他忽反施徒忽反蘆郭音力何反謝力吳反萉郭音菔蒲北反蕪音無本或作蔓音萬菁音精又子丁反雹步角反疏紫花菘也俗呼溫菘似蕪菁大根一名葖俗呼雹葖一名蘆菔今謂之蘿蔔是也淔灌注未詳苬芝注芝一歲三華瑞草音義淔恥力反聲類云淔灌苬芝也苬沈顧音祥由反謝音由芝音之瑞草也疏瑞草名也一歲三華一名苬一名芝論衡云芝生於土土氣和故芝草生瑞命禮曰王者仁慈則芝草生是也筍竹萌注初生者音義筍息尹反竹初生也萌亡耕反疏孫炎曰竹初萌生謂之筍凡草木初生謂之萌筍則竹之初生者故曰筍竹萌也可以為菜殽詩大雅韓奕云其􅉡維何維筍及蒲蔌則菜殽也蕩竹注竹别名儀禮曰簜在建鼓之間謂簫管之屬音義簜徒朗反說文云大竹也尚書云篠簜既敷是也本或作音同案說文大作筩也字林他莽反疏簜則竹之别名李廵曰竹節相去一丈曰蕩孫炎曰竹闊節者曰簜禹貢蓧簜既敷孔安國云簜大竹郭氏云竹别名無大小之異故引禮經為證也注儀禮曰者大射禮文也案彼云樂人宿縣西階之西頌磬東面其南鐘皆南陳一建鼓在其南東鼓朔鼙在其北一建鼓在西階之東南面簜在建鼓之間鄭注云簜竹也謂笙簫之屬倚於堂以笙簫之屬固非大竹故郭氏引之也鄭又云建猶樹也以木貫而載之樹之跗也故謂之建鼓云謂簫管之屬者郭用鄭𤣥之說也莪蘿注今莪蒿也亦曰䕲蒿音義莪五河反蘿力何反䕲良甚反廣雅云莪蒿䕲蒿也疏舍人云莪一名蘿郭云今莪蒿也亦曰䕲蒿詩小雅云菁菁者莪陸璣云莪蒿也一名蘿蒿生澤田漸洳之處葉似邪蒿而細科生三月中莖可生食又可蒸香美味頗似蔞蒿是也苨菧苨注薺苨音義苨奴禮反菧丁禮反疏苨一名菧苨郭云薺苨也本草薺苨陶注云根莖都似人參而葉小異根味甜又别本注云根似桔梗以無心為異者是也絰履注未詳莕接余其葉苻注叢生水中葉圓在莖端長短随水深淺江東食之亦呼莕音義絰待節反莕音杏本亦作荇詩云參差荇菜說文作䓷接如字說文作菨音同余羊如反本或作荼非疏莕菜一名接余其葉名苻郭云叢生水中葉圓在莖端長短随水深淺江東食之亦呼為莕詩周南闗雎云參差荇菜是也荇與莕同陸璣疏云接余白莖葉紫赤色正圓莖寸餘浮在水上根在水底與水深淺等大如釵股上青下白鬻其白莖以苦酒浸之肥美可案酒白華野菅注菅茅屬詩曰白華菅兮音義菅古顔反疏舍人云白華一名野菅陸璣云菅似茅而滑澤無毛根下五寸中有白粉者柔韌宜為索漚乃尤善矣郭云菅茅屬此白華亦是茅之類也漚之柔韌異其名謂之為菅因謂在野未漚者為野菅耳詩小雅云白華菅兮是也薜白蘄注即上山蘄菲芴注即土瓜也音義薜方麥反蘄巨斤反菲芳尾反芴音物疏一名芴郭云土瓜也孫炎曰葍類也詩谷風云采葑采菲陸璣云菲似葍莖粗葉厚而長有毛三月中蒸鬻為茹甘美可作羹幽州人謂之芴爾雅又謂之蒠菜今河内人謂之宿菜案今爾雅菲芴與蒠菜異郭注似是别草如陸之言又是二物某氏注爾雅二處皆引谷風詩即菲也芴也蒠菜也土瓜也宿菜也五者一物其狀似葍而非葍故云葍類也葍䔰注大葉白華根如指正白可啖音義葍方服反說文云亦名舜楚謂之葍秦謂之蔓地生而連花䔰音富疏葍一名䔰郭云大葉白華根如指正白可啖詩小雅云我行其野言采其葍陸璣云幽州人謂之燕䔰其根正白可著熱灰中溫啖之饑荒之歲可蒸以禦饑也熒委萎注藥草也葉似竹大者如箭竿冇節葉狹而長表白裏青根大如指長一二尺可啖音義熒戸坰反萎謝於危反孫人垂反郭音痿癖同案痿音人垂反字林云庳也韓信云痿人不忘起是也讀史漢者或於危反竿音幹又音干或古但反疏藥草也一名熒一名委本草女萎萎蕤一名熒是也葉似竹大者如箭竿有節葉狹而長表白裏青根大如指長一二尺可啖葋艼熒注未詳竹萹蓄注似小藜赤莖節好生道傍可食又殺蟲音義葋求于反艼天頂反又天丁反熒音迥又音螢竹本又作筑張六反萹匹善反顧補殄匹緜二反蓄勑六反陶𢎞景云萹蓄亦呼為萹竹好呼報反蟲直中反疏李廵曰一物二名也孫炎􅾜氏引詩衞風云菉竹猗猗郭云似小藜赤莖節好生道傍可食又殺蟲案陶隱居本草注云處處有布地而生節間白華葉細緑人謂之萹竹煑汁與小兒飲療蚘蟲是也葴寒漿注今酸漿草江東呼曰苦葴音義葴之金反寒何干反疏葴一名寒漿郭云今酸漿草江東呼曰苦葴案本草酸漿一名醋漿陶注云處處人家多有葉亦可食子作房房中有子如梅李大皆黄赤色薢茩芵茪注芵明也葉黄銳赤華實如山茱萸或曰䔖也闗西謂之薢茩音義薢郭音皆一音古買反茩古口反秦人名䔖曰薢茩廣雅云䔖芰薢茩芵古穴反本亦作決茪古黄反茱常朱反萸羊朱反䔖字又作菱音陵疏藥草芵明也一名芵光一名芵明郭云葉黄鋭赤華實如山茱萸陶注本草云葉如茳芒子形似馬蹄呼為馬蹄決明廣雅謂之羊躑躅也或曰者案說文云䔖楚曰芰秦曰薢茩是也莁荑蔱蘠注一名白蕢音義莁亡符反讀者或常制反又户耕反荑羊而反蔱所黠反蘠在羊反蕢巨貴反疏莁荑一名蔱蘠郭云一名白蕢此草也案本草莁荑一名無姑一名䕋唐本注云爾雅莁荑一名蔱蘠今作䕋字之誤也而在木部疑非是或者與草同氣音殿䕋音唐瓞瓝其紹瓞注俗呼瓝瓜為瓞紹者瓜蔓緒亦著子但小如瓝音義瓞大結反詩云緜緜瓜瓞瓝步角反字林作㼎云小瓜也紹市沼反蔓音萬著丁畧反疏瓞一名瓝小瓜也紹繼也瓜之蔓紹緒先歳之瓜必小亦名瓞故云紹瓞詩大雅云緜緜瓜瓞舍人曰瓞名瓝小瓜也紹繼謂瓞子漢中小瓜曰瓞孫炎曰瓞小瓜子如瓝其本子小紹先歳之瓜曰瓞然則瓜之族類本有二種大者曰瓜小者曰瓞此則其種别也而瓜蔓近本之瓜必小於先歳之大瓜以其小如瓝故謂之瓞瓞是瓝之别名故郭云俗呼瓝為瓞紹者瓜蔓緒亦著子但小如瓝芍鳧茈注生下田苗似龍須而細根如指頭黑色可食音義芍户孑反鳬音扶茈本又作沈顧徂斯反謝徂咨反疏芍一名鳬茈郭云生下田中苗似龍須而細根如指頭黑色可食今俗瀹而䰞之者是也蘱薡蕫注似蒲而細音義蘱力愧反又力對反薡音頂蕫本或作董丁動反施音童疏蘱一名薡蕫狀似蒲而細可為屩亦可綯以為索蕛苵注蕛似稗布地生穢草音義蕛大兮反本又作稊莊子云道在稊稗是也苵大結反稗蒲賣反字林云禾别名也疏蕛一名苵似稗之穢草也布生於地莊子曰道在蕛稗是亦有米細小莊子又曰若蕛米之在太倉是也鉤芺注大如拇指中空莖頭有臺似薊初生可食音義鉤古侯反芺於表反又於老反拇音母薊音計疏薊類也一名鉤一名芺郭云大如拇指中空莖頭有臺似薊初生可食說文云味苦江南食以下氣是也䪥鴻薈注即䪥菜也音義䪥胡界反薈烏外反疏䪥葉似韭之菜也一名鴻薈本草謂之菜芝是也蘇桂荏注蘇荏類故名桂荏疏蘇荏類之草也以其味辛似荏一名桂荏陶注本草云葉下紫色而氣甚香其無紫色不香似荏者名野蘇生池中者名水蘇一名雞蘇皆荏類也薔虞蓼注虞蓼澤蓼音義薔師力反說文作薔云虞蓼也音色蓼音了疏薔一名虞蓼即蓼之生水澤者也周頌良耜云以薅荼蓼毛傳云蓼水草是也蓧蓨注未詳虋赤苗注今之赤粱粟芑白苗注今之白粱粟皆好穀秬黑黍注詩曰維秬維秠秠一稃二米注此亦黑黍但中米異耳漢和帝時任城生黑黍或三四實實二米得黍三斛八斗是音義蓧他彫反蓨他的反虋詩作糜字林亡昆反郭亡津反本亦作􅚂梁音良芑羌紀反秬音巨黒黍也或云今蜀黍也米白穀黑說文作或作粔字秠孚鄙反又孚丕反字林匹凡匹九夫九三反稃音敷本作殍竝同任音壬疏案詩大雅生民云誕降嘉種維秬維秠維糜維芑故此釋之也虋與糜音義同虋即嘉榖赤苗者郭云今之赤梁粟芑即嘉穀白苗者郭云今之白粱粟皆好穀也李廵曰黒黍一名秬黍秬即黒黍之大名也秠是黑黍之中一稃有二米者别名之為秠若然秬秠皆黒黍矣而春官鬯人注云釀秬為酒秬如黒黍一秠二米言如者以黒黍一米者多秬為正稱二米則秬中之異故言如以明秬有二等也秬有二等則二米亦可為酒鬯人之注必言二米者以宗廟之祭唯裸為重二米嘉異之物鬯酒宜當用之故以二米解鬯其實秬是大名故云釀秬為酒此云秠一稃二米鬯人注云一秬二米文不同者鄭志答張逸云秠即皮其稃亦皮也爾雅重言以曉人然則秠稃古今語之異故鄭引此文得以稃為秠也漢和帝時任城縣生黒黍或三四實實二米得黍三斛八斗是也稌稻注今沛國呼稌音義稌待古反又他古反詩云豐年多黍多稌為酒為醴禮記云牛宜稌羊宜黍本草云秔米主益氣止煩泄稻米主溫中令人多熱陶注云道家方藥有俱用稻米稉米此則是兩物云稻米糠白如霜今江東無通呼稉米為稻米耳不知其色類復云何案說文云沛國謂稻為穤秔稻屬也字林云穤黏稻也秔稻不黏者李登聲類亦以秔為不黏稻但江東人呼為稬字林曰稬乃亂反字林作穤北人呼為穤稉與粳皆俗秔字也音庚今稉穤甚相類但黏與不黏耳依說文穤即稻也沛音貝國名疏别二名也郭云今沛國呼稌詩周頌云豐年多黍多稌禮記内則云牛宜稌豳風七月云十月穫稻是一物也案說文云沛國謂稻為糯秔稻屬也字林云糯黏稻也秔稻不黏者本草以粳米稻米為二物秔與粳古今字然秔糯甚相類黏不黏為異耳依說文稌稻即糯也江東呼稬乃亂切葍藑茅注葍華有赤者為藑藑葍一種耳亦猶蔆苕華黄白異名音義葍音福藑巨營反又詳兖反種章勇反苕音條疏葍與藑茅一草也華白者即名華華赤者别名藑茅故郭云亦猶蔆苕華黄白異名也臺夫須注鄭箋詩云臺可以為禦雨笠音義臺字又作䑓同夫音扶箋即田反禦音語笠音立疏舍人云臺一名夫須詩小雅云南山有臺陸璣云舊說夫須莎草也可以為簔笠都人士云臺笠緇撮是也按箋者傳注之别名也以詩先有毛公作傳鄭𤣥釋其未備者字林云箋者表也識也鄭以毛學審備遵暢厥㫖所以表明毛意記識其事故特稱箋也都人士箋云都人之士以臺皮為笠此引其意非全文也藆藅注未詳莔貝母注根如小貝圓而白華葉似韭音義藆居輦反本亦作搴字藅音伐本又作罰莔亡庚反詩作蝱同本草云貝母一名空草一名藥實一名苦華一名苦菜一名商草一名勤母疏藥草貝母一名莔郭云根如小貝圓而白華葉似韭詩鄘風載馳云陟彼阿丘言采其蝱陸璣云蝱今藥草貝母也其葉如栝樓而細小其子在根下如芋子正白四方連累相著有分解也本草一名空草陶注云出近道形似聚貝子故云貝母是也荍蚍衃注今荆葵也似葵紫色謝氏云小草多華少葉葉又翹起音義荍祁堯反或巨遶反蚍婢夷反郭音疕衃本又作芣又作􅗶房尤反郭芳九反疏舍人云荍一名蚍􅗶郭云今荆葵也似葵紫色謝氏云小草多華少葉葉又翹起詩陳風云視爾如荍毛傳云芘芣也陸璣云芘芣一名荆葵似蕪菁華紫綠色可食微苦是也艾冰臺注今艾蒿音義艾五蓋反冰彼升反疏艾一名冰臺即今艾蒿也詩王風云彼采艾兮是也蕇亭歴注實葉皆似芥一名狗薺廣雅云音義蕇音典亭字或作葶同歴字或作藶廣雅云狗薺大室亭歴也本草云一名大室一名大適丁歴反一名丁歴一名蕇今江東人呼為公薺芥音界狗音苟疏蕇一名亭歴郭云實葉皆似芥廣雅又名狗薺本草一名丁歴一名大室一名大適陶注云今近道亦有母則狗薺子細黄至苦是也苻鬼目注今江東有鬼目草莖似葛葉圓而毛子如耳璫也赤色叢生音義璫音當疏苻一名鬼目郭云今江東有鬼目草莖如葛葉圓而毛子如耳璫也赤色叢生薜庾草注未詳蔜􅭚􅘚注今蘩􅘚也或曰雞腸草音義薜布麥反庾字或作謝羊主反孫音臾蔜五高反􅭚字或作䕅謝先老反沈施所留反本草呼為蘩􅘚蘩音煩􅘚字亦作縷力主反今蘩􅘚草疏蔜一名􅭚􅘚一名蘩􅘚一名雞腸草本草云蘩􅘚味辛陶注此菜人以作羹唐本注云此即雞腸草也多生下濕坑渠之側人家園庭亦有此草是也離南活莌注草生江南高丈許大葉莖中有瓤正白零陵人祖日貫之為樹音義離力知反活胡闊反莌字或作徒活反瓤女良反三蒼云瓜中子也日人一反疏離南草也一名活莌山海經又名冠脫生江南高丈許大葉而肥莖中有瓤正白者是也云零陵人祖日貫之為樹者祖且也貫事也言零陵郡人且日事之使科大若樹然也郭又注山海經云零桂人植而日灌之以為樹然所未詳蘢天蘥須葑蓯注未詳蒡隱荵注似蘇有毛今江東呼為隱荵藏以為葅亦可瀹食也音義蘢郭音聾施音龍蘥餘若反葑方孔反蓯音總蒡郭音彭又音旁荵音忍注同葅莊居反瀹餘若反字林云煮也本亦作汋音同後放此疏蒡蘇類菜也一名隱荵郭云似蘇有毛今江東呼為隱荵藏以為葅亦可瀹食者瀹煑也莤蔓于注多生水中一名軒于江東呼莤音義莤郭音由又音酉蔓或作曼通音萬疏莤水草也一名蔓于郭云一名軒于江東呼莤蓾蔖注作履苴草音義蓾音魯蔖施謝才古反郭才河采苦二反字林千古反苴將呂反一云將慮反字苑云苴履底疏蓾說文云蓾草也可以束一名蔖即蒯類也中作履底字苑云苴履底故云作履苴草也柱夫搖車注蔓生細葉紫華可食今俗呼曰翹搖車音義柱張縷反本或作拄同夫音扶或如字車尺蛇反又音居疏柱夫可食之草也一名摇車俗呼翹摇車蔓生紫華華翹起摇動因名云出隧蘧蔬注蘧蔬似土菌生菰草中今江東啖之甜滑音同氍㲣音義隧音遂蘧郭音氍巨俱反謝音渠蔬郭音山俱反謝音疎菌巨隕反菰音孤廣雅云蔣也啖大敢反甜徒謙反滑乎八反氊之延反本亦作旃同氍音衢又音渠字又作瞿㲣所俱反又所魚反疏菌類也一名出隧一名蘧蔬廣雅云朝生形如鬼蓋郭云似土菌生菰草中今江東啖之甜滑音同氍㲣者說文云菰蔣也張揖云氍㲣毛席取其音同蘄茝蘪蕪注香草葉小如萎狀淮南子云似蛇牀山海經曰臭如蘪蕪音義蘄巨斤反茝昌改昌敗二反本草云白芷一名白茝蘪忘悲反蕪亡符反本草蘪蕪一名薇蕪一名江蘺芎藭苗也陶注云葉似蛇牀而香萎於危反字林於偽反臭昌又反疏芎藭苗也一名蘄茝一名蘪蕪本草一名薇蕪一名江蘺陶注云似蛇牀而香郭云香草葉小如萎狀者言如萎蕤之狀也注淮南子云似蛇牀者案淮南子汜論篇云夫物之相類者世主之所亂惑也嫌疑肖像者衆人所眩耀也故狠者類知而非知也愚者類君子而非君子也戇者類勇而非勇也使人相去也若玉之與石也葵之與莧也則論人易矣夫亂人者若芎藭之與藁本蛇牀之與蘪蕪者許愼云此四者藥草臭味之相似惟治病則力不同是也云山海經曰臭如蘪蕪者案西山經浮山有草曰薰草麻葉而方莖赤華而黒實臭如蘪蕪可以止癘又天帝山有草其狀如葵其臭如蘪蕪曰杜衡可以走馬食之已癭是也臭香也言其香氣如蘪蕪也茨蒺藜注布地蔓生細葉子有三角刺人見詩音義茨徂咨反或作薋同蒺音疾藜音梨案本草蒺䔧一名旁通一名屈人一名止行一名豺羽一名升推一名即梨一名茨多生道上布地子及葉竝有刺狀如雞蓤刺七亦反見賢遍反後放此疏茨一名蒺藜郭云布地蔓生細葉子有三角刺人見詩者案詩小雅云楚楚者茨是也蘮蒘竊衣注似芹可食子大如麥兩兩相合有毛著人衣音義蘮居例反郭巨例反蒘女居反竊音切芹音勤著直畧反疏蘮蒘一名竊衣郭云似芹可食子大如麥兩兩相合有毛著人衣俗名鬼麥者也髦顚蕀注細葉有刺蔓生一名商棘廣雅云女木也音義髦音毛顚都年反蕀古力反疏髦一名顚蕀一名商蕀廣雅云女木也郭云細葉有刺蔓生雚芄蘭注雚芄蔓生斷之有白汁可啖音義雚郭音灌謝音官沈施音丸芄音桓蘭力丹反斷丁管反汁之什反疏雚一名是芄蘭郭云雚芄蔓生斷之有白汁可啖案如此注則以雚芄一名蘭或傳寫誤芄衍字詩衛風云芄蘭之支陸璣云一名蘿藦幽州人謂之雀瓢􅙛莐藩注生山上葉如韭一曰蝭母音義􅙛孫云古藫字徒南反說文云或作蕁字莐字或作䒞音直林反藩甫煩反又音煩郭云一名蝭母本草謂之知母一名蚔母一名連母一名野蓼一名地參一名水參一名貨母一名蝭母一名女雷一名女理一名兒草一名鹿列一名韭逢一名兒踵一名東根一名水須一名莐藩一名􅙛陶注云形似菖蒲而柔潤葉至難死掘出隨生須枯燥乃止堪治熱病亦主瘧疾疏藥草知母也一名􅙛一名莐藩郭云生山上葉似韭一名蝭母案本草此名之外更有十餘名文多不載陶注云形似菖蒲而柔潤葉至難死掘出隨生須枯燥乃止也蕍蕮注今澤蕮音義蕍羊朱反蕮本又作舄私夕反下同郭云今澤舄案本草云一名水舄一名及瀉一名芒芋陶注云葉狹而長叢生淺水中仙經服食用之令人身輕能歩行水上疏蕍一名蕮即藥草澤蕮也本草作澤瀉一名水瀉一名及瀉一名芒芋一名鵠瀉陶注云葉狹長叢生諸淺水中蔨鹿其實莥注今鹿豆也葉似大豆根黄而香蔓延生音義蔨謝其隕反郭巨阮反施其免反沈巨轉反鹿力斛反火郭反說文云菽之少也字又作藿莥女久其久二反蔓音萬延以戰反疏蔨一名鹿其實名莥郭云今鹿豆也葉似大豆根黄而香蔓延生本草云味苦唐本注云此草所在有之苗似豌豆有蔓而長大人取以為菜亦微有豆氣名為鹿豆也薃侯莎其實媞注夏小正曰薃也者莎䔺媞者其實音義薃胡老反莎先禾反媞尼兮反夏音下正之盈反䔺弋埀徂規二反廣雅云蓆也又云地毛莎䔺也本或作蓨他狄反疏薃即莎别名侯維也猶語辭也其實别名媞注夏小正者大戴禮之篇名本夏后氏著十二月之候也漢九江太守戴德記之謂之大戴禮記其正月云媞薃薃也者莎䔺也媞也者其實也先言媞而後言薃何也媞先見者也何以謂之小正以著名也案廣雅云地毛莎䔺也是䔺即莎也故云莎䔺莞苻蘺其上蒚注今西方人呼蒲為莞蒲蒚謂其頭臺首也今江東謂之苻蘺西方亦名蒲中莖為蒚用之為席音義莞本或作謝音官郭音桓字林音緩俗音闗蘺力知反本或作離蒚郭音翮又音歴疏某氏曰本草云白蒲一名苻蘺楚謂之莞蒲其上臺别名蒚郭義具注詩小雅斯干云下莞上簟鄭箋云莞小蒲也者以莞蒲一草之名而司几筵有莞筵蒲筵則有大小之異為席有精有粗故得為兩種席也荷芙蕖注别名芙蓉江東呼荷其莖茄其葉蕸其本蔤注莖下白蒻在泥中者其華菡蓞注見詩其實蓮注蓮謂房也其根藕其中的注蓮中子也的中薏注中心苦音義荷音河芙音苻本或作扶蕖音渠蓉音容莖戸耕反茄古牙反蕸字或作葭音遐又音加衆家竝無此句唯郭有然就郭本中或復脫此一句亦竝闕讀蔤亡筆反蒻音若菡戸感反蓞字又作􅣿徒感反說文云菡蓞花未𤼵也已𤼵名芙蓉張揖同亦曰芺蕖蓮力田反藕字亦作同五口反案本草云一名水芝丹的丁歴反又戸孑反或作菂同薏於力反疏李廵曰皆分别蓮莖華葉實之名芙蕖其總名也别名芙蓉江東呼荷菡蓞蓮華也的蓮實也薏中心也郭璞曰蔤莖下白蒻在泥中者今江東人呼荷華為芙蓉北方人便以藕為荷亦以蓮為荷蜀人以藕為茄或用其母為華名或用根子為母葉號此皆名相錯習俗傳誤失其正體者也陸璣疏云蓮靑皮裏白子為的的中有靑為薏味甚苦故里語云苦如薏是也詩陳風云彼澤之陂有蒲與荷又曰有蒲與蓮又曰有蒲菡蓞是也紅蘢古其大者蘬注俗呼紅草為蘢鼔語轉耳音義蘢力恭反又力公反蘬謝丘軌反郭巨龜反疏舍人曰紅名蘢古其大者名蘬詩鄭風云隰有游蘢毛云蘢紅草也陸璣云一名馬蓼葉大而赤白色生水澤中高丈餘郭云俗呼紅草為蘢鼓語轉耳蒫薺實注薺子味甘音義蒫才河反又子邪反疏本草云薺味甘人取其葉作菹及羹亦佳詩谷風云誰謂荼苦其甘如薺其子别名蒫黂枲實注禮記曰苴麻之有黂音義黂本或作蕡苻刃反或扶沸反枲息似反苴七徐反下同疏枲麻也黂者即麻子名也故云黂枲實也注禮記曰苴麻之有黂者儀禮喪服傳文也傳所以解經故亦謂之禮記也案喪服經云苴絰傳曰苴絰者麻之有黂者是也枲麻注别二名音義别彼列反疏麻一名枲故注云别二名禹貢靑州云厥貢岱畎絲枲是也須薞蕪注薞蕪似羊蹄葉細味酢可食音義薞音孫酢七故反疏案詩谷風云采葑采菲毛傳云葑須也先儒即以須葑蓯當之孫炎云須一名葑蓯今郭注上葑蓯云未詳注此云薞蕪似羊蹄葉細味酢可食則郭意以毛云葑須者謂此薞蕪也坊記注云葑蔓菁也陳宋之間謂之葑陸璣云葑蕪菁幽州人或謂之芥方言云蘴蕘蕪菁也陳楚謂之蘴齊魯謂之蕘闗西謂之蕪菁趙魏之郊謂之大芥蘴與葑字雖異音實同則葑也須也蕪菁也蔓菁也薞蕪也蕘也芥也七者一物也菲蒠菜注菲草生下溼地似蕪菁華紫赤色可食音義菲孚匪反又音妃蒠音息本又作息疏菲一名蒠菜案詩谷風云采葑采菲毛傳云菲芴郭上注菲芴云土瓜也注此云菲草生下溼地似蕪菁華紫赤色可食則是芴與蒠菜别草而某氏及陸璣以為一物非郭義也蕢赤莧注赤莧一名蕢今莧菜之赤莖者音義蕢字亦作巨愧反又苦怪反莧閑辦反蘠蘼虋冬注門冬一名滿冬本草云音義蘠音牆蘼亡彼反又作靡同虋音門本皆作門郭云門俗字亦作􅚂字山海經云條谷山其草多芍藥虋冬郭云本草一名滿冬案本草天門冬一名顚勒麥門冬秦名羊韭齊名愛韭楚名馬韭越名羊蓍一名禹葭一名禹餘糧葉如韭冬夏生無名滿冬者疏藥草也一名蘠蘼一名虋冬案山海經云條谷山其草多芍藥虋冬郭注亦云本草一名滿冬今檢本草有天門冬一名顚勒麥門冬秦名羊韭齊名愛韭楚名馬韭越名羊蓍一名禹葭一名禹餘糧無名滿冬者蓋所見本異也虋門字異音同耳萹苻止注未詳濼貫衆注葉圓銳莖毛黑布地冬不死一名貫渠廣雅云貫節音義萹匹緜反濼郭舒若反孫餘若反貫古亂反衆音終本草云貫衆一名貫節一名貫渠一名百頭一名虎卷一名萹苻一名伯藥一名藥藻所謂草鴟頭也爾雅萹苻止郭云未詳本草乃是貫衆疏藥草名也一名濼一名貫衆本草云一名貫節一名貫渠一名百頭一名虎卷一名萹苻一名伯萍一名藥藻此謂鴟頭陶注云葉如太蕨形色毛芒全似老鴟頭因名之郭氏云葉圓銳莖毛黒布地冬不死一名貫渠廣雅名貫節莙牛薻注似薻葉大江東呼為馬薻音義莙其隕反孫居筠反薻音早疏莙一名牛薻江東呼馬薻薻之葉大者也詩召南云于以采藻左傳云蘋蘩薀藻之菜以此草好聚生故言薀藻薀訓聚也毛傳云藻聚藻也陸璣云藻水草也生水底有二種其一種葉如雞蘇莖大如箸長四五尺其一種莖大如釵股葉如蓬蒿謂之聚藻又云扶風人謂之藻聚為發聲也此二藻皆可食煑熟挼去腥氣米麵糝蒸為茹嘉美揚州饑荒可以當穀食也蓫薚馬尾注廣雅曰馬尾蔏陸本草云别名薚今闗西亦呼為薚江東為當陸音義蓫他六反薚呂郭他羊反謝他唐反廣雅云馬尾蔏陸也郭云江東呼為當陸一名薚根一名夜呼如人形者冇神蔏音商本亦作商疏藥草蔏陸也一名蓫薚一名馬尾郭云廣雅曰馬尾薚陸本草云别名薚今闗西呼為薚江東為當陸案本草蔏陸一名薚根一名夜呼不同者所見本異也今注云一名白昌一名當陸是也萍蓱注水中浮萍江東謂之薸其大者蘋注詩曰于以采蘋音義萍音平蓱音瓶薸郭音瓢婢遥反廣雅云藻蓱也蘋毗人反說文作薲疏舍人曰萍一名蓱大者名蘋郭曰水中浮蓱江東謂之薸陸璣毛詩義疏云今水上浮萍是也其粗大者謂之蘋小者曰蓱季春始生可糝蒸為茹又可苦酒淹以就酒注詩曰于以采蘋召南采蘋篇文也莃莬葵注頗似葵而小葉狀如黎有毛汋啖之滑音義莃虛祈反莬湯故反葵夬唯反汋以灼反疏莃一名莬葵郭云頗似葵小葉狀如藜有毛汋啖之滑者汋煑也案本草唐本注云苗如石龍苪葉光澤花白似梅莖紫色煑汁極滑堪噉爾雅釋草一名莃所在平澤皆冇田間人多識之是也芹楚葵注今水中芹菜疏郭云今水中芹菜案本草云水芹一名水英陶注云二月三月作英時可作葅及瀹食之又有渣芹可為生菜亦可生噉别本注云芹有兩種荻芹取根白色赤芹取莖葉竝堪作葅及生菜是也渣音樝藬牛蘈注今江東呼草為牛蘈者高尺餘許方莖葉長而銳有穗穗間有華華紫縹色可淋以為飲音義藬吐回反蘈大回反穗音遂說文作采云禾成秀人所收也穗俗字廣雅云采䆃采也縹匹眇反又匹妙反字林云青白色淋音林字林云以水沃也疏藬一名牛蘈詩小雅云言采其蓫鄭箋云蓫牛蘈郭云今江東呼草為牛蘈者高尺餘許方莖葉長而銳有穗穗間有華華紫縹色可淋以為飲者字林云縹青白色淋以水沃也藚牛脣注毛詩傳曰水蕮也如藚斷寸寸有節拔之可復音義藚音續脣音脣蕮音昔疏李廵曰别二名郭云如續斷寸寸有節陸璣以為今澤蕮也郭氏所不取詩魏風汾沮洳云彼分一曲言采其藚毛傳云藚水蕮是也苹藾蕭注今藾蒿也初生亦可食音義苹皮英反藾力大反疏苹一名藾蕭郭云今藾蒿也初生亦可食詩小雅云呦呦鹿鳴食野之苹陸璣云葉青白色莖似箸而輕肥始生香可生食又可蒸食也連異翹注一名連苕又名連草本草云音義翹字亦作翹祁饒反本草連翹一名異翹一名軹一名蘭華一名折根一名三廉苕音條疏連一名異翹郭云一名連苕又名連草本草云者案今本草連翹一名異翹一名蘭華一名析根一名軹一名三廉不同者所見本異也唐本注云此物有兩種大翹小翹大翹葉狹長如水蘇花黄可愛生下濕地著子似椿實之未開者作房翹出衆草其小翹生岡原之上葉花實皆似大翹而小細耳是也澤烏蘾注即上蘾也疏即上蘾生於水澤者然形所未詳傅横目注一名結縷俗謂之鼓箏草音義傅音付横如字胡彭反或音黄縷本亦作􅘚力主反箏側耕反疏傅一名横目草蔓延生郭云一名結縷俗謂之鼔箏草是也釐蔓華注一名蒙華音義釐力基反䝉亡公反疏釐一名蔓華郭云一名蒙華蓤蕨攗注蓤今水中芰音義蓤字又作菱力矜反蕨居月反攗亡悲反孫居郡反又居羣反芰巨義反字林云楚人名蓤曰芰疏蓤一名蕨攗郭云蓤今水中芰者字林云楚人名蓤曰芰可食國語曰屈到嗜芰俗云蓤角是也大菊蘧麥注一名麥句薑即瞿麥音義菊居六反蘧音渠或音劬字或作遽音同麥字亦作麦郭云蘧麥一名麥句薑即瞿麥廣雅云茈萎麥句薑蘧麥本草瞿麥一名巨句麥一名大菊一名大蘭陶注云一莖生細葉華紅紫赤可愛瞿求于反疏大菊一名蘧麥藥草也郭云一名麥句薑即瞿麥廣雅云茈萎麥句薑瞿麥案本草云瞿麥一名巨句麥一名大菊一名大蘭陶注云今出近道一莖生細葉花紅紫赤可愛子頗似麥故名瞿麥薜牡注未詳葥山莓注今之木莓也實似藨莓而大亦可食音義薜彼麥反牡亡后反子旦反葥子賤反莓音每又音梅後注同藨皮苗反又皮表反疏山莓一名葥郭云今之木莓也實似藨莓而大亦可食藨莓說在下齧苦堇注今堇葵也葉似柳子如米汋食之滑音義齧五結反堇音謹汋以灼反疏齧一名苦堇可食之菜也郭云今堇葵也葉似桞子如米汋食之滑者本草唐本注云此菜野生非人所種俗謂之莖菜葉似蕺花紫色者内則云堇荁枌榆是也本草云味甘此云苦者古人語倒猶甘草謂之大苦也藫石衣注水苔也一名石髪江東食之或曰藫葉似䪥而大生水底亦可食音義藫徒南反苔徒來反或大之反郭云一名石髪水青衣也底丁禮反疏藫一名石衣郭云水苔也一名石髪江東食之者案本草有陟釐别本注云此即石髪也色類苔而麄澀為異郭又云或曰藫葉似䪥而大生水底亦可食者即本草海藻一名藫陳藏器本草云大葉藻也生深海中及新羅葉如水藻而大海人取之正在深海底以繩繫腰因没水下刈得旋繫繩上五月已後當有大魚傷人不可取也蘜治蘠注今之秋華菊音義蘜字或作菊居六反說文云蘜治牆也又作鞠云日精也疏蘜一名治蘠郭云今之秋華菊案月令季秋云菊有黄花本草云菊華一名節華陶注云菊有兩種一種莖紫氣香而味甘葉可作羹而食者為眞一種莖青而作蒿艾氣味苦不堪食者名苦薏非眞也唐蒙女蘿女蘿莬絲注别四名詩云爰采唐矣音義蘿音羅别彼列反疏孫炎曰别三名郭云别四名則唐與蒙或幷或别故三四異也詩經直言唐而傳云唐蒙也是以蒙解唐也則四名為得下云蒙玊女郭云即唐也是又名玉女然則唐也蒙也女蘿也莬絲也玉女也凡五名詩頍弁云蔦與女蘿毛傳云女蘿莬絲陸璣云今莬絲蔓連草上生黄赤如金今合藥莬絲子是也注詩云爰采唐矣鄘風桑中篇文也苗蓨注未詳茥蒛葐注覆葐也實似莓而小亦可食音義苗郭他六反又徒的反說文云從由聲蓨郭湯彫他周二反顧他廸反茥苦圭反蒛去悅反葐步昆反覆芳服反疏茥一名蒛葐郭云覆葐也實似莓而小亦可食案本草蓬虆一名覆葐一名陵虆一名陰虆其實名覆盆子今注云蓬虆是覆盆之苗也覆盆乃蓬虆之子也唐本注云然生處不同沃地則子大而甘瘠地則子細而酸者是也芨堇草注即烏頭也江東呼為堇音義芨居及反又起及反堇音謹下注同郭音靳居覲反即烏頭也案本草蒴藋一名堇草一名芨非烏頭也疏芨一名堇草郭云即烏頭也江東呼為堇音靳案詩大雅云堇荼如飴又晉語驪姬將譛申生寘鴆於酒寘堇於肉賈逵曰堇烏頭也然則堇者其烏頭乎嫌讀為堇草之堇故音之虃百足注未詳菺戎葵注今蜀葵也似葵華如木槿華音義虃息廉子廉二反菺古田反疏菺一名戎葵郭云今蜀葵也似葵華如木槿華戎蜀蓋其所自也因以名之蘻狗毒注樊光云俗語苦如蘻音義蘻郭音古系反又苦系反狗音苟疏蘻一名狗毒樊光云俗語苦如蘻樊光者京兆人後漢中散大夫注爾雅六卷故郭氏取以為說埀比葉注未詳蕧盜庚注旋蕧似菊音義蕧郭音服施孚服反郭云旋蕧也本草云一名金沸草一名盛椹一名戴葚陶注云花似菊花而大庚本又作羹同古衡反疏蕧一名盜庚郭云旋蕧似菊本草旋蕧一名戴椹一名金沸草一名盛椹陶注云出近道下濕地似菊花而大是也莩麻母注苴麻盛子者音義莩音孚苴七徐反盛音成疏苴麻之盛子者也一名莩一名麻母瓝九葉注今江東有草五葉共叢生一莖俗因名為五葉即此類也音義瓝歩角反舍人云瓝九葉九枚共一莖樊本瓝字作駮釋云駮也一名九葉疏此草九葉叢生一莖然郭亦未詳其狀但舉其類云今江東有草五葉共叢生一莖俗因名為五葉即此類也藐茈草注可以染紫一名茈䓞廣雅云音義藐亡角反又亡校反茈子爾反䓞力計反疏藐一名茈草根可以染紫之草廣雅一名茈䓞本草一名紫丹唐本注云苗似蘭香莖赤節青花紫白色而實白也倚商活脫注即離南也蘵黄蒢注蘵草葉似酸漿華小而白中心黄江東以作葅食音義倚謝於綺反或其綺反舍人作猗音同活如字孫咅括脫徒活反字又作莌蘵字又作職諸弋反蒢直居反疏蘵草一名黄蒢郭云蘵草似酸漿華小而白中心黄江東以作葅食藒車芞輿注藒車香草見離騷音義藒去竭反謝起例反郭去謁反車音居本多無此字芞謝去訖反沈又虛訖反輿字或作藇音餘唯郭謝及舍人本同衆家竝作蒢疏香草也一名藒車一名芞輿郭云藒車香草見離騷者離騷云畦留夷與藒車兮雜杜衡與芳芷是也權黄華注今謂牛芸草為黄華華黄葉似蓿音義權其圓反芸音云音目本亦作目蓿音肅疏權一名黄華郭云今謂牛芸草為黄華華黄葉似蓿說文亦云芸草也似苜蓿淮南子說芸草可以死復生月今注云芸香草也雜禮圖曰芸蒿也葉似邪蒿香美可食然則牛芸者亦芸類也郭以時驗而言之故云今謂牛芸草為黄華也葞春草注一名芒草本草云音義葞彌爾反疏藥草也郭云一名芒草本草云者案本草芒草一名葞一名春草陶注云今是處皆有葉青辛烈者良今俗呼為菵草也郭云芒草者所見本異也蔠葵蘩露注承露也大莖小葉華紫黄色音義蘩音煩疏葵類一名蔠葵一名蘩露郭云承露也大莖小葉華紫黄色菋荎藸注五味也蔓生子叢在莖頭音義菋音味又亡戒反荎直其反藸音除疏藥草也一名菋一名荎藸郭云五味也蔓生子叢生莖頭案本草五味子一名會及一名𤣥及唐本注云五味皮肉甘酸核中辛苦都有鹹味此則五味具也其葉似杏而大蔓生木上子作房如落葵大如蘡子蒤委葉注詩云以茠蒤蓼音義蒤音徒委於詭反或於危反字或作羹同茠本或作薅火羔反又作同說文茠或作薅字蓼音了疏穢草也舍人曰蒤一名委葉王肅說詩云荼陸穢草然則蒤者原田蕪穢之草非苦菜也詩云以茠蒤蓼此周頌良耜篇文茠耘除也今詩本茠作薅音義同皇守田注似燕麥子如彫胡米可食生廢田中一名守氣疏皇一名守田郭云似燕麥子如彫胡米可食生廢田中一名守氣彫胡即苽也鉤姑注鉤􅕕也一名王瓜實如瓝瓜正赤味苦音義鉤古侯反本或作暌顧謝同音圭孫苦圭反鉤一作五侯反􅕕力侯反字林云􅕕王瓜也疏鉤一名姑一云鉤􅕕也一名王瓜實如瓝瓜正赤味苦本草云王瓜一名土瓜陶注云即今土瓜生籬院亦有子熟時赤如彈丸根大唐本注云此物蔓生葉似栝樓圓無义缺子如梔子生青熟赤但無稜爾根似葛細而多糝是也望椉車注可以為索長丈餘音義椉本又作乘施音繩謝市證反索悉各反下同疏望一名椉車郭云可以為索長丈餘困衱袶注未詳欔烏階注即烏杷也子連相著狀如杷齒可以染皁音義衱居業反袶施音絳孫蒲空反欔沈居縛反杷白麻反字從木下同著直畧反皁音造疏欔一名烏階郭云即烏杷也子連相著狀如杷齒可以染皁今俗謂之狼杷是也杜土鹵注杜衡也似葵而香音義杜郭云杜衡也似葵而香案本草云杜衡味辛香人衣體陶注云根葉都似細辛唯氣小異耳本草經又有杜若一名杜衡陶注云葉似薑根亦似高良薑而細氣味辛香又絶似旋蕧根殆欲相亂如陶之言二種竝不似葵或恐郭誤耳土他覩反鹵音魯衡字或作蘅音行疏香草也一名杜一名土鹵郭云杜衡也似葵而香本草唐本注云杜衡葉似葵形如馬蹄故俗云馬蹄香生山之陰水澤下濕地根似細辛白前等山海經云天帝山有草其狀如葵其臭如麋蕪名曰杜衡可以走馬食之已癭是也盱虺牀注蛇牀也一名馬牀廣雅云音義盱香于反又音于虺虛鬼反郭云蛇牀也廣雅云一名馬牀本草云蛇牀子一名蛇粟一名蛇米一名虺牀一名思益一名繩毒一名棗棘一名牆蘼陶注云華葉正似蘪蕪疏盱一名虺牀郭云蛇牀也一名馬牀廣雅云案本草蛇牀一名蛇米一名虺牀一名思益一名繩毒一名棗棘一名牆蘼陶注云近道田野墟落間甚多花葉正似蘼蕪蔝蔜注未聞赤枹薊注即上枹薊莬奚顆涷注款冬也紫赤華生水中音義蔝音米蔜樊本作蔝蔜麥音五刀反枹音包又音浮薊音計顆苦果反或音款涷謝音東施都弄反讀者亦音冬郭云款涷也生水中案本草云款冬一名槖吾一名顆涷一名虎鬚一名莬奚一名氐冬陶注云其冬月在冰下生則應是冬恐承音作字異耳疏藥草也一名莬奚一名顆涷郭云款涷也紫赤莖生水中案本草款冬一名槖吾一名顆涷一名虎鬚一名莬奚陶注云形如蓿蓴未舒者其腹裏有絲其花乃似大菊花唐本注云葉似葵而大叢生花出根下是也中馗菌注地蕈也似蓋今江東名為土菌亦曰馗厨可啖之小者菌注大小異名音義馗求龜反郭音仇字則當作頄舍人本作中鳩云莬奚名顆東顆東名中鳩菌郭巨隕反孫去貧反蕈亂荏反案今人呼菌為蕈葛洪字茹同云世作椹二字非也字林式甚反或云桑䓴也沈徒感反䓴人萒反疏此辨菌大小之異名也大者名中馗小者即名菌郭云地蕈也似蓋今江東人名為土菌亦曰馗厨可啖之者說文云蕈桑䓴也謂菌生木上也今云地蕈即俗呼地菌者是也菆小葉注未聞苕陵苕注一名陵時本草云黄華蔈白華茇注苕華色異名亦不同音義菆豬葉反又阻留反苕徒舟反下同蔈必遥反茇郭音沛補蓋反又音撥說文云草之白華為茇音布末反疏苕一名陵苕本草一名陵時舍人曰苕陵苕也黄華名蔈白華名茇别花色之名也陸璣疏云一名䑕尾生下濕水中七八月中華紫似今紫草可染皁煑以沐髪即黑詩小雅云苕之華芸其黄矣鄭箋云陵苕之華紫赤而繁陸璣亦言其華紫色而此云黄白者蓋就紫色之中有黄紫白紫耳及其將落則全變為黄故詩云芸其黄矣毛傳云將落則黄是也蘪從水生注生於水中音義蘪亡悲反蘪草生江水中疏草從水生者曰蘪故注云生於水中薇垂水注生於水邊音義薇音微又音眉顧云水濱生故曰垂水疏草生於水濱而枝葉垂於水者曰薇故注云生於水邊也薜山麻注似人家麻生山中音義薜卑麥反疏麻生山中者名薜故注云似人家麻生山中也莽數節注竹類也節間促桃枝四寸有節江今桃枝節間相去多四寸粼堅中注竹類也其中實簢筡中注言其中空竹類仲無笐注亦竹類未詳䈚箭萌注萌筍屬也周禮曰䈚菹鴈醢篠箭注别二名音義莽莫朗反數色角反數猶促也促七玊反粼字又作􅀢音吝又音鱗簢字或作宻謹反又亡忍反筡郭音徒又音攄施音儲笐本又作亢户剛反䈚音待說文云竹萌生也字林大才反萌亡耕反筍思尹反菹側於反醢音海篠思了反字林作筱云小竹也别彼列反疏此辨竹節希數及中空實萌篠之異名也凡竹節間促數者名莽相去四寸有節者名桃枝竹其中堅實者名粼其中空者名簢筡空中仲無笐注未詳䈚一名箭萌即筍也篠一名箭書曰篠簜既敷釋地云會稽之竹箭是也郭云今桃枝節間相去多四寸者郭以時驗而言也尚書顧命云敷重篾席孔安國云篾桃枝竹周禮春官司几筵云加次席黼純鄭注云次席桃枝席有次列成文是也注周禮曰䈚菹鴈醢者天官醢人職文也彼文作箈鄭𤣥注云箈箭萌字雖異音義同枹霍首素華軌鬷注皆未詳芏夫王注芏草生海邊似莞藺今南越人采以為席音義枹音包霍戸各反素蘇故反又作索鬷子工反郭音總芏郭他古反案今南人以此草作席呼為芏音杜夫謝方于反孫音苻莞古丸反字又作雚誤藺力刃反字林云莞屬也疏芏草一名夫王郭云芏草生海邊似莞藺今南越人采以為席藄月爾注即紫藄也似蕨可食音義藄郭音其紫藄菜也說文云藄芏夫也或作萁非也案說文云萁豆莖施謝竝音其蕨音厥疏藄一名月爾可食之菜也郭云即紫藄也似蕨可食葴馬藍注今大葉冬藍也音義葴之林反又音咸藍力甘反疏葴一名馬藍郭云今大葉冬藍也今為澱者是也姚莖涂薺注未詳芐地黄注一名地髓江東呼芐音義莖謝户耕反施郭於耕反涂音徒芐音戸本草地黄一名地髓一名芐一名芑髓素累反疏藥草也郭云一名地髓江東人呼芐案本草地黄一名地髓一名芐一名芑陶注云生渭城者乃有子實實如小麥蒙玊女注蒙即唐也女蘿别名㧞蘢葛注似葛蔓生有節江東呼為龍尾亦謂之虎葛細葉赤莖音義拔步八反蘢力恭反疏拔一名蘢葛葛類也郭云似葛蔓生有節江東呼為龍尾亦謂之虎葛細葉赤莖藗牡茅注白茅屬音義藗音速牡木后反茅亡交反疏茅之不實者也一名藗一名牡茅郭云白茅屬菤耳苓耳注廣雅云枲耳也亦云胡枲江東呼為常枲或曰苓耳形似䑕耳叢生如盤音義菤謝作卷九轉反耳詩卷耳是也本草作枲耳云一名胡枲一名地葵一名葹一名常思陶注云一名羊負來昔中國無此物言從外國逐羊毛中來也廣雅云苓耳蒼耳葹常枲胡枲之類耳苓音零枲音死疏菤耳一名苓耳郭云廣雅云枲耳也亦云胡枲江東呼為常枲或曰苓耳形似䑕耳叢生如盤詩周南云采采卷耳陸璣疏云葉青白色似胡荽白華細莖蔓生可煑為茹滑而少味四月中生子如婦人耳璫幽州謂之爵耳是也蕨􅣀注廣雅云紫綦非也初生無葉可食江西謂之虌音義􅣀卑滅反字亦作鱉案此即今蕨菜也葉初出鱉蔽因以名云廣雅云紫藄非也疏可食之菜也舍人曰蕨一名虌郭云廣雅云紫綦非也初生無葉可食江西謂之虌詩召南云言采其蕨陸璣疏云蕨山菜也初生似蒜莖紫黑色可食如葵是也蕎邛鉅注今藥草大㦸也本草云音義蕎居喬反又音喬卬巨恭反鉅音巨案本草云大㦸一名卬鉅今近道處處有㦸九逆反疏蕎一名卬鉅郭云今藥草大㦸也本草云者案本草大㦸一名卬鉅苗名澤漆陶注云今近道處處有生時摘葉有白汁故名澤漆也繁由胡注未詳莣杜榮注今芒草似茅皮可以為繩索履屩也音義繁音煩莣音亡字亦作芒杜徒土反舍人作牡屩大畧反疏芒草一名杜榮郭云今芒草似茅皮可以為繩索履屩也者屩草履也稂童粱注稂莠類也音義稂音郎說文云禾粟之莠生而不成者莠羊久反詩云不稂不莠疏舍人曰稂一名童粱郭云稂莠類也詩曹風云浸彼苞稂陸璣疏云禾秀為穗而不成崱嶷然謂之童粱今人謂之宿田翁或謂之守田也大田云不稂不莠外傳曰馬不過稂莠皆是也藨麃注麃即莓也今江東呼為藨莓子似覆盆而大赤酢甜可啖音義藨謝蒲苗反或力驕反孫蒲矯反字林工兆反顧平表白交普苗三反麃謝蒲表反郭又苻囂反覆芳伏反酢七故反甜大廉反疏藨一名麃郭云麃即莓也今江東人呼為藨莓子似覆盆而大酢甜可啖的薂注即蓮實音義的丁歴反薂字又作敫户歴反疏的又一名薂即上釋荷云其實蓮其中的也故郭云即蓮實購蔏蔞注蔏蔞蔞蒿也生下田初出可啖江東用羹魚音義購古豆反又古侯反蔏音商蔞孫力朱反郭力侯反注同疏舍人曰購一名蔏蔞郭云蔏蔞蔞蒿也生下田初出可啖江東用羹魚詩周南漢廣云翹翹錯薪言刈其蔞陸璣疏云其葉似艾白色長數寸高丈餘好生水邉及澤中正月根牙生旁莖正白生食之香而脆美其葉又可蒸為茹是也茢勃茢注一名石芸本草云音義施謝二茢皆音列沈上音例下音列勃蒲没反疏茢一名勃茢郭云一名石芸本草云者案本草石芸味甘一名螫烈一名顧喙是也葽繞蕀蒬注今遠志也似麻黄赤華葉銳而黄其上謂之小草廣雅云音義葽烏了反蕀居力反蒬於袁反又於阮反廣雅云蕀蒬遠志也其上謂之小草案本草遠志一名蕀蒬一名葽繞一名細草遠志字又作薳䓌非疏藥草也葽繞一名蕀蒬郭云今遠志也似麻黄赤華葉銳而黄其上謂之小草廣雅云者案本草遠志一名細草其葉名小草陶注云小草狀如麻黄而青今注云遠志莖葉似大青而小廣雅云蕀蒬遠志也其上謂之小草是也茦刺注草刺針也闗西謂之刺燕北朝鮮之間曰茦見方言音義茦初革反方言云凡草木而刺人者北燕朝鮮之間謂之茦刺字又作㓨又作莿七賜反注同方言云闗西呼茦壯為莿朝直遥反鮮音仙疏謂草針刺人也一名茦又名刺郭云草刺針也闗西謂之刺燕北朝鮮之間曰茦見方言者案方言凡草木刺人北燕朝鮮之間謂之茦或謂之壯自闗而東或謂之梗或謂之劌自闗而西謂之刺江湘之間謂之棘是也蕭荻注即蒿音義荻音狄疏李廵云荻一名蕭陸璣云今人所謂荻蒿者是也或云牛尾蒿似白蒿白葉莖麄科生多者數十莖可作燭有香氣故祭祀以脂爇之為香許慎以為艾蒿非也郊特牲云既奠然後爇蕭合馨香是也􅙛海薻注藥草也一名海蘿如亂髪生海中本草云音義􅙛徒南反薻子老反本亦作藻本草一名落首一名􅙛郭云一名海蘿疏􅙛又名海薻郭云藥草也一名海蘿如亂髮生海中本草云者案本草一名落首一名藫陶注云生海島上黒色如亂髮而大少許葉大都似藻葉長楚銚芅注今羊桃也或曰鬼桃葉似桃華白子如小麥亦似桃音義長耳良反銚羊招反或羊召反字或作芅音翼字亦作弋麥亡革反疏舍人曰長楚一名銚芅本草云銚芅名羊桃郭云今羊桃也或曰鬼桃葉似桃華白子如小麥亦似桃詩檜風隰有萇楚陸璣疏云今羊桃是也葉長而狹華紫赤色其枝莖弱過一尺引蔓于草上今人以為汲灌重而善沒不如楊柳也近下根刀切其皮著熱灰中脫之可韜筆管蘦大苦注今甘草也蔓延生葉似荷青黄莖赤有節節有枝相當或云蘦似地黄音義蘦詩作苓力丁反蔓音萬延餘見反疏藥草也蘦一名大苦郭云今甘草也蔓延生葉似荷青黄莖亦有節節有枝相當或云蘦似地黄詩唐風云采苓采苓首陽之巅是也蘦與苓字雖異音義同芣苢馬舄馬舄車前注今車前草大葉長穗好生道邊江東呼為蝦蟆衣音義芣音浮苢字亦作苡音以見詩說文云芣苢馬扁也其實如李令人宜子周書所說舄四夕反車昌遮反穗音遂好呼報反蝦音遐蟆字又作蟇亡巴反本草云車前一名當道一名芣苢一名蝦蟆衣一名牛遺一名勝舄久服令人身輕不老疏藥草也别三名郭云今車前草大葉長穗好生道邉江東呼為蝦蟆衣詩周南云采采芣苢陸璣疏云馬舄一名車前一名當道喜在牛跡中生故曰車前當道也今藥中車前子是也幽州人謂之牛舌草可鬻作茹大滑其子治婦人產難王肅引周書王㑹云芣苢如李出於西戎王基駮云王㑹所記雜物竒獸皆四夷遠國各齎土地異物以為貢贄非周南婦人所得采是芣苢為馬舄之草非西戎之木也綸似綸組似組東海有之注綸今有秩嗇夫所帶糾青絲綸組綬也海中草生彩理有象之者因以名云帛似帛布似布華山有之注草葉有象布帛者因以名云生華山中音義綸古頑反下同組作古反下同秩直乙反嗇音色疏此辨草似綸組布帛者以其所似因名其草也綸是糾青絲繩也組綬也東海有草文理似之即名綸草組草華山有草葉似帛布者因名帛草布草也案漢書百官公卿大夫表云十里一亭十亭一鄉鄉有三老有秩嗇夫有游徼三老掌敎化嗇夫掌獄訟游徼掌禁盜賊故漢書云張敞以鄉有秩補太守卒史又云朱邑為桐鄉嗇夫又續漢書百官表云鄉置有秩三老游徼有秩郡所置秩百户其鄉小者縣所置嗇夫案此則有秩嗇夫職同但隨鄉大小故名異耳名雖異皆糾青絲為綸以帶佩之則同至東晉尚然故郭云今也張華云綸如宛轉繩苀東蠡注未詳緜馬羊齒注草細葉葉羅生而毛有似羊齒今江東呼為鴈齒繅者以取繭緒音義苀户剛反本亦作芫蠡音禮緜武延反繅先刀反字林云繹繭也本亦作繰又作縿非也繰宜音干少反縿音所銜反繭古典反張揖云繭纊新緜疏緜馬一名羊齒郭云草細葉葉羅生而毛有似羊齒今江東人呼為鴈齒繅者以取繭緒者說文云繅澤繭為絲也緒絲端也以此草似羊齒而毛故繅者用之以取繭緒也萿麋舌注今麋舌草春生葉有似於舌音義萿古活反麋音眉疏萿草春生葉似麋舌故萿一名麋舌郭云今麋舌草春生葉有似於舌搴柜朐注未聞蘩之醜秋為蒿注醜類也春時各有種名至秋老成皆通呼為蒿音義搴施居展反謝去䖍反柜音巨朐巨俱反種章勇反疏醜類也此言蘩蕭莪之類春始生氣味既異故其名不同至秋老成則皆蒿也郭云醜類也春時各有種名至秋老成皆通呼為蒿也芺薊其實荂注芺與薊莖頭皆有蓊臺名荂即其實也音義芺沈顧烏老反謝烏兆反說文云味苦江東食以下氣薊音計荂香于芳于二反下同注音俘同蓊烏孔反疏鉤芺枹薊之類其實名荂郭云芺與薊莖頭皆有蓊臺名荂荂即其實也蔈荂荼注即芀猋藨芀注皆芀荼之别名方俗異語所未聞音義蔈芳腰反又必招反荼郭音徒又音蛇猋必遥反又方瓢反又方么反字從三犬俗從三火非也焱字林弋劍反云火花也藨郭方驕反謝苻苗反一音皮兆反芀徒彫反字或作苕下同疏此辨芀荼之别名也案鄭注周禮掌荼及詩有女如荼皆云荼茅秀也蔈也荂也其别名荼即芀也芀又一名猋又名藨皆萑茅之屬華秀名也故注云皆芀荼之别名方俗異語所未聞言未聞者謂未聞其所出也葦醜芀注其類皆有芀秀音義葦于鬼反謝于歸反疏葦即蘆之成者其類皆有芀秀也葭華注即今蘆也蒹薕注似萑而細高數尺江東呼為薕葭蘆注葦也菼薍注似葦而小實中江東呼為烏蓲其萌虇注今江東呼蘆筍為虇然則萑葦之類其初生者皆名虇音繾綣音義葭音加蒹古謙反薕力占反萑音桓字林作雚數所主反菼他敢反說文作􅫠云菼或􅫠字薍五患反蓲郭音丘說文云烏蓲草也張揖云未秀曰烏蓲虇郭音綣丘阮反本或作非音權說文云曲弓也繾弃善反或去忍反疏此辨蒹葭等生成之異名也葭一名華即今蘆也葦之未成者蒹一名蒹郭云似萑而細高數尺江東呼為薕案詩秦風云蒹葭蒼蒼陸璣云蒹水草也堅實牛食令牛肥彊青徐人謂之薕兖州遼東通語也葭一名蘆菼一名薍李巡曰分别葦類之異名郭云蘆葦也菼似葦而小實中江東呼為烏蓲如李巡云蘆薍共為一草如郭云則蘆薍别草案詩大車傳云菼鵻也蘆之初生則毛意亦以葭菼為一草也案詩衞風碩人云葭菼揭揭陸璣云薍或謂之荻至秋堅成則謂之萑其初生三月中其心挺出其下本大如箸上銳而細揚州人謂之馬尾以今語驗之則蘆薍别草也其萌名虇郭云今江東人呼蘆筍為虇然則萑葦之類其初生者皆名虇注音繾綣者大雅民勞云以謹繾綣昭二十五年左傳云繾綣從公無通外内此取虇與繾字音同不為義也蕍芛葟華榮注釋言云華皇也今俗呼草木華初生者為芛音䝐豬蕍猶敷蕍亦華之貌所未聞音義蕍羊朱反芛郭音䝐羊棰反顧羊述反謝私尹反樊本作葦葟音皇本亦作皇疏此别草木榮華之異名也蕍言華之敷貌芛華初生之名也葟華單也所未聞云未聞者亦未聞所出也注音䝐豬者釋獸云䝐豶郭云俗呼小豶豬為䝐子此亦取芛與䝐音同其義則異也卷施草拔心不死注宿莽也離騷云音義卷施竝如字施或作葹同疏卷施草一名宿莽拔其心亦不死也案離騷經云朝搴阰之木蘭兮夕擥中洲之宿莽王逸云草冬生不死者楚人名之曰宿莽荺茭注今江東呼藕經緒如指空中可啖者為茇茭即此類音義荺于閔反茭字又作䒝胡巧反又胡交反廣雅云根也藕五口反啖大敢反疏荺一名茭謂草根可食者也亦笋類也非一種故郭氏舉類以曉人云今江東呼藕經緒如指空中可食者為茇茭即此類是也荄根注别二名俗呼韭根為荄音義荄顧謝音該郭音皆說文云草根也别彼列反韭音久疏凡草根一名荄郭云别二名俗呼韭根為荄此舉一隅也檴槖含注未詳音義檴俱縳反槖音託華荂也注今江東呼華為荂華荂榮也注轉相解木謂之華草謂之榮不榮而實者謂之秀榮而不實者謂之英音義荂音香于芳于二反下同說文云草木華也不榮衆家竝無不字郭雖不音注而音義引不榮之物證之則郭本有不字疏李巡云分别異名以曉人也華一名荂郭云今江東呼華為荂又一名榮郭云轉相解木則名華月令季春桐始華草則名榮月令仲夏木槿榮此對文爾散文則草亦名華鄭風云隰有荷華是也不見其榮但見其實者曰秀詩大雅云實秀實發有其榮而不實者曰英此亦對文爾故以英為不實其實黍稷皆先榮後實詩小雅出車云黍稷方華是嘉穀之秀必有榮也爾雅注疏卷八
