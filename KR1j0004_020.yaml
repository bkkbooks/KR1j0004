body:
  text: 爾雅注疏卷十考證釋魚第十六鰋注今鰋額白魚陸本額作額鱧鄭樵曰今只謂之鱧多在泥水中服食家忌食鱀是鱁注鱀䱜屬胎生健啖細魚陸本䱜作啖作㗖玉篇鱁鮧也鮧亦作鯷本草鮧今人皆呼慈音即是鮎魚爾雅翼鮧魚偃額兩目上陳方頭大尾小身身滑無鱗謂之鮎魚言黏滑也鯷同鮷博雅鮎也鮥鮛鮪陸本鮛作叔魵鰕鄭樵曰說文字林皆謂魵魚名出穢邪頭國郭氏引以為證樵謂魵魚自有之而此所謂魵者乃鰕也不得引彼證此鯬鯠注未詳鄭樵曰今鰻魚也亦呼鰻鯬臣照按集韻鰻鯠魚也本草鰻鱺似鱓而腹大鄭樵說是蛭蟣鄭樵本無此二字魁陸注外有理縱橫陸本縱作從鄭樵曰魁蛤也見本草詳矣而郭氏謂為蚶按蚶即瓦隴也亦名􅒕䗯與此自殊鼁􅖚蟾諸陸本􅖚作諸作蠩蜌螷注今江東呼蚌長而狭者為螷陸本螷作蠯蚌含漿鄭樵曰按此今謂之珠母老能産珠其甲曰方諸照月生水故曰含漿蠃小者蜬鄭樵曰今所謂鸚鵡杯者是左倪不類注行頭左庳陸本庳作俾貝小者鰿陸本鰿作蠑螈蜥蝪蜥蝪蝘蜓蝘蜓守宫也鄭樵曰今按小而青者曰蜥蝪大而黃者曰蝘蜓最小在墻間砌下者曰守宫螣螣蛇石經作螣螣蛇鄭樵本作螣蛇蝮虺博三寸首大如擘陸本蝮作虺作虫鄭樵曰樵疑擘爲臂之訛爾豈有身廣三寸而頭如拇指者鯢大者謂之鰕注今鯢魚似鮎四脚前似彌猴後似狗聲如小兒啼大者長八九尺别名鰕疏雌鯨也臣照按本草鯢魚一名王鮪在山溪中似鮎有四脚長尾能上樹天旱則含水上葉覆身鳥來飲水因而取之伊洛間亦有聲如小兒啼故曰鯢魚一名鱯魚一名人魚膏燃燭不滅此與郭合若從邢疏曰雌鯨也則是鯨鯢之鯢未必如郭氏之㫖魚枕謂之丁魚腸謂之乙魚尾謂之丙石經作魚之尾謂之丙鄭樵曰以本有此名故作文字者象其形而爲之此則爲實文也如十日之字乃因音借此耳許氏妄以乙丙丁之字而取十日之義焉二曰靈龜注縁中文似蝳蝐陸本蝳蝐作瑇瑁三曰攝龜鄭樵曰或言此龜乃蛇所化故頭尾似蛇俗呼鴦龜好食蛇亦謂之蛇龜釋鳥第十七隹其鳺鴀鄭樵曰今所謂鵓鳩也謹愿之鳥其指之之辭鳥之短尾者皆謂之佳惟夫不專名焉故指佳爲夫不也鶌鳩鶻鵃鄭樵曰今謂之鸜鵒廣雅謂爲斑鳩誤矣斑鳩即鵓鳩也鷑鳩鵧鷑鄭樵曰按此似鸜鵒無冠而尾長多在山寺㕑檻間今謂之烏鶂鴡鳩王鴡注鳥摯而有别陸本摯作鷙鄭樵曰鳧類多在水邉舊說鵰類誤矣鴗天狗鄭樵曰魚狗也似翡翠而小青碧可愛鷚天鸙鄭樵曰按此雀類似鶉而小尾長所在寒月多有之輿鵛鷋注未詳陸本輿作與廣雅鵛雀怪鳥鶾天雞鄭樵曰按今有吐錦鷄蓋雉類惟蜀中有之甚有文彩鷽山鵲注長尾觜脚赤陸本鵲作觜作鴜鷣負雀鄭樵曰按此即今之小鷂也蓋鶻類南方無鷹唯呼此爲鷹齧齒艾注未詳鄭樵曰艾即鴱也見下文鶨䳢老臣照按鄭樵本只有鶨䳢二字無老字下文作老􅟾鴳今此本下文只鳸鴳二字而老字連上攷鄭樵注鶨䳢云鶨音彖郭云鴒鶨也俗呼癡鳥字林云句喙鳥此蓋鴟類能捕雀句喙目圜黃可畏如拳大又鄭樵老􅟾鴳注云鴳音晏雀也舊注諸家皆斷老上屬曰鶨䳢老惟樊光斷鶨䳢為句以老下屬據春秋九鳸有桑鳸老鳸則老字應屬下明矣鄭說是桑鳸竊脂鄭樵曰按此鳥今謂之蠟觜性甚慧可教色微緑其觜似蠟竊古淺字言淺有脂色謂其觜之色也鸒斯鵯鶋鄭樵本鸒作鷽密肌繫英陸本密作英作鶧鄭樵曰英鷄也喙啖石英故謂名焉巂周燕燕鳦臣照按說文作巂周燕下文惟燕鳦二字蓋云巂周者燕也燕即鳦也巂周狀燕之聲以爲名也與郭異春鳸鳻鶞夏鳸竊𤣥秋鳸竊藍冬鳸竊黃桑鳸竊脂棘鳸竊丹行鳸唶唶宵鳸嘖嘖陸本鳸作扈鶭澤虞鄭樵曰按此鳥亦多在田中閩人呼為姑鷄又謂其鳴名姑鷄紡以其聲類紡聲且聒聒不輟鶿鷧臣照按埤雅云鳥似鶂而黒一名鷧郭注即鸕鷀也李時珍曰韻書盧與兹皆黒也此鳥深黒故名鷧者其聲自呼鷯鶉其雄鶛牝痺痺石經陸本鄭本並作庳鸍沈鳧鄭樵曰似鶩而小尾白俗呼水䲹好沒故曰沈鳧萑老鵵鄭樵曰疑此即訓狐以其首似狐鵵故有此等名狂㝱鳥陸本狂作鵟楊鳥白鷢楊鳥二字石經鄭樵本並合為一字作鸉音楊鷆蟁母石經作母鷉須鸁注鷉鷿鷉似鳧而小膏中瑩刀陸本鷿作瑩作鎣鴩餔敊注未詳陸本鴩作䳀敊作豉臣照按通雅曰即鵓鳩俗譌呼鵓姑子又蒼頡篇餔榖鳥即布穀然則餔豉亦餔穀之譌鵲鵙醜其飛也翪石經鵙作鵙鳧鴈醜其足蹼陸本蹼作爾雅注疏卷十考證
