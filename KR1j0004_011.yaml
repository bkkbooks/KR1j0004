body:
  text: 欽定四庫全書爾雅注疏卷六晉郭璞注唐陸徳明音義宋邢昺疏釋地第九音義地徒利反一音徒細反釋名云地底也其體在底下載萬物也張顯古今訓云土乙力為地許慎注淮南子云地麗也物理論云地底也著也隂體下著禮統云地施也諦也應變施化審諦不誤疏案説文云元氣初分輕清陽為天重濁隂為地萬物所陳列也白虎通云地者易也言養萬物懷任交易變化含吐應節也釋名云地底也其體在底下載萬物也禮統云地施也諦也應變施化審諦不誤也此篇釋地之所載四方中國州府陵藪之異故曰釋地兩河間曰冀州注自東河至西河河南曰豫州注自南河至漢河西曰雝州注自西河至黑水漢南曰荆州注自漢南至衡山之陽江南曰揚州注自江南至海濟河間曰兗州注自河東至濟濟東曰徐州注自濟東至海燕曰幽州注自易水至北狄齊曰營州注自岱東至海此蓋殷制音義周禮云河内曰冀州韋昭注漢書云東西南北皆有河故曰河内馬融曰在東河之西西河之東南河之北李廵云兩河間其氣清厥性相近故曰冀冀近也周禮云河南曰豫州尚書云荆河惟豫州孔傳曰西南至荆山北距河水李廵云河南其氣著密厥性安舒故曰豫豫舒也春秋元命包云豫之言序也言陽氣分布各得其處故其氣平靜多序也尚書云黑水西河惟雍州孔傳云西距黑水東據河周禮云正西曰雍州雍者擁也東崤西漢南商於北居庸四山之内擁翳也李廵云河西其氣蔽壅厥性急凶故曰雍雍壅也太康地記云雍州兼得梁州之地西北之位陽所不及隂氣壅閼故取名焉案周禮及爾雅皆無梁州則雍州兼有梁州之地也禹貢云華陽黒水惟梁川孔傳云東據華山之南西距黒水韋昭云今益州也太康地記云梁州者言西方金剛之氣疆梁故因以為名漢時改雍州為梁州改梁州為益州也尚書云荆及衡陽惟荆州孔傳云北據荆山南及衡山之陽周禮云正南曰荆州釋名云荆州者取荆山之名荆警也南蠻數為冦逆嘗警備故也尚書云淮海惟揚州孔傳云北據淮南距海周禮云東南曰揚州李廵云江南其氣燥勁厥性輕揚太康地記云以揚州漸太陽位天氣奮揚厥正含文明故取名焉濟本又作子禮反下同兗悅轉反尚書云濟河惟兗州孔傳云東南據濟西北距河周禮云河東曰兗州李廵云濟河間其氣専質厥性信謹故曰兗兗信也釋名以為取兗水之義尚書云海岱及淮惟徐州孔傳云東至海北至岱南及淮釋名云徐舒也土氣舒緩太康地記以為取徐丘為名云周合其地於青州案周禮無營州而有青州燕烏賢反周禮云東北曰幽州李廵云燕其氣深要厥性剽疾故曰幽幽要也太康地記以為因於幽都為名或云北方太隂故以幽冥為號二者相依也周禮云正北曰幷州春秋元命包云并之言併也陽合交并其氣勇壯抱誠信也太康地記云并州不以衛水為號又不以恒山為稱而言并者蓋以其在兩谷之間也尚書云海岱惟青州孔傳云東北據海西南距岱則爾雅營州為禹貢之青州矣營者蓋取營􅉌以為號周禮云正東曰青州博物志云營與青同海東有青􅉌齊有營丘豈是名乎太康地記云東方少陽其色青其氣清歲之首事之始故以青為名焉疏此釋九州之名及其界域也兩河間曰冀州注自東河至西河者周禮職方氏云河内曰冀州禹貢不説境界孔安國云此州帝都不說境界以餘州所至即可知以其禹貢兗州云濟河自東河以東也豫州云荆河自南河以南也雍州云西河自西河以西也明東河之西西河之東南河之北是冀州之境也言東河西河南河者皆據帝都冀州而言也案禹貢導河自積石龍門南流謂之西河至于華隂折而東經底柱孟津過洛汭皆東流謂之南河至于大伾折而北流過降水至于大陸又北播為九河同為逆河入于海謂之東河此惟云兩河者從可知李廵曰兩河間其氣清厥性相近故曰冀冀近也河南曰豫州注自南河至漢者職方與此同禹貢云荆河惟豫州孔安國云西南至荆山北距河水以其荆山在荆州漢水所經故文不同其實一也李廵云河南其氣著密厥性安舒故曰豫豫舒也河西曰雍州注自西河至黑水者周禮正西曰雍州禹貢云黒水西河惟雍州孔安國云西距黑水東據河案酈元水經黑水出張掖雞山南流至燉煌過三危山南流入于南海然則雍州之境東據龍門河西距此黒水也李廵云河西其氣蔽壅厥性急凶故曰雍雍壅也兼得梁州之地西北之位陽所不及隂壅也漢南曰荆州注自漢南至衡山之陽者周禮正南曰荆州禹貢荆及衡陽惟荆州孔安國云北據荆山南及衡山之陽言北據荆山則至漢水也李廵曰漢南其氣燥剛禀性强梁故曰荆荆强也釋名以為取荆山之名荆警也南蠻數為冦逆常警備也江南曰揚州注自江南至海者周禮東南曰揚州禹貢淮海惟揚州孔安國云北據淮南距海然則揚州之境跨江北至淮此云江南者舉逺大而言也李廵曰江南其氣燥勁厥性輕揚太康地記云以揚州漸太陽位天氣奮揚履正含文故取名焉濟河間曰兗州注自河至濟者周禮河東曰兗州禹貢濟河惟兗州孔安國云東南據濟西北距河孔傳云據者謂跨之也距至也濟河之間相去路近兗州之境跨濟而過東南越濟水西北至東河也李廵云濟河間其氣専質厥性信謹故曰兗兗信也釋名以為取兗水之義濟東曰徐州注自濟東至海者禹貢海岱及淮惟徐州孔傳云東至海北至岱南及淮此云自濟東則是西至濟也李廵曰淮海間其氣寛舒稟性安徐故曰徐徐舒也周合其地於青州燕曰幽州注自易水至北狄者周禮東北曰幽州李廵曰燕其氣深要厥性剽疾故曰幽幽要也禹貢其地合於冀州也地理志云涿郡故安縣閻鄉易水所出東至范入濡也從此易水至於北狄幽州之境也齊曰營州注自岱東至海此蓋殷制者周禮正東曰青州禹貢云海岱惟青州孔傳云東北據海西南距岱然則此營州則青州之地也博物志云營與青同海東有青􅉌齊有營丘豈是名乎太康地記云東方少陽其色青其氣清嵗之首事之始故以青為名焉此蓋殷制者以此文上與禹貢不同下與周禮文異禹别九州有青徐梁而無幽并營是夏制也周禮周公所作有青并幽而無徐梁營是周制也此有徐幽營而無青梁并疑是殷制也以無正文故云蓋也九州音義案禹平水土畫為九州禹貢所言是也其後舜分置十二州鄭𤣥云舜以青州越海而分齊為營州冀州南北太逺分衛為并州燕以北為幽州新置三州并舊為十二州也夏家依禹貢九州爾雅所言李郭以為殷制周禮職方氏之叙列是周制也禹貢無幽并營爾雅有徐幽營而無青梁并職方有青幽并而無徐梁營三代不同之故也疏此上釋九州之名故題云九州也魯有大野註今髙平鉅野縣東北大澤是也音義鉅音巨疏此下至周有焦䕶釋十藪之名也禹貢徐州云大野既豬地理志云大野澤在山陽鉅野縣北鉅即大也由其旁有大澤故縣以鉅野為名哀十四年左傳云西狩於大野以其澤在曲阜西故云西狩也郭云今髙平鉅野縣者東晉時鉅野屬髙平郡故與志不同凡注言今者皆謂東晉時也晉有大陸注今鉅鹿北廣河澤是也疏孫炎曰廣河猶大陸以地名言之近為是也禹貢冀州云大陸既作是也案定元年左傳晉魏獻子田於大陸焚焉還卒於寗杜預注嫌鉅鹿絶逺疑此田在汲郡吳澤寗今脩武縣近吳澤計此二凙相去甚逺亦得言大陸者以其廣平曰陸但廣而平者則名大陸故異所而同名也澤雖卑下旁帶廣平之地故統名焉秦有楊陓註今在扶風汧縣西音義陓孫於于反郭烏花反本或作紆字非也汧苦堅反字林水出隴右扶風也疏周禮冀州云其澤藪曰楊陓鄭注云所在未聞又雍州云其澤藪曰弦蒲鄭注云在汧案地理志汧吳山在西古文以為汧山北有蒲谷鄉弦中谷雍州藪今注亦云在汧然則周禮弦蒲即此揚陓也宋有孟諸注今在梁國雎陽縣東北音義諸如字左傳同尚書作豬丁魚反睢蘇維反水名也疏周禮青州其澤藪曰望諸鄭注云望諸明都也在睢陽禹貢豫州云導菏澤被孟豬左傳亦作孟諸文不同者聲轉字異正是一地也楚有雲夢注今南郡華容縣東南巴㐀湖是也音義夢木或作蒙亡貢亡工二反疏周禮荆州云其澤藪曰雲鄭注云雲在華容禹貢云雲土夢作乂昭三年左傳楚子與鄭伯田于江南之夢又定四年楚子涉雎濟江入于雲中杜預云南郡枝江縣西有雲夢城江夏安陸縣東南亦有夢城或曰南郡華容縣東南有巴􅉌湖江南之夢也雲夢一澤而毎處有名者司馬相如子虚賦云雲夢者方九百里則此澤跨江南北亦得單稱雲單稱夢瞢即夢也吳越之間有具區注今吳縣南太湖即震澤是也疏周禮揚州云其澤藪曰具區鄭注云在吳南地理志云㑹稽吳縣故周泰伯所封國也具區在西古文以為震澤禹貢揚州云三江既入震澤底定是也齊有海隅注海濵廣斥音義隅本或作嵎同仰于反斥音赤疏此營州藪也云海濵廣斥禹貢文也孔傳云濵涯也言復其斥鹵案説文云鹵鹹地也東方謂之斥西方謂之鹵海畔逈濶地皆斥鹵故云廣斥也燕有昭余祁注今太原鄔陵縣北九澤是也音義余羊如反祁巨伊反又止尸反孫本作底音之視反鄔於慮反字林云太原縣也又乙祛反疏周禮并州其澤藪曰昭余祁鄭注云在鄔地理志云鄔九澤在北是為昭余祁并州藪是也鄭有圃田注今滎陽中牟縣西圃田澤是也音義圃本或作同布古反又音布滎乎銘反疏周禮豫州云其澤藪曰圃田鄭注云在中牟地理志云中牟圃田澤在西豫州藪僖三十三年左傳云鄭之冇原圃猶秦之有具囿也又詩車攻云東冇甫草鄭𤣥以為甫田之草皆謂此也周有焦䕶註今扶風池陽縣瓠中是也音義䕶胡故反瓠胡故反疏孫炎云周岐周也詩六月云玁狁匪茹整居焦䕶是也時人謂之瓠中也十藪音義藪素口反疏題上事也説文云大澤也風俗通云藪厚也冇草木魚鼈所以厚養人也東陵阠南陵息慎西陵威夷中陵朱滕北陵西隃鴈門是也注即鴈門山也音義阠音信郭尸慎反字林所人反又所慎反滕徒登反隃戍輸二音疏此五方之陵名也其義及所在未詳云鴈門是也者此指解北陵也即鴈門山是也陵莫大於加陵注今所在未聞疏莫無也陵大阜也言陵無大於加陵者謂加陵最大者今所在未聞梁莫大於溴梁注溴水名梁隄也音義溴古壁反隄丁兮反疏釋宫云隄謂之梁詩傳云石絶水曰梁然則以土石為隄障絶水者名梁雖所在皆冇而無大於湨水之旁者杜註云湨出河内軹縣東南至温入河春秋襄十六年公㑹晉侯以下于湨梁是也墳莫大於河墳注墳大防音義墳扶云反防音房疏墳大防也謂隄雖水所皆有而河墳最大也八陵音義陵大阜曰陵疏此亦題上事也大阜曰陵溴梁河墳雖非大阜以其絶大若陵故通謂之八陵也東方之美者有醫無閭之珣玗琪焉注醫無閭山名今在遼東珣玗琪玉屬東南之美者有㑹稽之竹箭焉注㑹稽山名今在山隂縣南竹箭篠也南方之美者有梁山之犀象焉注犀牛皮角象牙骨西南之美者有華山之金石焉注黄金礝石之屬西方之美者有霍山之多珠玉焉注霍山今在平陽永安縣東北珠如今雜珠而精好西北之美者有崑崙虛之璆琳琅玕焉注璆琳美玉名琅玕狀如珠也山海經曰崑崙山有琅玕樹北方之美者有幽都之筋角焉注幽都山名謂多野牛筋角東北之美者有斥山之文皮焉注虎豹之屬皮有縟綵者中有岱岳與其五榖魚鹽生焉注言泰山有魚鹽之饒音義醫於其反李本作音同珣胥均反又音峻説文云周書所謂美玉讀若宣玗音于琪巨疑反㑹古外反稽古兮反箭子賤反篠悉了反犀音西華戸花反又户化反礝如兗反應劭注子虚賦云礝石出雁門白者若冰半有赤色霍呼郭反崑音昆崙路昆反虚𦍑魚反璆其樛反又音求琳音林琅音郎玕音干筋音斤本或䈥字非斥昌亦反又昌夜反縟音辱饒而遥反疏此釋八方中國名山所産之物也案地理志遼東郡無慮縣應劭曰慮音閭顔師古云即謂醫巫閭是縣因山為名故云山名今在遼東周禮幽州鎮也云珣玗琪玉屬者說文云珣周書所謂美玉也玗石之似玉者琪玉也皆王之類也故云玉屬周禮揚州云其山鎮曰㑹稽鄭注云在山隂地理志㑹稽郡山隂縣云㑹稽在南上有禹冢禹井故云山名今在山隂縣南也云竹箭篠也者禹貢揚州云篠簜既敷釋草云篠竹箭也郭云别二名則竹箭一名篠是竹之小者可以為箭幹者也南方之美者有梁山之犀象焉者郭氏不注梁山所在犀象二獸皮角牙骨材之美者也黄金礝石之屬者經惟言金知黄金者以三品之中黄金為上此言美者故知黄金礝石石之次玉者玉藻云士佩礝玫而緼組綬是也其類非一故云之屬注霍山至精好者周禮冀州其山鎮曰霍山鄭云在彘案地理志河東郡彘縣云霍大山在東冀州山周厲王所奔應劭曰順帝改曰永安然則東晉時屬平陽郡而縣名永安故云今在平陽永安縣也云珠如今雜珠而精好郭氏時驗為然也璆與球同說文云璆玉磬也琳美玉名書云戛擊嗚球美玉可以為磬故皆云美玉也山海經曰者案海内西經云帝之下都崑崙之虚方八百里髙萬仞其上冇三頭人琅玕樹注云琅玕子似珠也幽都者山海經云北海之内有山名曰幽都之山是也斥山山名也文皮虎豹之屬其皮毛有文綵細縟故謂之文皮焉岱岳泰山也此言中國也五榖黍稷麻麥豆也泰山東近海禹貢海岱惟青州厥貢鹽絺海物惟錯言其饒多非一種故注云言泰山有魚鹽之饒也九府音義府猶庫藏也疏此亦題上事也府聚也財物之所藏故言此八方及中皆美物之所聚故題云九府也東方有比目魚焉不比不行其名謂之鰈注狀似牛脾鱗細紫黒色一眼兩片相合乃得行今水中所在有之江東又呼為王餘魚南方有比翼鳥焉不比不飛其名謂之鶼鶼注似鳧青赤色一目一翼相得乃飛西方有比肩獸焉與卭卭岠虚比為卭卭岠虚齧甘草即有難卭卭岠虚負而走其名謂之蟨注吕氏春秋曰北方有獸其名為蟨鼠前而兔後趨則頓走則顛然則卭卭岠虚亦宜鼠後而兔前前髙不得取甘草故須蟨食之今鴈門廣武縣夏屋山中有獸形如兔而大相負共行土俗名之為蟨鼠北方有比肩民焉迭食而迭望注此即半體之人各冇一目一鼻一孔一臂一脚亦猶魚鳥之相合更望備警急中有軹首蛇焉注岐頭蛇也或曰今江東呼兩頭蛇為越王約髮亦名弩弦此四方中國之異氣也音義鰈本或作鰨同音牒又勅臘他盍二反脾婢文反翼本或作翌同羊式反鶼古恬反鳧音扶肩音堅卭本或作巨凶反岠音巨又作􅩅虚又作同許俱反為于偽反齧五結反本或作噬謝音逝難奴旦反蟨郭音厥孫居衛反李云卭卭岠虚能走蟨知美草即若驚難者卭卭岠虚便負蟨而走故曰比肩獸孫云卭卭岠虚狀如馬前足鹿後足前髙不得食而善走蟨前足鼠後足善求食走則倒故齧甘草則仰食卭卭岠虚卭卭岠虚負以走郭云今雁門夏屋山中冇獸形如而大相負共行土俗名之為蟨鼠穆天子傳云卭卭岠虚走百里之類也司馬相如子虚賦蹵卭卭轔岠虚又為二獸也趨七俞反作趍非食音嗣夏户雅反迭徒結反更音庚軹本或作顧音居是諸是二反郭巨宜反孫音支云蛇有技首者名曰率然施音指案枳首謂蛇冇兩頭首舒酉反疏此釋五方異氣而産非常之物也云東方有比目魚焉者言東方水中有魚其形狀似牛脾鱗細紫黒色一眼兩片相合兩目相比乃得行故曰比目魚云不比不行者比合也言一片不能行須兩片相合乃行故云不比不行也云其名謂之鰈者言鰈為比目之名也一名比目魚一名鰈郭云江東又呼為王餘魚案山海經云崇吾山有鳥狀如鳬一翼一目相得乃飛名曰蠻蠻郭云比翼烏也色青赤不比不得飛爾雅作鶼鶼者正謂相比也云西方有比肩獸焉者此謂蟨也與卭卭岠虚相比蟨則肩庳不能走而能取甘草卭卭岠虚則前髙不得取甘草而善走穆天子傳曰卭卭岠虚走百里是也故各以其能而濟所不能蟨常為卭卭岠虚齧甘美之草仰而食之即有急難卭卭岠虚則背負而走者其名謂之蟨也云吕氏春秋二十六篇秦相吕不韋輯智畧士作也云曰北方有獸至則顛者大慎覽順說篇之文也引之乃以證卭卭岠虚之形也然則以下郭氏注云今雁門廣武縣云云者目驗知之也北方至迭望此即半體人也兩半相比乃得為人動作及禦非常以肩在上而顯故謂之比肩民焉迭更也謂一體取食則一體瞻望所以備驚急也故云迭食而迭望云中有軹首蛇焉軹岐也此即兩頭蛇也今江東呼越王約髪言是越王約髪所變也亦名弩弦即以形相似而名之也五方疏此亦題上事也言是五方風氣殊異而生此怪物也邑外謂之郊郊外謂之牧牧外謂之野野外謂之林林外謂之坰注邑國都也假令百里之國五十里之界界各十里也下溼曰隰大野曰平廣平曰原髙平曰陸大陸曰阜大阜曰陵大陵曰阿可食者曰原注可種榖給食陂者曰阪注陂陀不平下者曰溼注公羊傳曰下平曰隰田一歲曰菑注今江東呼初耕地反草為菑二歲曰新田注詩曰于彼新田三歲曰畬注易曰不菑畬音義牧亡卜反養也此謂牧養之地說文從牛或作目李本牧作田字釋云田敕也謂敕列種榖之處敕音陳野本或作埜古字羊者反坰古塋反令力呈反溼俗作濕申入反隰音習種之用反陂彼宜反字林或彼義反又作坡郭音普何反阪甫晚反字林父板反陀大何反菑本或作甾同側基反孫音災畬本或作畭羊如反字林弋恕反疏此釋郊野之地逺近髙下不同之名也云邑外謂之郊者邑國都也謂國都城之外名郊也云郊外謂之牧者言可放牧也書牧誓云王朝至于商郊牧野乃誓是也云牧外謂之野者言牧外之地名野詩傳云郊外曰野者以細别言之則郊外之地名牧牧外之地名野若大判而言則野者郊外通名故周禮六遂在逺郊之外遂人職云凡治野田是其郊外之地總稱野也云野外謂之林者言野外之地名林以其去都邑逺薪采者少其地可長平林因名云也云林外謂之坰者言林外之地最為逺野名坰魯頌云駉駉牡馬在坰之野毛傳云坰逺野是也注云邑國都也者案周禮四縣為都四井為邑春秋莊二十八年左傳曰凡邑有宗廟先君之主曰都無曰邑然則邑與都異此為一者彼對文之例耳但都者聚居之處故詩小雅云彼都人士説文云邑國也是天子諸侯所居國城或謂之邑或謂之都故以國都解邑也云假令百里之國五十里之界界各十里也者以其百里之國國都在中去境五十里毎十里而異其名則坰為邊畔去國最逺故毛傳以為逺野也此假令者據小國言之郊為逺郊牧野林坰自郊外為差耳然則郊之逺近計國境之廣狹以為差也聘禮云賔及郊注云郊逺郊周制天子畿内千里逺郊百里以此差之逺郊上公五十里侯四十里伯三十里子二十里男十里也近郊各半之是也鄭之所約也是以司馬法云王國百里為逺郊又此經從邑之外止有五名明當毎皆百里故知逺郊百里也知近郊半之者書序云周公既沒命君陳分正東郊成周於時周都王城而謂成周為東郊則成周在其郊也於漢王城為河南成周為洛陽相去不容百里則所言郊者謂近郊故鄭注云天子近郊五十里今河南洛陽相去則然是鄭以河南洛陽約近郊之里數也周禮杜子春注云五十里為近郊白虎通亦云近郊五十里逺郊百里是儒者相傳為然也下溼曰隰者謂地形庳下而水溼者李廵曰下溼謂土地窊下常沮洳名為隰也云大野曰平者大野之澤一名平魯有大野是也云廣平曰原者謂澤之廣平者亦名原漢以平原為郡名屬青州云髙平曰陸大陸曰阜大阜曰陵大陵曰阿者李廵曰髙平謂土地豐正名為陸土地髙大名曰阜最大名為陵陵之大者名阿詩大雅皇矣云無矢我陵我陵我阿是也此上七者或萊沛沮洳或險陗磽确雖不可種榖給食亦得其名也云可食曰原陂者曰阪下者曰隰此三者釋地形雖有髙下不平皆可種榖給食髙而可食者名原詩大雅云篤公劉于胥斯原是也陂陀不平而可食者名阪詩小雅正月云瞻彼阪田有菀其特是也下平而可食者名隰本作溼誤公羊傳曰下平曰隰此昭元年傳文也案彼曰晉荀吳帥師敗狄于太原此大鹵也曷為謂之太原地物從中國邑人名從主人原者何上平曰原下平曰隰何休云分别之者地勢各有所生原宜粟隰宜麥當教民所宜因以制貢賦是也云田一歲曰菑二歲曰新田三歲曰畬此釋耕田年歲逺近名義不同之事也菑者災也畬和柔之意也孫炎云菑始災殺其草本也新田新成柔田也畬和也田舒緩也郭云今江東呼初耕地反草為菑注詩曰于彼新田此小雅采芑篇文也案彼云薄言采芑于彼新田于此菑畝毛傳取此文為説故引證也云易曰不菑畬此無妄六二爻辭也鄭注亦取此文故引以為證也野疏此亦題上事也上自邑外謂之郊以下雖逺近髙下其名不同野為總稱故云東至於泰逺西至於邠國南至於濮鈆北至於祝栗謂之四極注皆四方極逺之國觚竹北户西王母日下謂之四荒注觚竹在北北户在南西王母在西日下在東皆四方昏荒之國次四極者九夷八狄七戎六蠻謂之四海注九夷在東八狄在北七戎在西六蠻在南次四荒者岠齊州以南戴日為丹穴注岠去也齊中也北戴斗極為空桐注戴值東至日所出為大平西至日所入為大蒙注即蒙汜也大平之人仁丹穴之人智大蒙之人信空桐之人武注地氣使之然也音義泰音太邠或作豳同彼貧反説文作汾音同濮音卜鈆悦全反祝章六昌六反觚姜胡反本又作孤同西王母是西方昏荒國名又曰西王母神名狀如人虎齒豹尾蓬頭戴勝善處穴宿周穆王廵狩至崑崙山見之西王母亦來賔昭宫見出竹書及穆天子傳岠音巨大音泰下同汜音祀一音似或云祀似同音後放此疏此釋九州之外四方極逺之國名也及其人性禀氣不同也泰逺邠國濮鈆祝栗此四方極逺之國名也觚竹者漢書地理志遼西令支有觚竹城是也北户者即日南郡是也顔師古曰言其在日之南所謂北户以向日者西王母者山海西荒經云西海之南流沙之濵赤水之後黑水之前有大山名崑崙之㐀有人戴勝虎齒有尾穴處名曰西王母又穆天子傳曰天子賔于西王母乃紀其迹于弇山名曰西王母之山是也日下者謂日所出處其下之國也山海東荒經云大荒之中有山名曰大言日月所出有波谷山者有大人之國又云大荒之中有山名曰合虚日月所出冇中容之國如此之類是也云謂之四荒者言聲教不及無禮義文章是四方昏荒之國也在上四極之内云九夷八狄七戎六蠻謂之四海者孫炎云海之言晦晦闇於禮義也云知在東西南北者以曲禮云其在東夷北狄西戎南蠻雖大曰子故也案風俗通云東方人好生萬物觗觸地而出夷者觗也其類有九依東夷傳夷有九種曰畎夷于夷方夷黄夷白夷赤夷𤣥夷風夷陽夷又一曰𤣥菟二曰樂浪三曰髙儷四曰滿飾五曰鳬叟六曰索家七曰東屠八曰倭人九曰天鄙蠻者風俗通云君臣同川而浴極為簡慢蠻者慢也其類冇八李廵曰一曰天竺二曰咳首三曰焦僥四曰跂踵五曰穿胷六曰儋耳七曰狗軹八曰旁脊戎者風俗通云斬伐殺生不得其中戎者兇也其類冇六李廵云一曰僥夷二曰戎夷三曰老白四曰耆羗五曰鼻息六曰天剛狄者風俗通云父子嫂叔同穴無别狄者辟也其行邪辟其類冇五李廵云一曰月支二曰穢貃三曰匈奴四曰單于五曰白屋案李廵所注爾雅本謂之四海下更三句云八蠻在南方六戎在西方五狄在北方故得此解孫炎郭氏諸本皆無此三句案明堂位稱九夷八蠻六戎五狄周禮職方氏掌四夷八蠻七閩九貉五戎六狄之人鄭注云四八七九五六周之所服國數也徧檢經傳四夷之數參差不同先儒舊解此爾雅上文殷制明堂位及職方幷爾雅下文皆為周制義或當然此在四荒之内九州之外於王者世一見周禮曰九州之外謂之蕃國世一見是也故云次四荒云岠齊以南戴日為丹穴者此明四海之中别有下四種之名也岠去也齊中也中州猶言中國也戴值也言去中國以南北户以北值日之下其處名丹穴天老説鳯云濯羽弱水莫宿丹穴又山海經云禱過山東五百里曰丹穴山是也云北戴斗極為空桐者斗北斗也極者中宫天極星其一明者泰一之常居也以其居天之中故謂之極極中也北斗拱極故云斗極值北斗極之下其處名空桐云即蒙汜者即淮南子云日出扶桑入於蒙汜是也云地氣使之然也者言是土地之氣剛柔不同使之仁智信武耳若考工記云鄭之刀宋之斤魯之削吳越之劍遷乎其地而弗能為良地氣然也四極釋丘第十音義丘羗牛反本又作丠古字非人所為曰丘廣雅云小陵曰丘疏案廣雅云小陵曰丘説文解字曰土之髙也非人所為也從北從一一地也人扂在丘南故從北中邦之居在崑崙東南一曰四方髙中央下為丘象形此下云非人為之丘然則土有自然而髙小於陵者名丘也其體雖一其名則多或近道途或因水澤所如則陵畝各異其重則再三不同通見詩書此篇具釋故名釋丘丘一成為敦丘注成猶重也周禮曰為壇三成今江東呼地髙堆者為敦音義孰郭云音頓或丁回反謝如字讀注並如後二音重直龍反下同壇大干反堆丁回反疏成重也言丘上更有一丘相重累者名敦丘詩衛風氓篇云送子涉淇至于頓丘是也一孫炎云形如覆敦敦器似盂今案下文别云如覆敦者敦丘則此自是丘之一重者故郭氏云成猶重也與孫氏意異注周禮曰為壇三成者此秋官司儀職所載文也鄭司農云三成三重也引之證成為重也再成為陶丘注今濟隂定陶城中有陶丘音義陶徒刀反孫云形如累兩盂濟子禮反疏丘形上有兩丘相重累者名陶丘李廵曰再成其形再重也禹貢曰濟水東出于陶丘北是也濟隂定陶者濟隂郡名定陶縣名也地理志云定陶縣西南有陶丘亭是也再成銳上為融丘注纖頂者音義銳唯歲反纖子㢘反疏丘形再重而頂纖者名融丘也三成為崑崙丘注崑崙山三重故以名云疏丘形三重者名崑崙丘崑崙山記云崑崙山一名崑丘三重髙萬一千里是也凡丘之形三重者因取此名云耳如椉者椉丘注形似車椉也或云椉者謂稻田塍埒音義椉繩證反注車乘同李郭皆云形如車乘又市陵反或云如稻田塍埒下文並倣此塍市陵反許叔重云稻田畦隄埒畔埒音劣疏郭氏兩解一云形似車椉也一或云椉謂稻田塍埒塍市陵切許叔重云塍埒稻田畦隄埒畔也案地理志云泰山有椉丘春秋莊十五年公敗宋師于乘丘是因丘以為名乎如陼者陼丘注水中小洲為陼音義陼章如反下同疏陼水中可扂之小者丘形似之名為陼丘也水潦所止泥丘注頂上汙下者音義潦力道反泥乃兮反依字作尼又作坭汙音烏又烏花反本或作洿疏水潦雨水也丘形頂上汙下雨水停止而成泥濘者名泥丘方丘胡丘注形四方疏丘形四方者名胡丘絶髙為之京注人力所作音義作子各反疏言卓絶髙大如丘而人力所作者名京案春秋宣十二年左傳楚敗晉師於邲潘黨曰君盍築武軍而收晉尸以為京觀楚子曰云云今罪無所而民皆盡忠以死君命又何以為京觀乎是其類也非人為之丘注地自然生疏李廵云謂非人力所為自然生者孫炎曰地性自然也故郭云地自然生水潦所還埒丘注謂丘邊有界埒水繞環之音義還户關反又音患下同施音旋繞音遶疏環遶也埒小隄也壝土為之言此丘邊有其界埒外則為水潦繞環者名埒丘上正章丘注頂平疏丘頂上平正者名章丘章亦平也澤中有丘都丘注在池澤中疏都水所聚也言在池澤中者因名都丘堂途梧丘注途道音義途音圖梧五故反又音吾疏途道也梧遇也當道有丘名梧丘言若相遇於道路然也途出其右而還之畫丘注言為道所規畫音義畫郭音獲謝胡卦反疏右謂西也還繞也畫規畫也言道出丘西而復還繞之者名畫丘若為道所規畫然也途出其前戴丘注道出丘南疏謂道過丘南若為道負戴故為戴丘途出其後昌丘注道出丘北疏謂道過丘北者名昌丘水出其前渻丘水出其後沮丘水出其右正丘水出其左營丘注今齊之營丘淄水過其南及東音義渻本或作字所景反沮孫郭同辭與慈吕二反謝子預反施子余反淄仄其反過古臥反疏此釋丘之前後左右有水過之者名也左右猶言東西也地理志云齊郡臨淄城中有丘即營丘也志又云泰山萊蕪縣淄水所出東至博昌入泲然則淄水出萊蕪經臨淄過營丘南折而北至博昌入泲言此以證水出其左者名營丘如覆敦者敦丘注敦盂也音義覆孚服反敦丁回反下及注同疏案周禮九嬪職云凡祭祀贊玉齍注云玉齍玉敦也受黍稷器又少牢禮曰主婦執一金敦黍有蓋凡設四敦皆南首注云敦有酋者尊者器飾也飾象龜形孝經緯説敦與簠簋容受雖同上下内外皆圓為異郭氏言敦盂舉其類而言之也丘形如覆敦者名敦丘邐迤沙丘注旁行連延音義邐吕紙反説文云邐行也迆字或作迤余紙余支二反説文云迤邪行也疏説文云邐行也迤斜行也故注云旁行連延也連延謂連接延長丘形斜行連接而長者名沙丘地理志云鉅鹿有紂所作沙丘臺在東北七十里左髙咸丘右髙臨丘前髙旄丘注詩云旄丘之葛兮後髙陵丘音義旄謝音毛字林作嵍又作堥俱亡付反疏此四者釋丘形左右前後髙而名不同也詩云旄丘之葛兮者邶風旄丘篇文也偏髙阿丘注詩云陟彼阿丘音義偏音篇疏謂丘形四隅有一髙而不正在左右前後者名阿丘也詩云陟彼阿丘者鄘風載馳篇文也宛中宛丘注宛謂中央隆髙音義宛施於阮反孫云謂中央汙也郭於粉反謂藴聚隆髙也下同隆力躬反疏案詩陳風云宛丘之上兮毛傳云四方髙中央下曰宛丘李廵孫炎亦皆云中央下而郭以為中央髙者以其四方髙中央下即是上文水潦所止泥丘也又下云丘上有丘為宛丘作者嫌人不曉故重辯之既言丘上有丘非中央隆髙而何此郭氏所以不從先儒也丘背有丘為負丘注此解宛丘中央隆峻狀如負一丘於背上音義解古買反背如字疏此解宛丘之狀也言中央隆峻若丘背之上更有一丘而負戴之者名宛丘又名負丘也左澤定丘音義定丁佞反疏謂丘之東有澤者名定丘右陵泰丘注宋有泰丘社亡見史記疏謂丘之西有大阜者名太丘宋有太丘社亡見史記案六國年表周顯王三十三年秦恵文王二年宋太丘社亡是也蓋依丘作社在宋國於時亡去故云太丘社亡亦咎徴也如畝畝丘注丘有隴界如田畝音義畝本或作畞隴力勇反本又作壟疏李廵曰諸丘如田畝曰畝丘孫炎云方百步郭以為田畝之壟也丘形冇界埒似之因名云詩小雅巷伯云楊圉之道猗於畝丘是也如陵陵丘注陵大阜也疏丘形如大阜者名陵丘云陵大阜者釋地文也丘上有丘為宛丘注嫌人不了故重曉之陳有宛丘注今在陳郡陳縣晉有潛丘注今在太原晉陽縣淮南有州黎丘注今在夀春縣天下有名丘五其三在河南其二在河北注説者多以州黎宛營為河南潛敦為河北者案此方稱天下之名丘恐此諸丘碌碌未足用當之殆自别更有魁梧桀大者五但未詳其名號今所在耳音義了或作僚重直用反潛昨鹽反黎力兮反敦丁回反碌音祿更古孟反魁口回反梧五故五胡二反桀渠列反疏此郭氏破先儒説天下名丘未當也碌小石也碌碌多貌恐此州黎等五丘碌碌然小耳史記毛遂入楚謂平原君諸舍人曰公等碌碌所謂因人成事者也意相類也殆近也近自更有魁梧然桀大者五但名號所在今所未詳知也丘疏此已上釋衆丘之名義故題曰丘也望厓洒而髙岸注厓水邊洒謂深也視厓峻而水深者曰岸音義厓字又作涯魚佳反洒蘇典反又西禮反下同疏望視也厓水邊也洒水深也言視水邊之厓其下水深其厓髙峻者名岸詩衛風云淇則有岸夷上洒下不漘注厓上平坦而下水深者為漘不發聲音義漘音脣坦土但反疏李廵云夷上平上洒下陗下故名漘孫炎曰平上陗下故名漘不者蓋衍字郭云厓上平坦而下水深者為漘不發聲也詩王風葛藟云在河之漘是也隩隈注今江東呼為浦隩淮南子曰漁者不爭隈音義隩字林烏到反郭於六反注及下同本或作澳隈木或作渨同烏回反字林一由反漁音魚疏隩一名隈也孫炎云隈水曲中也詩衛風云瞻彼淇隩故此釋之也案淮南子原道篇云昔舜耕於歴山朞年而田者爭處墝埆以封畔肥饒相讓釣於河濵朞年而漁者爭處湍瀬以曲隈深潭相予是不爭隈之事引之以證隈即厓内深隩之處也厓内為隩外為隈注别厓表裏之名音義别彼列反裏音里疏别厓表裏之名也孫炎云内曲裏也外曲表也李廵曰厓内近水為隩其外為鞫此句覆釋上文隩隈之處也云外為隈者隈當作鞫傳寫誤也詩大雅公劉云芮鞫之即毛傳云水之外曰鞫然則厓在水曲其内名隩又名隈其外名鞫今以隩隈一事分為外内之名故知誤也畢堂牆注今終南山道名畢其邊若堂室之牆音義畢本又作卑吉反疏李廵云堂牆名厓似堂牆曰畢郭以畢終南山之道名也其邊之厓如堂室之牆言平正也詩秦風云終南何有有紀有堂是也重厓岸注兩厓累者為岸音義重直龍反疏言兩厓相重累者亦名岸也岸上滸注岸上地音義滸呼五反疏岸上平地去水稍逺者名滸詩大雅緜篇云率西水滸之類也墳大防注謂隄音義墳符紛反防音房隄丁兮反疏李廵曰墳謂厓岸狀如墳墓名大防也詩周南云遵彼汝墳又釋地云墳莫大於河墳是也涘為厓注謂水邊音義涘舊音仕疏李廵曰涘一名厓謂水邊也詩秦風云所謂伊人在水之涘也窮瀆汜注水無所通者音義瀆音獨汜音似疏謂窮困不通之水瀆名汜也亦得名谿即釋山云山豄無所通谿郭注云所謂窮瀆者豄無所通與水注川同名是也谷者溦注通於谷音義溦本又作湄亡悲反又音微疏謂窮瀆汜若能通於谷者則别名溦也厓岸此已上釋厓岸之名也故題厓岸爾雅注疏卷六
