body:
  text: 欽定四庫全書經部十爾雅注疏小學類一訓詁之屬目録爾雅注解傳述人爾雅注疏序爾雅注序卷一釋詁卷二釋言卷三釋訓釋親卷四釋宫釋器卷五釋樂釋天卷六釋地釋丘卷七釋山釋水卷八釋草卷九釋木釋蟲卷十釋魚釋鳥卷十一釋獸釋畜臣等謹案爾雅注疏十一卷晉郭璞注宋邢昺等疏治爾雅者自犍為文學而下共十餘家璞薈萃為注陸德明謂其洽聞強識為世所重自是以後為解義者甚多釋文而外傳者甚少朝公武曰舊有孫炎髙璉疏以其淺略命昺等别著此書其後若陸佃之埤雅羅願之爾雅翼又因邢疏而廣之者也明刻本不載釋文今補入又取鄭樵注本參校是正為多皆乾隆四年奉敕校定本也乾隆四十一年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀爾雅注疏目録欽定四庫全書爾雅注解傳述人唐國子博士兼太子中允贈齊州刺史吳縣開國男陸德眀録爾雅者所以訓釋五經辨章同異實九流之通路百氏之指南多識鳥獸草木之名博覽而不惑者也爾近也雅正也言可近而取正也釋詁一篇蓋周公所作釋言以下或言仲尼所增子夏所足叔孫通所益梁文所補張揖論之詳矣前漢終軍始受豹鼠之賜自兹迄今斯文盛矣先儒多為億必之説乖蓋闕之義惟郭景純洽聞強識詳悉古今作爾雅注為世所重今依郭本為正犍為文學注三卷一云犍為郡文學卒史臣舍人漢武帝時待詔闕中卷劉歆注三卷與李巡注正同疑非歆注樊光注六卷京兆人後漢中散大夫沈旋疑非光注李巡注三卷汝南人後漢中黃門孫炎注三卷音一卷郭璞注三卷字景純河東人東晉𢎞農太守著作郎音一卷圖贊二卷梁有沈旋約之子集衆家之注陳博士施乾國子祭酒謝嶠舍人顧野王並撰音既是名家今亦采之附於先儒之末爾雅注解傳述人欽定四庫全書爾雅注疏序翰林侍講學士朝請大夫守國子祭酒上柱國賜紫金魚袋臣邢昺等奉敕校定夫爾雅者先儒授教之術後進索隱之方誠傳注之濫觴為經籍之樞要者也夫混元闢而三才位聖人作而六藝斯興本乎發德於中將以納民於善洎夫醇醨既異步驟不同一物多名係方俗之語片言殊訓滯今古之情將使後生若為鑽仰繇是聖賢間出詁訓遞陳周公倡之於前子夏和之於後蟲魚草木爰自爾以昭彰禮樂詩書盡由斯而紛郁然又時經戰國運歷挾書傳授之徒寖微發揮之道斯寡諸篇所釋世罕得聞惟漢終軍獨深其道豹鼠既辨斯文遂隆其後相傳乃可詳悉其為注者則有犍為文學劉歆樊光李巡孫炎雖各名家猶未詳備惟東晉郭景純用心幾二十年注解方畢甚得六經之旨頗詳百物之形學者祖焉最為稱首其為義疏者則俗間有孫炎髙璉皆淺近俗儒不經師匠今既奉敕校定考案其事必以經籍為宗理義所詮則以景純為主雖復研精覃思尚慮學淺意疏謹與尚書駕部員外郎直祕閣臣杜鎬尚書都官員外郎祕閣校理臣舒雅太常博士直集賢院臣李維諸王府侍講太常博士兼國子監直講臣孫奭殿中丞臣李慕清大理寺丞國子監直講臣王煥大理評事國子監直講臣崔偓佺前知洺州永年縣事臣劉士元等共相討論為之疏釋雖上遵睿旨共竭於顓蒙而下示將來尚慙於疏略謹序爾雅注疏序爾雅注序晉郭璞撰唐陸德明音義宋邢昺疏爾雅序疏爾雅者釋文云所以訓釋五經辨章同異實九經之通路百氏之指南多識鳥獸草木之名博覽而不惑者也爾近也雅正也言可近而取正也釋詁一篇蓋周公所作釋言以下或言仲尼所增子夏所足叔孫通所益梁文所補張揖云昔在周公纘述唐虞宗翼文武克定四海勤相成王踐阼理政日昃不食坐而待旦德化宣流越裳來貢嘉禾貫桑六年制禮以導天下著爾雅一篇以釋其義傳乎後孠歷載五百墳典散落唯爾雅常存禮三朝記哀公曰寡人欲學小辨以觀於政其可乎孔子曰爾雅以觀於古足以辨言矣春秋元命包言子夏問夫子作春秋不以初哉首基為始何是以知周公所造也率斯以降超絶六國越踰秦楚爰暨帝劉魯人叔孫通撰置禮記文不違古今俗所傳三篇爾雅或言仲尼所增或言子夏所益或言叔孫通所補或言是沛郡梁文所著皆解家所説先師口傳既無正驗聖人所言是故疑不能明也夫爾雅為書也文約而義固其陳道也精研而無誤真七經之檢度學問之階路儒林之楷素也序與緒音義同釋詁云敘緒也言已注述之由敘陳此經之旨若繭之抽緒耳孔子作書序子夏作詩序故郭氏亦謂之序序之大指凡有五焉初自夫爾雅者至辨同實而殊號者也明此書之用也二自誠九流之津涉至摛翰者之華苑也言為群經之樞要也三自若乃至莫近於爾雅言其博物他書不之過也四自爾雅者至其業亦顯明其興隆之時也五自英儒贍聞之士至末總序已所以作注之意也今各依文解之夫爾雅者所以通詁訓之指歸敘詩人之興詠總絶代之離詞辨同實而殊號者也音義夫音符爾字又作邇雅字亦作匹詁音古又音故興許應反總子孔反疏此明其用也夫者發語辭亦指示語指此爾雅者所以通詁訓之指歸也詁古也通古今之言使人知也訓道也道物之貌以告人也指歸謂指意歸鄉也言此書所以通暢古今之言訓道百物之貌使人知其指意歸鄉也若言初哉首基者其指歸在始也若言番番矯矯者其指歸在勇也略舉一隅他皆放此云敘詩人之興詠者敘次敘也鄭玄注周禮大司樂云興者以善物喻善事又注大師云興者見今之美嫌於媚諛取善事以喻勸之鄭司農云興者托於事物詠者永言也故舜典云歌永言孔注云歌詠其義以長其言又詩序云言之不足故嗟歎之嗟歎之不足故詠歌之斯皆詩人所為此書能次序之故言敘詩人之興詠也若言雍雍喈喈以興民協服也其虛其徐以詠威儀容止也如此之類皆是案爾雅所釋遍解六經而獨云敘詩人之興詠者以爾雅之作多為釋詩故毛公傳詩皆據爾雅謂之詁訓傳蓋亦此意也云總絶代之離詞者總聚也絶代謂逺代也離詞猶異詞也郭璞序方言云標六代之絶語類離詞之指韻亦猶此也以其六代絶逺四方乖越故今古語異夷夏詞殊此書能總聚而釋之使人知也若其繹又祭也周曰繹商曰肜夏曰復胙及注引方言之類是也云辨同實而殊號者也者辨謂辨別事物雖殊其號而同一實者此書辨之若繴謂之罿罿罬也罬謂之罦罦覆車也又釋草云唐蒙女蘿女蘿搜絲注云別四名如此之類是也誠九流之津涉六藝之鈐鍵學覽者之潭奧摛翰者之華苑也音義鈐其亷反鍵字又作楗其展反字林巨偃反鋭也一曰轄也廣雅云鍵牡也小爾雅云鍵謂之鑰方言云鑰也自關而東陳楚之間謂鑰為鍵或一音巨言反潭徒南反奧烏報反摛敕知反説文云舒也翰寒半反華胡瓜反苑於阮反疏此明其樞要也云誠九流之津涉者誠實也九流者序六藝為九種言於六經若水之下流也津涉者濟渡之處名言九流之多非此書無以通喻九河之廣非津涉無以渡案漢書藝文志云儒家者流五十三家八百三十五篇蓋出於司徒之官助人君順隂陽明教化者也遊文於六經之中留意於仁義之際祖述堯舜憲章文武宗師仲尼以重其言於道最為髙孔子曰如有所譽其有所試唐虞之隆殷周之盛仲尼之業已試之效者也然惑者既失精微而僻者又隨時抑揚違離道本苟以譁衆取寵後進循之是以五經乖析儒學寖衰此僻儒之患也道家者流三十七家九百九十三篇蓋出於史官歷記成敗存亡禍福古今之道然後知秉要執本清虛以自守卑弱以自持此人君南靣之術也合於堯舜之克讓易之謙謙一謙而四益此其所長也隂陽家者流二十一家三百六十九篇蓋出於羲和之官敬順昊天歷象日月星辰敬授民時此其所長也法家者流十二家二百一十七篇蓋出於理官信賞必罰以輔禮制易曰先王以明罰敕法此其所長也名家者流七家三十六篇蓋出於禮官古者名位不同禮亦異數孔子曰必也正名乎名不正則言不順言不順則事不成此其所長也墨家者流六家八十六篇蓋出於清廟之守茅屋采椽是以貴儉飬三老五更是以兼愛選士大射是以上賢宗祀嚴父是以右鬼順四時而行是以非命以孝視天下是以上同此其所長也從橫家者流十二家百七篇蓋出於行人之官孔子曰誦詩三百使於四方不能專對雖多亦奚以為又曰使乎使乎言其當權事制宜受命而不受辭此其所長也雜家者流二十家四百三篇蓋出於議官兼儒墨合名法知國體之有此見王治之無不貫此其所長也農家者流九家百一十四篇蓋出於農稷之官播百榖勸耕桑以足衣食故八政一曰食二曰貨孔子曰所重民食此其所長也此九流之大旨也云六藝之鈐鍵者案漢書藝文志六藝謂易書詩禮樂春秋六經也凡六藝一百三家三千一百二十三篇説文鈐鎖也方言云戶鑰自關之東陳楚之間謂之鍵小爾雅云鍵謂之鑰言此書為六藝之鎖鑰必開導之然後得其微旨也故云六藝之鈐鍵也云學覽者之潭奧者潭淵也室中西南隅謂之奧言隱奧也此書釋二儀之形象載八表之昏荒雖博學廣覽之士莫能究淵深隱奧故云學覽者之潭奧也云摛翰者之華苑也者言此書森蘿萬有純粹六經摛文染翰之士凡以掇其英華若園苑然故云華苑也若乃可以博物不惑多識於鳥獸草木之名者莫近於爾雅音義近如字又音附近之近疏此言其博物也云若乃者因上起下語上既言其功用此復美其博物故云若乃既可以博釋庶物又能多識辨於鳥獸草木之名者莫近於爾雅言爾雅最近之也案公羊傳説春秋功德云撥亂世反諸正莫近於春秋何休云莫近猶莫過之也然則博物多識他書亦莫過於爾雅也爾雅者蓋興於中古隆於漢氏豹鼠既辨其業亦顯音義中丁仲反又如字中古謂周公也豹百教反疏此言興隆之時也云蓋興於中古者爾雅之作經傳莫言其人及時世但相傳云周公作之以教成王無正文故云蓋以疑之經典通以伏羲為上古文王為中古孔子為下古周公文王子父統子業周公亦可為中古故云蓋興於中古云隆於漢氏者以夫子沒後書紀散亡戰國陵遲嬴秦燔滅則此書亦從而墜矣洎乎漢氏御宇旁求典籍除挾書之律開獻書之路此書亦從而隆矣故云隆於漢氏也云豹鼠既辨其業亦顯者謂漢武帝時孝亷郎終軍既辨豹文之鼠人服其博物故爭相傳授爾雅之業於是遂顯言不但興行兼亦廣顯故云亦也英儒贍聞之士洪筆麗藻之客靡不欽玩耽味為之義訓璞不揆檮昧少而習焉沈研鑽極二九載矣雖注者十餘然猶未詳備並多紛謬有所漏略是以復綴集異聞會稡舊説考方國之語采謡俗之志錯綜樊孫博關羣言剟其瑕礫搴其蕭稂事有隱滯援據徵之其所易了闕而不論别為音圖用袪未寤輒復擁篲清道企望塵躅者以將來君子為亦有涉乎此也音義贍時豔反玩五貫反耽丁南反璞普剝反揆巨癸反檮徒刀反檮杌也少詩照反沈直金反研五堅反鑽子官反注之戍反紛芳云反謬靡幼反鄭注禮記云誤也方言云詐也本或作繆音同復扶又反綴丁衛反又丁劣反會古外反周禮注云計也本又作檜音同廣雅云檜收也稡子外反又子骨反聚也謡音遙綜子宋反剟丁恱反説文云利也廣雅云削也又都活反瑕戶加反玉翳也礫力的反説文云小礓石搴字又作居展反又去虔反拔也蕭先遼反稂音郎稂童粱穢禾草也詩云不稂不莠隱於謹反滯直例反援音袁引也易以豉反了本亦作憭音同照察也袪去魚反寤五故反篲字又作彗似稅反又囚醉反一音息遂反説文云掃竹也企邱豉反躅本又作躅直録反漢書音義躅迹也韋昭音擢云三輔謂牛蹄迹為躅鄭氏音拘􅠁案字林􅠁音竹足反疏此言已所以作注之意也云英儒贍聞之士者案禮辭名記德過千人曰英儒者柔也能以德柔服人也贍多也士者有德之稱言英俊通儒多聞之士也云洪筆麗藻之客者洪大也麗美也藻水藻也有文以喻人之文章言大有詞筆美於文章之客也云靡不欽玩耽味為之義訓者靡無也欽玩猶敬愛也耽味猶樂嗜也言英儒等無不敬愛此書如耽廣樂嗜嘉肴然故曰耽味而為之義理訓解謂作注也云璞不揆檮昧少而習焉者此自謙也揆度也檮謂檮杌無知之貌昧暗也郭氏言已不度其無知暗昧自少小而習此書焉云沈研鑽極二九載矣者此言用力深不敢苟為注解也謂深沈研核鑽求窮極凡十八載故云二九載矣云雖注者十餘然猶未詳備者言作注者雖十有餘家猶尚未能精詳具備十餘家者陸德明敘録犍為文學注二卷劉歆注三卷樊光注六卷李巡注三卷孫炎注三卷惟此五家而已又五經正義援引有某氏謝氏顧氏今郭氏言十餘者典籍散亡未知誰氏或云沈旋施乾謝􆀿顧野王者非也此四家在郭氏之後故知非也云並多紛繆有所漏略者言十家所注並多紛紜錯繆若孫叔然覭髣茀離字别為義是紛繆也其所難解則全不入根節是漏略也云是以復綴集異聞會稡舊説者是以者因前起後語因前十家所注紛繆漏略起已作注之意故言是以對前已有注故云復綴集謂聨綴聚集異聞者注所引六經子史之類是也會稡者廣雅云會收也稡聚也舊説謂十家所説也雖不能盡善亦時有可觀其所善者則收聚用之也云考方國之語者考成也四方之國言語不同有可通釋者則援引考成之注引方言是也云采謡俗之志者采取也徒歌謂之謡案漢書地理志云好惡取舍動靜亡常隨君上之情欲故謂之俗但童謡嬉戲之言及俗聞有所記志可以通此書者亦采用之若榽橀注引齊人諺曰上山斫檀榽橀先殫蠨蛸注云俗為喜子之類是也云錯綜樊孫者謂交錯綜聚樊先孫炎二家之注取其理長者用之云博關羣言者關通也羣言謂子史及小説也言非但援引六經亦博通此子史等以為注説也云剟其瑕礫搴其蕭稂者此喻已作注去惡取善也剟其瑕礫以玉石喻也剟削去其疵瑕瓦礫以取瑾瑜也搴其蕭稂以禾莠喻也搴拔也蕭蒿也稂童粱莠類也拔去其蕭蒿稂莠以存其嘉禾也云事有隱滯援據徴之者援引也徴成也若事有隱奧滯泥者則援引經據以證成之也云其所易了闕而不論者謂通見詩書不難曉了者則不須援引故闕而不論也云别為音圖用袪未寤者謂注解之外别為音一卷圖贊二卷字形難識者則審音以知之物狀難辨者則披圖以别之用此音圖以袪除未曉寤者故云用袪未寤也云輒復擁篲清道企望塵躅者此郭氏自問也擁手持也篲帚也清道謂清潔道塗也企望者企踵而瞻望也塵躅者塵路躅迹也言已注此書若人持帚以清道企踵而望其芳塵美迹所以然者何謂是自問也云以將來君子為亦有涉乎此也者此亦答也言已注此書非他以為將來有德君子之為必欲研核百氏探討九流非爾雅不可必涉歷此途若其注釋未備則恐迷誤後人作注之由良為此也爾雅注序
