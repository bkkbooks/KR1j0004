body:
  text: 爾雅注疏卷十一考證釋獸第十八鹿牡麚牝麀其子麛其跡速絕有力石經麚作鹿陸本速作子嬎陸本嬎作娩豕子豬䝐豶幺幼奏者豱豕生三豵二師一特所寢橧四豴皆白􅘻其跡刻絕有力􅙊牝豝陸本䝐作􅷱豴作蹢臣照按此豕類應入釋畜合馬牛羊狗鷄爲六畜貘白豹注能䑛食銅錫及竹骨陸本䑛作鄭樵曰牙齒極堅今人多以其牙託爲佛牙虪黒虎陸本虪作貀無前足臣照按異物志貀出朝鮮似猩猩蒼黒色無前兩足能捕䑕陳藏器曰骨豽獸出西方突厥國似狐而大長尾臨海志狀如虎形頭似狗出東海水中宼宗奭曰今出登萊州狀非狗非獸非魚前脚似獸尾即魚身有短青白毛毛有黒㸃或曰方書腽肭臍即貀外腎貈子貆注其雌者名􅭗陸本􅭗作麝父麕足陸本麕作麇豺狗足鄭樵曰今亦謂之豺狗害人牛馬猱蝯善援陸本蝯作猨貜父善顧臣照按貜本作玃集韻或作貜蠷又作玃恭于切音拘玃者純牡無牝故名玃父又下文豦迅頭郭注云今建平山中有豦大如狗似獼猴黄黒色西山經云崇吾之山有獸焉狀如禺長臂善投石名曰舉父即此也時善椉領臣照按當連上文蜼卭鼻而長尾讀言蜼好登山蜂非别有獸名時也闕洩多狃臣照按洩與渫同猩猩有牝無牡故云闕洩伏行交足故云多狃非别有獸也當連上文猩猩小而好啼讀又疑闕洩當是闕膝羅願爾雅翼曰如婦人被髪袒足無膝羣行遇人則手掩其形寓屬疏寓寄也言此上獸屬多寄寓木上故題云寓屬鄭樵曰謂此等獸爲寓屬未詳何義或說多寄寓木上如此則自貍䝖已下方可言寓犀兕以前當别有命名恐失之臣照按說文寓本作禺今疏謂寄寓木上蓋因郭注寓䑕云寓謂獼猴之類寄寓木上故云不知寓字從禸音蹂說文獸足蹂地也細玩本文其跡躔其跡速其跡解其跡迒其跡刻無前足麕足狗足旄毛狗足其足蹯其跡夙歹多狃注狃脚饒指皆謂獸足之有掌爪非若馬蹄然者言也若以寄寓木上言則僅猶善登木蹂蝯善援蜼卭鼻注鼻露向上雨即自懸于樹數者而已似不可爲訓觀齸屬可以例見鼢鼠鄭樵曰地中行者今竹根有人謂之竹䶉伯勞所化廣雅謂之鼹鼠鼸鼠鄭樵曰田鼠者鼸鼠也鼷鼠鄭樵曰鼠之最小者郭云謂有螫毒者一說甘口鼠也鼬鼠鄭樵曰俗呼鼠狼江東呼為鼪即莊子云騏驥驊騮捕鼠不如貍鼪豹文鼮鼠鄭樵曰常在樹上如鼠大其文似虎豹今深林中甚多鼰鼠石經鄭樵本並作鼠羊曰齥注今江東呼齝爲齥陸本齥作齛齝作鄭樵曰皆謂食入肚中久則反吐出嚼之凡有角無前齒者皆然但命其所食之名或異爾魚曰須注鼓顋須息陸本顋作鰓鳥曰臭注張兩翅石經臭作具陸本翅作翄釋畜第十九騉駼枝蹄趼善陞甗鄭樵曰枝蹄如牛蹄是也牛枝蹄馬溷蹄牡曰隲注今江東呼䭸馬爲隲陸本隲作隲䭸作父駵曰駁黄曰騜石經二曰字並作白靑驪驎驒陸本驎作粼一目白瞷陸本瞷作犦牛注即犎牛也領上肉犦胅起高二尺許狀如橐駞肉鞍一邊陸本犦作𦢊犤牛注今之􅵈牛也陸本􅵈作㹄犣牛注旄牛也陸本旄作髦牛石經作犑牛角一俯一仰觭注牛角低仰陸本仰作卭黒脣犉陸本犉作􅧄夏羊鄭樵曰疑今胡羊也多出夏州牡羭鄭樵曰今人呼牡羊爲羖角三觠羷注觠角三匝陸本匝作迊長喙獫短喙猲獢陸本猲作獥鷄犬者蜀石經犬作大馬八尺爲駥陸本駥作戎六畜石經鄭本俱有此二字監本毛本無今從石經補右六畜有彘五尺爲􅙊一句則上文羊屬之後應有彘屬今乃見于釋獸子嬎之後曰豕子豬云云不知何時以畜入獸也爾雅注疏卷十一考證尚書臣張照謹言爾雅一書凡將倉林之流其厠於聖經列於學官者以所訓詁皆先聖先賢之語也韓愈云凡爲文須略識字字旣今古不同文亦後先逈異苟非述古以開今曷由發蒙而契聖此爾雅所以爲重而不徒以辨豹鼠注蟲魚遂足當識字之目也皇上稽古右文稱先啓後重刋經史被于辟廱以逮四海臣忝禁直校讐亥豕土風鄉語今古攸殊典册無徴難以臆斷惟就前賢辨論之語與郭邢岐趨者有可採備即著于篇間或出其螢爝塵㸃汗靑旣沐聖俞並列簡末臣謹識侍講學士臣林枝春庶子臣朱良裘侍讀臣齊召南原任編修臣聞棠編修臣宋邦綏庶吉士臣邵齊燾㧞貢生臣費應泰臣楊茂遷奉敕恭校刋
