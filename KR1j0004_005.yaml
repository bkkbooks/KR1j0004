body:
  text: 欽定四庫全書爾雅注疏卷三晉郭璞注唐陸德眀音義宋邢昺疏釋訓第三音義訓休運反張揖雜字云訓者謂字有意義也案釋詁以下三篇皆釋古今之語方俗之言意義不同故立號亦異至於訓釋墳典其實一焉疏案釋詁云訓道也周禮地官有土訓誦訓鄭司農注云謂以逺方土地所生異物以告道王也後鄭云玄謂土訓能訓説土地善惡之勢誦訓能訓説四方所誦習及人所作為及時事然則此篇以物之事義形貌告道人也故曰釋訓案此所釋多釋詩文故郭氏即以詩義解之眀明斤斤察也注皆聰眀鑒察音義斤樊居覲反舍人云眀明甚明也斤斤物精詳之察孫云斤斤重慎之察也聰七公反疏舍人曰明明言其明甚孫炎曰明明性理之察也大雅常武云赫赫明明舍人曰斤斤物精詳之察也孫炎曰斤斤重愼之察也周頌執競云斤斤其明聰明鑒察也條條秩秩智也注皆智思深長音義條條舍人本作攸攸沈亦音條秩直栗反思息嗣反下文并注同疏皆智思深長也小雅賓之初筵云左右秩秩言其威儀審智不失禮也穆穆肅肅敬也注皆容儀謹敬疏周頌雍篇云有來雍雍至止肅肅相維辟公天子穆穆此皆禘祭之時容儀謹敬也諸諸便便辨也注皆言辭辨給音義便婢綿反疏皆言辭辨給也論語云便便言小雅采菽云平平左右毛傳云平平辨治也便平古今字肅肅翼翼恭也注皆恭敬疏皆恭敬也大雅思齊云肅肅在廟大明云維此文王小心翼翼言文王及羣臣恭敬貌也雍雍優優和也注皆和樂音義雍於容反優音憂樂音洛疏大雅思齊云雍雍在宫商頌長發云敷政優優此皆人君德政和樂也兢兢憴憴戒也注皆戒慎音義兢音矜憴食蒸反戒音界疏小雅小旻云戰戰兢兢大雅抑篇云子孫繩繩此皆小心戒慎也繩憴音義同戰戰蹌蹌動也注皆恐動趨步音義蹌七羊反恐邱勇反趨七俞反疏小旻云戰戰兢兢椘茨云濟濟蹌蹌此皆恐動趨步威儀謹敬也晏晏溫溫柔也注皆和柔疏衛風氓篇云言笑晏晏大雅抑篇云溫溫恭人此皆寬緩和柔也業業翹翹危也注皆懸危音義業魚怯反郭五答反翹巨遙反懸音玄疏大雅召旻云兢兢業業豳風鴟梟云子室翹翹此皆懸危恐懼也惴惴憢憢懼也注皆危懼音義惴之瑞反憢許堯反本又作嘵音同字林云懼也案詩云豫維音嘵嘵是也疏秦風黃鳥云惴惴其栗豳風鴟梟云豫維音嘵嘵此皆危恐戰懼也番番勇也注皆壯勇之貌音義番布何反詩云申伯番番居兆反舍人云得勝之勇也詩云矯虎臣疏大雅嵩髙云申伯番番魯頌泮水云矯虎臣此皆武夫壯勇之貌桓桓烈烈威也注皆嚴猛之貌疏皆威武嚴猛之貌周頌桓篇云桓桓武王小雅黍苖云烈烈征師洸洸赳赳武也注皆果毅之貌音義洸女皇反舍人本作僙音同赳居黝反説文云輕徑有才也詩云赳赳武夫疏大雅江漢云武夫洸洸周南兔罝云赳赳武夫此皆武夫果毅之貌左傳殺敵為果致果為毅藹藹濟濟止也注皆賢士盛多之容止音義藹烏害反濟咨禮反疏大雅卷阿云藹藹王多吉士小雅椘茨云濟濟蹌蹌此皆王朝賢士盛多之容止也悠悠洋洋思也注皆憂思音義悠音由洋音羊疏鄭風子襟云悠悠我思邶風二子乘舟云中心養養此皆想念憂思也洋養音義同又中庸云齊明盛服以承祭祀洋洋乎如在其上如在其左右鄭玄云洋洋人想思其傍倚之貌蹶蹶踖踖敏也注皆便速敏捷也音義蹶居衛反踖音夕又音籍便婢面反捷才接反疏唐風蟋蟀云良士蹶蹶小雅椘茨云執爨踖踖此皆便速敏捷于事也薨薨增增衆也注皆衆夥之貌音義薨虎宏反顧舍人本作雄雄衆諸仲反夥戶果反漢書云椘人謂多為夥疏周南螽斯云螽斯羽薨薨兮魯頌閟宫云蒸徒增增此皆人物衆夥之貌椘人謂多為夥蒸蒸遂遂作也注皆物盛興作之貌音義蒸諸仍反作子洛反疏皆物盛興作之貌也魯頌泮水云蒸蒸皇皇委委他他美也注皆佳麗美艷之貌音義委於危反詩云委委他他如山如河是也諸儒本並作褘於宜反舍人云褘褘者心之美引詩云亦作禕他本或作它字徒河反顧舍人引詩釋云褘褘它它如山如河謝羊兒反疏李巡曰皆容之美也孫炎曰委委行之美他他長之美詩鄘風君子偕老云委委他他毛傳云委委者行可委曲蹤迹也他他者德平易也是皆佳麗美艷之貌也忯忯惕惕愛也注詩云心焉惕惕韓詩以為悅人故言愛也忯忯未詳音義忯郭徒啓反與愷悌音同顧舍人渠支反李余之反忯忯和適之愛也惕他狄反疏李巡曰忯忯和適之愛也注云心焉惕惕者陳風防有鵲巢文云韓詩以為悅人故言愛也者燕人韓嬰為詩作傳名曰韓詩以此惕惕為悅人故言愛也稱稱格格舉也注皆舉持物音義稱尺仍反本亦作稱同疏皆謂舉持物也蓁蓁孽孽戴也注皆頭戴物音義蓁郭側巾反又子人反孽魚謁反又五葛反疏周南桃夭云其葉蓁蓁衛風碩人云庶薑孽孽此皆頭戴物婦人盛飾貌懕懕媞媞安也注皆好人安詳之容音義懕於占反説文云安靜也媞徒低反疏秦風小戎云厭厭良人毛傳云厭厭安靜也孫炎云媞媞行步之安也魏風葛屨云好人媞媞毛傳云媞媞安諦謂行步安舒而審諦也是皆好人安詳之容也祁祁遲遲徐也注皆安徐音義祁巨移反疏皆安徐也豳風七月云春日遲遲采繁祁祁丕丕簡簡大也注皆多大音義丕本或作丕同普悲反疏書立政云以並受此丕丕基周頌執競云降福簡簡是皆多大之稱存存萌萌在也注萌萌未見所出音義萌郭武耕反施云朋反字或作蕄疏謂存在也易繫辭云成性存存萌萌字書作􅽪説文作蕄郭云未見所出懋懋慔慔勉也注皆自勉強音義懋古茂字慔音暮亦作慕強其丈反疏皆出勉強也書曰懋哉懋哉慔與慕同庸庸慅慅勞也注皆劬勞也音義庸音容慅郭騷草蕭三音疏皆劬勞也有功庸者皆勞也小雅巷伯云勞人草草毛傳云草草勞心也又陳風月出云勞心慅兮慅草音義同赫赫躍躍迅也注皆盛疾之貌音義赫郭音釋舍人本作奭失石反説文云奭盛也謝許格反躍余斫反樊本作濯引詩釋云濯濯厥靈疏孫炎云赫赫顯著之迅大雅常武云赫赫業業毛傳云赫赫然盛也巧言詩云躍躍毚兔是皆顯著然疾之貌綽綽爰爰緩也注皆寬緩也疏皆寬緩也小雅角弓云綽綽有裕毛傳云綽綽寬也王風爰云有爰爰毛傳云爰爰緩意郭云悠悠稱稱丕丕簡簡存存懋懋庸庸綽綽盡重語者言此數字單言之其義亦同但古人有重語者故復出之坎坎樽樽喜也注皆鼓舞歡喜音義坎苦感反樽七旬反舍人云舞貌毛傳同郭云謂鼓舞歡喜也説文云樽士舞也宜從士尊也本或作蹲同疏皆鼓舞歡喜也小雅伐木云坎坎鼓我蹲蹲舞我鄭箋云為我擊鼓坎坎然為我興舞蹲蹲然謂以樂樂已也樽蹲音義同瞿瞿休休儉也注皆良士節儉音義瞿居具反休虛求反又虛虯反疏李巡曰皆良士顧禮節之儉也唐風蟋蟀云良士瞿瞿毛傳云瞿瞿然顧禮義也又云良士休休毛傳云休休樂道之心皆良士節儉也旭旭憍也注皆小人得志蹇之貌音義旭謝許玉反郭呼老反郭居天反案詩小雅小子音巨虐反今依詩讀九苗反疏郭氏讀旭旭為好好小雅巷伯云驕人好好鄭箋云好好者喜讒言之人也大雅板篇云小子毛傳云蹻蹻驕貌是皆小人得志憍蹇之貌也夢夢訰訰亂也注皆暗亂音義夢亡工亡棟二反沈施亡增反訰之閏之屯二反或作諄音同顧舍人云夢夢訰訰煩悶亂也疏孫炎曰夢夢昏昏之亂也大雅抑篇云視爾夢夢又曰誨爾諄諄皆是暗亂也訰諄音義同懪懪邈邈悶也注皆煩悶音義懪本又作蒲卓反又布卓反説文云大呼也自寃也邈亡角反疏懪懪煩悶也舍人曰藐藐憂悶也大雅抑篇云聼我藐藐毛傳云藐藐然不入也是皆煩悶之謂也儚儚洄洄惛也注皆迷惛音義儚字或作懵孫亡崩亡氷二反洄沈音回郭音韋音義云本或作音韋案字林重衣貌于回反惛音昏疏皆迷亂惛惑也郭音義云洄本作音韋版版蕩蕩僻也注皆邪僻音義版詩作板並如字僻匹亦反邪似嗟反疏皆邪僻也李巡曰版版者失道之僻也蕩蕩者弗思之僻也大雅板篇云上帝板板毛傳云板板反也上帝以稱王者也鄭箋云王為政反先王與天之道又蕩篇云蕩蕩上帝鄭箋云蕩蕩法度廢壞之貌版板蕩蕩音義同爞爞炎炎薰也注皆旱熱薰炙人音義爞郭徒冬反又直忠反炎于廉反薰本亦作燻或作熏許云反炙之石反疏皆旱熱之氣薰炙人也大雅雲漢云蘊隆蟲蟲毛傳云蘊蘊而暑隆隆而雷蟲蟲而熱又云赫赫炎炎毛傳云赫赫氣也炎炎熱氣也爞蟲音義同居居究究惡也注皆相憎惡音義究九又反疏李巡曰居居不狎習之惡孫炎曰究究窮極人之惡唐風羔裘云羔裘豹袪自我人居居又曰自我人究究毛傳曰居居懷惡不相親比之貌究究猶居居也是皆相憎惡也仇仇敖敖傲也注皆傲慢賢者音義仇音求敖本又作謷又作囂同五髙反傲本或作慠同五報反舍人本傲作毁釋云仇仇無倫理之貌謷謷衆口毁人之貌李同疏小雅正月云執我仇仇毛傳云仇仇猶謷謷也鄭箋云王既得我執留我其禮待我謷謷然亦不問我在位之功力言其有貪賢之名無用賢之實大雅板篇云我即爾謀聼我囂囂毛傳云猶謷也鄭箋云我就女而謀欲忠告以善道女反聼我言謷謷然不肯受是皆傲慢賢者敖謷囂音義同佌佌瑣瑣小也注皆才器細陋音義佌顧音此郭音徙謝音紫舍人云形容小貌瑣星果反亦作疏皆才器細陋也小雅正月云佌佌彼有屋毛傳云佌佌小也鄭箋云此言小人富也舍人曰瑣瑣計謀褊淺之貌節南山云瑣瑣姻亞鄭箋云瑣瑣婚姻妻黨之小人悄悄慘慘慍也注皆賢人愁恨音義悄七小反慘七感反慍于問反疏慍恨怒也皆賢人愁恨也邶風柏舟云憂心悄悄慍于羣小毛傳云慍怒也悄悄憂貌李巡曰慘慘憂之慍大雅抑篇云我心慘慘毛傳云慘慘憂不樂也痯痯瘐瘐病也注皆賢人失志懷憂病也音義痯郭古卵反又古玩反庾羊主反又羊朱反本或作庾疏小雅枤杜云四牡痯痯毛傳云痯痯罷貌又大雅板篇云靡聖管管毛傳云管管無所依也小雅正月云憂心愈愈毛傳云愈愈憂懼也此皆賢人失志懷憂病也殷殷惸惸忉忉慱慱欽欽京京忡忡惙惙怲怲奕奕憂也注此皆作者歌事以詠心憂音義殷于斤反樊光于謹反惸本或作煢巨營反忉都勞反慱徒端反施逋莫反郭徂兖徂沿二反忡恥忠反惙丁劣反怲彼病反奕音亦疏小雅正月云憂心殷殷毛傳云殷殷然痛也又云憂心惸惸毛傳云惸惸憂意也檜風羔裘云勞心忉忉鄭箋云三諌不從待放而去思君如是心忉忉然又素冠云勞心慱慱毛傳云慱慱憂勞也秦風云憂心欽欽毛傳云思望之心中欽欽然小雅正月云憂心京京毛傳云京京憂不去也召南草蟲云未見君子憂心忡忡毛傳云忡忡猶衝衝也鄭箋云未見君子者謂在塗時也在塗時憂憂不當君子無以寧父母故心衝衝然又曰憂心惙惙毛傳云惙惙憂也小雅頍辨云憂心怲怲毛傳云怲怲憂盛滿也又云憂心奕奕毛傳云奕奕然無所薄也此皆作者歌事以詠心憂也畇畇田也注言墾辟也音義畇本或作􅵆郭音巡沈居賓反謝蘇旬反字林云均均田也又羊倫反墾苦很反蒼頡篇云耕也廣雅云治也辟婢亦反開也疏謂耕墾開辟土田畇畇然也小雅信南山云畇畇原隰毛傳云墾辟貌畟畟耜也注言嚴利音義畟椘力反字或作稷耜音似疏舍人曰畟畟耜入地之貌周頌良耜云畟畟良耜俶載南畝毛傳云畟畟猶測測也鄭箋云良善也農人測測以利善之耜熾災是南畝也是言耜之嚴利也郝郝耕也注言土解音義郝音釋又呼各反解音蟹疏謂耕也謂土解散郝郝然也周頌載芟云其耕澤澤鄭箋云氣蒸逹而和之則澤澤然解散郝郝澤澤並音釋其義亦同繹繹生也注言種調音義繹音亦種之用反疏舍人云穀皆生之貌載芟云驛驛其逹也毛傳云逹射也鄭箋云逹出地也是言其種調勻皆出地而生也驛與繹音義同穟穟苖也注言茂好也音義穟郭音遂説文云禾垂之貌疏大雅生民云禾役穟穟毛傳云役列也穟穟苗好美也是言茂好也綿綿穮也注言藝耨精音義綿彌延反穮麃同方遙反耘也字林云耕禾間也左傳云譬如農夫是穮是蓘是也説文云穮耨鋤田也藝字亦作耘同音云疏孫炎云綿綿言詳密也載芟云綿綿其麃毛傳云麃耘也説文云穮耨鋤田也字林云穮耕禾間也是言藝耨精也穮麃耘藝音義同挃挃穫也注刈禾聲栗栗衆也注積聚緻音義挃郭丁秩反小爾雅云截穎謂之挃穫户郭反刈魚廢反衆諸仲反緻直吏反疏孫炎云挃挃穫聲也李巡曰栗栗積聚之衆也良耜云穫之挃挃積之栗栗毛傳挃挃穫聲也栗栗衆多也小爾雅云截穎謂之挃故郭云刈禾聲積聚緻也緻謂密也溞溞淅也注洮米聲烰烰蒸也注氣出盛音義溞郭蘇刀反詩云淅之溞溞謝所留反淅蘇厯反洮徒刀反洮猶淅也烰吕郭並音浮又符彪反詩作浮蒸之升反疏大雅生民云釋之叟叟蒸之浮浮毛傳云釋淅米也叟叟聲也浮浮氣也鄭箋云釋之蒸之以為酒及簠簋之實故郭云洮米聲氣出盛也溞叟音異義同浮烰音義同俅俅服也注謂戴辨服音義俅音求本亦作絿同戴丁代反辨音卞疏周頌絲衣云載辨俅俅毛傳云俅俅恭順貌鄭箋云載猶戴也辨爵辨也爵辨而祭于王士服也故郭云謂戴辨服峨峨祭也注謂執圭璋助祭音義璋音章疏大雅棫朴云奉璋峨峨毛傳云半圭曰璋峨峨盛壯也鄭箋云璋璋瓉也祭祀之禮王祼以圭瓉諸臣助之亞祼以璋瓉奉璋之儀峨峨然故郭云執圭璋助祭也鍠鍠樂也注鐘鼓音音義鍠胡光反樂如字疏周頌執競云鐘鼓喤喤毛傳云喤喤和也鄭箋云武王既定天下祭祖考之廟奏樂而八音克諧字書云鍠鍠樂之聲也故郭云鐘鼓音喤鍠音義同穰穰福也注言饒多音義穰而羊反疏執競云降福穰穰衆也鄭箋云神與之福又衆大謂如嘏辭也是言得福饒多也子子孫孫引無極也注世世昌盛長無窮音義引余忍余慎二反引長多也疏子子孫孫小雅椘茨文也引無極者作者所以釋之也舍人曰子孫長行美道引無極也郭云世世昌盛長無窮顒顒卬卬君之德也注道君人者之德望音義顒魚恭反卬五剛反郭魚殃反疏此道君人之德望也顒顒卬卬大雅卷阿文也君之德也者作者釋之也詩云顒顒卬卬如圭如璋令聞令望毛傳云顒顒溫貌卬卬盛貌鄭箋云令善也王有賢臣與之以禮義相切磋體貌則顒顒然敬順志氣則卬卬然髙朗如玉之圭璋也人聞之則有善聲譽人望之則有善威儀德行相副丁丁嚶嚶相切直也注丁丁斫木聲嚶嚶兩鳥鳴以喻朋友切磋相正音義丁豬耕反嚶烏耕反斫音灼磋七何反疏直猶正也小雅伐木云伐木丁丁鳥鳴嚶嚶鄭箋云昔日未居位在農之時與友生于山巖伐木為勤苦之事猶以道德相切正也故郭云丁丁伐木聲嚶嚶兩鳥鳴以喻朋友切磋相正藹藹萋萋臣盡力也注梧桐茂賢才衆地極化臣竭忠噰噰喈喈民協服也注鳳凰應德鳴相和百姓懷附興頌歌音義藹于蓋反萋七西反盡苦忍反噰本或作雍又作雍同于恭反喈古諧反應音譍疏大雅卷阿云藹藹王多吉士鄭箋云王之朝多善士藹藹然又云菶菶萋萋雍雍喈喈毛傳云梧桐盛也鳳皇鳴也臣竭其力則地極其化天下和洽則鳳皇樂德鄭箋云菶菶萋萋喻君德盛也雍雍喈喈喻民臣和協是皆臣下盡力民人協服也故郭云梧桐茂賢才衆地極化臣竭忠鳳皇應德鳴相和百姓懷附興頌歌也佻佻契契愈遐急也注賦役不均小國困竭賢人憂歎逺益急切音義佻徒雕反詩云佻佻獨行歎息也契苦結反詩云契契字又作苦計反愈本或作俞同瑜庾二音竭本又作巨列反疏愈益也遐逺也謂賦役不均小國困竭賢人憂歎逺益急切也小雅大東云糾糾葛屨可以履霜佻佻公子行彼周行毛傳云佻佻獨行貌公子談公子也鄭箋云葛屨夏屨也周行周之列位也言時財貨盡雖公子衣屨不能順時乃夏之葛屨今以履霜送轉餫因見使行周之列位者而發幣焉言雖困乏猶不得止又云契契寤歎哀我憚人毛傳云契契憂苦也鄭箋云今談大夫契契憂苦而寤歎哀其民人之勞苦是也宴宴粲粲尼居息也注盛飾宴安近處優間音義宴烏殿烏顯二反粲七旦反尼女乙反謝羊而反又奴啓反飾音式處音杵間音間疏尼近也謂宴宴盛飾近處優間也小雅北山或燕燕居息毛傳云燕燕安息貌大東云東人之子職勞不來西人之子粲粲衣服毛傳云東人談人也來勤也西人京師人也粲粲鮮盛也鄭箋云職主也東人勞苦而不見謂勤京師人衣服鮮潔而逸豫言王政偏甚也哀哀悽悽懷報德也注悲苦征役思所生也音義悽郭本或作萋同古兮反苦如字又立故反思息嗣反郭音如字疏懷思也悲苦征役思報父母之德也小雅蓼莪云哀哀父母生我劬勞鄭箋云哀哀者恨不得終養父母報其生長已之苦郭音云悽本或作萋出車云赫赫南仲薄伐西戎春日遲遲卉木萋萋是也言以此征役故思所生也所生謂父母倏倏嘒嘒罹禍毒也注悼王道穢塞羡蟬鳴自得傷已失所遭讒賊音義倏郭徒的反顧舒育反樊本作攸引詩云攸攸我思嘒虎惠反罹力支反悼音盜已音紀疏罹遭也小雅小辨云踧踧周道鞠為茂草毛傳云踧踧平易也周道周室之通道鞠窮也鄭箋云此喻幽王信褒姒之讒亂其德政使不通于四方又曰菀彼栁斯鳴蜩嘒嘒毛傳云蜩蟬也嘒嘒聲也鄭箋云栁木茂盛則多蟬案詩序云小辨刺幽王也太子之傅作焉毛傳云幽王取申女生太子宜臼又悅褒似生子伯服立以為后而放宜臼將殺之故郭云悼王道穢塞羡蟬鳴自得傷已失所遭讒賊倏踧並音狄晏晏旦旦悔爽忒也注傷見絶棄恨士失也音義旦本或作􅘔同都歎反忒他得反疏悔恨也爽忒差失也皆婦人恨夫棄已而行差失也衛風氓篇云總角之宴言笑晏晏信誓旦旦毛傳云總角結髮也晏晏和柔也信誓旦旦然鄭箋云我為童女未筓結髮晏然之時女與我言笑晏晏然而和柔我其以信相誓旦旦耳言其懇惻款誠案詩序云恨刺時也宣王之時禮義消亡淫風大行男女無别遂相奔誘華落色衰復相棄背或乃困而自悔喪其妃耦故序其事以風焉故郭云傷見絶棄恨士失也臯臯琄琄刺素食也注譏無功德尸寵祿也音義臯古豪反樊本作浩古老反琄胡犬古犬二反刺字又作誎同七賜反疏素空也刺無德而空食其祿也舍人曰臯臯不治之貌大雅召旻云臯臯訿訿曾不知其玷毛傳云皋皋頑不知其道也鄭箋云玷缺也王政已大壞小人在位曾不知大道之缺某氏云鞙鞙無德而佩小雅大東云鞙鞙佩璲不以其長毛傳云鞙鞙玉貌璲瑞也鄭箋云佩璲者以瑞玉為佩佩之鞙鞙然居其官職非其才之所長也徒美其佩而無其德刺其素餐是也郭云譏無功德尸寵祿也者案鄭注禮記云尸謂不知人事無辭讓也以其尸皆神象居位不言但受祭享小人在位亦無言而受寵祿有似于尸故云尸寵祿也㻆鞙音義同歡歡愮愮憂無告也注賢者憂懼無所訴也音義歡古玩反愮音遙本又作搖樊本作遙又作佻恌與愮同訓也書云愮愮憂無告也廣雅云搖亂也告如字又古毒反訴音素疏謂賢者憂懼無所告訴也大雅板篇云老夫灌灌毛傳云灌灌猶款款也鄭箋云老夫諌女款款然王風云中心搖搖毛傳云搖搖憂無所訴灌歡愮搖音義同憲憲泄泄制法則也注佐興虐政設教令也音義泄余誓反或作呭同疏李巡曰皆惡黨為制法則也孫炎曰厲王方虐諂臣並為制作法令大雅板篇云天之方難無然憲憲天之方蹶無然泄泄毛傳云憲憲猶欣欣也蹶動也泄泄猶沓沓也鄭箋云天斥王也王方欲艱難天下之民又方變更先王之道臣乎女無憲憲然無沓沓然為之制法度逹其意以成其惡皆是佐興虐政設教令也謔謔謞謞崇讒慝也注樂禍助虐增譖惡也音義謔虛虐反謞郭虛各反或火角反慝謝切得反諸儒並女陟反言隱匿其情以飾非樂如字又音洛譖側禁反疏崇增也讒也慝惡也舍人曰謔謔謞謞皆盛烈貌孫炎曰厲王暴虐大臣謔謔謞謞然盛以興讒惡也大雅板篇云天之方虐無然謔謔毛傳云謔謔然喜樂鄭箋云王方為酷虐之政女無謔謔然以讒慝助之又曰多將熇熇不可救藥毛傳云熇熇然熾盛也鄭箋云多行熇熇慘毒之惡誰能止其禍是也謞熇音義同翕翕訿訿莫供職也注賢者陵替姦黨熾背公恤私曠職事音義訿子爾反字林云不思稱乎上之意供音恭熾尺志反背音佩疏言賢者陵替姦黨熾盛背公恤私曠其職事無肯供職也小雅小旻云潝潝訿訿亦孔之哀毛傳云潝潝然患其上訿訿然思不稱乎上鄭箋云臣不事君亂之階也甚可哀也又大雅召旻云皋皋訿訿毛傳云訿訿窳不共事也故郭云賢者陵替姦黨熾盛背公恤私曠職事説文云窳懶也草木皆自竪立惟瓜瓠之屬卧而不起似若懶人常卧室故字從冗音眠速速蹙蹙惟逑鞫也注陋人専祿國侵削賢士求哀念窮迫音義戲子六反逑巨鳩反郭云迫也字林云斂聚也本亦作求鞫居六反迫音伯疏惟念也逑急迫也鞫窮也言鄙陋小人専據爵祿國土侵削致賢士求哀念其窮迫也小雅正月云蓛蔌方有榖毛傳云蔌蔌陋也鄭箋云榖祿也此言小人富而窶陋將貴也又節南山云蹙蹙靡所騁毛傳云騁極也鄭箋云蹙蹙小之貌我視四方土地日見侵削于夷狄蹙蹙然雖欲馳騁無所之也速蔌音義同抑抑密也注威儀審諦秩秩清也注德音清泠音義抑音億諦音帝秩直乙反泠郎丁反疏言威儀審諦德音清泠也舍人曰威儀密靜也大雅假樂云威儀抑抑德音秩秩鄭箋云成王立朝之威儀致密無所失教令又清眀天下皆樂仰之甹夆掣曵也注謂牽挽音義甹普經反夆孚逢反掣本或作􅠺同充世反説文云引而縱之曵餘世反疏孫炎曰謂相掣曵入于惡也郭云謂牽挽周頌小毖嗣王求助也云莫豫荓蜂毛傳云荓蜂􅠺曵也鄭箋云羣臣小人無敢我􅠺曵謂為譎詐欺不可信也然則掣曵者從旁牽挽之言是挽離正道使就邪僻荓甹夆蜂掣􅠺音義同朔北方也注謂幽朔音義朔所角反疏舍人曰朔盡也北方萬物盡故言朔也李超曰萬物盡于北方小雅出車云城彼朔方毛傳云朔方北方也但北方大名皆言朔方堯典云宅朔方郭云謂幽朔不俟不來也注不可待是不復來音義來本或作徠迷同力胎反復如字疏俟待也既云不待是不來也郭云不可待是不復來不遹不迹也注言不循軌迹也音義遹古述字一音聿迹子亦反詩云念彼不迹傳云不循道也循音巡疏遹循也迹軌迹也謂不循道者曰不迹郭云言不循軌迹也小雅沔彼云念彼不迹毛傳云不迹不循道也是矣不徹不道也注徹亦道也音義徹直列反疏小雅十月云天命不徹毛傳云徹道也鄭箋云不道者言王不循天之政教是也勿念勿忘也注勿念念也音義忘音亡下同疏勿念念也念即不忘也若大雅文王篇云無念爾祖是也萱諼忘也注義見伯兮考槃詩音義萱施音袁謝許袁反郭云義見伯兮詩云焉得萱草毛傳云萱草令人善忘則謝讀為是諼許爰反槃步干反本又作盤疏衛伯兮云焉得諼草毛傳云諼草令人忘憂又考槃云永矢弗諼是也伯兮篇本或作萱草每有雖也注詩曰每有良朋辭之雖也疏小雅棠棣云每有良朋况也永歎毛傳云况兹永長也箋云每有雖也良善也當急難之時雖有善同門來兹對之長嘆而已郭云辭之雖也者言為語辭之雖無他義也饎酒食也注猶今云饎饌皆一語而兼通音義饎尺志反字林云熟食也又充之反舍人本又作喜釋云古曰饎饌乳戀反疏小雅天保云吉蠲為饎毛傳云吉善蠲潔也饎酒食也郭云猶今云饎饌皆一語而兼通者言饎之一字通酒食兩名也李巡曰得酒食則喜歡也舞號雩也注雩之祭舞者吁嗟而請雨音義號戶髙反孫炎云雩之祭有舞有號雩音于祭名吁許于反疏孫炎云雩之祭有舞有號左傳云龍見而雩服杜皆云雩之言逺也逺為百榖祈膏雨月令仲夏云大雩帝鄭注云雩吁嗟求雨之祭也郭云雩之祭舞者吁嗟而請雨是同鄭説也暨不及也注公羊傳曰及我欲之暨不得已暨不得已是不得及音義暨其器反已音以疏案春秋隱元年三月公及邾婁儀父盟于昧公羊傳曰及者何與也會及暨皆與也曷為或言會或言及或言暨會猶最也及猶汲汲也暨猶暨暨也及我欲之暨不得已也然則暨者非我欲之事不獲已而為會者也故云不及也蠢不遜也注蠢動為惡不謙遜也音義蠢昌允反疏蠢動也遜順也言蠢動為惡不謙遜也小雅采芑蠢爾蠻荆大邦為讎是也如切如磋道學也注骨象須切磋而為器人須學問以成德如琢如磨自修也注玉石之被琢磨猶人自修飾瑟兮僴兮恂栗也注恆戰竦赫兮咺兮威儀也注貌光宣有斐君子終不可諼兮注斐文貌道盛德至善民之不能忘也注常思詠音義磋七何反琢丁角反治玉也本或作琢非也僴本或作􅏌同下板反郭音簡恂音荀郭音峻鄭玄注禮記同云謂嚴栗也謝私尹反栗音栗赫火格反烜吁逺反烜者光明宣著今並作咺字音同斐孚尾反疏此舉衛風淇澳篇文以釋之也云如切如磋者詩文也云道學也者作者以釋詩也道言也言人之學以成德如切如磋骨象以成器毛傳云治骨曰切象曰磋道其學而成也故郭云骨象須切磋而為器人須學問以成德云如琢如磨者詩文也云自修也者釋之也言人自修飾如琢磨玉石毛傳云治玉曰琢石曰磨聼其規諌以自修如玉石之見琢磨郭云玉石之被雕磨猶人自修飾云瑟兮僴兮者詩文也恂栗也者釋之也謂嚴恂戰栗也故郭云恆戰竦毛傳云瑟矜莊貌僴寬大貌是外貌莊嚴又內寬裕也云赫兮咺兮者詩文也威儀也者釋之也言赫咺者容儀發揚之貌言威儀也毛傳云赫有明德赫赫然咺威儀容止宣著也故郭云貌光宣云有斐君子終不可諼兮者詩文也云道盛德至善民之不能忘也者釋之也毛傳云斐文章貌諼忘也此道有斐然文章之君子盛德至善如此故民稱之常思詠終不能忘也案詩稱君子謂武公既微且腫骭瘍為微腫足為腫注骭腳脛瘍創也音義微如字書作三蒼云足創腫本或作腫同並籀文瘇字也蜀勇時踵二反骭下諌反郭作扞音古案反謂腳脛也瘍音羊腫之勇反脛戶定反創初良反疏云既微且腫者小雅巧言文也云骭瘍為微腫足為腫者釋之也孫炎曰皆水濕之疾也郭云骭腳脛也瘍創也然則膝之下有瘡腫是涉水所為故鄭箋亦云此人居下濕之地故生微腫之疾詩云居河之麋是居下濕也是刈是濩濩煮之也注煮葛為絺綌音義刈音乂濩又作鑊同戶郭反煮之與反絺丑尼反綌去􅊇反疏云是刈是濩者周南葛覃文也云濩煮之也者釋之也舍人曰是刈刈取之是濩煮治之郭云煮葛為絺綌以煮之于濩故曰濩煮非訓濩為煮以彼下云為絺為綌故知煮葛為絺綌也毛傳云精曰絺粗曰綌履帝武敏武迹也敏拇也注拇迹大指處音義敏如字舍人本作畝釋云古者薑嫄履天帝之迹于畎畝之中而生后稷拇音畝足大指處昌慮反疏云履帝武敏者大雅生民文也云武迹也敏拇也者釋之也郭云拇迹大指處鄭箋詩云祀郊禖之時時則有大神之迹薑嫄履之足不能滿履其拇指之處于是遂有身而生后稷是其事也張仲孝友注周宣王時賢臣善父母為孝善兄弟為友疏云張仲孝友者小雅六月文也云善父母為孝善兄弟為友者釋之也李巡云張仲字其人孝故稱孝友毛傳云張仲賢臣也鄭箋云張仲吉甫之友其性孝友以詩序云六月宣王北伐也故郭云周宣王時賢臣有客宿宿言再宿也有客信信言四宿也注再宿為信重言之故知四宿音義宿先六反重直用反疏云有客宿宿有客信信者周頌有客文也云言再宿也言四宿也者釋之也毛傳云一宿曰宿再宿曰信各重言之故知再宿及四宿也美女為媛注所以結好媛音義媛為眷反好呼報反疏詩鄘風君子偕老云展如之人兮邦之媛也故此釋之郭云所以結好媛孫炎曰君子之援助然則由有美可以援助君子故云美女為媛美士為彥注人所彥詠音義彥音唁疏鄭風羔裘云彼其之子邦之彥兮故此釋之也毛傳云彥士之美稱郭云人所彥詠舍人曰國有美士為人所言道其虛其徐威儀容止也注雍容都雅之貌疏云其虛其徐鄘風北風文也威儀容止也者釋之也郭云雍容都雅之貌孫炎云虛徐威儀謙退也然則虛徐者謙虛間徐之義故鄭箋云威儀虛徐寬仁者也詩作其邪此作其徐字雖異音實同故鄭箋云邪讀如徐猗嗟名兮目上為名注眉眼之間音義猗于宜反眼五限反或作目疏云猗嗟名兮者齊風猗嗟文也云目上為名者釋之也孫炎云目上平博郭云眉眼之間式微式微者微乎微者也注言至微疏云式微式微者邶風式微文也云微乎微也者釋之也郭云言至微鄭箋云式發聲也案詩序云式微黎寓于衛其臣勸以歸也然則以君被逐既微又見卑賤是至微也不取式為義故鄭云發聲也之子者是子也注斥所詠音義斥音尺疏詩言之子者多矣故此釋之李巡云之子者論五方之言是子也然則之為語助人言之子者猶云是此子也桃夭傳云之子彼説嫁事為嫁者之子漢廣之子則貞潔者之子東山之子言其妻白華之子斥幽王各隨其事而名之故郭云斥所詠徒御不驚輦者也注步挽輦車音義挽本亦作挽同亡逺反聲類云引也車音居疏云徒御不驚者小雅車攻文也云輦者也者釋也此上解徒字也諸徒皆為徒行此獨為輦是以辨之地官鄉師云大軍旅會同治其輦注云輦人挽行所以載任器也止以為䉒營司馬法輦有一斧一斤一鑿一梩周輦加二版二築夏后氏二十人而輦殷十八人而輦周十五人而輦是會同田獵人挽輦以徒行也故郭云步挽輦車袒裼肉袒也注脫衣而見體暴虎徒搏也注空手執也音義袒本或作袒同徒坦徒丹二反下同裼蘇厯反脫他活反見賢遍反暴步報反搏連莫反郭音付疏鄭風大叔于田云袒裼暴虎故此釋之毛傳云袒裼肉袒也李巡曰袒裼脫衣見體曰肉祖孫炎曰袒去裼衣郭云脫衣而見體毛傳又云暴虎空手以搏之舍人曰無兵空手搏之然則徒空也故郭云空手執也馮河徒涉也注無舟楫音義馮字又作慿皮氷反依字當作慿説文云無船渡河楫本或作楫又作接同子葉才入二反方言曰楫橈也説文云楫舟棹也釋名曰在旁撥水曰棹又謂之楫楫捷也疏小雅小旻云不敢馮河故此釋之也李巡曰無舟而渡水曰徒涉郭云無舟楫毛傳云馮陵也然則空涉水陵波而渡故訓馮為陵也籧篨口柔也注籧篨之疾不能俯口柔之人視人顔色常亦不伏因以名云戚施面柔也注戚施之疾不能仰面柔之人常俯似之亦以名云音義籧本或作􅞠同巨居反篨直閭反戚七厯反施式支反疏邶風新臺云籧篨不鮮又曰得此戚施故此釋之也毛傳云籧篨不能俯者戚施不能仰者李巡曰籧篨巧言好辭以饒人是謂口柔戚施和顔悅色以誘人是謂面柔但籧篨戚施本人疾之名故晉語云籧篨不可使俯戚施不可使仰是也人口柔者必仰面觀人顔色而為辭似籧篨不俯之人因名口柔者為籧篨面柔者必低首下人媚以容色似戚施不仰之人因名面柔者為戚施故郭云籧篨之疾不能俯口柔之人視人顔色常亦不伏戚施之人不能仰面柔之人常俯似之因以名云夸毗體柔也注屈已卑身以柔順人也音義夸苦瓜反毗鼻以反舍人曰卑身屈已也樊引詩云無為夸毗李孫郭云屈已卑身以柔順人也字書作䠸已音紀疏大雅板篇云無為夸毗故此釋之也毛傳云夸毗以體柔人也李巡曰屈已卑身求得于人曰體柔然則夸毗者便辟其足前却為恭以形體順從于人故郭云屈已卑身以柔順人也婆娑舞也注舞者之容音義娑素河反疏陳風東門之枍云婆娑其下故此釋之李巡曰婆娑盤辟舞也郭云舞者之容孫炎曰舞者之容婆娑然則婆娑舞者之狀貌也劈拊心也注謂椎胸也音義劈婢亦反拊本亦作撫同芳武反椎本或作捶同直追反字林云擊也胸音凶疏邶風柏舟云寤劈有標劈謂拊心也郭云謂椎胸也矜憐撫掩之也注撫掩猶撫拍謂慰恤也音義矜几陵反憐力堅反拍普伯反疏撫掩猶撫拍謂慰恤也小雅鴻鴈云爰及矜人緎羔裘之縫也注縫飾羔皮之名音義緎許域反又音域縫扶用反疏召南羔裘云羔羊之革素絲五緎故此解之也孫炎云緎之為界緎然則縫合羔羊皮為裘縫即皮之界緎因名裘縫為緎故郭云縫飾羔皮之名殿屎呻也注呻吟之聲音義殿丁練反屎虛伊反或作敜吹又作㕧説文作念咿郭上音香惟反又音丁念反下許利反呻音申疏大雅板篇云民之方殿屎毛傳云殿屎呻吟也是用此為説郭云呻吟之聲孫炎云人愁苦呻吟之聲也幬謂之帳注今江東亦謂帳為幬音義幬本或作同直留反帳陟亮反疏帳一名幬召南小星云抱衾與裯鄭箋云幬牀帳也郭云今江東亦謂帳為幬幬與裯音義同侜張誑也注書曰無或侜張為幻幻惑欺誑人者音義侜本或作倜同張留反誑俱放反幻胡辦反疏陳風防有鵲巢云誰侜豫美毛傳云侜張誑也鄭箋云女衆讒人誰侜張誑欺我所美之人乎注云書曰無或侜張為幻者周書無逸篇文也引之者以證侜張謂幻惑欺誑人者誰昔昔也注誰發語辭疏陳風墓門云誰昔然矣毛傳云昔久也郭云誰發語辭與毛同也不辰不時也注辰亦時也疏辰亦時也不辰者言不得其時也大雅桑柔云我生不辰逢天僤怒是也凡曲者為罶注毛傳曰罶曲梁也凡以薄為魚笱者名為罶音義罶本或作同力九反薄蒲博反本今作簿笱音苟疏曲薄也凡以薄取魚為罶注云毛傳曰罶曲梁也者小雅魚麗篇傳文也云凡以薄為魚笱者名為罶者即釋器云嫠婦之笱謂之罶也鬼之為言歸也注尸子曰古者謂死人為歸人疏人死為鬼小雅何人斯云為鬼為蜮周禮曰享大鬼謂之鬼者鬼猶歸也若歸去然故尸子曰古者謂死人為歸人釋親第四音義説文云親至也蒼頡篇云親愛也近也禮記云親親以三為五以五為九尚書云以親九族親者通謂五服九族之親也疏案禮記大傳云聖人南面聼天下所且先者五民不與焉一曰治親蒼頡曰親愛也近也然則親者恩愛狎近不疏逺之稱也書曰克明峻德以親九族喪服小記曰親親以三為五以五為九上殺下殺旁殺而親畢矣以九族之親其名謂非一此篇釋之故曰釋親父為考母為妣注禮記曰生曰父母妻死曰考妣嬪今世學者從之案尚書曰大傷厥考心事厥考厥長聰聽祖考之彛訓如喪考妣公羊傳曰惠公者何隱之考也仲子者何桓之母也蒼頡篇曰考妣延年書曰嬪于虞詩曰聿嬪于京周禮有九嬪之官明此非死生之異稱矣其義猶今謂兄為晜妹為媦即是此例也父之考為王父父之妣為王母注加王者尊之王父之考為曾祖王父王父之妣為曾祖王母注曾猶重也曾祖王父之考為髙祖王父曾祖王父之妣為髙祖王母注髙者言最在上父之世父叔父為從祖祖父父之世母叔母為從祖祖母注從祖而别世統異故父之晜弟先生為世父後生為叔父注世有為嫡者嗣世統故也男子先生為兄後生為弟男子謂女子先生為姊後生為妹父之姊妹為姑父之從父晜弟為從祖父父之從祖晜弟為族父族父之子相謂為族晜弟族晜弟之子相謂為親同姓注同姓之親無服屬兄之子弟之子相謂為從父晜弟注從父而别子之子為孫注孫猶後也孫之子為曾孫注曾猶重也曾孫之子為玄孫注玄者言親屬微昧也玄孫之子為來孫注言有往來之親來孫之子為晜孫注晜後也汲冡竹書曰不窋之晜孫晜孫之子為仍孫注仍亦重也仍孫之子為雲孫注言輕逺如浮雲王父之姊妹為王姑曾祖王父之姊妹為曾祖王姑髙祖王父之姊妹為髙祖王姑父之從父姊妹為從祖姑父之從祖姊妹為族祖姑父之從父晜弟之母為從祖王母父之從祖晜弟之母為族祖王母父之兄妻為世母父之弟妻為叔母父之從父晜弟之妻為從祖母父之從祖晜弟之妻為族祖母父之從祖祖父為族曾王父父之從祖祖母為族曾王母父之妾為庶母祖王父也晜兄也注今江東人通言晜音義妣必里反嬪毗真反長丁丈反下皆同彞音夷喪息浪反又如字頡戶結反稱尺證反晜音昆本亦作昆下同媦于貴反廣雅云媦妹也説文云椘人謂女弟為媦纂文云河南人云妹媦也重直龍反下皆同别彼列反又如字下皆同嫡丁厯反來音徠汲居及反冡竹奉反窋丁律反又丁滑反不窋后稷之子疏此别同宗親族白虎通曰父矩也以度教子也又為考考成也言有成德廣雅云母牧也言育養子也又為妣妣媲也媲匹于父廣雅又云兄况也况于父又謂之晜弟悌也言順于兄子孜也以孝事父常孜孜也孫順也順于祖男任家事也女如也白虎通曰言如人也徐鍇曰女子從父之教從夫之命故曰如姑故也言尊如故也又謂之威徐鍇曰土盛于戌土隂之主也故字從戍漢律曰婦告威姑是也姊咨也以其先生言可咨問説文云妹女弟也又謂之媦妾接也鄭注禮記云聞彼有禮走而往焉以得接見于君子也庶母者父之妾也此皆同宗之族也白虎通曰宗者何謂也宗有尊也為先祖主也宗人之所尊也禮曰宗人將有事族人皆待聖者所以必有宗何也所以長和睦也族者何也族者湊也聚也謂恩愛相流湊生相親愛死相哀痛有會聚之道故謂之族也注云禮記曰生曰父母妻死曰考妣嬪者曲禮下篇文也云今世學者從之者謂從禮記以父母妻為生之稱以考妣嬪為死之稱彼乃記者一家之説爾學者膠柱遂為生死定稱非也故郭氏引諸文以證之云尚書曰大傷厥考心康誥文也云事厥考厥長聰聽祖考之彞訓者皆酒誥文也云如喪考妣者舜典文也此皆生稱考妣也云公羊傳曰惠公者何隱之考也仲子者何桓之母也者隱元年傳文也此即死稱母也云蒼頡篇曰考妣延年者此亦生稱考妣也云書曰嬪于虞者堯典文也云詩曰聿嬪于京大雅大眀篇文也云周禮有九嬪之官者屬天官掌婦學之法者也此皆生稱嬪者也云眀此非死生之異稱矣者所以破先儒之説也云其義猶今謂兄為晜妹為媦即是此例也者舉類以曉人也云從祖而别世統異故者解所以稱從之理也從祖而别繼世分宗其統各異故曰從祖别世有為嫡者嗣世統故也者解所以稱世之義也繼世以嫡長先生于父則繼世者也故曰世父説文叔作叔許慎曰從上小言尊行之小也云同姓之親無服屬者禮記大傳云親者屬也鄭注云有親者服各以其屬親疏此經言親同姓者謂五世之外比諸同姓猶親但無服屬爾云孫猶後也言繼後嗣也廣雅云孫順也許慎云從子從系系續也言順續也言順續先祖之後也云玄者言親屬微昧也又玄者緅緇之間色色之微昧者也親屬微昧故曰玄孫云晜後也汲冡竹書曰不窋之晜孫晜後也釋言文束晳傳曰太康元年汲郡民盜發魏安釐王塜得竹書漆字科斗文科斗文者周時古文也其字頭粗尾細似科斗之蟲故俗名之焉不窋后稷之子也晜孫謂毁隃也宗族母之考為外王父母之妣為外王母母之王考為外曾王父母之王妣女為外曾王母注異姓故言外母之晜弟為舅母之從父晜弟為從舅母之姊妹為從母從母之男子為從母晜弟其女子子為從母姊妹音義從才用反下注娣從同舅音臼疏此一節别母之族黨也黨是鄉之細也此外族屬母若黨之屬鄉故云母黨云舅者孫炎云舅之言舊尊長之稱詩秦風云我送舅氏曰至渭陽是也母黨妻之父為外舅妻之母為外姑注謂我舅者吾謂之甥然則亦宜呼壻為甥孟子曰帝館甥于二室是也姑之子為甥舅之子為甥妻之晜弟為甥姊妹之夫為甥注四人體敵故更相為甥甥猶生也今人相呼蓋依此妻之姊妹同出為姨注同出謂俱已嫁詩曰邢侯之姨女子謂姊妹之夫為私注詩曰談公維私男子謂姊妹之子為出注公羊傳曰蓋舅出女子謂晜弟之子為姪注左傳曰姪其從姑謂出之子為離孫謂姪之子為歸孫女子子之子為外孫女子同出謂先生為姒後生為娣注同出謂俱嫁事一夫公羊傳曰諸侯娶一國二國往媵之以姪娣從娣者何弟也此即其義也女子謂兄之妻為嫂弟之妻為婦注猶今言新婦是也長婦謂稚婦為娣婦娣婦謂長婦為姒婦注今相呼先後或云妯娌音義甥音生壻音細館古半反更音庚談大南反姪大結反字林云兄女又丈乙反姒音似娣大計反娶七具反媵以證反嫂素早反稚直吏反先蘇練反後胡遘反廣雅云先後妯娌韋昭云先謂姒後謂娣妯音逐娌音里廣雅云先後也郭注方言云今關西兄弟婦相呼為妯娌疏此一節别妻之親黨也內則曰聘則為妻白虎通云妻者齊也與夫齊體自天子下至庶人其義一也注孟子云舜尚見帝帝館甥于二室亦饗舜迭為賓主是天子而友匹夫也彼注云尚上也舜在畎畝之時堯友禮之舜上見堯舍之于二室二室副宫也堯亦就饗舜之所設更迭為賓主禮記妻父曰外舅謂我舅者吾謂之甥堯以女妻舜故謂堯甥卒與之天位是天子之友匹夫也云四人謂姑之子舅之子妻之晜弟姊妹之夫也此四人尊卑體敵更相為甥云甥猶生也者取相親之意也云邢侯之姨談公維私皆衛風碩人篇文也孫炎曰私無正親之言然則謂吾姨者我謂之私邢侯談公皆莊薑姊妹之夫互言之耳春秋談子伐莒則談是子爵言公者蓋依臣子稱便文耳云公羊傳白蓋舅出案春秋襄五年夏叔孫豹鄫世子巫如晉公羊傳曰外相如不書此何以書為叔孫豹率而與之俱也叔孫豹則曷為率而與之俱蓋舅出也何休云巫者鄫前夫人襄公母妹夫之子也俱莒外孫故曰舅出是也云左傳曰姪其從姑案僖十五年傳云初晉獻公筮嫁伯姬于秦遇歸妹之暌史蘇占之曰不吉其繇曰姪其從姑杜注云震為木離為火火從木生離為震妹于火為姑謂我姪者我謂之姑謂子圉質秦是也云公羊傳者案春秋莊十九年秋公子結媵陳人之婦于鄄遂及齊侯宋公盟公羊傳曰媵者何諸侯娶一國則二國往媵之以姪娣從姪者何兄之子也娣者何弟也諸侯一聘九女諸侯不再娶何休云必以姪娣從之者欲使一人有子二人喜也所以防嫉妬令重繼嗣也因以備尊尊親親也九者極陽數也不再娶者所以節人情開媵路云猶今言新婦是也案儀禮喪服傳云夫之昆弟何以無服也其夫屬乎父道者妻皆母道也其夫屬乎子道者妻皆婦道也謂弟之妻婦者是嫂亦可謂之母乎故名者人治之大者也可無慎乎鄭注云道猶行也言婦人棄姓無常秩稱嫁于父行則為母行嫁于子行則為婦行謂弟之妻為婦者卑逺之故謂之娣嫂者尊嚴之稱是嫂亦可謂之母乎嫂猶叟也叟老人稱也是為序男女之别爾若已以母婦之服服兄弟之妻兄弟之妻以舅子之服服已則是亂昭穆之序也治猶理也父母兄弟夫婦之理人倫之大者可不慎乎大傳曰同姓從宗合族屬異姓主名治際會名著而男女有别是别嫂婦之名也郭云猶今言新婦者以時驗而知也至今猶然云今相呼先後或云妯娌者廣雅云娣社妯娌娣姒先後也人多疑娣姒之名皆以為兄妻呼弟妻為娣弟妻呼兄妻為姒因即惑于斯文不知何以為説今謂母婦之號隨夫尊卑娣姒之名從身長幼以其俱來夫族其夫班秩既同尊卑無以相加遂從身之少長喪服小功章曰娣姒婦報傳曰娣姒婦者弟長也以弟長解娣姒言娣是弟姒是長也公羊傳亦云娣者何弟也是其以弟解娣自然以長解姒長謂身之年長非夫之年長也此云長婦謂稚婦為娣婦娣婦謂長婦為姒婦者止言婦之長稚不言夫之大小左傳成公十一年穆薑謂聲伯之母為姒昭公八年傳叔向之嫂謂叔向之妻為姒二者皆呼夫弟之妻為姒豈計夫之長幼乎上云女子同出謂先生為姒後生為娣郭云同出謂俱嫁事一夫也事一夫者以已生先後為娣姒則知娣姒以已之年非夫之年也故賈逵鄭玄及杜預皆云兄弟之妻相謂為姒言兩人相謂長者為姒知娣姒之名不計夫之長幼也妻黨婦稱夫之父曰舅稱夫之母曰姑姑舅在則曰君舅君姑沒則曰先舅先姑注國語曰吾聞之先姑謂夫之庶母為少姑夫之兄為兄公注今俗呼兄鍾語之轉耳夫之弟為叔夫之姊為女公夫之女弟為女妹注今謂之女妹是也子之妻為婦長婦為嫡婦衆婦為庶婦女子子之夫為壻壻之父為姻婦之父為婚父之黨為宗族母與妻之黨為兄弟婦之父母壻之父母相謂為婚姻兩壻相謂為亞注詩曰瑣瑣姻亞今江東人呼同門為僚壻婦之黨為婚兄弟壻之黨為姻兄弟注古者皆謂婚姻為兄弟嬪婦也注書曰嬪于虞謂我舅者吾謂之甥也音義稱如字少證照反公音鍾轉丁戀反又如字姻音因亞一駕反又作婭瑣桑果反僚力雕反疏此别夫婦婚姻之名也説文云婦服也從女持帚灑掃也白虎通云夫婦者何謂也夫者扶也以道扶接婦者服也以禮屈服謂之舅姑者何舅者舊也姑者故也舊故老人稱也夫之父母謂舅姑何尊如父而非父者舅也親如母而非母者姑也鄭注喪服傳云女子子者子女也别于男子也説文云壻女之夫也從士從胥聞一知十為士胥者有才智之稱故謂女之夫為壻廣雅云壻謂之倩方言云東齊之間壻謂之倩白虎通云婚姻者何謂昏時行禮故曰婚婦人因夫而成故曰姻注國語曰吾聞之先姑者魯語季康子問于公父文伯之母曰主亦有以語肥也對曰吾能老而已何以語子曰雖然肥願有聞于主對曰吾聞諸先姑曰君子能勞後世有繼子夏聞之曰善哉商聞之曰古之嫁者不及舅姑謂之不幸夫婦學于舅姑者也是矣瑣瑣姻亞小雅節南山文也劉熙釋名云兩壻相謂為亞者言每一人取姊一人取妹相亞次也又並來女氏則姊夫在前妹夫在後亦相亞也古者皆謂婚姻為兄弟者禮記曾子問曰昏禮既納幣有吉日女之父母死則如之何孔子曰壻使人弔如壻之父母死則女之家亦使人弔鄭注云必使人弔者未成兄弟又云父喪稱父母喪稱母父母不在則稱伯父世母壻已葬壻之伯父致命女氏曰某之子有父母之喪不得嗣為兄弟使某致命女氏許諾而弗敢嫁禮也是古者謂婚姻為兄弟以夫婦有兄弟之義或據壻于妻之父母有緦服故得謂之兄弟也嬪于虞者案堯典羣臣共舉舜于帝帝曰我其試哉女于時觀厥刑于二女釐降二女于媯汭嬪于虞孔安國注云降下嬪婦也舜為匹夫能以義理下帝女之心于所居媯水之汭使行婦道于虞氏是也婚姻爾雅注疏卷三
