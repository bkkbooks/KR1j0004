body:
  text: 欽定四庫全書爾雅注䟽卷三晉郭璞注唐陸徳眀音義宋邢昺䟽釋訓第三音義訓休運反張揖雜字云訓者謂字有意義也案釋詁以下三篇皆釋古今之語方俗之言意義不同故立號亦異至於訓釋墳典其實一焉䟽案釋詁云訓道也周禮地官有土訓誦訓鄭司農注云謂以逺方土地所生異物以吿道王也後鄭云𤣥謂土訓䏻訓説土地善惡之勢誦訓䏻訓説四方所誦習及人所作為及時事然則此篇以物之事義形貌吿道人也故曰釋訓案此所釋多釋詩文故郭氏即以詩義觧之眀明斤斤察也注皆聡眀鑒察音義斤樊居覲反舎人云眀明甚明也斤斤物精詳之察孫云斤斤重慎之察也聡七公反䟽舎人曰明明言其明甚孫炎曰明明性理之察也大雅常武云赫赫明明舎人曰斤斤物精詳之察也孫炎曰斤斤重愼之察也周頌執競云斤斤其明聡明鑒察也條條秩秩智也注皆智思深長音義條條舎人本作攸攸沈亦音條秩直栗反思息嗣反下文并注同䟽皆智思深長也小雅賓之初筵云左右秩秩言其威儀審智不失禮也穆穆肅肅敬也注皆容儀謹敬䟽周頌雝篇云有来雝雝至止肅肅相維辟公天子穆穆此皆禘祭之時容儀謹敬也諸諸便便辯也注皆言辭辯給音義便婢緜反䟽皆言辭辯給也論語云便便言小雅采菽云平平左右毛傳云平平辯治也便平古今字肅肅翼翼恭也注皆恭敬䟽皆恭敬也大雅思齊云肅肅在廟大明云維此文王小心翼翼言文王及羣臣恭敬貌也廱廱優優和也注皆和樂音義廱於容反優音憂樂音洛䟽大雅思齊云雝雝在宫商頌長發云敷政優優此皆人君徳政和樂也兢兢憴憴戒也注皆戒慎音義兢音矜憴食蒸反戒音界䟽小雅小旻云戰戰兢兢大雅抑篇云子孫繩繩此皆小心戒慎也繩憴音義同戰戰蹌蹌動也注皆恐動趨歩音義蹌七羊反恐邱勇反趨七俞反䟽小旻云戰戰兢兢椘茨云濟濟蹌蹌此皆恐動趨歩威儀謹敬也晏晏溫溫柔也注皆和柔䟽衛風氓篇云言笑晏晏大雅抑篇云溫溫恭人此皆寛緩和柔也業業翹翹危也注皆懸危音義業魚怯反郭五荅反翹巨遥反懸音𤣥䟽大雅召旻云兢兢業業豳風鴟鴞云子室翹翹此皆懸危恐懼也惴惴憢憢懼也注皆危懼音義惴之瑞反憢許堯反本又作嘵音同字林云懼也案詩云予維音嘵嘵是也䟽秦風黄鳥云惴惴其慄豳風鴟鴞云予維音嘵嘵此皆危恐戰懼也番番勇也注皆壮勇之貌音義番布何反詩云申伯番番居兆反舎人云得勝之勇也詩云矯虎臣䟽大雅崧髙云申伯番番魯頌泮水云矯虎臣此皆武夫壮勇之貌桓桓烈烈威也注皆嚴猛之貌䟽皆威武嚴猛之貌周頌桓篇云桓桓武王小雅黍苖云烈烈征師洸洸赳赳武也注皆果毅之貎音義洸女皇反舎人本作僙音同赳居黝反説文云輕勁有才也詩云赳赳武夫䟽大雅江漢云武夫洸洸周南兎罝云赳赳武夫此皆武夫果毅之貎左傳殺敵為果致果為毅藹藹濟濟止也注皆賢士盛多之容止音義藹烏害反濟咨禮反䟽大雅卷阿云藹藹王多吉士小雅椘茨云濟濟蹌蹌此皆王朝賢士盛多之容止也悠悠洋洋思也注皆憂思音義悠音由洋音羊䟽鄭風子衿云悠悠我思邶風二子乗舟云中心養養此皆想念憂思也洋養音義同又中庸云齊明盛服以承祭祀洋洋乎如在其上如在其左右鄭𤣥云洋洋人想思其傍倚之貌蹶蹶踖踖敏也注皆便速敏㨗也音義蹶居衛反踖音夕又音籍便婢面反㨗才接反䟽唐風蟋蟀云良士蹶蹶小雅椘茨云執爨踖踖此皆便速敏㨗扵事也薨薨增增衆也注皆衆夥之貌音義薨虎宏反顧舎人本作雄雄衆諸仲反夥戸果反漢書云椘人謂多為夥䟽周南螽斯云螽斯羽薨薨兮魯頌閟宫云烝徒增增此皆人物衆夥之貌椘人謂多為夥烝烝遂遂作也注皆物盛興作之貌音義烝諸仍反作子洛反䟽皆物盛興作之貌也魯頌泮水云烝烝皇皇委委佗佗美也注皆佳麗美艶之貌音義委於危反詩云委委佗佗如山如河是也諸儒本並作褘於宜反舎人云褘褘者心之美引詩云亦作禕佗本㦯作它字徒河反顧舎人引詩釋云褘褘它它如山如河謝羊兒反䟽李廵曰皆容之美也孫炎曰委委行之美佗佗長之美詩鄘風君子偕老云委委佗佗毛傳云委委者行可委曲蹤迹也佗佗者徳平易也是皆佳麗美艶之貌也忯忯惕惕愛也注詩云心焉惕惕韓詩以為悦人故言愛也忯忯未詳音義忯郭徒啟反與愷悌音同顧舎人渠支反李余之反忯忯和適之愛也惕他狄反䟽李廵曰忯忯和適之愛也注云心焉惕惕者陳風防有鵲巢文云韓詩以為悦人故言愛也者燕人韓嬰為詩作傳名曰韓詩以此惕惕為悦人故言愛也偁偁格格舉也注皆舉持物音義偁尺仍反本亦作稱同䟽皆謂舉持物也蓁蓁孽孽戴也注皆頭戴物音義蓁郭側巾反又子人反孽魚謁反又五葛反䟽周南桃夭云其葉蓁蓁衛風碩人云庶姜孽孽此皆頭戴物婦人盛飾貌懕懕媞媞安也注皆好人安詳之容音義懕於占反説文云安静也媞徒低反䟽秦風小戎云厭厭良人毛傳云厭厭安静也孫炎云媞媞行歩之安也魏風葛屨云好人媞媞毛傳云媞媞安諦謂行歩安舒而審諦也是皆好人安詳之容也祁祁遲遲徐也注皆安徐音義祁巨移反䟽皆安徐也豳風七月云春日遲遲采繁祁祁丕丕簡簡大也注皆多大音義丕本㦯作㔻同普悲反䟽書立政云以並受此丕丕基周頌執競云降福簡簡是皆多大之稱存存萌萌在也注萌萌未見所出音義萌郭武耕反施云朋反字㦯作蕄䟽謂存在也易繫辭云成性存存萌萌字書作􅽪説文作蕄郭云未見所出懋懋慔慔勉也注皆自勉強音義懋古茂字慔音暮亦作慕強其丈反䟽皆出勉強也書曰懋哉懋哉慔與慕同庸庸慅慅勞也注皆劬勞也音義庸音容慅郭騷草蕭三音䟽皆劬勞也有功庸者皆勞也小雅巷伯云勞人草草毛傳云草草勞心也又陳風月出云勞心慅兮慅草音義同赫赫躍躍迅也注皆盛疾之貎音義赫郭音釋舎人本作奭失石反説文云奭盛也謝許格反躍余斫反樊本作濯引詩釋云濯濯厥靈䟽孫炎云赫赫顯著之迅大雅常武云赫赫業業毛傳云赫赫然盛也巧言詩云躍躍毚兎是皆顯著然疾之貎綽綽爰爰緩也注皆寛緩也䟽皆寛緩也小雅角弓云綽綽有裕毛傳云綽綽寛也王風爰云有爰爰毛傳云爰爰緩意郭云悠悠偁偁丕丕簡簡存存懋懋庸庸綽綽盡重語者言此數字單言之其義亦同但古人有重語者故復出之坎坎壿墫喜也注皆鼓舞懽喜音義坎苦感反墫七旬反舎人云舞貎毛傳同郭云謂鼓舞歡喜也説文云墫士舞也宜從士尊也本㦯作蹲同䟽皆鼓舞懽喜也小雅伐木云坎坎鼓我蹲蹲舞我鄭箋云為我擊鼓坎坎然為我興舞蹲蹲然謂以樂樂已也墫蹲音義同瞿瞿休休儉也注皆良士節儉音義瞿居具反休虚求反又虚虯反䟽李廵曰皆良士顧禮節之儉也唐風蟋蟀云良士瞿瞿毛傳云瞿瞿然顧禮義也又云良士休休毛傳云休休樂道之心皆良士節儉也旭旭憍也注皆小人得志蹇之貎音義旭謝許玉反郭呼老反郭居天反案詩小雅小子音巨虐反今依詩讀九苗反䟽郭氏讀旭旭為好好小雅巷伯云驕人好好鄭箋云好好者喜讒言之人也大雅板篇云小子毛傳云蹻蹻驕貎是皆小人得志憍蹇之貎也夢夢訰訰亂也注皆闇亂音義夢亡工亡棟二反沈施亡增反訰之閏之屯二反㦯作諄音同顧舎人云夢夢訰訰煩懣亂也䟽孫炎曰夢夢昏昏之亂也大雅抑篇云視爾夢夢又曰誨爾諄諄皆是闇亂也訰諄音義同懪懪邈邈悶也注皆煩悶音義懪本又作蒲卓反又布卓反説文云大呼也自寃也邈亡角反䟽懪懪煩悶也舎人曰藐藐憂悶也大雅抑篇云聼我藐藐毛傳云藐藐然不入也是皆煩悶之謂也儚儚洄洄惛也注皆迷惽音義儚字㦯作懜孫亡崩亡氷二反洄沈音回郭音韋音義云本㦯作音韋案字林重衣貎于回反惽音昬䟽皆迷亂惽惑也郭音義云洄本作音韋版版盪盪僻也注皆邪僻音義版詩作板並如字僻匹亦反邪似嗟反䟽皆邪僻也李廵曰版版者失道之僻也盪盪者弗思之僻也大雅板篇云上帝板板毛傳云板板反也上帝以稱王者也鄭箋云王為政反先王與天之道又蕩篇云蕩蕩上帝鄭箋云蕩蕩法度廢壊之貎版板盪蕩音義同爞爞炎炎薫也注皆旱熱薫炙人音義爞郭徒冬反又直忠反炎于廉反薰本亦作燻㦯作熏許云反炙之石反䟽皆旱熱之氣薰炙人也大雅雲漢云蘊隆蟲蟲毛傳云蘊蘊而暑隆隆而雷蟲蟲而熱又云赫赫炎炎毛傳云赫赫氣也炎炎熱氣也爞蟲音義同居居䆒䆒惡也注皆相憎惡音義䆒九又反䟽李廵曰居居不狎習之惡孫炎曰䆒䆒窮極人之惡唐風羔裘云羔裘豹袪自我人居居又曰自我人䆒䆒毛傳曰居居懐惡不相親比之貎䆒䆒猶居居也是皆相憎惡也仇仇敖敖傲也注皆傲慢賢者音義仇音求敖本又作謷又作囂同五髙反傲本㦯作慠同五報反舎人本傲作毁釋云仇仇無倫理之貎謷謷衆口毁人之貎李同䟽小雅正月云執我仇仇毛傳云仇仇猶謷謷也鄭箋云王既得我執留我其禮待我謷謷然亦不問我在位之功力言其有貪賢之名無用賢之實大雅板篇云我即爾謀聼我囂囂毛傳云猶謷也鄭箋云我就女而謀欲忠吿以善道女反聼我言謷謷然不肯受是皆傲慢賢者敖謷囂音義同佌佌瑣瑣小也注皆才器細陋音義佌顧音此郭音徙謝音紫舎人云形容小貎瑣星果反亦作䟽皆才器細陋也小雅正月云佌佌彼有屋毛傳云佌佌小也鄭箋云此言小人富也舎人曰瑣瑣計謀褊淺之貎節南山云瑣瑣姻亞鄭箋云瑣瑣㛰姻妻黨之小人悄悄慘慘慍也注皆賢人愁恨音義悄七小反慘七感反慍扵問反䟽慍恨怒也皆賢人愁恨也邶風柏舟云憂心悄悄慍于羣小毛傳云慍怒也悄悄憂貎李廵曰慘慘憂之慍大雅抑篇云我心慘慘毛傳云慘慘憂不樂也痯痯瘐瘐病也注皆賢人失志懐憂病也音義痯郭古卵反又古玩反庾羊主反又羊朱反本㦯作庾䟽小雅枤杜云四牡痯痯毛傳云痯痯罷貎又大雅板篇云靡聖管管毛傳云管管無所依也小雅正月云憂心愈愈毛傳云愈愈憂懼也此皆賢人失志懐憂病也殷殷惸惸忉忉慱慱欽欽京京忡忡惙惙怲怲弈弈憂也注此皆作者歌事以詠心憂音義殷扵斤反樊光扵謹反惸本㦯作煢巨營反忉都勞反慱徒端反施逋莫反郭徂兖徂㳂二反忡恥忠反惙丁劣反怲彼病反弈音亦䟽小雅正月云憂心慇慇毛傳云慇慇然痛也又云憂心惸惸毛傳云惸惸憂意也檜風羔裘云勞心忉忉鄭箋云三諌不從待放而去思君如是心忉忉然又素冠云勞心慱慱毛傳云慱慱憂勞也秦風云憂心欽欽毛傳云思望之心中欽欽然小雅正月云憂心京京毛傳云京京憂不去也召南草蟲云未見君子憂心忡忡毛傳云忡忡猶衝衝也鄭箋云未見君子者謂在塗時也在塗時憂憂不當君子無以寧父母故心衝衝然又曰憂心惙惙毛傳云惙惙憂也小雅頍弁云憂心怲怲毛傳云怲怲憂盛滿也又云憂心奕奕毛傳云奕奕然無所薄也此皆作者歌事以詠心憂也畇畇田也注言墾辟也音義畇本㦯作􅵆郭音廵沈居賓反謝蘇旬反字林云均均田也又羊倫反墾苦很反蒼頡篇云耕也廣雅云治也辟婢亦反開也䟽謂耕墾開辟土田畇畇然也小雅信南山云畇畇原隰毛傳云墾辟貎畟畟耜也注言嚴利音義畟椘力反字㦯作稷耜音似䟽舎人曰畟畟耜入地之貎周頌良耜云畟畟良耜俶載南畝毛傳云畟畟猶測測也鄭箋云良善也農人測測以利善之耜熾菑是南畝也是言耜之嚴利也郝郝耕也注言土解音義郝音釋又呼各反解音蟹䟽謂耕也謂土解散郝郝然也周頌載芟云其耕澤澤鄭箋云氣烝逹而和之則澤澤然解散郝郝澤澤並音釋其義亦同繹繹生也注言種調音義繹音亦種之用反䟽舎人云穀皆生之貎載芟云驛驛其逹也毛傳云逹射也鄭箋云逹出地也是言其種調勻皆出地而生也驛與繹音義同穟穟苖也注言茂好也音義穟郭音遂説文云禾垂之貎䟽大雅生民云禾役穟穟毛傳云役列也穟穟苗好美也是言茂好也緜緜穮也注言芸耨精音義緜彌延反穮麃同方遥反耘也字林云耕禾間也左傳云譬如農夫是穮是蓘是也説文云穮耨鋤田也芸字亦作耘同音云䟽孫炎云緜緜言詳宻也載芟云緜緜其麃毛傳云麃耘也説文云穮耨鋤田也字林云穮耕禾間也是言芸耨精也穮麃耘芸音義同挃挃穫也注刈禾聲栗栗衆也注積聚緻音義挃郭丁秩反小爾雅云截穎謂之挃穫户郭反刈魚廢反衆諸仲反緻直吏反䟽孫炎云挃挃穫聲也李廵曰栗栗積聚之衆也良耜云穫之挃挃積之栗栗毛傳挃挃穫聲也栗栗衆多也小爾雅云截穎謂之挃故郭云刈禾聲積聚緻也緻謂宻也溞溞淅也注洮米聲烰烰烝也注氣出盛音義溞郭蘇刀反詩云淅之溞溞謝所留反淅蘓厯反洮徒刀反洮猶淅也烰吕郭並音浮又符彪反詩作浮烝之升反䟽大雅生民云釋之叟叟烝之浮浮毛傳云釋淅米也叟叟聲也浮浮氣也鄭箋云釋之烝之以為酒及簠簋之實故郭云洮米聲氣出盛也溞叟音異義同浮烰音義同俅俅服也注謂戴弁服音義俅音求本亦作絿同戴丁代反弁音卞䟽周頌絲衣云載弁俅俅毛傳云俅俅恭順貎鄭箋云載猶戴也弁爵弁也爵弁而祭扵王士服也故郭云謂戴弁服峨峨祭也注謂執圭璋助祭音義璋音章䟽大雅棫樸云奉璋峨峨毛傳云半圭曰璋峨峨盛壮也鄭箋云璋璋瓉也祭祀之禮王祼以圭瓉諸臣助之亞祼以璋瓉奉璋之儀峨峨然故郭云執圭璋助祭也鍠鍠樂也注鐘鼓音音義鍠胡光反樂如字䟽周頌執競云鐘鼓喤喤毛傳云喤喤和也鄭箋云武王既定天下祭祖考之廟奏樂而八音克諧字書云鍠鍠樂之聲也故郭云鐘鼓音喤鍠音義同穰穰福也注言饒多音義穰而羊反䟽執競云降福穰穰衆也鄭箋云神與之福又衆大謂如嘏辭也是言得福饒多也子子孫孫引無極也注世世昌盛長無窮音義引余忍余慎二反引長多也䟽子子孫孫小雅椘茨文也引無極者作者所以釋之也舎人曰子孫長行美道引無極也郭云世世昌盛長無窮顒顒卬卬君之徳也注道君人者之徳望音義顒魚恭反卬五剛反郭魚殃反䟽此道君人之徳望也顒顒卬卬大雅卷阿文也君之徳也者作者釋之也詩云顒顒卬卬如圭如璋令聞令望毛傳云顒顒溫貎卬卬盛貎鄭箋云令善也王有賢臣與之以禮義相切磋體貎則顒顒然敬順志氣則卬卬然髙朗如玉之圭璋也人聞之則有善聲譽人望之則有善威儀徳行相副丁丁嚶嚶相切直也注丁丁斫木聲嚶嚶兩鳥鳴以喻朋友切磋相正音義丁豬耕反嚶烏耕反斫音灼磋七何反䟽直猶正也小雅伐木云伐木丁丁鳥鳴嚶嚶鄭箋云昔日未居位在農之時與友生扵山巖伐木為勤苦之事猶以道徳相切正也故郭云丁丁伐木聲嚶嚶兩鳥鳴以喻朋友切磋相正藹藹萋萋臣盡力也注梧桐茂賢才衆地極化臣竭忠噰噰喈喈民恊服也注鳳凰應徳鳴相和百姓懐附興頌歌音義藹扵盖反萋七西反盡苦忍反噰本㦯作雍又作廱同扵恭反喈古諧反應音譍䟽大雅卷阿云藹藹王多吉士鄭箋云王之朝多善士藹藹然又云菶菶萋萋雝雝喈喈毛傳云梧桐盛也鳳皇鳴也臣竭其力則地極其化天下和洽則鳳皇樂徳鄭箋云菶菶萋萋喻君徳盛也雝雝喈喈喻民臣和協是皆臣下盡力民人協服也故郭云梧桐茂賢才衆地極化臣竭忠鳳皇應徳鳴相和百姓懐附興頌歌也佻佻契契愈遐急也注賦役不均小國困竭賢人憂歎逺益急切音義佻徒彫反詩云佻佻獨行歎息也契苦結反詩云契契字又作苦計反愈本㦯作俞同瑜庾二音竭本又作巨列反䟽愈益也遐逺也謂賦役不均小國困竭賢人憂歎逺益急切也小雅大東云糾糾葛屨可以履霜佻佻公子行彼周行毛傳云佻佻獨行貎公子譚公子也鄭箋云葛屨夏屨也周行周之列位也言時財貨盡雖公子衣屨不䏻順時乃夏之葛屨今以履霜送轉餫因見使行周之列位者而發幣焉言雖困乏猶不得止又云契契寤歎哀我惮人毛傳云契契憂苦也鄭箋云今譚大夫契契憂苦而寤歎哀其民人之勞苦是也宴宴粲粲尼居息也注盛飾宴安近處優閑音義宴烏殿烏顯二反粲七旦反尼女乙反謝羊而反又奴啟反飾音式處音杵閑音閒䟽尼近也謂宴宴盛飾近處優閑也小雅北山㦯燕燕居息毛傳云燕燕安息貎大東云東人之子職勞不来西人之子粲粲衣服毛傳云東人譚人也来勤也西人京師人也粲粲鮮盛也鄭箋云職主也東人勞苦而不見謂勤京師人衣服鮮潔而逸豫言王政偏甚也哀哀悽悽懐報徳也注悲苦征役思所生也音義悽郭本㦯作萋同古兮反苦如字又立故反思息嗣反郭音如字䟽懐思也悲苦征役思報父母之徳也小雅蓼莪云哀哀父母生我劬勞鄭箋云哀哀者恨不得終養父母報其生長已之苦郭音云悽本㦯作萋出車云赫赫南仲薄伐西戎春日遲遲卉木萋萋是也言以此征役故思所生也所生謂父母儵儵嘒嘒罹禍毒也注悼王道穢塞羡蟬鳴自得傷已失所遭讒賊音義儵郭徒的反顧舒育反樊本作攸引詩云攸攸我思嘒虎恵反罹力支反悼音盗已音紀䟽罹遭也小雅小弁云踧踧周道鞠為茂草毛傳云踧踧平易也周道周室之通道鞠窮也鄭箋云此喻幽王信褒姒之讒亂其徳政使不通扵四方又曰菀彼栁斯鳴蜩嘒嘒毛傳云蜩蟬也嘒嘒聲也鄭箋云栁木茂盛則多蟬案詩序云小弁刺幽王也太子之傅作焉毛傳云幽王取申女生太子宜臼又悦褒似生子伯服立以為后而放宜臼将殺之故郭云悼王道穢塞羡蟬鳴自得傷已失所遭讒賊儵踧並音狄晏晏旦旦悔爽忒也注傷見絶棄恨士失也音義旦本㦯作􅘔同都歎反忒佗得反䟽悔恨也爽忒差失也皆婦人恨夫棄已而行差失也衛風氓篇云総角之宴言笑晏晏信誓旦旦毛傳云總角結髪也晏晏和柔也信誓旦旦然鄭箋云我為童女未筓結髮晏然之時女與我言笑晏晏然而和柔我其以信相誓旦旦耳言其懇惻款誠案詩序云恨刺時也宣王之時禮義消亡滛風大行男女無别遂相奔誘華落色衰復相棄背㦯乃困而自悔䘮其妃耦故序其事以風焉故郭云傷見絶棄恨士失也臯臯琄琄刺素食也注譏無功徳尸寵禄也音義臯古豪反樊本作浩古老反琄胡犬古犬二反刺字又作誎同七賜反䟽素空也刺無徳而空食其禄也舎人曰臯臯不治之貎大雅召旻云臯臯訿訿曾不知其玷毛傳云皋皋頑不知其道也鄭箋云玷缺也王政已大壞小人在位曾不知大道之缺某氏云鞙鞙無徳而佩小雅大東云鞙鞙佩璲不以其長毛傳云鞙鞙玉貎璲瑞也鄭箋云佩璲者以瑞玉為佩佩之鞙鞙然居其官職非其才之所長也徒美其佩而無其徳刺其素餐是也郭云譏無功徳尸寵禄也者案鄭注禮記云尸謂不知人事無辭讓也以其尸皆神象居位不言但受祭享小人在位亦無言而受寵禄有似扵尸故云尸寵禄也㻆鞙音義同懽懽愮愮憂無吿也注賢者憂懼無所訴也音義懽古玩反愮音遥本又作摇樊本作遥又作佻恌與愮同訓也書云愮愮憂無吿也廣雅云摇亂也吿如字又古毒反訴音素䟽謂賢者憂懼無所吿訴也大雅板篇云老夫灌灌毛傳云灌灌猶款款也鄭箋云老夫諌女款款然王風云中心摇摇毛傳云摇摇憂無所愬灌懽愮摇音義同憲憲洩洩制灋則也注佐興虐政設教令也音義洩余誓反㦯作呭同䟽李廵曰皆惡黨為制灋則也孫炎曰厲王方虐諂臣並為制作灋令大雅板篇云天之方難無然憲憲天之方蹶無然泄泄毛傳云憲憲猶欣欣也蹶動也泄泄猶沓沓也鄭箋云天斥王也王方欲艱難天下之民又方變更先王之道臣乎女無憲憲然無沓沓然為之制灋度逹其意以成其惡皆是佐興虐政設教令也謔謔謞謞崇讒慝也注樂禍助虐增譖惡也音義謔虚虐反謞郭虚各反㦯火角反慝謝切得反諸儒並女陟反言隐匿其情以飾非樂如字又音洛譖側禁反䟽崇增也讒也慝惡也舎人曰謔謔謞謞皆盛烈貎孫炎曰厲王暴虐大臣謔謔謞謞然盛以興讒惡也大雅板篇云天之方虐無然謔謔毛傳云謔謔然喜樂鄭箋云王方為酷虐之政女無謔謔然以讒慝助之又曰多将熇熇不可救藥毛傳云熇熇然熾盛也鄭箋云多行熇熇慘毒之惡誰䏻止其禍是也謞熇音義同翕翕訿訿莫供職也注賢者陵替姦黨熾背公卹私曠職事音義訿子爾反字林云不思稱乎上之意供音恭熾尺志反背音佩䟽言賢者陵替姦黨熾盛背公卹私曠其職事無肯供職也小雅小旻云潝潝訿訿亦孔之哀毛傳云潝潝然患其上訿訿然思不稱乎上鄭箋云臣不事君亂之階也甚可哀也又大雅召旻云皐皐訿訿毛傳云訿訿窳不共事也故郭云賢者陵替姦黨熾盛背公卹私曠職事説文云窳嬾也草木皆自竪立惟瓜瓠之屬卧而不起似若嬾人常卧室故字從宂音眠速速蹙蹙惟逑鞫也注陋人専禄國侵削賢士求哀念窮廹音義戲子六反逑巨鳩反郭云廹也字林云歛聚也本亦作求鞫居六反廹音伯䟽惟念也逑急廹也鞫窮也言鄙陋小人専據爵禄國土侵削致賢士求哀念其窮廹也小雅正月云蓛蔌方有榖毛傳云蔌蔌陋也鄭箋云榖禄也此言小人富而窶陋将貴也又節南山云蹙蹙靡所騁毛傳云騁極也鄭箋云蹙蹙小之貎我視四方土地日見侵削扵夷狄蹙蹙然雖欲馳騁無所之也速蔌音義同抑抑密也注威儀審諦秩秩清也注徳音清泠音義抑音億諦音帝秩直乙反泠郎丁反䟽言威儀審諦徳音清泠也舎人曰威儀密静也大雅假樂云威儀抑抑徳音秩秩鄭箋云成王立朝之威儀致密無所失教令又清眀天下皆樂仰之甹夆掣曵也注謂牽挽音義甹普經反夆孚逢反掣本㦯作􅠺同充世反説文云引而縦之曵餘世反䟽孫炎曰謂相掣曵入扵惡也郭云謂牽挽周頌小毖嗣王求助也云莫予荓蜂毛傳云荓蜂􅠺曵也鄭箋云羣臣小人無敢我􅠺曵謂為譎詐欺不可信也然則掣曵者從旁牽挽之言是挽離正道使就邪僻荓甹夆蜂掣􅠺音義同朔北方也注謂幽朔音義朔所角反䟽舎人曰朔盡也北方萬物盡故言朔也李超曰萬物盡扵北方小雅出車云城彼朔方毛傳云朔方北方也但北方大名皆言朔方堯典云宅朔方郭云謂幽朔不俟不来也注不可待是不復来音義来本㦯作俫迷同力胎反復如字䟽俟待也既云不待是不来也郭云不可待是不復来不遹不蹟也注言不循軌跡也音義遹古述字一音聿蹟子亦反詩云念彼不蹟傳云不循道也循音廵䟽遹循也蹟軌跡也謂不循道者曰不蹟郭云言不循軌跡也小雅沔彼云念彼不蹟毛傳云不蹟不循道也是矣不徹不道也注徹亦道也音義徹直列反䟽小雅十月云天命不徹毛傳云徹道也鄭箋云不道者言王不循天之政教是也勿念勿忘也注勿念念也音義忘音亡下同䟽勿念念也念即不忘也若大雅文王篇云無念爾祖是也萲諼忘也注義見伯兮考槃詩音義萲施音袁謝許袁反郭云義見伯兮詩云焉得萲草毛傳云萲草令人善忘則謝讀為是諼許爰反槃歩干反本又作盤䟽衛伯兮云焉得諼草毛傳云諼草令人忘憂又考槃云永矢弗諼是也伯兮篇本㦯作萲草毎有雖也注詩曰毎有良朋辭之雖也䟽小雅棠棣云毎有良朋况也永歎毛傳云况兹永長也箋云毎有雖也良善也當急難之時雖有善同門来兹對之長嘆而已郭云辭之雖也者言為語辭之雖無佗義也饎酒食也注猶今云饎饌皆一語而兼通音義饎尺志反字林云熟食也又充之反舎人本又作喜釋云古曰饎饌乳戀反䟽小雅天保云吉蠲為饎毛傳云吉善蠲絜也饎酒食也郭云猶今云饎饌皆一語而兼通者言饎之一字通酒食兩名也李廵曰得酒食則喜歡也舞號雩也注雩之祭舞者吁嗟而請雨音義號戸髙反孫炎云雩之祭有舞有號雩音于祭名吁許于反䟽孫炎云雩之祭有舞有號左傳云龍見而雩服杜皆云雩之言逺也逺為百榖祈膏雨月令仲夏云大雩帝鄭注云雩吁嗟求雨之祭也郭云雩之祭舞者吁嗟而請雨是同鄭説也暨不及也注公羊傳曰及我欲之暨不得已暨不得已是不得及音義暨其器反已音以䟽案春秋隐元年三月公及邾婁儀父盟于昧公羊傳曰及者何與也㑹及暨皆與也曷為㦯言㑹㦯言及㦯言暨㑹猶最也及猶汲汲也暨猶暨暨也及我欲之暨不得已也然則暨者非我欲之事不獲已而為㑹者也故云不及也蠢不遜也注蠢動為惡不謙遜也音義蠢昌允反䟽蠢動也遜順也言蠢動為惡不謙遜也小雅采芑蠢爾蠻荆大邦為讎是也如切如磋道學也注骨象須切磋而為器人須學問以成徳如琢如磨自脩也注玉石之被琢磨猶人自脩飾瑟兮僴兮恂慄也注恒戰竦赫兮咺兮威儀也注貎光宣有斐君子終不可諼兮注斐文貎道盛徳至善民之不䏻忘也注常思詠音義磋七何反琢丁角反治玉也本㦯作琢非也僴本㦯作􅏌同下板反郭音簡恂音荀郭音峻鄭𤣥注禮記同云謂嚴慄也謝私尹反慄音栗赫火格反烜吁逺反烜者光明宣著今並作咺字音同斐孚尾反䟽此舉衛風淇澳篇文以釋之也云如切如磋者詩文也云道學也者作者以釋詩也道言也言人之學以成徳如切如磋骨象以成器毛傳云治骨曰切象曰磋道其學而成也故郭云骨象須切磋而為器人須學問以成徳云如琢如磨者詩文也云自脩也者釋之也言人自脩飾如琢磨玉石毛傳云治玉曰琢石曰磨聼其規諌以自脩如玉石之見琢磨郭云玉石之被雕磨猶人自脩飾云瑟兮僴兮者詩文也恂慄也者釋之也謂嚴恂戰慄也故郭云恒戰竦毛傳云瑟矜荘貎僴寛大貌是外貎荘嚴又内寛裕也云赫兮咺兮者詩文也威儀也者釋之也言赫咺者容儀𤼵揚之貎言威儀也毛傳云赫有明徳赫赫然咺威儀容止宣著也故郭云貎光宣云有斐君子終不可諼兮者詩文也云道盛徳至善民之不䏻忘也者釋之也毛傳云斐文章貎諼忘也此道有斐然文章之君子盛徳至善如此故民稱之常思詠終不䏻忘也案詩稱君子謂武公既微且尰骭瘍為微腫足為尰注骭脚脛瘍創也音義微如字書作三蒼云足創尰本㦯作尰同並籀文瘇字也蜀勇時踵二反骭下諌反郭作扞音古案反謂脚脛也瘍音羊腫之勇反脛戸定反創初良反䟽云既微且尰者小雅巧言文也云骭瘍為微腫足為尰者釋之也孫炎曰皆水濕之疾也郭云骭脚脛也瘍創也然則膝之下有瘡腫是渉水所為故鄭箋亦云此人居下濕之地故生微尰之疾詩云居河之麋是居下濕也是刈是濩濩煑之也注煮葛為絺綌音義刈音乂濩又作鑊同戸郭反煮之與反絺丑尼反綌去􅊇反䟽云是刈是濩者周南葛覃文也云濩煮之也者釋之也舎人曰是刈刈取之是濩煮治之郭云煮葛為絺綌以煮之扵濩故曰濩煮非訓濩為煮以彼下云為絺為綌故知煮葛為絺綌也毛傳云精曰絺粗曰綌履帝武敏武迹也敏拇也注拇迹大指處音義敏如字舎人本作畝釋云古者姜嫄履天帝之迹扵畎畝之中而生后稷拇音畝足大指處昌慮反䟽云履帝武敏者大雅生民文也云武迹也敏拇也者釋之也郭云拇迹大指處鄭箋詩云祀郊禖之時時則有大神之迹姜嫄履之足不䏻滿履其拇指之處扵是遂有身而生后稷是其事也張仲孝友注周宣王時賢臣善父母為孝善兄弟為友䟽云張仲孝友者小雅六月文也云善父母為孝善兄弟為友者釋之也李廵云張仲字其人孝故稱孝友毛傳云張仲賢臣也鄭箋云張仲吉甫之友其性孝友以詩序云六月宣王北伐也故郭云周宣王時賢臣有客宿宿言再宿也有客信信言四宿也注再宿為信重言之故知四宿音義宿先六反重直用反䟽云有客宿宿有客信信者周頌有客文也云言再宿也言四宿也者釋之也毛傳云一宿曰宿再宿曰信各重言之故知再宿及四宿也美女為媛注所以結好媛音義媛為眷反好呼報反䟽詩鄘風君子偕老云展如之人兮邦之媛也故此釋之郭云所以結好媛孫炎曰君子之援助然則由有美可以援助君子故云美女為媛美士為彦注人所彦詠音義彦音喭䟽鄭風羔裘云彼其之子邦之彦兮故此釋之也毛傳云彦士之美稱郭云人所彦詠舎人曰國有美士為人所言道其虚其徐威儀容止也注雍容都雅之貎䟽云其虚其徐鄘風北風文也威儀容止也者釋之也郭云雍容都雅之貎孫炎云虚徐威儀謙退也然則虚徐者謙虚閑徐之義故鄭箋云威儀虚徐寛仁者也詩作其邪此作其徐字雖異音實同故鄭箋云邪讀如徐猗嗟名兮目上為名注眉眼之間音義猗扵宜反眼五限反㦯作目䟽云猗嗟名兮者齊風猗嗟文也云目上為名者釋之也孫炎云目上平博郭云眉眼之間式微式微者微乎微者也注言至微䟽云式微式微者邶風式微文也云微乎微也者釋之也郭云言至微鄭箋云式發聲也案詩序云式微黎寓扵衛其臣勸以歸也然則以君被逐既微又見卑賤是至微也不取式為義故鄭云發聲也之子者是子也注斥所詠音義斥音尺䟽詩言之子者多矣故此釋之李廵云之子者論五方之言是子也然則之為語助人言之子者猶云是此子也桃夭傳云之子彼説嫁事為嫁者之子漢廣之子則貞潔者之子東山之子言其妻白華之子斥幽王各随其事而名之故郭云斥所詠徒御不驚輦者也注歩挽輦車音義挽本亦作輓同亡逺反聲類云引也車音居䟽云徒御不驚者小雅車攻文也云輦者也者釋也此上觧徒字也諸徒皆為徒行此獨為輦是以辨之地官鄉師云大軍旅㑹同治其輦注云輦人輓行所以載任器也止以為䉒營司馬法輦有一斧一斤一鑿一梩周輦加二版二築夏后氏二十人而輦殷十八人而輦周十五人而輦是㑹同田獵人輓輦以徒行也故郭云歩挽輦車襢裼肉袒也注脱衣而見體暴虎徒搏也注空手執也音義襢本㦯作袒同徒坦徒丹二反下同裼蘇厯反脱佗活反見賢遍反暴歩報反搏連莫反郭音付䟽鄭風大叔于田云襢裼暴虎故此釋之毛傳云襢裼肉袒也李廵曰襢裼脱衣見體曰肉祖孫炎曰袒去裼衣郭云脱衣而見體毛傳又云暴虎空手以搏之舎人曰無兵空手搏之然則徒空也故郭云空手執也馮河徒渉也注無舟楫音義馮字又作慿皮氷反依字當作慿説文云無舩渡河楫本㦯作檝又作接同子葉才入二反方言曰檝橈也説文云檝舟棹也釋名曰在旁撥水曰櫂又謂之檝檝㨗也䟽小雅小旻云不敢馮河故此釋之也李廵曰無舟而渡水曰徒渉郭云無舟楫毛傳云馮陵也然則空渉水陵波而渡故訓馮為陵也籧篨口柔也注籧篨之疾不䏻俯口柔之人視人顔色常亦不伏因以名云戚施面柔也注戚施之疾不䏻仰面柔之人常俯似之亦以名云音義籧本㦯作􅞠同巨居反篨直閭反戚七厯反施式支反䟽邶風新臺云籧篨不鮮又曰得此戚施故此釋之也毛傳云籧篨不䏻俯者戚施不䏻仰者李廵曰籧篨巧言好辭以饒人是謂口柔戚施和顔悦色以誘人是謂面柔但籧篨戚施本人疾之名故晉語云籧篨不可使俯戚施不可使仰是也人口柔者必仰面觀人顔色而為辭似籧篨不俯之人因名口柔者為籧篨面柔者必低首下人媚以容色似戚施不仰之人因名面柔者為戚施故郭云籧篨之疾不䏻俯口柔之人視人顔色常亦不伏戚施之人不䏻仰面柔之人常俯似之因以名云夸毗體柔也注屈已卑身以柔順人也音義夸苦瓜反毗鼻以反舎人曰卑身屈已也樊引詩云無為夸毗李孫郭云屈已卑身以柔順人也字書作䠸已音紀䟽大雅板篇云無為夸毗故此釋之也毛傳云夸毗以體柔人也李廵曰屈已卑身求得扵人曰體柔然則夸毗者便辟其足前却為恭以形體順從于人故郭云屈已卑身以柔順人也婆娑舞也注舞者之容音義娑素河反䟽陳風東門之枍云婆娑其下故此釋之李廵曰婆娑盤辟舞也郭云舞者之容孫炎曰舞者之容婆娑然則婆娑舞者之状貎也擗拊心也注謂椎胷也音義擗婢亦反拊本亦作撫同芳武反椎本㦯作搥同直追反字林云擊也胷音凶䟽邶風柏舟云寤擗有標擗謂拊心也郭云謂椎胷也矜憐撫掩之也注撫掩猶撫拍謂慰䘏也音義矜几陵反憐力堅反拍普伯反䟽撫掩猶撫拍謂慰䘏也小雅鴻鴈云爰及矜人緎羔裘之縫也注縫飾羔皮之名音義緎許域反又音域縫扶用反䟽召南羔裘云羔羊之革素絲五緎故此觧之也孫炎云緎之為界緎然則縫合羔羊皮為裘縫即皮之界緎因名裘縫為緎故郭云縫飾羔皮之名殿屎呻也注呻吟之聲音義殿丁練反屎虚伊反㦯作敜吹又作䐖説文作唸吚郭上音香惟反又音丁念反下許利反呻音申䟽大雅板篇云民之方殿屎毛傳云殿屎呻吟也是用此為説郭云呻吟之聲孫炎云人愁苦呻吟之聲也幬謂之帳注今江東亦謂帳為幬音義幬本㦯作同直留反帳陟亮反䟽帳一名幬召南小星云抱衾與裯鄭箋云幬牀帳也郭云今江東亦謂帳為幬幬與裯音義同侜張誑也注書曰無㦯侜張為幻幻惑欺誑人者音義侜本㦯作倜同張留反誑俱放反幻胡辦反䟽陳風防有鵲巢云誰侜予美毛傳云侜張誑也鄭箋云女衆讒人誰侜張誑欺我所美之人乎注云書曰無㦯侜張為幻者周書無逸篇文也引之者以證侜張謂幻惑欺誑人者誰昔昔也注誰𤼵語辭䟽陳風墓門云誰昔然矣毛傳云昔乆也郭云誰𤼵語辭與毛同也不辰不時也注辰亦時也䟽辰亦時也不辰者言不得其時也大雅桑柔云我生不辰逢天僤怒是也凡曲者為罶注毛傳曰罶曲梁也凡以薄為魚笱者名為罶音義罶本㦯作同力九反薄蒲博反本今作簿笱音苟䟽曲薄也凡以薄取魚為罶注云毛傳曰罶曲梁也者小雅魚麗篇傳文也云凡以薄為魚笱者名為罶者即釋器云嫠婦之笱謂之罶也鬼之為言歸也注尸子曰古者謂死人為歸人䟽人死為鬼小雅何人斯云為鬼為蜮周禮曰享大鬼謂之鬼者鬼猶歸也若歸去然故尸子曰古者謂死人為歸人釋親第四音義説文云親至也蒼頡篇云親愛也近也禮記云親親以三為五以五為九尚書云以親九族親者通謂五服九族之親也䟽案禮記大傳云聖人南面聼天下所且先者五民不與焉一曰治親蒼頡曰親愛也近也然則親者恩愛狎近不䟽逺之稱也書曰克明峻徳以親九族䘮服小記曰親親以三為五以五為九上殺下殺旁殺而親畢矣以九族之親其名謂非一此篇釋之故曰釋親父為考母為妣注禮記曰生曰父母妻死曰考妣嬪今世學者從之案尚書曰大傷厥考心事厥考厥長聡聴祖考之彛訓如䘮考妣公羊傳曰恵公者何隐之考也仲子者何桓之母也蒼頡篇曰考妣延年書曰嬪于虞詩曰聿嬪于京周禮有九嬪之官明此非死生之異稱矣其義猶今謂兄為晜妹為媦即是此例也父之考為王父父之妣為王母注加王者尊之王父之考為曾祖王父王父之妣為曾祖王母注曾猶重也曾祖王父之考為髙祖王父曾祖王父之妣為髙祖王母注髙者言最在上父之世父叔父為從祖祖父父之世母叔母為從祖祖母注從祖而别世統異故父之晜弟先生為世父後生為叔父注世有為嫡者嗣世統故也男子先生為兄後生為弟男子謂女子先生為姊後生為妹父之姊妹為姑父之從父晜弟為從祖父父之從祖晜弟為族父族父之子相謂為族晜弟族晜弟之子相謂為親同姓注同姓之親無服屬兄之子弟之子相謂為從父晜弟注從父而别子之子為孫注孫猶後也孫之子為曾孫注曾猶重也曾孫之子為𤣥孫注𤣥者言親屬微昧也𤣥孫之子為来孫注言有徃来之親来孫之子為晜孫注晜後也汲冡竹書曰不窋之晜孫晜孫之子為仍孫注仍亦重也仍孫之子為雲孫注言輕逺如浮雲王父之姊妹為王姑曾祖王父之姊妹為曾祖王姑髙祖王父之姊妹為髙祖王姑父之從父姊妹為從祖姑父之從祖姊妹為族祖姑父之從父晜弟之母為從祖王母父之從祖晜弟之母為族祖王母父之兄妻為世母父之弟妻為叔母父之從父晜弟之妻為從祖母父之從祖晜弟之妻為族祖母父之從祖祖父為族曾王父父之從祖祖母為族曾王母父之妾為庶母祖王父也晜兄也注今江東人通言晜音義妣必里反嬪毗真反長丁丈反下皆同彞音夷䘮息浪反又如字頡戸結反稱尺證反晜音昆本亦作昆下同媦于貴反廣雅云媦妹也説文云椘人謂女弟為媦纂文云河南人云妹媦也重直龍反下皆同别彼列反又如字下皆同嫡丁厯反来音徕汲居及反冡竹奉反窋丁律反又丁滑反不窋后稷之子䟽此别同宗親族白虎通曰父矩也以度教子也又為考考成也言有成徳廣雅云母牧也言育養子也又為妣妣媲也媲匹扵父廣雅又云兄况也况扵父又謂之晜弟悌也言順扵兄子孜也以孝事父常孜孜也孫順也順扵祖男任家事也女如也白虎通曰言如人也徐鍇曰女子從父之教從夫之命故曰如姑故也言尊如故也又謂之威徐鍇曰土盛扵戌土隂之主也故字從戍漢律曰婦吿威姑是也姊咨也以其先生言可咨問説文云妹女弟也又謂之媦妾接也鄭注禮記云聞彼有禮走而徃焉以得接見扵君子也庶母者父之妾也此皆同宗之族也白虎通曰宗者何謂也宗有尊也為先祖主也宗人之所尊也禮曰宗人将有事族人皆待聖者所以必有宗何也所以長和睦也族者何也族者湊也聚也謂恩愛相流湊生相親愛死相哀痛有㑹聚之道故謂之族也注云禮記曰生曰父母妻死曰考妣嬪者曲禮下篇文也云今世學者從之者謂從禮記以父母妻為生之稱以考妣嬪為死之稱彼乃記者一家之説爾學者膠柱遂為生死定稱非也故郭氏引諸文以證之云尚書曰大傷厥考心康誥文也云事厥考厥長聡聴祖考之彞訓者皆酒誥文也云如䘮考妣者舜典文也此皆生稱考妣也云公羊傳曰恵公者何隐之考也仲子者何桓之母也者隐元年傳文也此即死稱母也云蒼頡篇曰考妣延年者此亦生稱考妣也云書曰嬪于虞者堯典文也云詩曰聿嬪于京大雅大眀篇文也云周禮有九嬪之官者屬天官掌婦學之法者也此皆生稱嬪者也云眀此非死生之異稱矣者所以破先儒之説也云其義猶今謂兄為晜妹為媦即是此例也者舉類以曉人也云從祖而别世統異故者觧所以稱從之理也從祖而别繼世分宗其統各異故曰從祖别世有為嫡者嗣世統故也者觧所以稱世之義也繼世以嫡長先生扵父則繼世者也故曰世父説文叔作尗許慎曰從上小言尊行之小也云同姓之親無服屬者禮記大傳云親者屬也鄭注云有親者服各以其屬親䟽此經言親同姓者謂五世之外比諸同姓猶親但無服屬爾云孫猶後也言繼後嗣也廣雅云孫順也許慎云從子從系系續也言順續也言順續先祖之後也云𤣥者言親屬微昧也又𤣥者緅緇之間色色之微昧者也親屬微昧故曰𤣥孫云晜後也汲冡竹書曰不窋之晜孫晜後也釋言文束晳傳曰太康元年汲郡民盗發魏安釐王塜得竹書漆字科斗文科斗文者周時古文也其字頭麤尾細似科斗之蟲故俗名之焉不窋后稷之子也晜孫謂毁隃也宗族母之考為外王父母之妣為外王母母之王考為外曾王父母之王妣女為外曾王母注異姓故言外母之晜弟為舅母之從父晜弟為從舅母之姊妹為從母從母之男子為從母晜弟其女子子為從母姊妹音義從才用反下注娣從同舅音臼䟽此一節别母之族黨也黨是鄉之細也此外族屬母若黨之屬鄉故云母黨云舅者孫炎云舅之言舊尊長之稱詩秦風云我送舅氏曰至渭陽是也母黨妻之父為外舅妻之母為外姑注謂我舅者吾謂之甥然則亦宜呼壻為甥孟子曰帝館甥于貳室是也姑之子為甥舅之子為甥妻之晜弟為甥姊妹之夫為甥注四人體敵故更相為甥甥猶生也今人相呼盖依此妻之姊妹同出為姨注同出謂俱已嫁詩曰邢侯之姨女子謂姊妹之夫為私注詩曰譚公維私男子謂姊妹之子為出注公羊傳曰盖舅出女子謂晜弟之子為姪注左傳曰姪其從姑謂出之子為離孫謂姪之子為歸孫女子子之子為外孫女子同出謂先生為姒後生為娣注同出謂俱嫁事一夫公羊傳曰諸侯娶一國二國徃媵之以姪娣從娣者何弟也此即其義也女子謂兄之妻為嫂弟之妻為婦注猶今言新婦是也長婦謂稚婦為娣婦娣婦謂長婦為姒婦注今相呼先後㦯云妯娌音義甥音生壻音細館古半反更音庚譚大南反姪大結反字林云兄女又丈乙反姒音似娣大計反娶七具反媵以證反嫂素早反稚直吏反先蘓練反後胡遘反廣雅云先後妯娌韋昭云先謂姒後謂娣妯音逐娌音里廣雅云先後也郭注方言云今闗西兄弟婦相呼為妯娌䟽此一節别妻之親黨也内則曰聘則為妻白虎通云妻者齊也與夫齊體自天子下至庶人其義一也注孟子云舜尚見帝帝館甥于貳室亦饗舜迭為賓主是天子而友匹夫也彼注云尚上也舜在畎畝之時堯友禮之舜上見堯舎之扵貳室貳室副宫也堯亦就饗舜之所設更迭為賓主禮記妻父曰外舅謂我舅者吾謂之甥堯以女妻舜故謂堯甥卒與之天位是天子之友匹夫也云四人謂姑之子舅之子妻之晜弟姊妹之夫也此四人尊卑體敵更相為甥云甥猶生也者取相親之意也云邢侯之姨譚公維私皆衛風碩人篇文也孫炎曰私無正親之言然則謂吾姨者我謂之私邢侯譚公皆荘姜姊妹之夫互言之耳春秋譚子伐莒則譚是子爵言公者盖依臣子稱便文耳云公羊傳白盖舅出案春秋襄五年夏叔孫豹鄫世子巫如晉公羊傳曰外相如不書此何以書為叔孫豹率而與之俱也叔孫豹則曷為率而與之俱盖舅出也何休云巫者鄫前夫人襄公母妹夫之子也俱莒外孫故曰舅出是也云左傳曰姪其從姑案僖十五年傳云初晉獻公筮嫁伯姬扵秦遇歸妹之暌史蘇占之曰不吉其繇曰姪其從姑杜注云震為木離為火火從木生離為震妹扵火為姑謂我姪者我謂之姑謂子圉質秦是也云公羊傳者案春秋荘十九年秋公子結媵陳人之婦于鄄遂及齊侯宋公盟公羊傳曰媵者何諸侯娶一國則二國徃媵之以姪娣從姪者何兄之子也娣者何弟也諸侯一聘九女諸侯不再娶何休云必以姪娣從之者欲使一人有子二人喜也所以防嫉妬令重繼嗣也因以備尊尊親親也九者極陽數也不再娶者所以節人情開媵路云猶今言新婦是也案儀禮䘮服傳云夫之昆弟何以無服也其夫屬乎父道者妻皆母道也其夫屬乎子道者妻皆婦道也謂弟之妻婦者是嫂亦可謂之母乎故名者人治之大者也可無慎乎鄭注云道猶行也言婦人棄姓無常秩稱嫁扵父行則為母行嫁扵子行則為婦行謂弟之妻為婦者卑逺之故謂之娣嫂者尊嚴之稱是嫂亦可謂之母乎嫂猶叟也叟老人稱也是為序男女之别爾若已以母婦之服服兄弟之妻兄弟之妻以舅子之服服已則是亂昭穆之序也治猶理也父母兄弟夫婦之理人倫之大者可不慎乎大傳曰同姓從宗合族屬異姓主名治際㑹名著而男女有别是别嫂婦之名也郭云猶今言新婦者以時驗而知也至今猶然云今相呼先後㦯云妯娌者廣雅云娣社妯娌娣姒先後也人多疑娣姒之名皆以為兄妻呼弟妻為娣弟妻呼兄妻為姒因即惑扵斯文不知何以為説今謂母婦之號随夫尊卑娣姒之名從身長㓜以其俱来夫族其夫班秩既同尊卑無以相加遂從身之少長䘮服小功章曰娣姒婦報傳曰娣姒婦者弟長也以弟長觧娣姒言娣是弟姒是長也公羊傳亦云娣者何弟也是其以弟觧娣自然以長觧姒長謂身之年長非夫之年長也此云長婦謂稚婦為娣婦娣婦謂長婦為姒婦者止言婦之長稚不言夫之大小左傳成公十一年穆姜謂聲伯之母為姒昭公八年傳叔向之嫂謂叔向之妻為姒二者皆呼夫弟之妻為姒豈計夫之長㓜乎上云女子同出謂先生為姒後生為娣郭云同出謂俱嫁事一夫也事一夫者以已生先後為娣姒則知娣姒以已之年非夫之年也故賈逵鄭𤣥及杜預皆云兄弟之妻相謂為姒言兩人相謂長者為姒知娣姒之名不計夫之長㓜也妻黨婦稱夫之父曰舅稱夫之母曰姑姑舅在則曰君舅君姑沒則曰先舅先姑注國語曰吾聞之先姑謂夫之庶母為少姑夫之兄為兄公注今俗呼兄鍾語之轉耳夫之弟為叔夫之姊為女公夫之女弟為女妹注今謂之女妹是也子之妻為婦長婦為嫡婦衆婦為庶婦女子子之夫為壻壻之父為姻婦之父為㛰父之黨為宗族母與妻之黨為兄弟婦之父母壻之父母相謂為㛰姻兩壻相謂為亞注詩曰瑣瑣姻亞今江東人呼同門為僚壻婦之黨為㛰兄弟壻之黨為姻兄弟注古者皆謂㛰姻為兄弟嬪婦也注書曰嬪于虞謂我舅者吾謂之甥也音義稱如字少證照反公音鍾轉丁戀反又如字姻音因亞一駕反又作婭瑣桑果反僚力彫反䟽此别夫婦㛰姻之名也説文云婦服也從女持帚灑掃也白虎通云夫婦者何謂也夫者扶也以道扶接婦者服也以禮屈服謂之舅姑者何舅者舊也姑者故也舊故老人稱也夫之父母謂舅姑何尊如父而非父者舅也親如母而非母者姑也鄭注䘮服傳云女子子者子女也别扵男子也説文云壻女之夫也從士從胥聞一知十為士胥者有才智之稱故謂女之夫為壻廣雅云壻謂之倩方言云東齊之間壻謂之倩白虎通云㛰姻者何謂昬時行禮故曰㛰婦人因夫而成故曰姻注國語曰吾聞之先姑者魯語季康子問扵公父文伯之母曰主亦有以語肥也對曰吾䏻老而已何以語子曰雖然肥願有聞扵主對曰吾聞諸先姑曰君子䏻勞後世有繼子夏聞之曰善哉商聞之曰古之嫁者不及舅姑謂之不幸夫婦學扵舅姑者也是矣瑣瑣姻亞小雅節南山文也劉熈釋名云兩壻相謂為亞者言毎一人取姊一人取妹相亞次也又並来女氏則姊夫在前妹夫在後亦相亞也古者皆謂㛰姻為兄弟者禮記曾子問曰昬禮既納幣有吉日女之父母死則如之何孔子曰壻使人弔如壻之父母死則女之家亦使人弔鄭注云必使人弔者未成兄弟又云父䘮稱父母䘮稱母父母不在則稱伯父世母壻已𦵏壻之伯父致命女氏曰某之子有父母之䘮不得嗣為兄弟使某致命女氏許諾而弗敢嫁禮也是古者謂㛰姻為兄弟以夫婦有兄弟之義㦯據壻扵妻之父母有緦服故得謂之兄弟也嬪于虞者案堯典羣臣共舉舜扵帝帝曰我其試哉女于時觀厥刑于二女釐降二女于媯汭嬪于虞孔安國注云降下嬪婦也舜為匹夫䏻以義理下帝女之心扵所居媯水之汭使行婦道扵虞氏是也婚姻爾雅注䟽卷三
