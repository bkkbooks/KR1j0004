body:
  text: 欽定四庫全書爾雅注疏卷五原目卷中晉郭璞注唐陸德明音義宋邢昺疏釋樂第七音義樂五角反説文云總五聲八音之名象鼓鞞之形木其虡也周禮有大司樂職掌六代之樂尚書云帝曰夔命汝典樂是也疏案樂記云樂者樂也君子樂得其道小人樂得其欲也説文云樂五聲八音之總名象鼓鞞之形木虡也白歌也又云石磬也五聲者商角宫徵羽也律歷志云商之為言章也物成熟可章度角觸也物觸地而出戴芒角也宫中也居中央暢四方唱始施生為四聲綱也徵祉也物盛大而繁祉也羽宇也物聚藏宇覆之也又云八音土曰塤匏曰笙皮曰鼓竹曰管絲曰絃石曰磬金曰鍾木曰柷此篇總釋五聲名及八音之器故名釋樂也宫謂之重商謂之敏角謂之經徵謂之迭羽謂之桞注皆五音之别名其義未詳音義重直冡反劉歆云宫中也居中央暢四方唱始施生為四聲綱也孫云宫音濁而遲故曰重也敏亡謹反疾也成也審也達也劉歆云商章也物成熟可章度也白虎通云商強也案商為臣而佐君成政故曰敏敏成也經常也劉歆云角觸也物觸地而出戴芒角也徵知里反迭大結反劉歆云徵祉也物盛大而繁祉也白虎通云徵止也劉歆云羽宇也物聚藏宇覆之也白虎通云羽舒也鄭注禮云桞聚也疏案此文則宫一名重商一名敏角一名經徵一名迭羽一名桞但未見義所出也注云皆五音者案鄭玄注樂記云雜比曰音謂宫商角徵羽清濁和比謂之音單出曰聲謂五聲之內唯單有一聲更無餘聲相雜也然則初發口單出者謂之聲衆和合成章謂之音金石干戚羽旄謂之樂則聲為初音為中樂為末此云五音者舉中而言也云之别名者謂重敏經迭桞是宫商角徵羽之别名也云其義未詳者以爾雅之作以釋六藝今經典之中無此五名或在亡逸中不可得知其義故云未詳案孫叔然云宫濁而遲故曰重也孫氏雖有此説更無經據故不取也大瑟謂之灑注長八尺一寸廣一尺八寸二十七絃音義瑟字林云庖羲作瑟灑所蟹所綺二反又所買反孫云音多變布出如灑也長直亮反又如字下放此廣古曠反疏瑟者登歌所用之樂器也故先釋之世本曰庖犧氏作五十絃黃帝使素女鼓瑟哀不自勝乃破為二十五絃具二均聲禮圖舊云雅瑟長八尺一寸廣一尺八寸二十三絃其常用者十九絃其餘四絃謂之番番贏也頌瑟長七尺二寸廣尺八寸二十五絃盡用之熊氏云瑟兩頭有孔其在底下者名越鄉飲酒禮云二人皆左何瑟後首挎越注云越瑟底孔也燕禮云小臣左何瑟面鼓執越注云越瑟下孔也若用之祭祀則練其絃疏其越樂記云清廟之瑟朱絃而疏越鄭注云朱絃練朱絃則聲濁越瑟底孔也畫疏之使聲遲也以其不練則體徑而聲清練則絲熟而聲濁也疏通也使兩頭孔相連而通也孔小則聲急孔大則聲遲故也其大者别名灑孫叔然云音多變布如灑出也郭云二十七絃未見所出大琴謂之離注或曰琴大者二十七絃未詳長短廣雅曰琴長三尺六寸六分五絃音義琴字林云神農作琴疏琴操曰伏犧作琴世本云神農作琴白虎通曰琴者禁也禁止於邪以正人心也琴之大者别名離也孫叔然云音多變聲流離也云或曰琴大者二十七絃未詳長短者或人言琴有二十七絃是琴之大者也但未詳其長短耳云廣雅曰琴長三尺六寸六分五絃者此常用之琴也象三百六十六日五絃象五行大絃為君小絃為臣文王武王加二絃以合君臣之恩也又五絃第一絃為宫其次商角徵羽文武二絃為少宫少商又琴操曰廣六寸象六合也又上曰池言其平下曰濱言其服前廣後狹象尊卑上圓下方法天地然琴為樂器通見詩書故此釋之也大鼓謂之鼖注鼖長八尺小者謂之應注詩曰應朄縣鼓在大鼓側音義鼖扶云反應音譍注同李云小者音聲相承故曰應應承也孫云和應大鼓也􅉧余刃反詩云應􅉧縣鼓是也案􅉧引也謂擊小鼓引樂聲縣音玄疏别鼓大小之名也鼓之大者名鼖周禮鼓人職曰以鼖鼓鼓軍事是也其小者名應言聲應於大鼓也李巡云小者音聲相承故曰應也孫炎云和應大鼓也鼖長八尺者案考工記韗人為鼓長八尺鼓四尺中圍加三之一謂之鼖後鄭注云中圍加三之一者加於面之圍以三分之一也面四尺其圍十二尺加以三分一四尺則中圍十六尺徑五尺三寸三分寸之一也今亦合二十版則版六寸三分寸之二耳大鼓謂之鼖鼓鼓軍事鄭司農云鼓四尺謂革所蒙者廣四尺應􅉧縣鼓周頌有瞽篇文也鄭箋云􅉧小鼓在大鼓旁應鼙之屬也案朄引也謂擊小鼓引樂聲大磬謂之毊注毊形似犂錧以玉石為之音義磬口定反毊虛嬌反又音喬孫云毊喬也喬高也謂其聲高也李云大磬聲清燥也故曰毊毊燥也犂郭奚反錧古緩反沈古亂反字林云田器也江南人呼犂刀為錧本亦作貫同疏毊樂器名也以玉石為之世本曰無句作磬釋名云磬罄也聲堅罄罄然考工記曰磬氏為磬倨句一矩有半其博為一股為二鼓為三參分其股博去一以為鼓博參分其鼓博以其一為之厚已上則磨其旁已下則磨其專是其制也大者名毊孫炎云毊喬也喬高也謂其聲高也李巡云大磬聲清燥也故曰毊毊燥也字林云錧田器也自江而南呼犂刀為錧此毊形似犂錧但大爾云以玉石為之者左傳云玉磬紀甗又八音謂磬為石故知以玉石為之也大笙謂之巢注列管瓠中施簧管端大者十九簧小者謂之和注十三簧者鄉射記曰三簧一和而成聲音義笙世本云隨作笙巢孫顧並仕交莊交二反孫又徂交反巢高也言其聲高瓠胡故反簧音黃和胡戈反下同李云小者聲少音相和也郭引儀禮云三笙一和而成聲鄭注云三人吹笙一人吹和又胡卧反孫云應和於笙也疏世本云隨作笙禮記曰女媧之笙簧釋名曰笙生也象物貫地而生説文云笙正月之音物生故謂之笙有三簧象鳯之身其大者名巢巢高也言其聲高小者名和李巡云小者聲少音相和也孫炎云應和於笙瓠匏也以匏為底故八音謂笙為匏簧者笙管之中金薄鐷也笙管必有簧故或謂笙為簧詩王風云左執簧是也大者十九簧以時驗而言也云十三簧者鄭司農注周禮亦云十三簧相傳為然注鄉射記云三笙一和而成聲者彼鄭注云三人吹笙一人吹和是也大篪謂之沂注篪以竹為之長尺四寸圍三寸一孔上出寸三分名翹橫吹之小者尺二寸廣雅云八孔音義篪字又作篪同直知反管有七孔世本云蘇成公所作長一尺二寸沂郭魚斤反又魚靳反李孫云篪聲悲沂悲也或作篪又作𪛊音宜肌反翹巨遙反疏李巡曰大篪其聲非一也孫炎曰篪聲悲沂悲也釋名曰篪啼也聲如嬰兒啼郭云篪以竹為之長尺四寸圍三寸一孔上出寸三分名翹橫吹之小者尺二寸廣雅云八孔鄭司農注周禮云篪七空蓋不數其上出者故七也大塤謂之嘂注塤燒土為之大如鵝子鋭上平底形如稱錘六孔小者如雞子音義塤本或作塤字同許袁反説文云塤樂器名從土熏聲釋名云塤喧也聲濁喧喧然案世本云暴辛公所作也圍五寸半長三寸半六孔也嘂本或作叫字同居弔反李云大塤也鵝如字鋭余祭反稱尺證反錘直危直偽二反廣雅云錘謂之權疏説文云塤樂器名從土熏聲塤塤古今字釋名云塤喧也聲濁喧喧然大塤名嘂孫炎曰音大如呌呼聲郭云塤燒土為之大如鵝子鋭上平底形如稱錘六孔小者如雞子周禮小師注云塤燒土為之大如鴈卵鄭司農亦云六孔是相傳為然也世本云暴辛公作塤蘇成公作篪譙周古史云古有塤篪尚矣周幽王時暴辛公善塤蘇成公善篪記者因以為作謬矣世本之謬信如周言其云蘇公暴公所善亦未知所出蓋以詩小雅云伯氏吹塤仲氏吹篪蘇公刺暴公也故致斯謬大鍾謂之鏞注書曰笙鏞以間亦名鑮其中謂之剽小者謂之棧音義鍾章容反説文作鐘云樂器也字林同世本云垂所作以此鍾為酒器今經典通為樂器鏞音容間間厠之間鑮音博字林云匹各反又音薄字書云大鍾也剽郭音瓢孫匹妙反釋云剽者聲輕疾李云其中微小故曰剽剽小也棧郭側簡反或助板反疏此别鍾大小之名也説文云鍾器也世本云垂作鍾考工記鳬氏為鍾釋名曰鍾空也內空受氣多其大者名鏞李巡曰大鍾音聲大鏞大也孫炎曰鏞深長之聲又名鑮大射禮云樂人宿縣于阼階東笙磬西面其南笙鍾其南鑮鄭云鑮如鍾而大是也其不大不小者名剽孫炎曰剽者聲輕疾也李巡云其中微小故曰剽剽小也其小者名棧李巡云棧淺也東晉元興年會稽剡縣人家井中得一鍾長三寸口徑四寸上有銘古文云棧鍾之小者既長三寸自然淺也注書曰笙鏞以間尚書益稷篇文也大簫謂之言注編二十三管長尺四寸小者謂之筊注十六管長尺二寸簫一名籟音義言如字本或作䇾音同編卑綿反又方千反或音步典反筊本或作笅字戶交反籟音賴疏此别簫大小之名也風俗通云舜作簫其形參差以象鳯翼十管長二尺博雅曰簫大者二十三管無底小者十六管有底其大者名言李巡曰大簫聲大者言言也郭云編二十三管長尺四寸其小者名筊李巡曰小者聲揚而小故言筊筊小也郭云十六管長尺二寸簫一名籟又通卦驗云簫長尺四寸其管數長短雖異要是編小竹管為之耳大管謂之簥注管長尺圍寸併漆之有底賈氏以為如篪六孔其中謂之篞小者謂之篎音義簥九遙反併步頂反又并之去聲漆音七篞乃結反篎郭音妙又亡小反疏别管小大之名也大管名簥李巡云聲高大故曰簥簥高也郭云管長尺圍寸併漆之有底賈氏以為如篪六孔小師注云管如笛形小併兩管而吹之今大常樂官有之是也其中不大不小者名篞小者名篎大籥謂之産注籥如笛三孔而短小廣雅云七孔其中謂之仲小者謂之箹音義籥羊灼反管三孔也本或作籥簅音産字又作産笛徒歷反字或作笛仲或作筗同箹烏角反又音約疏籥樂器名其大者名産其中者名仲小者名箹郭云籥如笛三孔而短小廣雅云七孔周禮笙師掌教吹籥鄭注云籥如笛三空詩邶風云左手執籥毛傳云籥六孔所見異也徒鼓瑟謂之步注獨作之徒吹謂之和徒歌謂之謡注詩云我歌且謡徒擊鼓謂之咢注詩曰或歌或咢徒鼓鍾謂之修徒鼓磬謂之寋注未見義所出音義吹本或作吹字同昌睡反咢五各反字林或作咢又本作鄂修如字本作修字寋李云置擊衆聲寋連也本或作謇字同紀展反或作蹇字非郭云未見義所出未知李何所據上重敏經迭桞郭云皆五音别名其義未詳諸家或有音訓亦可為義上下皆類此疏凡八音備作曰樂一音獨作不得樂名故此辨其異名也徒空也鄭注周禮小師云出音曰鼓空作一器以出其音者謂之徒鼓故郭云獨作之也注詩云我歌且謡此魏風園有桃篇文也毛傳云曲合樂曰歌徒歌曰謡孫炎云聲消搖也注或歌或咢此大雅行葦篇文也毛傳云歌者比於琴瑟也徒擊鼓曰咢孫炎云聲驚咢也所以鼓柷謂之止注柷如漆桶方二尺四寸深一尺八寸中有椎柄連底挏之令左右擊止者其椎名所以鼓敔謂之籈注敔如伏虎背上有二十七鉏鋙刻以木長尺櫟之籈者其名音義柷昌熟反桶音動又音甬甬即斛也深尸鴆反或如字椎直追反下同柄兵命反底丁禮反挏大孔反令力呈反敔魚吕反鄭衆云木虎籈郭之仁反又音戰謝居延反郭云以木長尺櫟之名籈字林云以竹長尺也疏此别柷敔之名也周禮小師掌教鼓鼗柷敔柷敔皆以木為之故大師注云木柷敔也禮記謂之椌楬所以鼓動其柷以出其音者名止所以鼓動其敔以出其音者名籈郭云柷如漆桶方二尺四寸深一尺八寸中有椎柄連底挏之令左右擊止者其椎名敔如伏虎背上有二十七鉏鋙刻以木長尺櫟之籈者其名臯陶謨云合止柷敔鄭注云柷狀如漆桶中有椎合之者投椎於其中而撞之敔狀如伏虎背上刻之所以鼓之以止樂此等形狀蓋依漢之大常樂而知之大鼗謂之麻小者謂之料注麻者音概而長也料者聲清而不亂音義鼗徒刀反本或作鞀同説文云鞀遼也或作鞉又作籀文作磬同麻如字料力雕反概居器反疏詩頌云鼗磬柷敔鄭注小師職云鼗如鼓而小持其柄搖之旁耳還自擊一名麻其小者名料郭云麻者音概而長也料者聲清而不亂和樂謂之節疏八音克諧無相奪倫謂之和樂樂和則應節樂記云治世之音安以樂其政和是也樂記又云大樂與天地同和大禮與天地同節此對文爾總而言之則禮樂相將故此和樂亦謂之節一云節樂器名謂相也樂記云治亂以相鄭注云相即拊也亦以節樂拊者以韋為表裝之以粳粳一名相因以名焉言治理奏樂之時擊拊以輔相於樂而為節也既以柷作樂以敔止樂故以節為和樂義亦通也釋天第八音義天土堅反釋名云天豫兗以舌腹言之天顯也在上高顯也青徐以舌頭言之天坦也坦然高逺也説文云天巔也至高無上從一大禮統云天之為言鎮也神也陳也珍也施生為本運轉精神功效列陳其道可珍重也春秋説題辭云天之為言鎮也居高理下為人經緯故其字一大以鎮之也疏河圖括地象云易有太極是生兩儀兩儀未分其氣混沌清濁既分伏者為天偃者為地釋名云天顯也在上高顯又云天坦也坦然高逺説文云天巔也至高無上從一大也春秋説題辭云天之言顯也居高理下為人經緯故其字一大以鎮之此天之名義也天之為體中包乎地日月星辰屬焉然天地有高下之形四時有升降之理日月有運行之度星辰有次舍之常既曰釋天不得不略言其趣故其形狀之殊凡有六等一曰蓋天文見周髀如蓋在上二曰渾天形如彈丸地在其中天包其外猶如雞卵白之繞黃揚雄桓談張衡蔡雍陸績王肅鄭玄之徒並所依用三曰宣夜昔説殷代之制其形體事義無所出以言之四曰昕天昕讀曰軒言天北高南下若車之軒是吳時姚信所説五曰穹天云穹隆在上虞氏所説不知其名也六曰安天是晉時虞喜所論案鄭注考靈耀云天者純陽清明無形聖人則之制璿璣玉衡以度其象如鄭此言則天是大虛本無形體但指諸星之運轉以為天耳但諸星之轉從東而西凡三百六十五日四分日之一星復舊處星既左轉日則右行亦三百六十五日四分日之一至舊星之處即日一日之行而為一度計二十八宿一周天凡三百六十五度四分度之一是天之二周之數也天如彈丸圍圜三百六十五度四分度之一案考靈耀云一度二千九百三十二里千四百六十一分里之三百四十八周天百七萬一千里者是天圜周之里數也以圍三徑一言之則直徑三十五萬七千里此為二十八宿周回直徑之數也然二十八宿之外上下東西各有萬五千里是為四遊之極謂之四表據四表之內并星宿內總有三十八萬七千里然則天之中央上下正半之處則一十九萬三千五百里地在於中是地去天之數也鄭注考靈耀云地蓋厚三萬里春分之時地正當中自此地漸漸而下至夏至之時地下萬五千里地之上畔與天中平夏至之後地漸漸向上至秋分地正當天之中央自此地漸漸而上至冬至上遊萬五千里地之下畔與天中自冬至後地漸漸而下此是地之升降於三萬里之中但混大之體雖繞於地地則中央正平天則北高南下北極高於地三十六度南極下於地三十六度然則北極之下三十六度常見不沒南極之上三十六度常沒不見南極至北極一百二十一度餘若逐曲計之則一百八十一度餘若以南北中半言之謂之赤道去南極九十一度去北極亦九十一度餘此是春秋分之日道赤道之北二十四度為夏至之日道去北極六十七度也赤道之南二十四度為冬至之日道去南極亦六十七度地有升降星辰有四遊又鄭注考靈耀云天旁行四表之中冬南夏北春西秋東皆薄西表而止地亦升降於天中冬至而下夏至而上二至上下蓋極地厚也地與星辰俱有四遊升降四遊者自立春地與星辰西遊春分西遊之極地雖西極升降正中從此漸漸而東至春季復正自立夏之後北遊夏至北遊之極地則升降極下至夏季復正立秋之後東遊秋分東遊之極地則升降正中至秋季復正立冬之後南遊冬至南遊之極地則升降極上至冬季復正此是地及星辰四遊之義也星辰亦隨地升降故鄭注考靈耀云夏日道上與四表平下去東井十二度為三萬里則是夏至之日上極萬五千里星辰下極萬五千里故夏至之日下至東井三萬里也日有九道故考靈耀云萬里不失九道謀鄭注引河圖帝覽嬉云黃道一青道二出黃道東赤道二出黃道南白道二出黃道西黑道二出黃道北日春東從青道夏南從赤道秋西從白道冬北從黑道立春星辰西遊日則東遊立夏星辰北遊日則南遊春分星辰西遊之極日東遊之極日與星辰相去三萬里夏至則星辰北遊之極日南遊之極日與星辰相去三萬里以此推之秋冬倣此可知計夏至之日日在井星當嵩高之上以其南遊之極故在嵩高之南萬五千里所以夏至有尺五寸之景也於時日又上極星辰下極故日下去東井三萬里也然鄭四遊之説元出周髀之文但二十八宿從東而左行日從西而右行一度逆沿二十八宿案漢書律歷志云冬至之時日在牽牛初度春分之時日在婁四度夏至之時日在東井三十一度秋分之時日在角十度若日在東井則極長八尺之表尺五寸之景若春分在婁秋分在角畫夜等八尺之表七尺五寸之景冬至日在牽牛則日極短八尺之表一丈三尺之景一丈三尺之中去其一尺五寸則餘有一丈一尺五寸之景是冬夏往來之景也凡於地千里而差一寸則夏至去冬至體漸南漸下相去十一萬五千里又考靈耀云正月假上八萬里假下一十萬四千里所以有假上假下者鄭注考靈耀之意以天去地十九萬三千五百里正月雨水之時日在上假於天八萬里下至地一十一萬三千五百里夏至之時日上極與天表平也後日漸向下故鄭注考靈耀云夏至日與表平冬至之時日下至於地八萬里上至於天十一萬三千五百里也委曲具考靈耀注凡二十八宿及諸星皆循天左行一日一夜一周天一周天之外更行一度計一年三百六十五周天四分度之一日月五星則右行日一日一度月一日一十三度十九分度之七此相通之數也今歷象之説則月一日至於四日行最疾日行十四度餘自五日至八日行次疾日行十三度餘自九日至十九日行則遲日行十二度餘自二十日至二十三日又小疾日行十三度餘自二十四日至於晦行又最疾日行一十四度餘此是月行之大率也二十七日月行一周天至二十九日強半月及於日與日相會乃為一月故考靈耀云九百四十分為一日二十九日與四百九十九分為月是一月二十九日之外至第三十日分至四百九十九分月及於日計九百四十分則四百七十為半今四百九十九分是過半二十九分也餘倣此月隂精日為陽精故周髀云日猶火月猶水火則外光水則含景故月光生於日所照魄生於日所蔽當日則光盈就日則明盡京房云月與星辰隂者也有形無光日照之乃有光先師以為日似彈丸月似鏡體或以為月亦似彈丸日照處則明不照處則暗案律厯志云二十八宿之度角一十二度亢九氐十五房五心五尾十八箕十一東方七十五度斗二十六牛八女十二虛十危十七營室十六壁九北方九十八度奎十六婁十二胃十四昴十一畢十六觜二參九西方八十度井三十三鬼四柳十五星七張十八翼十八軫十七南方一百一十二度丑為星紀初斗十二度終婺女七度子為玄枵初婺女八度終於危十五度亥為娵觜初危十六度終於奎四度戍為降婁初奎五度終於胃六度酉為大梁初胃七度終於畢十一度申為實沈初畢十二度終於井十五度未為鶉首初井十六度終於柳八度午為鶉火初柳九度終於張十七度已為鶉尾初張十八度終於軫十一度辰為壽星初軫十二度終於氐四度卯為大火初氐五度終於尾九度寅為析木初尾十度終於斗十一度五星者東方歲星南方熒惑西方太白北方辰星中央鎮星其行之遲速俱在律歷志更不煩説元命包云日之為言實也月闕也劉熙釋名云日實也光明盛實月闕也滿則闕也説題辭云星陽精之榮也陽精為日日分為星故其字日下生也釋名云星散也布散於天又云隂蔭也氣在內奧蔭也陽揚也陽氣在外發揚此等是隂陽日月之名也祭法黃帝正名百物其名蓋黃帝而有也或後人更有增足其天高地下日盈月闕觜星度少井斗度多日月右行星辰左轉四遊升降之差二儀運動之法非由人事所作皆是造化自然先儒因其自然遂以人事為義或據理是實或搆虛不經既無正文可慿今皆略而不録穹蒼蒼天也注天形穹隆其色蒼蒼因名云春為蒼天注萬物蒼蒼然生夏為昊天注言氣皓旰秋為旻天注旻猶愍也愍萬物雕落冬為上天注言時無事在上而臨下而已音義穹起宫反蒼且剛反郭以穹及蒼蒼俱為天稱毛詩傳則以蒼天釋穹蒼隆呂穹反夏胡駕反下同昊胡杲反皓胡老反本亦作昊光明也日出也旰古案反日光出也旻亡巾反愍亡忍反雕都聊反上時羕反疏此釋四時之天名也云穹蒼蒼天也者詩大雅桑柔云靡有旅力以念穹蒼故此釋之也詩人因天形穹隆其色蒼蒼故云穹蒼其實則與下云春為蒼天者是一故云穹蒼蒼天也郭云天形穹隆其色蒼蒼因名云也云春為蒼天者詩王風黍離云悠悠蒼天故此釋之也郭云萬物蒼蒼然生者言春時萬物蒼蒼然生春時天名曰蒼天也云夏為昊天者詩雨無正云浩浩昊天故此釋之昊者元氣博大之貌郭云言氣皓旰者皓旰日光出之貌也言畏日光明皓旰因名云昊天也云秋為旻天者詩大雅召旻云旻天疾威之類旻愍也言秋氣肅殺萬物可愍故曰旻天郭云旻猶愍也愍萬物雕落者旻愍詩序文但彼愍作閔音義同也云冬為上天者詩小雅信南山云上天同雲之類言冬時無事唯在於上故曰上天郭云言時無事在上臨下而已者言冬氣閉藏無他生殺之事惟在於上監於下而已也案詩傳云蒼天以體言之尊而君之則稱皇天元氣廣大則稱昊天仁覆閔下則稱旻天自上降監則稱上天據逺視之蒼蒼然則稱蒼天毛公此傳當有成文不知出何書李巡云古詩人質仰視天形穹隆而高其色蒼蒼故曰穹蒼是蒼天以體言之也皇君也故尊而君之則稱皇天昊天貌故言其混元之氣昊昊廣大則稱昊天旻閔也言其以仁慈之恩覆閔在下則稱旻天從上而下視萬物則稱上天據人逺而視之其色蒼蒼然則稱蒼天又李巡注此云春萬物始生其色蒼蒼故曰蒼天夏萬物盛壯其氣昊昊故曰昊天秋萬物成熟皆有文章故曰旻天冬隂氣在上萬物伏藏故曰上天案此以四時異其天名詩傳則各用所宜為稱似相乖異而鄭玄則和合二説故異義同號今尚書歐陽説春曰昊天夏曰蒼天秋曰旻天冬曰上天爾雅亦云古尚書與毛詩同謹案尚書堯典羲和以昊天總敕以四時故知昊天不獨春也左傳夏四月孔丘卒稱曰旻天不弔非秋也玄之聞也爾雅者孔子門人所作以釋六藝之言蓋不誤也春氣博施故以廣大言之夏氣高明故以逺大言之秋氣或生或殺故以閔下言之冬氣閉藏而清察故以監下言之皇天者至尊之號也六藝之中諸稱天者以情所切求之耳非必於其時稱之浩浩昊天求天之博施悠悠蒼天求天之高明旻天不弔求天之生殺當得其宜上天同雲求天之所為當順其時也此之求天猶人之説事各從其主耳若察於是則堯命羲和欽若昊天孔丘卒旻天不弔無可怪耳是鄭和合二説之事也爾雅春為蒼天夏為昊天歐陽説春為昊天夏為蒼天鄭即言爾雅不誤當從爾雅而又從歐陽説以春昊夏蒼者鄭讀爾雅與孫郭本異故許慎既載今尚書説即言爾雅亦云明見爾雅與歐陽説同雖蒼昊有春夏之殊則未知孰是要二説理相符合故鄭和而釋之四時疏此題上事也言上所陳是四時之名也題之在下者若周公踐阼及詩篇章句皆篇末題之故此亦爾白虎通云嵗時何謂春秋冬夏也時者期也隂陽消息之期也鄉飲酒義云春之為言蠢也産萬物者聖也夏之為言假也飬之長之假之仁也秋之為言揫也揫之以時察守義者也冬之為言中也中者藏也春為青陽注氣青而溫陽夏為朱明注氣赤而光明秋為白藏注氣白而收藏冬為玄英注氣黑而清英四時和謂之玉燭注道光照春為發生夏為長贏秋為收成冬為安寧注此亦四時之别號尸子皆以為太平祥風四時和為通正注通平暢也謂之景風注所以致景風甘雨時降萬物以嘉注莫不善之謂之醴泉注所以出醴泉音義藏徂蒼反英於京反玉燭李云人君德美如玉而明若燭長謝丁兩反李云萬物各發生長也施直良反贏本或作嬴以征反大音泰醴本或作澧字音禮疏此釋太平之時四氣和暢以致嘉祥之事也云春為青陽者言青春之氣和則青而溫陽也云夏為朱明者言夏之氣和則赤而光明也云秋為白藏者言秋之氣和則色白而收藏也云冬為玄英者言冬之氣和則黑而清英也云四氣和謂之玉燭注云道光照者道言也言四時和氣溫潤明照故曰玉燭李巡云人君德美如玉而明若燭聘義云君子比德於玉焉是知人君若德輝動於內則和氣應於外統而言之謂之玉燭也云春為發生夏為長贏秋為收成冬為安寧者此亦四時之别號也云四時和為通正者言上四時之功和是為通暢平正也云謂之景風者言所以致景風景風即祥風也云甘雨時降萬物以嘉者嘉善也甘雨即時雨也不為萬物所苦故曰甘若月令苦雨數來則非甘也甘雨既以時降則萬物莫不嘉善之也云謂之醴泉者言四時平暢亦所以使地出醴泉也醴泉者水泉味甘如醴也云此亦四時之别號者言與上青陽等同為四時别號故云亦也上據氣而言此據功為説注尸子皆以為太平祥風者案尸子仁意篇述太平之事云燭於玉燭飲於醴泉暢於永風春為青陽夏為朱明秋為白藏冬為玄英四時和正光照此之謂玉燭甘雨時降萬物以嘉高者不少下者不多此之謂醴泉其風春為發生夏為長贏秋為方盛冬為安靜四氣和為通正此之謂永風是也案援神契云德及於天斗極明日月光甘露降德至深泉則黃龍見醴泉湧是言王者修德以召和平則致景風醴泉也案此經所釋即謂發生等為景風時雨為醴泉而郭云所以致景風醴泉者所以𢎞通其義也祥疏云祥者亦題上事也祥吉也善也言此上皆太平之吉祥也榖不熟為飢注五榖不成蔬不熟為饉注凡草菜可食者通名為蔬果不熟為荒注果木子仍飢為荐注連嵗不熟左傳曰今又荐飢音義飢居疑反本或作飢又作古字説文字林皆云飢榖不熟飢餓也蔬音疏饉巨靳反荐李本作薦字音同在見反疏此釋嵗凶災荒之名也榖謂五榖黍稷麻麥豆也熟成也五榖不成曰飢郭云凡草菜可食者通名蔬李巡曰可食之菜皆不熟為饉周禮天官大宰職云以九職任萬民八曰臣妾聚斂疏材鄭玄云疏材百草根實可食者小雅云降喪飢饉襄公二十四年榖梁傳曰一榖不升謂之歉二榖不升謂之飢三榖不升謂之饉四榖不升謂之荒五榖不升謂之大飢又謂之大侵彼以五榖熟之多少立差等之名其實五者皆是飢也三榖不升於民之困蓋與蔬不熟同故俱名為饉也果木子也不成熟之嵗名荒仍因也飢飢也連嵗不熟為荐飢僖十三年晉荐飢是也注左傳曰今又荐飢此晉語文也左丘明既作傳以解春秋又采簡牘以作國語其文不主於經故謂之外傳俱是丘明所作亦得云左傳曰案彼云晉飢乞糴於秦丕豹曰晉君無禮於君莫不知往年有難今又荐飢已失人又失天其殃也多矣君其伐之勿與糴是其事也災疏云災者亦題上事也下皆倣此大嵗在甲曰閼逢在乙曰􅏧蒙在丙曰柔兆在丁曰強圉在戊曰著雍在已曰屠維在庚曰上章在辛曰重光在壬曰玄黓在癸曰昭陽音義大音泰下放此本今作太閼烏割反又於歇反又於虔反逢符隆反􅏧之然反蒙莫東反強本或作強字音同渠良反圉魚呂反戊音茂著直魚反孫直略反又陟慮遲慮反本或作祝字宜章六反雍於恭反本或作黎字宜力低反已音紀重直龍反黓余職反嵗陽太嵗在寅曰攝提格在卯曰單閼在辰曰執徐在已曰大荒落在午曰敦牂在未曰協洽在申曰涒灘在酉曰作噩在戌曰閹茂在亥曰大淵獻在子曰困敦在丑曰赤奮若音義提徒兮反卯亡巧反單音丹李云盡也又音蟬或音善閼於葛反李云土也又於虔反執徐此二字依文讀李云執蟄也徐舒也言蟄物皆敷舒而出故曰執徐也已音祀敦如字韋昭音頓牂子良反協音叶洽户浹反涒湯昆反灘本或作攤郭敕丹敕旦二反字林大安他安二反噩本或作咢字同五各反漢書作詻韋昭音折案聲類詻音五格反戍先律反閹於撿反漢書作掩敦都鈍反奮方問反疏此别大嵗在日在辰之名也甲至癸為十日日為陽寅至丑為十二辰辰為隂案漢書律歷志云乃以前歷上元泰初四千六百二十七嵗至於元封七年復得閼逄攝提格之嵗中冬孟康曰言復得者上元泰初時亦是閼逢之嵗嵗在甲曰閼逢在寅曰攝提格此謂甲寅之嵗也然則乙卯之嵗曰􅏧蒙單閼丙辰之嵗曰柔兆執徐丁已之嵗曰強圉大荒落戊午之嵗曰著雍敦牂己未之嵗曰屠維協洽庚申之嵗曰上章涒灘辛酉之嵗曰重光作噩壬戌之嵗曰玄黓閹茂癸亥之嵗曰昭陽大淵獻甲子之嵗曰閼逢困敦乙丑之歲曰􅏧蒙赤奮若以此推之周而復始可知載嵗也夏曰嵗注取嵗星行一次商曰祀注取四時一終周曰年注取禾一熟唐虞曰載注取物終更始音義夏胡雅反嵗􅏷征云每嵗孟春祀太甲云惟元祀年見春秋尚書載堯典云朕在位七十載疏别年嵗之名也載即嵗也白虎通云王者受命而改正朔者明易姓示不相襲也明受之於天不受之於人所以變易民心革其耳目以助化也然則嵗名變易理亦同此故夏曰嵗取嵗星行一次夏書曰每嵗孟春遒人以木鐸徇于路是也商曰祀取四時一終則以祀者嗣也取其興來繼往之義孫炎曰取四時祭祀一訖商書曰惟元祀十有二月乙丑伊尹嗣于先王是也周曰年者取禾一熟也案説文云年榖熟也從禾千聲春秋曰大有年然則年者禾熟之名每嵗一熟故以為嵗名左傳曰卜年七百是也唐虞曰載載始也取物終更始堯典曰朕在位七十載舜典曰五載一巡守是也一案律歷志分二十八宿為十二次晉灼注天文志云太嵗在四仲則嵗行三宿太嵗在四孟四季則嵗行二宿二八十六三四十二而行二十八宿十二嵗而周天是嵗星年行一次也嵗名月在甲曰畢在乙曰橘在丙曰修在丁曰圉在戊曰厲在已曰則在庚曰窒在辛曰塞在壬曰終在癸曰極音義橘均筆反修本亦作修圉音語己音紀窒知乙反塞先北反月陽正月為陬注離騷云攝提貞於孟陬二月為如三月為寎四月為余五月為臯六月為且七月為相八月為壯九月為玄注國語云至於玄月是也十月為陽注純隂用事嫌於無陽故以名云十一月為辜十二月為塗注皆月之别名自嵗陽至此其事義皆所未詳通者故闕而不論音義正音征陬側留子侯二反隅也又子瑜反寎本或作窉字同郭孚柄反又況病反又匡詠反李陂病反余餘舒二音孫作舒李云舒也萬物生枝葉故曰舒也臯或作高同且子余反相息亮反壯側亮反陽本或作霷字同詩云日月陽止是也辜音姑塗音徒疏此辨以日配月之名也設若正月得甲則曰畢陬二月得乙則曰橘如三月得丙則曰修寎四月得丁則曰圉余五月得戊則曰厲臯六月得已則曰則且七月得庚則曰窒相八月得辛則曰塞壯九月得壬則曰終玄十月得癸則曰極陽十一月得甲則曰畢辜十二月得乙則曰橘塗周而復始亦可知也若史記厯書云月名畢聚也注離騷者屈原所作也屈原與楚同姓事懷王為三閭大夫為大夫靳尚所譖毁見疏乃作離騷經離别也騷愁也言已放逐離别心中愁思猶陳正道以諷諫君也其經曰帝高陽之苖裔兮朕皇考曰伯庸攝提貞於孟陬兮惟庚寅吾以降彼注云言已生得隂陽之正中者引之以證正月為陬之義云國語云至於玄月是也此越語文也案彼云越王將伐吳范蠡諫曰王姑待之至於玄月王召范蠡而問焉彼注云魯哀公十六年九月也至十七年三月越伐吳是也引之以證九月為玄也云純隂用事嫌於無陽故以名云者以易言之五月一隂生十月純隂用事故云純隂用事也云嫌者君子愛陽而惡隂故以陽名之無陽而得陽名者以分隂分陽迭用剛柔十二月之消息見其用事耳其實隂陽有常詩緯曰陽生酉仲隂生戍仲是十月中兼有隂陽也四月莠葽靡草死豈無隂乎明隂陽常兼有也詩小雅云日月陽止是也又云自嵗陽至此者謂自閼逢以下也云其事義皆所未詳通者案李巡孫炎雖各有其説皆搆虛不經疑事無質故闕而不論月名南風謂之凱風注詩曰凱風自南東風謂之谷風注詩云習習谷風北風謂之涼風注詩云北風其涼西風謂之泰風注詩曰泰風有隧焚輪謂之頽注暴風從上下扶搖謂之猋注暴風從下上風與火為庉注庉庉熾盛之貌回風為飄注旋風也日出而風為暴注詩云終風且暴風而雨土為霾注詩云終風且霾隂而風為曀注詩曰終風且曀天氣下地不應曰雺注言蒙昧地氣發天不應曰霧霧謂之晦注言晦冥螮蝀謂之雩螮蝀虹也注俗名為美人虹江東呼雩霓為挈二注霓雌虹也見離騷挈二其别名見尸子弇日為蔽雲注即暈氣五彩覆日也疾雷為庭霓注雷之急擊者謂霹靂雨霰為霄雪注詩曰如彼雨雪先集維霰霰冰雪雜下者謂之霄雪暴雨謂之涷注今江東呼夏月暴雨為涷雨離騷云令飄風兮先驅使涷雨兮灑塵是也小雨謂之霡霂注詩曰益之以霡霂久雨謂之淫注左傳曰天作淫雨淫謂之霖注雨自三日已上為霖濟謂之霽注今南陽人呼雨止為霽音義凱口海反又作颽涼本或作古字同力張反隧音遂焚符云反頽本或作穨隤同徒回反扶如字字林作同搖音遙字林作颻同猋必遙反字林作飆音同上時掌反庉徒衮徒昆二反本或作炖字同熾尺志反飄音瓢暴薄報反雨音芋下雨霰注雨雪同霾亡皆反字林云亡戒反曀於計反應於證反下同雺或作霧字同亡公亡侯二反霧亡弄反又亡付反字林作音司本亦作晦音誨冥亡定反螮丁計反本或作蝃蚚同蝀丁孔反詩作東音同又德紅反雩案字林越俱反今借為芌音于句反虹胡公反字林云工弄反陳國武古巷反郭音講俗亦呼為青絳也霓五兮反如淳五結反郭五擊反音義云雄曰虹雌曰霓説文曰屈虹青赤也一曰白色隂氣也故孟子云若大旱之望雲霓也挈本或作契字同苦結反二而至反弇音掩暈音運庭徒丁反字林同又徒佞徒頂二反説文云雷餘聲鈴鈴所以挺出萬物也霹普覔反靂力狄反楊雄羽獵賦云霹靂列缺吐火施鞭史記云霹靂者陽氣也霰本或作霰同悉練反霄音消本亦作消説文曰雨霰為霄齊語也涷都貢反郭音東令力呈反驅如字豈俱羌句二反灑所買所綺二反霡亡革反字林作音同又亡狄反霂亡祿反上時掌反濟祖細反霽字林子系反云雨止也郭祖禮反一音祖細反疏此釋風雨之名也易曰風以動之雨以潤之又曰潤之以風雨洪範曰月之從星則以風雨然則風雨相將之物故此類聚而釋之也云南風謂之凱風者李巡曰南風長養萬物喜樂故曰凱風凱樂也郭氏無説義或當然詩邶風云凱風自南是也云東風謂之谷風者孫炎曰谷之言榖榖生也谷風者生長之風也詩邶風云習習谷風是也云北風謂之涼風者北風一名涼風言北風寒涼之風也月令孟秋之月涼風至詩邶風云北風其涼是也云西風謂之泰風者孫炎曰西風成物物豐泰也詩大雅桑柔云泰風有隧是也云焚輪謂之頽者李巡曰焚輪暴風從上來降謂之頽頽下也孫炎曰回風從上下曰頽郭云暴風從上下與李同也詩小雅云習習谷風維風及頽是也云扶搖謂之猋者李巡曰扶搖暴風從下升上故曰猋猋上也孫炎曰回風從下上曰猋郭云暴風從下上亦同李説莊子説鵬云搏扶搖而上者九萬里月令孟春行秋令則猋風暴雨總至是也云風與火為庉者郭云庉庉熾盛之貌言風自火出火因風熾而有大風者為庉云回風為飄者郭云旋風也李巡曰一曰飄風别二名也詩蓼莪云飄風發發是也云日出而風為暴者孫炎云隂雲不興而大風暴起然則為風之暴疾故詩邶風云終風且暴毛傳云暴疾也云風而雨土為霾者孫炎曰大風揚塵土從上下也詩邶風云終風且霾是也云隂而風為曀者孫炎曰雲風曀日光詩邶風云終風且曀是也云天氣下地不應曰雺者郭云言蒙昧洪範云曰雺鄭注云雺聲近蒙詩零雨其蒙則雺是天氣下降地氣不應蒙暗也云地氣發而天不應曰霧霧謂之晦者郭云言晦冥月令仲冬行夏令氛霧冥冥鄭云霜露之氣散相亂也然則地氣發而上天不應之則為氛霧霧又名晦春秋僖十五年己卯晦震夷伯之廟公羊榖梁皆云晦冥也是矣云螮蝀謂之雩螮蝀虹也者郭云俗名美人虹江東呼雩然則螮蝀一名雩一名虹詩鄘風云蝃蝀在東月令季春之月虹始見音義云虹雙出色鮮盛者為雄雄曰虹暗者為雌雌曰霓虹是隂陽交會之氣純隂純陽則虹不見若雲薄漏日日照雨滴則虹生螮與蝃音義同云霓為挈二者霓雌虹也一名挈二説文云霓屈虹青赤或白色隂氣也郭云見離騷者即天問云白霓嬰茀胡為此堂及逺遊章云雌霓㛹嬛以會橈兮是也挈二其别名也文見尸子云弇日為蔽雲者郭云即暈氣五彩覆日也然則暈氣弇日名蔽雲周禮春官視祲掌十輝之法鄭司農云輝謂日光氣是也云疾雷為霆霓者郭云雷之急擊者謂霹靂案説文云霆雷餘聲也鈴鈴所以挺出萬物也又云震劈歷振物者然則疾雷一名霆霓又名震春秋震夷伯之廟謂劈歷破之是也霹靂俗字也云雨霰為霄雪者霰冰雪雜下也因名霄雪霄即消也詩小雅頍辨云如彼雨雪先集維霰鄭箋云將大雨雪始必微溫雪自上下遇溫氣而搏謂之霰案大戴禮曽子云陽之專氣為霰隂之專氣為雹盛陽之氣在雨水則溫暖為隂氣薄而脅之不相入則搏為雹也盛隂之氣在雨水則凝滯而為雪陽氣薄而脅之不相入則消散而下因冰而為霰是霰由陽氣所薄而為之故鄭言遇溫氣而搏也霰與霰音義同云暴雨謂之涷者暴雨謂驟雨也一名涷郭云今江東呼夏月暴雨為涷雨離騷云令飄風兮先驅使涷雨兮灑塵是也者此離騷九歌大司命文案彼云廣開兮天門紛吾乘兮玄雲令飄風兮先驅使涷雨兮灑塵是也云小雨謂之霡霂者小雨一名霡霂小雅信南山云益之以霡霂是也李巡云冰雪俱下案此文上有暴雨下云久雨於中間無雪事而云冰雪俱下妄矣云久雨謂之淫者淫過也久雨過多害於五稼故謂之淫月令季春行秋令則天多沈隂淫雨早降謂久雨也注云左傳曰天作淫雨者莊十二年傳文也云淫謂之霖者淫雨又名霖也郭云雨自三日已上為霖者隱九年左傳文也云濟謂之霽者濟止也雨止名霽郭云今南陽人呼雨止為霽書云曰霽風雨疏風雨者題上事也壽星角亢也注數起角亢列宿之長故曰壽天根氐也注角亢下繫於氐若木之有根天駟房也注龍為天馬故房四星謂之天駟大辰房心尾也注龍星明者以為時候故曰大辰大火謂之大辰注大火心也在中最明故時候主焉析木謂之津注即漢津也箕斗之間漢津也注箕龍尾斗南斗天漢之津梁星紀斗牽牛也注牽牛斗者日月五星之所終始故謂之星紀玄枵虛也注虛在正北北方黑色枵之言耗耗亦虛意顓頊之虛虛也注顓頊水德位在北方北陸虛也注虛星之名凡四營室謂之定注定正也作宫室皆以營室之中為正娵觜之口營室東壁也注營室東壁星四方似口因名云降婁奎婁也注奎為溝瀆故名降大梁昴也西陸昴也注昴西方之宿别名旄頭濁謂之畢注掩兔之畢或呼為濁因星形以名咮謂之柳注咮朱鳥之名柳鶉火也注鶉鳥名火屬南方北極謂之北辰注北極天之中以正四時何鼓謂之牽牛注今荆楚人呼牽牛星為簷鼓簷者荷也明星謂之啓明注太白星也晨見東方為啓明昏見西方為太白彗星為欃槍注亦謂之孛言其形孛孛似掃彗奔星為彴約注流星音義亢音剛又口浪反或戶剛反數色住反宿夙又反下同長丁丈反氐都黎反郭音抵丁禮反注云若木之有根尋義應作丁計反析星歷反枵許嬌反左傳云枵耗名也耗呼報反顓音專頊許玉反顓頊帝高陽氏虛此一字音墟下如字定多佞反娵子瑜反觜咨移反又子髓反壁布覓反今案此星有人居之角象宜為壁降胡江反又江巷反注同婁郎侯反奎口圭反昴音卯本或作鼎同旄音毛兔他故反咮豬究反本或作喙許穢反説文云喙口也昌鋭反柳力九反鶉音純何郭胡可反又胡多反注同小爾雅云任也説文云簷也注作荷字音同簷丁甘反字林負也啓口禮反見賢遍反下同彗似鋭反又音遂欃初銜仕衫二反槍初庚七羊二反孛蒲匆反或音佩掃素報反彴蒲博步角皮約三反約如字又於詔反又音握疏此别星名也案周禮保章氏以星土辨九州之地所封封域皆有分星以觀妖祥鄭玄注云大界則曰九州諸國之封域於星亦有分焉其書亡矣堪輿雖有郡國所入度非古數也今其存可言者十二次之分也星紀吳越也玄枵齊也娵訾衛也降婁魯也大梁趙也實沈晉也鶉首秦也鶉火周也鶉尾楚也壽星鄭也大火宋也析木燕也又漢書律歷志東方角亢氐房心尾箕北方斗牛女虛危室壁西方奎婁胃昴畢觜參南方井鬼柳星張翼軫宿凡二十八此經所釋次惟有九宿惟十七者以爾雅之作釋六藝所載者所不載者則闕焉壽星角亢也者言壽星之次值角亢之宿也郭云數起角亢列宿之長故曰壽天文志云東宫蒼龍左角理右角將大角者天王帝坐廷亢主宗廟是也云天根氐也者氐一名天根郭云角亢下繫於氐若木之有根國語曰天根見而水涸是也云天駟房也者房一名天駟也郭云龍為天馬故房四星謂之天駟天文志曰房為天府曰天駟國語曰月在天駟是也云大辰房心尾也者大辰房心尾之總名也辰時也郭云龍星明者以為時候故曰大辰春秋昭十七年冬有星孛於大辰是也云大火謂之大辰者大火大辰之次名也李巡云大火蒼龍宿心以候四時郭云大火心也在中最明故時候主焉左傳曰心為大火是也云析木謂之津箕斗之間漢津也者析木之津箕斗之次名也孫炎曰析别水木以箕斗之間是天漢之津也劉炫謂是天漢即天河也天河在箕斗二星之間箕在東方木位斗在北方水位分析水木以箕星為隔隔河須津梁以渡故謂此次為析木之津也不言析水而言析木者此次自南而盡北故依此次而名析木也郭云箕龍尾斗南斗天漢之津梁以四方皆有七宿各成一形東方成龍形西方成虎形皆南首而北尾南方成鳥形北方成龜形皆西首而東尾箕在蒼龍之末故云龍尾斗至南方即見故云南斗昭八年左傳曰今在析木之津國語曰日在析木之津者是也案經典但有析木之津無析木謂之津今定本有謂字因注云即漢津也誤矣云星紀斗牽牛也者星紀斗牛之次也郭云牽牛斗者日月五星之所終始故謂之星紀左傳曰嵗在星紀是也云玄枵虛也者玄枵虛之次名也郭云虛在正北北方黑色枵之言耗耗亦虛意然則以其色黑而虛耗故名其次曰玄枵案襄二十八年左傳云春無冰梓慎曰今兹宋鄭其飢乎嵗在星紀而淫於玄枵以有時災隂不堪陽蛇乘龍龍宋鄭之星也宋鄭必飢玄枵虛中也枵耗名也土虛而民耗不飢何為云顓頊之虛虛也郭云顓頊水德位在北方然則以北方三次以玄枵為中玄枵次有三宿又虛在其中以水位在北顓頊居之故謂玄枵虛星為顓頊之虛也昭十年左傳云鄭裨竈言於子産曰今兹嵗在顓頊之虛是也云北陸虛也者虛星又謂之北陸也孫炎曰陸中也北方之宿虛為中也昭四年左傳云古者日在北陸而藏冰杜注云陸道也陸之為中為道皆無正訓各以意耳要以虛為北方中星宿是日行之道故謂之北陸郭云虛星之名凡四者玄枵也虛也顓頊之虛也北陸也云營室謂之定者營室一名定郭云定正也作宫室皆以營室中為正詩鄘風云定之方中作于楚宫鄭箋云定星昏中而正於是可以營制宫室故謂之營室云娵訾之口營室東壁也者娵訾室壁之次也壁居南則在室東孫炎曰娵訾之次則口開方營室東壁四方似口故因名也郭云營室東壁星四方似口因名云由其營室與東壁相成故得正四方襄三十年左傳云嵗在娵訾之口是也云降婁奎婁也者降婁奎婁之次名也孫炎曰降下也奎為溝瀆故稱降也郭云奎為溝瀆故名降者漢書天文志云奎曰封豨為溝瀆是也案襄三十年左傳云鄭公孫揮與禆竈晨過伯有氏其門上生莠子羽曰其莠猶在乎於是嵗在降婁降婁中而旦禆竈指之曰猶可以終嵗嵗不及此次也已及其亡也嵗在娵訾之口其明年乃及降婁是也云大梁昴也西陸昴也者大梁昴之次名也昴西方之宿名也昴又謂之西陸昭四年左傳云古者日在北陸而藏冰西陸朝覿而出之又十一年傳云嵗及大梁蔡復楚凶是昴星之名凡三郭云昴西方之宿别名旄頭者天文志云昴曰旄頭胡星也是矣云濁謂之畢者畢西方之宿名一名濁郭云掩兔之畢或呼為濁因星形以名詩小雅云有救天畢毛傳云救畢貌畢所以掩兔特牲饋食禮曰宗人執畢鄭注云畢狀如義蓋為其似畢星取名焉然則掩兔祭器之畢俱象畢星為之但掩兔之畢施網為異爾云咮謂之柳柳鶉火也者柳南方之宿名南方七宿共為朱鳥之形柳為朱鳥之口故名咮咮即朱鳥之口也鶉火柳之次名也鶉即朱鳥也火屬南方行也因名其次為鶉火襄九年左傳曰晉侯問於士弱曰吾聞之宋災於是乎知有天道何故對曰古之火正或食於心或食於咮以出內火是故咮為鶉火心為大火是也云北極謂之北辰者極中也辰時也居天之中人望之在北因名北極斗杓所建以正四時故云北辰論語云為政以德譬如北辰是也云何鼓謂之牽牛者李巡云何鼓牽牛皆二十八宿名也孫炎曰何鼓之旗十二星在牽牛北也或名為何鼓亦名牽牛如此文則牽牛何鼓一星也如李巡孫炎之意則二星今不知其同異也案漢書天文志牽牛為犧牲其北河鼓河鼓大星上將左左將右右將亦以牽牛河鼓為二星郭云今楚荆人呼牽牛星為簷鼓簷者荷也順經為説以時驗而言也云明星謂之啓明者孫炎曰明星太白也出東方高三舍今曰明星昏出西方高三舍今曰太白郭云太白星也晨見東方為啓明昏見西方為太白然則啓明是太白矣詩小雅云東有啓明西有長庚不知是何星也或以在東西而異名或二者别星未能審也云彗星為欃槍者彗星一名欃槍漢書天文志云嵗星贏而東南石氏見彗星甘氏不出三月乃生彗本類星末類彗長二丈贏東北石氏見覺星甘氏不出三月乃生天棓本類星末鋭長四尺縮西南石氏見欃雲如牛甘氏不出三月乃生天槍左右鋭長數丈縮西北石氏見槍雲如馬甘氏不出三月乃生天欃本類星末鋭長數丈石氏欃槍棓彗異狀其殃一也郭云亦謂之孛言其形孛孛似掃彗春秋左氏傳昭十七年冬有星孛于大辰西及漢申須曰彗所以除舊布新也公羊傳孛者何彗星也彗謂帚也言其狀似掃帚光芒孛孛然妖變之星非常所有故言孛又言彗也云奔星為彴約者奔星即流星也一名彴約星名疏星名題上事也春祭曰祠注祠之言食夏祭曰礿注新菜可汋秋祭曰嘗注嘗新榖冬祭曰蒸注進品物也祭天曰燔柴注既祭積薪燒之祭地曰瘞薶注既祭埋藏之祭山曰庪縣注或庪或縣置之於山山海經曰縣以吉玉是也祭川曰浮沉注投祭水中或浮或沉祭星曰布注布散祭於地祭風曰磔注今俗當大道中磔狗云以止風此其象是禷是禡師祭也注師出征伐類于上帝禡於所征之地既伯既禱馬祭也注伯祭馬祖也將用馬力必先祭其先禘大祭也注五年一大祭繹又祭也注祭之明日尋繹復祭周曰繹注春秋經曰壬午猶繹商曰肜注書曰高宗肜日夏曰復胙注未見義所出音義祠如字或音祀食音嗣礿本或作禴字同餘弱反汋余弱反燂菜也蒸之升反燔音煩猶焚也柴仕皆反説文作祡云燒柴燎祭天也瘞於例於計二反薶音埋本或作􅍥又作攱同居委居偽二反縣音玄注同沈直今反布李曰祭星者以祭布露地故曰布孫曰既祭布散於地似星布列也郭云布散祭於地也指謂敷列羅布也磔張格反狗音苟禷音類經典作類禡亡駕反禱丁老反説文亦作禱同禘大計反繹以石反五經及爾雅皆作此字本或作襗字書為䭞鐸二字同下同復扶又反夏戶雅反肜余終反復音服胙本或作祚才故反祚福也胙祭肉也於義並同疏此别四時及三代諸祭名也春祭曰祠夏祭曰礿秋祭曰嘗冬祭曰蒸者此四時之祭名也郭云祠之言食礿新菜可汋嘗嘗新榖蒸進品物也此皆周禮也殷以上則礿禘蒸嘗王制文是也至周公則去夏禘之名以春禴當之更名春曰祠故禘祫志云王制記先王之法度宗廟之祭春曰禴夏曰禘秋曰嘗冬曰蒸祫為大祭於夏於秋於冬周公制禮乃改夏為禴禘又為大祭祭義注云周以禘為殷祭更名春曰祠是祠禴嘗蒸之名周公制禮之所改也若然詩小雅云禴祠蒸嘗于公先王此文王之詩所以已得有制禮所改之名者王者因革與世而遷事雖制禮大定要亦所改有漸易曰不如西鄰之禴祭鄭注為夏祭之名則文王時已改言周公者據制禮大定言之耳祭天曰燔柴者祭天名燔柴祭法云燔柴於泰壇祭天也郭云既祭積薪燒之大宗伯云以禋祀祀昊天上帝以實柴祀日月星辰以槱燎祀司中司命飌師雨師鄭云禋之言煙周人尚臭煙氣之臭聞者槱積也詩曰芃芃棫朴薪之槱之三祀皆積柴實牲體焉或有玉帛燔燎而升煙所以報陽也然則祭天之禮積柴以實牲體玉帛而燔之使煙氣之臭上逹於天因名祭天曰燔柴也云祭地曰瘞薶者祭地名瘞薶祭法云瘞埋於泰圻祭地也然則祭神州地祗於北郊瘞繒埋牲因名祭地曰瘞埋李巡曰祭地以玉埋地中曰瘞埋孫炎曰瘞者翳也既祭翳藏地中云祭山曰庪縣者庪縣祭山之名也庪謂埋藏之大宗伯云以薶沉祭山林川澤鄭注云祭山林曰埋是也縣謂縣其牲幣於山林中因名祭山曰庪縣郭云或庪或縣置之於山是也又云山海經曰縣以吉玉是也者案中山經云歷兒冢也其祠禮毛太牢之具縣以吉玉彼注云縣祭山之名是也云祭川曰浮沉者浮沉祭川之名也郭云投祭水中或浮或沉大宗伯云以薶沉祭山林川澤鄭注云祭川澤曰沉順其性之含藏是也云祭星曰布者李巡曰祭星者以祭布露地故曰布孫炎曰既祭布散於地似星布列也郭云布散於地云祭風曰磔者磔謂披磔牲體象風之散物因名云郭云今俗當大道中磔狗云以止風此其象云是禷是禡師祭也者是類是禡詩大雅皇矣篇文也師祭也作者所以解詩也言用師出征之祭名也郭云師出征伐類于上帝禡於所征之地者王制云天子將出征類乎上帝禡於所征之地是也言類乎上帝則類祭祭天也祭天而謂之類者尚書夏侯歐陽説以事類祭之在南方就南郊祭之春官肆師注云類禮依郊祀而為之是用尚書説為義也禡之所祭其神不明肆師云凡四時之田獵祭表貉則為位注云貉師祭也於立表處為師祭祭造軍法者禱氣勢之增倍也其神蓋蚩尤或曰黃帝又甸祝掌四時之田表貉之祝號杜子春云貉兵祭也田以講武治兵故有兵祭習兵之禮故貉祭禱氣勢之十百而多獲由此二注言之則禡祭造兵為軍法者為表以祭之禡周禮作貉貉又或為貃字古今之異也貉之言百祭祀此神求獲百倍云既伯既禱馬祭也者既伯既禱詩小雅吉日篇文也馬祭也作者所以釋詩也毛傳云伯馬祖也重物慎微將用馬力必先為之禱其祖禱禱獲也郭云伯祭馬祖也將用馬力必先祭其先知伯是祭馬祖者為馬而祭故知馬祖謂之伯者伯長也馬祖始是長也鄭注周禮云馬祖天駟房也彼注云龍為天馬故房四星謂之天駟馬國之大用王者重之故夏官校人春祭馬祖夏祭先牧秋祭馬社冬祭馬步注云馬祖天駟先牧始養馬者馬社始乘馬者馬步神為災害馬者既四時各有所為祭之馬祖祭之在春其常也而將用馬力則又用彼禮以禱之云禘大祭也者經傳之文稱禘非一其義各殊論語云禘自既灌及春秋禘于太廟謂太廟之祭也喪服小記云王者禘其所自出也及太傳云禮不王不禘謂祭感生之帝於南郊也祭法云周人禘嚳而郊稷謂祭昊天於圜丘也以此比餘處為大祭總得謂禘宗廟謂之禘者禘諦也言使昭穆之次審諦而不亂也祭天謂之禘者亦言使典禮諦也郭云五年一大祭者出禮記文知非祭天之禘者以此文下云繹又祭也為宗廟之祭知此亦宗廟之祭者云繹又祭也者又復也繹復祭之名也郭云祭之明日尋繹復祭公羊傳云繹者何祭之明日也榖梁傳云繹者祭之旦日之享賓也天子諸侯謂之為繹少牢饋食大夫之禮也謂之賓尸與祭同日若然是亦與賔尸事不同矣而詩頌絲衣序云繹賓尸者繹祭之禮主為賓事此尸但天子諸侯禮大異日為之别為立名謂之為繹言其尋繹昨日卿大夫禮小同日為之不别立名直指其事謂之賔尸耳此序言繹者是此祭之名賓尸是此祭之事故特詳其文也然又祭之名三代各異周名繹商名肜夏名復胙郭云春秋經曰壬午猶繹者宣八年經文也又云書曰高宗肜日商書篇也孫炎云肜者相尋不絶之意夏曰復胙者郭云未見義所出以夏之典訓無言復胙名者是未見義所出也詩傳及詩箋亦無此一句説者云胙是祭肉也以祭之旦日復陳其祭肉以賓尸也未知然否祭名春獵為搜注搜索取不任者夏獵為苖注為苗稼除害秋獵為獮注順殺氣也冬獵為狩注得獸取之無所擇宵田為獠注管子曰獠獵畢弋今江東亦呼獵為獠或曰即今夜獵載爐照也火田為狩注放火燒草獵亦為狩乃立冢土戎醜攸行注冢土大社戎醜大衆起大事動大衆必先有事乎社而後出謂之宜注有事祭也周官所謂宜乎社振旅闐闐注振旅整衆闐闐羣行聲出為治兵尚威武也注幼賤在前貴勇力入為振旅反尊卑也注尊老在前復常儀也音義獵力涉反搜色留反搜音同上索色白反任而鴆反為于偽反獮息淺反説文從繭或作襺從示狩手又反宵音消夜也字從宀若雲霄之字即從雨獠郭音遼夜獵也又力召力弔二反或作燎宵田也畢本又作罼爐力吳反字或作壚冡竹勇反攸音由大音泰下大常同闐徒天反整之領反治音持疏此説田獵習武之事也云春獵為搜夏獵為苗秋獵為獮冬獵為狩者此四時田獵之名也郭云搜搜索取不任者苗為苗稼除害獮順殺氣也狩得獸取之無所擇隱五年左傳文搜苗獮狩注云搜索擇取不孕者苗為苗除害也獮殺也以殺為名順秋氣也狩圍守也冬物畢成獲則取之無所擇也周禮大司馬職中春教振旅遂以搜田中夏教茇舍遂以苗田中秋教治兵遂以獮田中冬教大閲遂以狩田其名亦與此同鄭玄解苗田與此小異言擇取不孕任者若治苗去不秀實者孫炎亦然桓四年公羊傳曰春曰苗秋曰搜冬曰狩三名既與禮異又復夏時不田榖梁傳曰四時之田皆為宗廟之事也春曰田夏曰苗秋曰搜冬曰狩皆與禮異者良由微言既絶曲辨妄生左丘明親受聖師爾雅者或云子夏所作故二者與禮合漢代古學不行明帝集諸學士作白虎通義因榖梁之文為之其説曰王者諸侯所以田獵何為苗除害上以共宗廟下以簡集士衆也春謂之田何春嵗之本舉本名而言之也夏謂之苗何擇去懷任者也秋謂之搜何搜索肥者也冬謂之狩何守地而取之也四時之田總名為田何為田除害也案苗非懷任之名何云擇去懷任秋獸盡皆不瘦何云搜索取肥雖名通義不通也故先儒皆依周禮左傳爾雅之文而為之説其名亦有意焉雖復春獵獲則取之不能擇取不孕夏獵所取無多不能為苗除害為因時異而變文耳謂之獵者蔡雍月令章句云獵者捷取之名也云宵田為獠者宵夜也夜獵名獠郭云管子曰獠獵畢弋者案管子四稱篇管仲對桓公曰昔者無道之君誅其良臣淫其婦女獠獵畢弋暴遇諸父者是也又云今江東亦呼獵為獠者以時驗而言也或曰即今夜獵載爐照也者亦得為一義故復引之云火田為狩者郭云放火燒草獵亦為狩言與冬獵同名故云亦也李巡孫炎皆云放火燒草守其下風周禮羅氏蠟則作羅襦鄭云襦細密之羅此時蟄者畢矣可以羅網圍取禽也今俗放火張羅其遺教禮記王制云昆蟲未蟄不以火田則是已蟄得火田也云乃立冢土戎醜攸行者此詩大雅綿篇文也郭云冢土大社戎醜大衆郊特牲云社所以神地之道也禮運云命降於社之謂殽地是社為土之神也冢詁為大土為社主故知冢土大社也釋詁云戎大也醜衆也故云戎醜大衆也云起大事動大衆必先有事乎社而後出謂之宜者此作者既引詩文於上然後為此辭以釋之也孫炎曰大事兵也有事祭也宜求見使祐也此文本解戎醜攸行之意言國家起發軍旅之大事以興動其大衆必先有祭祀於此社而出行其祭之名謂之為宜以師行必須宜祭以告社故言戎醜攸行也成十三年左傳曰國之大事在祀與戎故兵為大事也春秋昭十五年有事於武宫雜記云有事於上帝皆是祭事故謂祭為有事以兵凶戰危慮有負敗祭之以求其福宜故謂之宜王制云天子將出宜乎社是也郭云周官所謂宜乎社者春官大祝職云出師宜于社造于祖是也云振旅闐闐者此詩小雅采芑篇文也鄭箋云至戰止將歸又振旅伐鼓闐闐然振猶止也旅衆也郭云振旅整衆闐闐羣行聲云出為治兵尚威武也入為振旅反尊卑也者此亦作者釋上詩文也古者春教振旅秋教治兵以戎是大事又三年一教隱五年左傳曰三年而治兵入而振旅是也征伐之時出軍至對陳用治兵禮戰止至還歸用振旅法名異而禮同也以此出當用之故以修治兵事為名入則休息故以整衆為名其治兵振旅之名周禮左傳榖梁與此皆同惟公羊以治兵為祠兵其禮治兵則幼賤在前振旅則尊老在前郭云幼賤在前貴勇力也尊老在前復常儀也講武疏講武者題上事也言皆所以講習武事也素錦綢杠注以白地錦韜旗之竿纁帛縿注纁帛絳也縿衆旒所著素升龍于縿注畫白龍於縿令上向練旒九注練絳練也飾以組注用綦組飾旒之邊維以縷注用朱縷維連持之不欲令曵地周禮曰六人維王之太常是也緇廣充幅長尋曰旐注帛全幅長八尺繼旐曰斾注帛續旐末為燕尾者義見詩注旄首曰旌注載旄於竿頭如今之幢亦有旒有鈴曰旗注縣鈴於竿頭畫蛟龍於旒錯革鳥曰旟注此謂合剝鳥皮毛置之竿頭即禮記云載鴻及鳴鳶因章曰旃注以帛練為旒因其文章不復畫之周禮云通帛為旃音義綢他刁反杠音江廣雅云天子之杠高九仞諸侯七仞卿大夫五仞士三仞韜他刀反纁許云反縿本或作襳又作襂衫字同所銜反下同旒力周反經典亦作流廣雅云天子十二旒至地諸侯九旒至軫卿大夫七旒至轂士三旒至肩著直略反升音升令力呈反綦音其本亦作纂祖管反飾音式緇側基反廣古曠反充方言云幅廣曰充幅音福長直亮反注同旐持小反斾蒲蓋反注之樹反旄云褒反旌音精本又作旍幢直江反竿音干鈴郎丁反旗音祈縣音玄錯七各反又七故反旟羊諸反剝北角反鳶以專反鴟也旃之然反世本云黃帝作旃疏此别旌旗之異名也素錦綢杠者自此至維以縷説旗之制也綢韜也杠竿也先以白地錦韜旗之竿禮記所謂綢練設旐是也則以纁帛著於素錦名縿縿即衆旒所著者升上也又畫白龍於縿令上向又練絳帛為旒九以著於縿飾旒之邊用綦組以朱縷維持其旒使不曵地詩鄘風云素絲組之鄭箋云素絲者以為縷以縫紕旌旗之旒縿或以維持之是也郭云周禮曰六人維王之太常者夏官節服氏職文後鄭注云維之以縷王旌十二旒兩兩以縷綴連旁三人持之禮天子旌曵地鄭司農云維持之是也廣雅云天子杠高九仞諸侯七仞大夫五仞天子十二斿至地諸侯五斿至軫卿大夫七斿至軹士三斿至肩云緇廣充幅長尋曰旐者緇黑色也以黑色之帛廣全幅長八尺屬於杠名旐又以帛繼續旐末為燕尾者名斾郭云義見詩者小雅六月云白斾央央是也云注旄首曰旌者李巡曰旄牛尾著竿首孫炎曰析五采羽注旄上也其下亦有旒縿郭云載旄於竿頭如今之幢亦有旒如是則竿之首有旄有羽也故周禮序官夏采注云夏采夏翟羽色禹貢徐州貢夏翟之羽有虞氏以為綏後世或無故染鳥羽象而用之謂之夏采其職注云綏以旄牛尾為之綴於幢上所謂注旄於竿首者也云有鈴曰旗者郭云縣鈴於竿頭畫蛟龍於旒司常云交龍為旗又曰諸侯建旗然則旗者畫二龍於上一升一降相交又縣鈴於竿是諸侯之所建也詩小雅云旗旐央央是也云錯革鳥曰旟者孫炎曰錯置也革急也畫急疾之鳥於縿也鄭志答張逸亦云畫急疾之鳥隼以司常云鳥隼為旟詩小雅云織文鳥章也郭云此謂合剝鳥皮毛置之竿頭者意與孫鄭少異云即禮記云載鴻及鳴鳶者案曲禮云前有水則載青旌前有塵埃則載鳴鳶前有車騎則載飛鴻前有士師則載虎皮前有摯獸則載貔貅鄭注云載謂舉於旌首以警衆也禮君行師從卿行旅從前驅舉此則士衆知所有所舉各以其類象青青雀水鳥鳶鳴則將風鴻取飛有行列也士師謂兵衆虎取其有威勇也貔貅亦摯獸也云因章曰旃者孫炎曰因其繒色以為旗章不畫之是也司常云通帛為旃鄭注云通帛謂大赤從周正色而飾郭云以帛練為旒因其文章不復畫之周禮云通帛為旃者以因其文章與周禮通用絳帛隨義立名其實一也故引為證旌旗音義旗本又作旗凡旌旗之字皆從音偃説文云旌旗得風靡也或示旁手旁者非也疏旌旗者凡旗之名雖異旌旗為之總稱故以此題之案祭名講武旌旗俱非天類而亦在此者以皆王者大事又祭名則天曰燔柴講武則類於上帝旌旗則日月為常他篇不可攝故繫之釋天也爾雅注疏卷五
